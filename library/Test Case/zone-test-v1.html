<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>PC Zone Layout v1.9.5 — Experiment</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0e0e10;color:#ddd;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;padding:20px;min-height:100vh}

  .toolbar{max-width:1500px;margin:0 auto 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .toolbar button{background:#222;color:#ddd;border:1px solid #444;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px}
  .toolbar button.active{background:#3EA6FF;border-color:#3EA6FF;color:#000;font-weight:700}
  .toolbar .info{color:#888;font-size:12px;margin-left:auto;font-family:ui-monospace,monospace}

  .grid{max-width:1500px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:700px){.grid{grid-template-columns:1fr}}

  .test{background:#1a1a1c;border:1px solid #2a2a2e;border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px}
  .test h3{font-size:13px;color:#4FC3F7;font-weight:700;letter-spacing:.3px}
  .test .meta{font-size:11px;color:#888;font-family:ui-monospace,monospace}
  .test .meta.shrunk{color:#FFB300}

  /* Card scaling wrapper */
  .card-outer{width:100%;aspect-ratio:4/5;position:relative;overflow:hidden;border-radius:4px}
  .card-inner{width:1080px;height:1350px;transform-origin:top left;position:absolute;top:0;left:0}

  /* Card — dark variant by default */
  .card{
    width:1080px;height:1350px;
    background:#1a1a1f;color:#f0e6d0;
    position:relative;overflow:hidden;
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  }
  body.light-bg .card{background:#f9f7f8;color:#1a1a1f}

  /* ZONES — the heart of v1.9.5
     4:5 (1080×1350): topMargin 5% + title 17% + body 65% + closer 5% + watermark 3% + bottomMargin 5% = 100%
  */
  .zone-title    {position:absolute;top:5%; left:10%;right:10%;height:17%;display:flex;align-items:center;justify-content:center;overflow:hidden;text-align:center}
  .zone-body     {position:absolute;top:22%;left:10%;right:10%;height:65%;display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden}
  .zone-closer   {position:absolute;top:87%;left:10%;right:10%;height:5%; display:flex;align-items:center;justify-content:center;overflow:hidden}
  .zone-watermark{position:absolute;top:92%;left:0;  right:0;  height:3%; display:flex;align-items:center;justify-content:center;overflow:hidden}

  /* Zone guides (dashed outlines, toggleable) */
  body.show-guides .zone-title    {outline:2px dashed rgba(80,230,140,.55);outline-offset:-1px}
  body.show-guides .zone-body     {outline:2px dashed rgba(255,225,80,.55);outline-offset:-1px}
  body.show-guides .zone-closer   {outline:2px dashed rgba(140,160,255,.55);outline-offset:-1px}
  body.show-guides .zone-watermark{outline:2px dashed rgba(255,140,220,.55);outline-offset:-1px}

  /* Content */
  .card-title{font-weight:900;text-transform:uppercase;line-height:1.15;color:#3EA6FF;width:100%}
  .card-title .accent{color:#FF4444}
  .item{line-height:1.4}
  .item .num,.item .kw{font-weight:800;color:#3EA6FF}
  .closer{font-weight:600;text-align:center;color:inherit;opacity:.75;width:100%}
  .watermark{letter-spacing:1.5px;font-weight:700;font-size:18px;opacity:.6}
</style>

// ─── RENDER ───
function renderCardHtml(t){
  const titleHtml = t.title.replace(/\*([^*]+)\*/g, '<span class="accent">$1</span>');
  const itemsHtml = t.items.map(it=>{
    const numHtml = it.num ? `<span class="num">${it.num}.</span> ` : '';
    const kwHtml  = it.kw  ? `<span class="kw">${it.kw}:</span> ` : '';
    return `<div class="item">${numHtml}${kwHtml}${it.text}</div>`;
  }).join('');
  return `
    <div class="card">
      <div class="zone-title"><div class="card-title">${titleHtml}</div></div>
      <div class="zone-body">${itemsHtml}</div>
      <div class="zone-closer"><div class="closer">${t.closer}</div></div>
      <div class="zone-watermark"><div class="watermark">PSICOLOGÍA CONOCIDA</div></div>
    </div>`;
}

// ─── PER-ZONE FIT ENGINE ───
// Applies base sizes to elements inside a zone, measures, and if content overflows
// the zone height, scales fonts (and margins) DOWN by a single ratio just for that
// zone. Returns the scale (1.0 = no shrink, <1.0 = shrunk).
function fitZone(zoneEl, specs){
  // specs: [{el, fontSize, marginBottom?}]
  specs.forEach(s => {
    s.el.style.fontSize = s.fontSize + 'px';
    if(s.marginBottom !== undefined) s.el.style.marginBottom = s.marginBottom + 'px';
  });
  void zoneEl.offsetHeight; // force reflow
  const zoneH = zoneEl.clientHeight;
  const contentH = zoneEl.scrollHeight;
  let scale = 1;
  if(contentH > zoneH){
    scale = (zoneH / contentH) * 0.98; // 2% safety buffer
    specs.forEach(s => {
      s.el.style.fontSize = (s.fontSize * scale) + 'px';
      if(s.marginBottom !== undefined) s.el.style.marginBottom = (s.marginBottom * scale) + 'px';
    });
  }
  return scale;
}

function applyFit(cardEl){
  const titleEl  = cardEl.querySelector('.card-title');
  const itemEls  = Array.from(cardEl.querySelectorAll('.item'));
  const closerEl = cardEl.querySelector('.closer');

  // Apply line-heights once
  titleEl.style.lineHeight = FONT.titleLH;
  itemEls.forEach(el => el.style.lineHeight = FONT.lineHeight);

  // Fit each zone independently
  const titleScale = fitZone(
    cardEl.querySelector('.zone-title'),
    [{ el:titleEl, fontSize:FONT.title }]
  );
  const bodyScale = fitZone(
    cardEl.querySelector('.zone-body'),
    itemEls.map(el => ({ el, fontSize:FONT.item, marginBottom:FONT.itemMargin }))
  );
  const closerScale = fitZone(
    cardEl.querySelector('.zone-closer'),
    [{ el:closerEl, fontSize:FONT.closer }]
  );

  return { titleScale, bodyScale, closerScale };
}

function fitOuter(outerEl){
  const inner = outerEl.querySelector('.card-inner');
  const scale = outerEl.clientWidth / 1080;
  inner.style.transform = `scale(${scale})`;
}

function renderAll(){
  const grid = document.getElementById('grid');
  grid.innerHTML = TESTS.map((t,i)=>`
    <div class="test">
      <h3>${t.label}</h3>
      <div class="meta" id="meta-${i}">…</div>
      <div class="card-outer" data-i="${i}">
        <div class="card-inner">${renderCardHtml(t)}</div>
      </div>
    </div>
  `).join('');

  // Pass 1: fit fonts to zones (in unscaled 1080×1350 coordinates)
  TESTS.forEach((t,i)=>{
    const cardEl = document.querySelector(`[data-i="${i}"] .card`);
    const scales = applyFit(cardEl);
    const meta = document.getElementById(`meta-${i}`);
    const parts = [
      `title ${(scales.titleScale*100).toFixed(0)}%`,
      `body ${(scales.bodyScale*100).toFixed(0)}%`,
      `closer ${(scales.closerScale*100).toFixed(0)}%`
    ];
    const shrunk = scales.titleScale<1 || scales.bodyScale<1 || scales.closerScale<1;
    meta.textContent = (shrunk ? '⚠ ' : '✓ ') + parts.join(' · ');
    meta.className = 'meta' + (shrunk ? ' shrunk' : '');
  });

  // Pass 2: scale outer wrappers to fit grid columns
  requestAnimationFrame(()=>{
    document.querySelectorAll('.card-outer').forEach(fitOuter);
  });
}

// ─── UI ───
document.getElementById('btnGuides').addEventListener('click', e=>{
  document.body.classList.toggle('show-guides');
  e.target.classList.toggle('active');
});
document.getElementById('btnBg').addEventListener('click', e=>{
  document.body.classList.toggle('light-bg');
  e.target.textContent = document.body.classList.contains('light-bg') ? 'Dark BG' : 'Light BG';
});
window.addEventListener('resize', ()=>{
  requestAnimationFrame(()=>{
    document.querySelectorAll('.card-outer').forEach(fitOuter);
  });
});

renderAll();
</script>

</html>
