body{background:#111;color:#fff;font-family:'Segoe UI',system-ui,sans-serif}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding:16px}

.bg-chip{width:18px;height:18px;border-radius:3px;border:2px solid #444;cursor:pointer;display:inline-block;vertical-align:middle}

.tb-lbl{font-size:10px;color:#666;margin-right:2px}

const cardBG=new Array(POSTS.length).fill(0);

function S(p,k){return PRESETS[p.format][cardBG[POSTS.indexOf(p)]||0][k]||''}
function SI(p,bi,k){return PRESETS[p.format][bi][k]||''}

// ── Render ──
function renderCard(post,bi){
  const P=PRESETS[post.format][bi??0];
  const bg=P.bg.includes('gradient')?P.bg:P.bg;
  let inner='';
  if(post.format==='list'){
    let items=post.items.map((it,i)=>`<div class="item"><span class="num" style="color:${P.num}">${i+1}. </span><span class="kw" style="color:${P.kw}">${it.kw}</span> <span style="color:${P.desc}">- ${it.desc}</span></div>`).join('');
    inner=`<div class="card-title" style="color:${P.title}">${post.title}</div>${items}<div class="closer" style="color:${P.closer}">${post.closer}</div>`;
  } else if(post.format==='identity'){
    let t=post.title.replace(/\*([^*]+)\*/g,`<span class="accent" style="color:${P.accent}">$1</span>`);
    let items=post.items.map(it=>{
      let d=it.desc.replace(/\*([^*]+)\*/g,`<span class="hi" style="color:${P.hi}">$1</span>`);
      return `<div class="item"><span class="label" style="color:${P.label}">${it.label}</span><span style="color:${P.label}"> : </span><span style="color:${P.desc}">${d}</span></div>`;
    }).join('');
    inner=`<div class="card-title" style="color:${P.titleC}">${t}</div>${items}<div class="closer" style="color:${P.closer}">${post.closer}</div>`;
  } else if(post.format==='question'){
    let t=post.title.replace(/\*([^*]+)\*/g,`<span class="accent" style="color:${P.accent}">$1</span>`);
    inner=`<div class="card-title" style="color:${P.titleC}">${t}</div>${post.sub?`<div class="sub" style="color:${P.sub}">${post.sub}</div>`:''}<div class="closer" style="color:${P.closer}">${post.closer}</div>`;
  } else if(post.format==='howto'){
    let t=post.title.replace(/\*([^*]+)\*/g,`<span class="accent" style="color:${P.accent}">$1</span>`);
    let items=post.items.map((it,i)=>`<div class="item"><span class="num" style="color:${P.num}">${i+1}. </span><span class="kw" style="color:${P.kw}">${it.kw}</span> <span style="color:${P.desc}">- ${it.desc}</span></div>`).join('');
    inner=`<div class="card-title" style="color:${P.title}">${t}</div>${items}<div class="closer" style="color:${P.closer}">${post.closer}</div>`;
  }
  return `<div class="card fmt-${post.format}" style="background:${bg}"><div class="safe-zone">${inner}</div><div class="watermark" style="color:${P.wm}">PSICOLOGÍA CONOCIDA</div></div>`;
}

function bgChipsHTML(pidx,ctx){
  const fmt=POSTS[pidx].format;
  return PRESETS[fmt].map((p,i)=>`<span class="bg-chip${i===cardBG[pidx]?' active':''}" style="background:${p.chip}" title="${p.name}" onclick="event.stopPropagation();setBG(${pidx},${i},'${ctx}')"></span>`).join('');
}
function setBG(pidx,bi,ctx){
  cardBG[pidx]=bi;
  if(ctx==='gallery'){const el=document.getElementById('gc-'+pidx);if(el)el.innerHTML=buildCC(pidx);}
  if(ctx==='overlay')renderOverlay();
}

// ── Gallery ──
let filtered=[],filteredMap=[];
function buildCC(pidx){
  return `<div class="card-container" id="gc-${pidx}">
    ${renderCard(POSTS[pidx],cardBG[pidx])}
    <div class="card-toolbar">
      <button onclick="event.stopPropagation();copyTitle(${pidx})">Copy Title</button>
      <button onclick="event.stopPropagation();copyCardText(${pidx})">Copy Card</button>
      <span class="tb-sep"></span>
      <span class="tb-lbl">BG</span>${bgChipsHTML(pidx,'gallery')}
      <span class="tb-sep"></span>
      <button onclick="event.stopPropagation();exportPost(${pidx})">Export</button>
      <button onclick="event.stopPropagation();openOverlay(${pidx})">Full View</button>
    </div>
  </div>`;
}
function buildGallery(){
  const type=document.getElementById('filterType').value;
  filtered=[];filteredMap=[];
  POSTS.forEach((p,i)=>{if(type==='all'||p.format===type){filtered.push(p);filteredMap.push(i);}});
  document.getElementById('counter').textContent=`${filtered.length} / ${POSTS.length}`;
  document.getElementById('gallery').innerHTML=filteredMap.map(pidx=>buildCC(pidx)).join('');
}
document.getElementById('filterType').onchange=buildGallery;

// ── Overlay (scaled for mobile) ──
let currentPidx=0;
function openOverlay(pidx){currentPidx=pidx;renderOverlay();document.getElementById('overlay').classList.add('active');}
function closeOverlay(){document.getElementById('overlay').classList.remove('active');}
function navPost(d){let fi=filteredMap.indexOf(currentPidx);fi=(fi+d+filteredMap.length)%filteredMap.length;currentPidx=filteredMap[fi];renderOverlay();}
function renderOverlay(){
  const fi=filteredMap.indexOf(currentPidx);
  document.getElementById('overlayIdx').textContent=`${fi+1} / ${filtered.length}`;
  document.getElementById('overlayCard').innerHTML=renderCard(POSTS[currentPidx],cardBG[currentPidx]);
  document.getElementById('ovBgChips').innerHTML='<span class="tb-lbl" style="color:#888">BG</span>'+bgChipsHTML(currentPidx,'overlay');
  // Scale to fit viewport
  const scale=Math.min(1,(window.innerWidth-32)/1080);
  const wrap=document.getElementById('cardWrap');
  wrap.style.transform=`scale(${scale})`;
  wrap.style.width='1080px';
  wrap.style.height=`${1350*scale}px`;
  wrap.style.transformOrigin='top center';
}
function jumpTo(){const v=parseInt(document.getElementById('jumpInput').value);if(v>=1&&v<=filteredMap.length)openOverlay(filteredMap[v-1]);}
window.addEventListener('resize',()=>{if(document.getElementById('overlay').classList.contains('active'))renderOverlay();});

// ── Export (renders at full 1080x1350) ──
async function exportPost(pidx){
  const post=POSTS[pidx];
  const stage=document.getElementById('exportStage');
  stage.innerHTML=renderCard(post,cardBG[pidx]);
  const card=stage.querySelector('.card');
  card.style.width='1080px';card.style.height='1350px';card.style.aspectRatio='auto';card.style.position='relative';
  // Apply overlay font sizes
  const fmt=post.format;
  const titleEl=card.querySelector('.card-title');
  if(fmt==='list'){titleEl.style.fontSize='48px';card.querySelectorAll('.item').forEach(el=>{el.style.fontSize='28px';el.style.marginBottom='18px';});card.querySelector('.closer').style.fontSize='22px';}
  else if(fmt==='identity'){titleEl.style.fontSize='42px';card.querySelectorAll('.item').forEach(el=>{el.style.fontSize='26px';el.style.marginBottom='14px';});card.querySelector('.closer').style.fontSize='20px';}
  else if(fmt==='question'){titleEl.style.fontSize='52px';const sub=card.querySelector('.sub');if(sub)sub.style.fontSize='28px';card.querySelector('.closer').style.fontSize='22px';}
  else if(fmt==='howto'){titleEl.style.fontSize='44px';card.querySelectorAll('.item').forEach(el=>{el.style.fontSize='27px';el.style.marginBottom='16px';});card.querySelector('.closer').style.fontSize='21px';}
  card.querySelector('.watermark').style.fontSize='16px';
  const canvas=await html2canvas(card,{backgroundColor:null,scale:2,width:1080,height:1350});
  const a=document.createElement('a');
  a.download=`pc_${fmt}_${String(pidx+1).padStart(3,'0')}.png`;
  a.href=canvas.toDataURL('image/png');a.click();
  stage.innerHTML='';
  toast('Exported');
}

// ── Copy ──
function strip(s){return s.replace(/\*([^*]+)\*/g,'$1');}
function copyTitle(pidx){navigator.clipboard.writeText(strip(POSTS[pidx].title)).then(()=>toast('Title copied'));}
function copyCardText(pidx){
  const p=POSTS[pidx];let lines=[strip(p.title),''];
  if(p.format==='question'){if(p.sub)lines.push(p.sub,'');}
  else if(p.items)p.items.forEach((it,i)=>{
    if(it.kw)lines.push(`${i+1}. ${it.kw} - ${it.desc}`);
    else lines.push(`${it.label} : ${strip(it.desc)}`);
  });
  lines.push('',p.closer);
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('Card copied'));
}
function copyTitleOv(){copyTitle(currentPidx);}
function copyCardOv(){copyCardText(currentPidx);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
