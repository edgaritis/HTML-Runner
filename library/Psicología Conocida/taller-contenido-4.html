o lo hacía.</p><p class='g'>Aprendí algunas cosas. Primero, a hablar del tema y no atacar a la persona. No es lo mismo &quot;no comparto esa idea&quot; que &quot;tú no tienes ni idea&quot;. Segundo, a reconocer algo válido del otro antes de marcar mi desacuerdo, porque el que no se siente atacado sí escucha. Y tercero, a dejar que el otro guardara la cara, a no humillarlo para &quot;ganar&quot;.</p><p class='g'>Descubrí que se puede ser firme en el fondo y suave en la forma. Muy claro en lo que pienso, y a la vez respetuoso al decirlo.</p><p class='g'>Y todo cambió. Empecé a defender mis ideas sin crear enemigos, y hasta a ganarme el respeto de quienes pensaban distinto. Aprendí que buscar entender vale más que buscar vencer, y que el que discrepa con respeto convence mucho más que el que humilla para tener razón.</p></div>", "search": "aprendí a discrepar sin ganarme enemigos cada desacuerdo se me volvía pelea. aprender a discrepar bien me cambió las relaciones. antes, cada vez que no estaba de acuerdo con alguien, terminaba en pelea. decía las cosas de frente, sin filtro, atacando. \"estás equivocado.\" \"eso no tiene sentido.\" tenía razón muchas veces, pero me ganaba enemigos a cada paso.\n\ncon el tiempo entendí que tener razón no servía de nada si en el camino lastimaba y me hacía enemigos. el problema no era discrepar; era cómo lo hacía.\n\naprendí algunas cosas. primero, a hablar del tema y no atacar a la persona. no es lo mismo \"no comparto esa idea\" que \"tú no tienes ni idea\". segundo, a reconocer algo válido del otro antes de marcar mi desacuerdo, porque el que no se siente atacado sí escucha. y tercero, a dejar que el otro guardara la cara, a no humillarlo para \"ganar\".\n\ndescubrí que se puede ser firme en el fondo y suave en la forma. muy claro en lo que pienso, y a la vez respetuoso al decirlo.\n\ny todo cambió. empecé a defender mis ideas sin crear enemigos, y hasta a ganarme el respeto de quienes pensaban distinto. aprendí que buscar entender vale más que buscar vencer, y que el que discrepa con respeto convence mucho más que el que humilla para tener razón.", "copies": [["Copy teaser", "Cada desacuerdo se me volvía pelea. Aprender a discrepar bien me cambió las relaciones."], ["Copy script", "Antes, cada vez que no estaba de acuerdo con alguien, terminaba en pelea. Decía las cosas de frente, sin filtro, atacando. \"Estás equivocado.\" \"Eso no tiene sentido.\" Tenía razón muchas veces, pero me ganaba enemigos a cada paso.\n\nCon el tiempo entendí que tener razón no servía de nada si en el camino lastimaba y me hacía enemigos. El problema no era discrepar; era cómo lo hacía.\n\nAprendí algunas cosas. Primero, a hablar del tema y no atacar a la persona. No es lo mismo \"no comparto esa idea\" que \"tú no tienes ni idea\". Segundo, a reconocer algo válido del otro antes de marcar mi desacuerdo, porque el que no se siente atacado sí escucha. Y tercero, a dejar que el otro guardara la cara, a no humillarlo para \"ganar\".\n\nDescubrí que se puede ser firme en el fondo y suave en la forma. Muy claro en lo que pienso, y a la vez respetuoso al decirlo.\n\nY todo cambió. Empecé a defender mis ideas sin crear enemigos, y hasta a ganarme el respeto de quienes pensaban distinto. Aprendí que buscar entender vale más que buscar vencer, y que el que discrepa con respeto convence mucho más que el que humilla para tener razón."]]}, {"fmt": "F3", "n": 171, "bucket": "", "title": "DEJÉ DE DISCUTIR CON QUIEN NO VALÍA LA PENA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Entraba a cada pelea que me ofrecían. Aprender a elegir mis batallas me devolvió la paz.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo entraba a cada discusión que se me cruzaba. Si alguien decía algo con lo que no estaba de acuerdo, ahí iba yo a debatir, a corregir, a tener razón. En redes, en el trabajo, en la familia. Sentía que tenía que responder a todo.</p><p class='g'>Y vivía agotado, de mal humor, enredado en peleas que no cambiaban nada.</p><p class='g'>Un día entendí algo que me liberó. No todas las batallas valen mi energía. Hay gente con la que discutir es perder el tiempo, porque no busca entender, solo ganar. No importa cuántos argumentos tengas; van a torcer todo con tal de no ceder.</p><p class='g'>Discutir con alguien así, me di cuenta, es como jugar ajedrez con quien tira las piezas: aunque &quot;ganes&quot;, no llegas a nada. Y al bajar a su nivel, además, te ganan por experiencia, porque ahí ellos tienen más práctica.</p><p class='g'>Empecé a elegir mis batallas. A preguntarme si valía la pena entrar o si era mejor un &quot;puede ser&quot; y seguir mi camino. A guardar mi energía para la gente y los temas que de verdad lo merecían.</p><p class='g'>Y recuperé la paz. Aprendí que no responder también es una respuesta, y que el silencio, ante quien solo quiere pelear, muchas veces dice más y te deja en mejor lugar que mil argumentos.</p></div>", "search": "dejé de discutir con quien no valía la pena entraba a cada pelea que me ofrecían. aprender a elegir mis batallas me devolvió la paz. yo entraba a cada discusión que se me cruzaba. si alguien decía algo con lo que no estaba de acuerdo, ahí iba yo a debatir, a corregir, a tener razón. en redes, en el trabajo, en la familia. sentía que tenía que responder a todo.\n\ny vivía agotado, de mal humor, enredado en peleas que no cambiaban nada.\n\nun día entendí algo que me liberó. no todas las batallas valen mi energía. hay gente con la que discutir es perder el tiempo, porque no busca entender, solo ganar. no importa cuántos argumentos tengas; van a torcer todo con tal de no ceder.\n\ndiscutir con alguien así, me di cuenta, es como jugar ajedrez con quien tira las piezas: aunque \"ganes\", no llegas a nada. y al bajar a su nivel, además, te ganan por experiencia, porque ahí ellos tienen más práctica.\n\nempecé a elegir mis batallas. a preguntarme si valía la pena entrar o si era mejor un \"puede ser\" y seguir mi camino. a guardar mi energía para la gente y los temas que de verdad lo merecían.\n\ny recuperé la paz. aprendí que no responder también es una respuesta, y que el silencio, ante quien solo quiere pelear, muchas veces dice más y te deja en mejor lugar que mil argumentos.", "copies": [["Copy teaser", "Entraba a cada pelea que me ofrecían. Aprender a elegir mis batallas me devolvió la paz."], ["Copy script", "Yo entraba a cada discusión que se me cruzaba. Si alguien decía algo con lo que no estaba de acuerdo, ahí iba yo a debatir, a corregir, a tener razón. En redes, en el trabajo, en la familia. Sentía que tenía que responder a todo.\n\nY vivía agotado, de mal humor, enredado en peleas que no cambiaban nada.\n\nUn día entendí algo que me liberó. No todas las batallas valen mi energía. Hay gente con la que discutir es perder el tiempo, porque no busca entender, solo ganar. No importa cuántos argumentos tengas; van a torcer todo con tal de no ceder.\n\nDiscutir con alguien así, me di cuenta, es como jugar ajedrez con quien tira las piezas: aunque \"ganes\", no llegas a nada. Y al bajar a su nivel, además, te ganan por experiencia, porque ahí ellos tienen más práctica.\n\nEmpecé a elegir mis batallas. A preguntarme si valía la pena entrar o si era mejor un \"puede ser\" y seguir mi camino. A guardar mi energía para la gente y los temas que de verdad lo merecían.\n\nY recuperé la paz. Aprendí que no responder también es una respuesta, y que el silencio, ante quien solo quiere pelear, muchas veces dice más y te deja en mejor lugar que mil argumentos."]]}, {"fmt": "F3", "n": 172, "bucket": "", "title": "APRENDÍ A DEJAR QUE ME SUBESTIMARAN", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Me molestaba que me midieran de menos. Aprendí a usar esa subestimación a mi favor.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Antes me molestaba muchísimo que me subestimaran. Si alguien me medía de menos, sentía la necesidad de demostrarle de inmediato lo que valía, de probar que se equivocaba. Vivía tratando de impresionar, de que todos supieran de lo que era capaz.</p><p class='g'>Con el tiempo entendí que esa necesidad de demostrar me jugaba en contra. El que presume alerta a sus rivales, se pone presión y se expone antes de tiempo.</p><p class='g'>Y descubrí algo más astuto: que me subestimaran podía ser una ventaja enorme. El que cree que no eres una amenaza baja la guardia, se confía, no te toma en serio. Y eso te da espacio para moverte tranquilo, sin que nadie te vigile.</p><p class='g'>Así que dejé de corregir a cada uno que me medía de menos. Empecé a trabajar en silencio, a dejar que los resultados hablaran por mí, en vez de anunciar lo que iba a lograr.</p><p class='g'>Y funcionó. Mientras me subestimaban, yo avanzaba sin ruido y sin presión. Cuando se daban cuenta, ya era tarde. Aprendí que sorprender vale más que advertir, que es mejor que te midan de menos a que te teman. Hoy, cuando alguien me subestima, ya no me ofende; lo uso a mi favor.</p></div>", "search": "aprendí a dejar que me subestimaran me molestaba que me midieran de menos. aprendí a usar esa subestimación a mi favor. antes me molestaba muchísimo que me subestimaran. si alguien me medía de menos, sentía la necesidad de demostrarle de inmediato lo que valía, de probar que se equivocaba. vivía tratando de impresionar, de que todos supieran de lo que era capaz.\n\ncon el tiempo entendí que esa necesidad de demostrar me jugaba en contra. el que presume alerta a sus rivales, se pone presión y se expone antes de tiempo.\n\ny descubrí algo más astuto: que me subestimaran podía ser una ventaja enorme. el que cree que no eres una amenaza baja la guardia, se confía, no te toma en serio. y eso te da espacio para moverte tranquilo, sin que nadie te vigile.\n\nasí que dejé de corregir a cada uno que me medía de menos. empecé a trabajar en silencio, a dejar que los resultados hablaran por mí, en vez de anunciar lo que iba a lograr.\n\ny funcionó. mientras me subestimaban, yo avanzaba sin ruido y sin presión. cuando se daban cuenta, ya era tarde. aprendí que sorprender vale más que advertir, que es mejor que te midan de menos a que te teman. hoy, cuando alguien me subestima, ya no me ofende; lo uso a mi favor.", "copies": [["Copy teaser", "Me molestaba que me midieran de menos. Aprendí a usar esa subestimación a mi favor."], ["Copy script", "Antes me molestaba muchísimo que me subestimaran. Si alguien me medía de menos, sentía la necesidad de demostrarle de inmediato lo que valía, de probar que se equivocaba. Vivía tratando de impresionar, de que todos supieran de lo que era capaz.\n\nCon el tiempo entendí que esa necesidad de demostrar me jugaba en contra. El que presume alerta a sus rivales, se pone presión y se expone antes de tiempo.\n\nY descubrí algo más astuto: que me subestimaran podía ser una ventaja enorme. El que cree que no eres una amenaza baja la guardia, se confía, no te toma en serio. Y eso te da espacio para moverte tranquilo, sin que nadie te vigile.\n\nAsí que dejé de corregir a cada uno que me medía de menos. Empecé a trabajar en silencio, a dejar que los resultados hablaran por mí, en vez de anunciar lo que iba a lograr.\n\nY funcionó. Mientras me subestimaban, yo avanzaba sin ruido y sin presión. Cuando se daban cuenta, ya era tarde. Aprendí que sorprender vale más que advertir, que es mejor que te midan de menos a que te teman. Hoy, cuando alguien me subestima, ya no me ofende; lo uso a mi favor."]]}, {"fmt": "F3", "n": 173, "bucket": "", "title": "DESCUBRÍ EL PODER DE LA PAUSA ANTES DE HABLAR", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Respondía todo al instante, y me arrepentía. Una simple pausa me cambió la forma de comunicarme.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo respondía todo al instante. En una discusión, ante una pregunta difícil, frente a una provocación, soltaba lo primero que se me venía. Y muchas veces me arrepentía: decía cosas de más, revelaba lo que no debía, hablaba en caliente.</p><p class='g'>Un día observé a alguien que admiraba. Antes de responder, hacía una pequeña pausa. Un par de segundos de silencio. Y lo que decía después siempre salía mejor, más pensado, más firme.</p><p class='g'>Empecé a copiar esa pausa. Y descubrí su poder.</p><p class='g'>Esos dos segundos antes de responder me separaban del error de hablar impulsivamente. Me daban tiempo de elegir mis palabras. Además, noté algo curioso: el silencio incomodaba al otro, no a mí. Mucha gente, ante mi pausa, se apuraba a llenarla y terminaba diciendo de más, cediendo, revelando cosas.</p><p class='g'>Aprendí que el que aguanta el silencio, manda. Que pensar antes de hablar se lee como seguridad y dominio, no como duda. Que no tengo que llenar cada vacío en una conversación.</p><p class='g'>Hoy, antes de responder algo importante, hago esa pausa. Respondo cuando estoy listo, no cuando me apuran. Y esa simple costumbre me dio un control sobre mis conversaciones que antes no tenía.</p></div>", "search": "descubrí el poder de la pausa antes de hablar respondía todo al instante, y me arrepentía. una simple pausa me cambió la forma de comunicarme. yo respondía todo al instante. en una discusión, ante una pregunta difícil, frente a una provocación, soltaba lo primero que se me venía. y muchas veces me arrepentía: decía cosas de más, revelaba lo que no debía, hablaba en caliente.\n\nun día observé a alguien que admiraba. antes de responder, hacía una pequeña pausa. un par de segundos de silencio. y lo que decía después siempre salía mejor, más pensado, más firme.\n\nempecé a copiar esa pausa. y descubrí su poder.\n\nesos dos segundos antes de responder me separaban del error de hablar impulsivamente. me daban tiempo de elegir mis palabras. además, noté algo curioso: el silencio incomodaba al otro, no a mí. mucha gente, ante mi pausa, se apuraba a llenarla y terminaba diciendo de más, cediendo, revelando cosas.\n\naprendí que el que aguanta el silencio, manda. que pensar antes de hablar se lee como seguridad y dominio, no como duda. que no tengo que llenar cada vacío en una conversación.\n\nhoy, antes de responder algo importante, hago esa pausa. respondo cuando estoy listo, no cuando me apuran. y esa simple costumbre me dio un control sobre mis conversaciones que antes no tenía.", "copies": [["Copy teaser", "Respondía todo al instante, y me arrepentía. Una simple pausa me cambió la forma de comunicarme."], ["Copy script", "Yo respondía todo al instante. En una discusión, ante una pregunta difícil, frente a una provocación, soltaba lo primero que se me venía. Y muchas veces me arrepentía: decía cosas de más, revelaba lo que no debía, hablaba en caliente.\n\nUn día observé a alguien que admiraba. Antes de responder, hacía una pequeña pausa. Un par de segundos de silencio. Y lo que decía después siempre salía mejor, más pensado, más firme.\n\nEmpecé a copiar esa pausa. Y descubrí su poder.\n\nEsos dos segundos antes de responder me separaban del error de hablar impulsivamente. Me daban tiempo de elegir mis palabras. Además, noté algo curioso: el silencio incomodaba al otro, no a mí. Mucha gente, ante mi pausa, se apuraba a llenarla y terminaba diciendo de más, cediendo, revelando cosas.\n\nAprendí que el que aguanta el silencio, manda. Que pensar antes de hablar se lee como seguridad y dominio, no como duda. Que no tengo que llenar cada vacío en una conversación.\n\nHoy, antes de responder algo importante, hago esa pausa. Respondo cuando estoy listo, no cuando me apuran. Y esa simple costumbre me dio un control sobre mis conversaciones que antes no tenía."]]}, {"fmt": "F3", "n": 174, "bucket": "", "title": "EL DÍA QUE ME ATREVÍ A CAER MAL", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Vivía para gustarle a todos. El día que me atreví a caer mal, por fin me sentí libre.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Toda mi vida quise gustarle a todo el mundo. Me moldeaba según con quién estuviera, decía que sí para no incomodar, callaba lo que pensaba para no caer mal. Cada decisión pasaba por el filtro de &quot;¿qué van a pensar?&quot;.</p><p class='g'>Y vivía agotado, porque agradar a todos es imposible, y porque, en el fondo, había dejado de ser yo. Era una versión editada de mí mismo, hecha para gustar.</p><p class='g'>Un día me cansé. Entendí algo: el que necesita gustarle a todos no es libre; vive preso de la aprobación ajena. Y que es imposible avanzar, poner límites o ser fiel a lo que crees sin incomodar a alguien en algún momento.</p><p class='g'>Así que empecé a atreverme a caer mal. A decir lo que pensaba, a poner límites, a ser yo, aunque eso no le gustara a todos.</p><p class='g'>Y, claro, a algunos dejé de caerles bien. Pero pasó algo más importante: por primera vez me sentí libre. Y los que se quedaron, me querían de verdad, no a una máscara.</p><p class='g'>Aprendí que mejor real y rechazado que falso y querido. Que si te quieren por una versión fingida, ese cariño no es para ti. Y que la paz no puede depender de gustarle a cada persona. El día que me atreví a caer mal, empecé a vivir.</p></div>", "search": "el día que me atreví a caer mal vivía para gustarle a todos. el día que me atreví a caer mal, por fin me sentí libre. toda mi vida quise gustarle a todo el mundo. me moldeaba según con quién estuviera, decía que sí para no incomodar, callaba lo que pensaba para no caer mal. cada decisión pasaba por el filtro de \"¿qué van a pensar?\".\n\ny vivía agotado, porque agradar a todos es imposible, y porque, en el fondo, había dejado de ser yo. era una versión editada de mí mismo, hecha para gustar.\n\nun día me cansé. entendí algo: el que necesita gustarle a todos no es libre; vive preso de la aprobación ajena. y que es imposible a a. Que ciertos caminos, simplemente, no funcionaban, y yo lo sabía.\n\nFue incómodo, pero también fue el principio de todo. Porque entendí algo clave: no puedes arreglar lo que no admites. Todo cambio empieza por ver claro, y las excusas me habían tapado los ojos por años.\n\nEmpecé a preguntarme, con honestidad, qué estaba evitando ver en cada área de mi vida. Y ahí, justo ahí, estaba lo que más necesitaba cambiar.\n\nAprendí que mentirme era cómodo y caro, y que la honestidad conmigo, aunque doliera, era lo único que de verdad me sacaba de donde estaba. La verdad, dicha a uno mismo, duele, pero libera."]]}, {"fmt": "F3", "n": 177, "bucket": "", "title": "ENTENDÍ POR QUÉ A ALGUNOS LES COSTABA ALEGRARSE POR MÍ", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Compartía una buena noticia y notaba que algunos se incomodaban. Tardé en entender qué pasaba.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años me confundía una cosa. Cuando me iba bien y compartía una buena noticia, ciertas personas, en vez de alegrarse, se incomodaban. Sonreían de boca, cambiaban de tema rápido, o me soltaban un &quot;no te ilusiones tanto&quot;.</p><p class='g'>Al principio pensé que el problema era yo, que presumía o algo así. Hasta que entendí que no se trataba de mí; se trataba de ellos.</p><p class='g'>Mi avance les recordaba lo que ellos no se atrevían a hacer en su propia vida. Mi luz les mostraba su oscuridad. Y la envidia, casi nunca abierta, se les escapaba disfrazada de consejo: &quot;ten cuidado&quot;, &quot;no es para tanto&quot;, frases que sonaban a preocupación pero buscaban bajarme.</p><p class='g'>Aprendí a notar la diferencia. El que me quería bien se alegraba sin esfuerzo, celebraba conmigo. El que competía o envidiaba se tensaba.</p><p class='g'>Dejé de bajar mi luz para que otros estuvieran cómodos. Y empecé a fijarme en quién se alegraba de verdad con mis logros, porque esa, descubrí, es una de las pruebas más honestas de quién está de verdad de tu lado.</p></div>", "search": "entendí por qué a algunos les costaba alegrarse por mí compartía una buena noticia y notaba que algunos se incomodaban. tardé en entender qué pasaba. durante años me confundía una cosa. cuando me iba bien y compartía una buena noticia, ciertas personas, en vez de alegrarse, se incomodaban. sonreían de boca, cambiaban de tema rápido, o me soltaban un \"no te ilusiones tanto\".\n\nal principio pensé que el problema era yo, que presumía o algo así. hasta que entendí que no se trataba de mí; se trataba de ellos.\n\nmi avance les recordaba lo que ellos no se atrevían a hacer en su propia vida. mi luz les mostraba su oscuridad. y la envidia, casi nunca abierta, se les escapaba disfrazada de consejo: \"ten cuidado\", \"no es para tanto\", frases que sonaban a preocupación pero buscaban bajarme.\n\naprendí a notar la diferencia. el que me quería bien se alegraba sin esfuerzo, celebraba conmigo. el que competía o envidiaba se tensaba.\n\ndejé de bajar mi luz para que otros estuvieran cómodos. y empecé a fijarme en quién se alegraba de verdad con mis logros, porque esa, descubrí, es una de las pruebas más honestas de quién está de verdad de tu lado.", "copies": [["Copy teaser", "Compartía una buena noticia y notaba que algunos se incomodaban. Tardé en entender qué pasaba."], ["Copy script", "Durante años me confundía una cosa. Cuando me iba bien y compartía una buena noticia, ciertas personas, en vez de alegrarse, se incomodaban. Sonreían de boca, cambiaban de tema rápido, o me soltaban un \"no te ilusiones tanto\".\n\nAl principio pensé que el problema era yo, que presumía o algo así. Hasta que entendí que no se trataba de mí; se trataba de ellos.\n\nMi avance les recordaba lo que ellos no se atrevían a hacer en su propia vida. Mi luz les mostraba su oscuridad. Y la envidia, casi nunca abierta, se les escapaba disfrazada de consejo: \"ten cuidado\", \"no es para tanto\", frases qu stró a la gente tal como era."]]}, {"fmt": "F3", "n": 180, "bucket": "", "title": "VIVÍA OCUPADO PERO NO AVANZABA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Corría todo el día y terminaba agotado. Un día noté que estar ocupado no era avanzar.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años viví ocupadísimo. Lleno de tareas, corriendo de una cosa a otra, sin un minuto libre. Terminaba el día agotado y sentía que había trabajado muchísimo.</p><p class='g'>Pero al mirar atrás, después de meses así, no había avanzado casi nada en lo que de verdad importaba. Estaba muy ocupado, sí, pero dando vueltas en círculos.</p><p class='g'>Ahí entendí algo clave: estar ocupado no es lo mismo que avanzar. Moverse mucho no significa ir hacia donde quieres. Yo había confundido actividad con progreso.</p><p class='g'>Peor aún, me di cuenta de que llenarme de tareas pequeñas y urgentes era, en parte, una forma de esconderme. De no enfrentar las pocas cosas grandes que de verdad movían la aguja, pero que daban miedo o costaban. La ocupación tapaba mi falta de rumbo.</p><p class='g'>Empecé a cambiar. A medir mi día no por cuántas cosas hacía, sino por si hacía las pocas que de verdad contaban. A preguntarme, ante cada tarea, si era importante o solo urgente.</p><p class='g'>Hice menos, pero avancé más. Aprendí que el cansancio no mide el progreso, y que correr no es lo mismo que llegar.</p></div>", "search": "vivía ocupado pero no avanzaba corría todo el día y terminaba agotado. un día noté que estar ocupado no era avanzar. durante años viví ocupadísimo. lleno de tareas, corriendo de una cosa a otra, sin un minuto libre. terminaba el día agotado y sentía que había trabajado muchísimo.\n\npero al mirar atrás, después de meses así, no había avanzado casi nada en lo que de verdad importaba. estaba muy ocupado, sí, pero dando vueltas en círculos.\n\nahí entendí algo clave: estar ocupado no es lo mismo que avanzar. moverse mucho no significa ir hacia donde quieres. yo había confundido actividad con progreso.\n\npeor aún, me di cuenta de que llenarme de tareas pequeñas y urgentes era, en parte, una forma de esconderme. de no enfrentar las pocas cosas grandes que de verdad movían la aguja, pero que daban miedo o costaban. la ocupación tapaba mi falta de rumbo.\n\nempecé a cambiar. a medir mi día no por cuántas cosas hacía, sino por si hacía las pocas que de verdad contaban. a preguntarme, ante cada tarea, si era importante o solo urgente.\n\nhice menos, pero avancé más. aprendí que el cansancio no mide el progreso, y que correr no es lo mismo que llegar.", "copies": [["Copy teaser", "Corría todo el día y terminaba agotado. Un día noté que estar ocupado no era avanzar."], ["Copy script", "Durante años viví ocupadísimo. Lleno de tareas, corriendo de una cosa a otra, sin un minuto libre. Terminaba el día agotado y sentía que había trabajado muchísimo.\n\nPero al mirar atrás, después de meses así, no había avanzado casi nada en lo que de verdad importaba. Estaba muy ocupado, sí, pero dando vueltas en círculos.\n\nAhí entendí algo clave: estar ocupado no es lo mismo que avanzar. Moverse mucho no significa ir hacia donde quieres. Yo había confundido actividad con progreso.\n\nPeor aún, me di cuenta de que llenarme de tareas pequeñas y urgentes era, en parte, una forma de esconderme. De no enfrentar las pocas cosas grandes que de verdad movían la aguja, pero que daban miedo o costaban. La ocupación tapaba mi falta de rumbo.\n\nEmpecé a cambiar. A medir mi día no por cuántas cosas hacía, sino por si hacía las pocas que de verdad contaban. A preguntarme, ante cada tarea, si era importante o solo urgente.\n\nHice menos, pero avancé más. Aprendí que el cansancio no mide el progreso, y que correr no es lo mismo que llegar."]]}, {"fmt": "F3", "n": 181, "bucket": "", "title": "ESCUCHÉ DE QUÉ SE ARREPIENTE LA GENTE AL FINAL", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Conocí los arrepentimientos más comunes de quienes llegan al final. Me cambiaron las prioridades.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Un día leí, y después escuché de cerca, de qué se arrepiente la gente al final de su vida. Y me marcó tanto que me cambió las prioridades.</p><p class='g'>El arrepentimiento más común no era por algo que hicieron mal. Era por no haber vivido su propia vida, sino la que otros esperaban. Por haberse pasado los años agradando, encajando, cumpliendo expectativas ajenas, en vez de seguir lo que de verdad querían.</p><p class='g'>Otro, muy repetido: haber trabajado tanto y vivido tan poco. Haberse perdido momentos con su gente por estar siempre en la oficina. Nadie, al final, deseaba haber trabajado más.</p><p class='g'>Y pesaban los &quot;te quiero&quot; que callaron, las disculpas que no dieron, los sueños que el miedo dejó guardados. La gente no se arrepentía tanto de lo que intentó y salió mal, sino de lo que no se atrevió a hacer ni a decir.</p><p class='g'>Eso me sacudió. Entendí que todavía estaba a tiempo de no cometer esos mismos errores. Empecé a vivir más a mi manera, a decir lo que sentía, a atreverme, a valorar a mi gente hoy. No quería llegar al final con esa lista de arrepentimientos.</p></div>", "search": "escuché de qué se arrepiente la gente al final conocí los arrepentimientos más comunes de quienes llegan al final. me cambiaron las prioridades. un día leí, y después escuché de cerca, de qué se arrepiente la gente al final de su vida. y me marcó tanto que me cambió las prioridades.\n\nel arrepentimiento más común no era por algo que hicieron mal. era por no haber vivido su propia vida, sino la que otros esperaban. por haberse pasado los años agradando, encajando, cumpliendo expectativas ajenas, en vez de seguir lo que de verdad querían.\n\notro, muy repetido: haber trabajado tanto y vivido tan poco. haberse perdido momentos con su gente por estar siempre en la oficina. nadie, al final, deseaba haber trabajado más.\n\ny pesaban los \"te quiero\" que callaron, las disculpas que no dieron, los sueños que el miedo dejó guardados. la gente no se arrepentía tanto de lo que intentó y salió mal, sino de lo que no se atrevió a hacer ni a decir.\n\neso me sacudió. entendí que todavía estaba a tiempo de no cometer esos mismos errores. empecé a vivir más a mi manera, a decir lo que sentía, a atreverme, a valorar a mi gente hoy. no quería llegar al final con esa lista de arrepentimientos.", "copies": [["Copy teaser", "Conocí los arrepentimientos más comunes de quienes llegan al final. Me cambiaron las prioridades."], ["Copy script", "Un día leí, y después escuché de cerca, de qué se arrepiente la gente al final de su vida. Y me marcó tanto que me cambió las prioridades.\n\nEl arrepentimiento más común no era por algo que hicieron mal. Era por no haber vivido su propia vida, sino la que otros esperaban. Por haberse pasado los años agradando, encajando, cumpliendo expectativas ajenas, en vez de seguir lo que de verdad querían.\n\nOtro, muy repetido: haber trabajado tanto y vivido tan poco. Haberse perdido momentos con su gente por estar siempre en la oficina. Nadie, al final, deseaba haber trabajado más.\n\nY pesaban los \"te quiero\" que callaron, las disculpas que no dieron, los sueños que el miedo dejó guardados. La gente no se arrepentía tanto de lo que intentó y salió mal, sino de lo que no se atrevió a hacer ni a decir.\n\nEso me sacudió. Entendí que todavía estaba a tiempo de no cometer esos mismos errores. Empecé a vivir más a mi manera, a decir lo que sentía, a atreverme, a valorar a mi gente hoy. No quería llegar al final con esa lista de arrepentimientos."]]}, {"fmt": "F3", "n": 182, "bucket": "", "title": "DEJÉ DE ANUNCIAR Y EMPECÉ A LOGRAR", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Hablaba mucho de mis grandes planes. El día que me callé y trabajé, unciar, avanzaba tranquilo, sin que nadie me frenara, dudara o saboteara. nadie puede frenar lo que no ve venir. trabajaba sin la presión de estar a la altura de lo que había presumido.\n\ncuando llegaban los resultados, hablaban solos, y hacían más ruido del que yo habría hecho contándolos.\n\naprendí que la ambición callada le gana a la ruidosa. que el que anuncia mucho suele hacer poco, y que es mejor mostrar logrado que prometer planeado. hoy trabajo en silencio y dejo que el resultado hable por mí.", "copies": [["Copy teaser", "Hablaba mucho de mis grandes planes. El día que me callé y trabajé, por fin empecé a lograrlos."], ["Copy script", "Yo era de los que anuncian todo. Hablaba sin parar de mis grandes planes, de lo que iba a lograr, de lo lejos que iba a llegar. Me encantaba el entusiasmo que generaba contarlo.\n\nPero noté algo incómodo: hablaba mucho y lograba poco. El ruido de anunciar reemplazaba al trabajo de hacer. Gastaba en presumir mis metas la energía que debía poner en cumplirlas. Y, encima, al contarlas, recibía opiniones y dudas que me enfriaban antes de empezar.\n\nDecidí cambiar. Me callé. Dejé de anunciar lo que iba a hacer y simplemente me puse a hacerlo, en silencio.\n\nY todo cambió. Sin anunciar, avanzaba tranquilo, sin que nadie me frenara, dudara o saboteara. Nadie puede frenar lo que no ve venir. Trabajaba sin la presión de estar a la altura de lo que había presumido.\n\nCuando llegaban los resultados, hablaban solos, y hacían más ruido del que yo habría hecho contándolos.\n\nAprendí que la ambición callada le gana a la ruidosa. Que el que anuncia mucho suele hacer poco, y que es mejor mostrar logrado que prometer planeado. Hoy trabajo en silencio y dejo que el resultado hable por mí."]]}, {"fmt": "F3", "n": 183, "bucket": "", "title": "DEJÉ DE BUSCAR DÍAS PERFECTOS Y EMPECÉ A SER CONSTANTE", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Empezaba todo con una intensidad enorme, y abando o. Entender de dónde venían me liberó.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Antes me tomaba todo personal. Si alguien me atacaba, me trataba mal o reaccionaba con veneno, yo asumía que algo había hecho mal, y cargaba con eso durante días.</p><p class='g'>Con el tiempo entendí algo que me liberó. Cuando alguien reacciona con una rabia o un desprecio desproporcionados, casi siempre está hablando de lo que carga por dentro, no de lo que yo hice. Lo que se dispara con tanta fuerza ya estaba ahí, esperando una excusa para salir.</p><p class='g'>Su reacción era un espejo de su interior, no una medida de mi valor.</p><p class='g'>Me di cuenta de que dos personas pueden vivir lo mismo y reaccionar completamente distinto, porque cada una responde desde su propia historia, sus heridas, su estado de ánimo. El mal humor o la agresividad de alguien casi siempre tenían que ver con lo que esa persona cargaba, no conmigo.</p><p class='g'>Empecé a soltar lo que no era mío. A no recoger todo lo que me lanzaban. A entender que el que critica todo, sufre con todo, y que su lupa para encontrar defectos hablaba de su propia infelicidad.</p><p class='g'>Aprendí a devolver lo que no me pertenecía. Dejé de cargar la mochila emocional de los demás, y viví mucho más liviano.</p></div>", "search": "entendí que su reacción hablaba de él, no de mí me tomaba personal cada ataque y cada mal trato. entender de dónde venían me liberó. antes me tomaba todo personal. si alguien me atacaba, me trataba mal o reaccionaba con veneno, yo asumía que algo había hecho mal, y cargaba con eso durante días.\n\ncon el tiempo entendí algo que me liberó. cuando alguien reacciona con una rabia o un desprecio desproporcionados, casi siempre está hablando de lo que carga por dentro, no de lo que yo hice. lo que se dispara con tanta fuerza ya estaba ahí, esperando una excusa para salir.\n\nsu reacción era un espejo de su interior, no una medida de mi valor.\n\nme di cuenta de qu ='teaser'>Fingía saberlo todo por miedo a verme débil. Aprender a decir &quot;no sé&quot; me dio más fuerza, no menos.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante mucho tiempo creí que tenía que tener respuesta para todo. Que decir &quot;no lo sé&quot; me haría ver débil, ignorante, menos capaz. Así que fingía. Asentía como si entendiera, opinaba de temas que no dominaba, inventaba seguridad que no tenía.</p><p class='g'>Vivía tenso, con miedo a que descubrieran mis vacíos.</p><p class='g'>Un día entendí que lo tenía al revés. Solo el inseguro necesita fingir que lo sabe todo, porque teme que vean sus límites. El que de verdad está seguro puede decir tranquilamente &quot;no lo sé, voy a averiguarlo&quot;, sin que su valor se tambalee.</p><p class='g'>Empecé a admitir lo que no sabía. Y pasaron dos cosas buenas. Primero, empecé a aprender de verdad, porque no se aprende desde el &quot;ya lo sé&quot;; reconocer mis vacíos era lo que me permitía llenarlos. Y segundo, la gente empezó a confiar más en mí, porque sabía que, cuando hablaba, era porque de verdad sabía.</p><p class='g'>Aprendí que fingir saber sale caro: tarde o temprano se nota, y cuesta más credibilidad que admitirlo desde el principio. Y que decir &quot;no lo sé&quot;, cuando es cierto, lejos de restarme, me hacía más fuerte y más confiable.</p></div>", "search": "aprendí la fuerza de decir \"no lo sé\" fingía saberlo todo por miedo a verme débil. aprender a decir \"no sé\" me dio más fuerza, no menos. durante mucho tiempo creí que tenía que tener respuesta para todo. que decir \"no lo sé\" me haría ver débil, ignorante, menos capaz. así que fingía. asentía como si entendiera, opinaba de temas que no dominaba, inventaba seguridad que no tenía.\n\nvivía tenso, con miedo a que descubrieran mis vacíos.\n\nun día entendí que lo tenía al revés. solo el inseguro necesita fingir que lo sabe todo, porque teme que vean sus límites. el que de verdad está seguro puede decir goes on the image</span><p class='teaser'>Le abría la puerta a cualquiera. Aprender a elegir quién entraba me devolvió la paz.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo le daba acceso a mi vida a casi cualquiera. Mi tiempo, mi energía, mi confianza, mi intimidad, todo abierto, para todos. Pensaba que cerrarle la puerta a alguien era ser frío o egoísta.</p><p class='g'>Y vivía agotado, vacío, rodeado de gente que me restaba más de lo que me sumaba.</p><p class='g'>Un día entendí algo. Mi tiempo y mi energía eran limitados; no alcanzaban para todo el mundo, ni tenían por qué. Cada persona a la que le daba acceso era energía que le quitaba a otra cosa o a alguien que sí importaba.</p><p class='g'>Entendí que el acceso a mí se gana, no se debe. Que no todo el que toca la puerta tiene que entrar. Que tengo derecho a elegir a quién dejo cerca.</p><p class='g'>Empecé a ser selectivo. A no estar disponible para todos por igual. A mantener a cierta distancia, sin culpa, a quien no le convenía a mi paz tener cerca.</p><p class='g'>Y, lejos de sentirme solo, me sentí mejor. Cada vez que dejaba de gastar energía en quien me restaba, me quedaba más para mí y para los que de verdad importaban.</p><p class='g'>Aprendí que mi círculo cercano decide buena parte de mi paz, y que cerrarle la puerta a algunos era, muchas veces, abrírmela a mí mismo. Cuidar quién entra resultó ser una forma de cuidarme.</p></div>", "search": "aprendí que no todos merecían acceso a mí le abría la puerta a cualquiera. aprender a elegir quién entraba me devolvió la paz. yo le daba acceso a mi vida a casi cualquiera. mi tiempo, mi energía, mi confianza, mi intimidad, todo abierto, para todos. pensaba que cerrarle la puerta a alguien era ser frío o egoísta.\n\ny vivía agotado, vacío, rodeado de gente que me restaba más de lo que me sumaba.\n\nun día entendí algo. mi tiempo y mi energía eran limitados; no alcanzaban para todo el mundo, ni tenían por qué. cada persona a l Cuidar quién entra resultó ser una forma de cuidarme."]]}, {"fmt": "F3", "n": 189, "bucket": "", "title": "ESTABA RODEADO DE GENTE Y ME SENTÍA SOLO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Tenía la casa llena y los grupos llenos, y por dentro me sentía completamente solo. No lo entendía.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años no entendí lo que me pasaba. Tenía gente alrededor, una casa que no estaba vacía, grupos, conocidos, planes. Y, aun así, por dentro me sentía profundamente solo.</p><p class='g'>Me culpaba por sentirme así &quot;teniéndolo todo&quot;. Hasta que entendí algo: la soledad de verdad no se mide por cuánta gente tienes cerca, sino por la falta de vínculos reales. Estaba acompañado, pero nadie me conocía de verdad. Estar solo y sentirse solo no son lo mismo.</p><p class='g'>También me di cuenta de que, por miedo a la soledad, me había rodeado de cualquiera, aguantando relaciones que me hacían mal solo por no estar solo. Y descubrí algo duro: estar mal acompañado es más solitario que estar solo.</p><p class='g'>Así que hice algo que me daba miedo: solté lo que no sumaba y me permití estar un tiempo a solas.</p><p class='g'>Y, aunque al principio dolió, aprendí a estar conmigo mismo. A disfrutar mi propia compañía. Y eso me liberó: dejé de aferrarme a cualquiera por miedo al vacío.</p><p class='g'>Hoy elijo mejor a quién dejo entrar, porque ya no lo hago desde la desesperación. Aprendí que es mejor estar solo y en paz que rodeado y vacío.</p></div>", "search": "estaba rodeado de gente y me sentía solo tenía la casa llena y los grupos llenos, y por dentro me sentía completamente solo. no lo entendía. durante años no entendí lo que me pasaba. tenía gente alrededor, una casa que no estaba vacía, grupos, conocidos, planes. y, aun así, por dentro me sentía profundamente solo.\n\nme culpaba por sentirme así \"teniéndolo todo\". hasta que entendí algo: la soledad de verdad no se mide por cuánta gente tienes cerca, sino por la falta de vínculos reales. estaba acompañado, pero nadie me conocía de verdad. estar solo y sentirse solo no son lo mismo.\n\ntambién me di cuenta de que, por miedo a la soledad, me había rodeado de cualquiera, aguantando relaciones que me hacían mal solo por no estar solo. y descubrí algo duro: estar mal acompañado es más solitario que estar solo.\n\nasí que hice algo que me daba miedo: solté lo que no sumaba y me permití estar un tiempo a solas.\n\ny, aunque al principio dolió, aprendí a estar conmigo mismo. a disfrutar mi propia compañía. y eso me liberó: dejé de aferrarme a cualquiera por miedo al vacío.\n\nhoy elijo mejor a quién dejo entrar, porque ya no lo hago desde la desesperación. aprendí que es mejor estar solo y en paz que rodeado y vacío.", "copies": [["Copy teaser", "Tenía la casa llena y los grupos llenos, y por dentro me sentía completamente solo. No lo entendía."], ["Copy script", "Durante años no entendí lo que me pasaba. Tenía gente alrededor, una casa que no estaba vacía, grupos, conocidos, planes. Y, aun así, por dentro me sentía profundamente solo.\n\nMe culpaba por sentirme así \"teniéndolo todo\". Hasta que entendí algo: la soledad de verdad no se mide por cuánta gente tienes cerca, sino por la falta de vínculos reales. Estaba acompañado, pero nadie me conocía de verdad. Estar solo y sentirse solo no son lo mismo.\n\nTambién me di cuenta de que, por miedo a la soledad, me había rodeado de cualquiera, aguantando relaciones que me hacían mal solo por no estar solo. Y descubrí algo duro: estar mal acompañado es más solitario que estar solo.\n\nAsí que hice algo que me daba miedo: solté lo que no sumaba y me permití estar un tiempo a solas.\n\nY, aunque al principio dolió, aprendí a estar conmigo mismo. A disfrutar mi propia compañía. Y eso me liberó: dejé de aferrarme a cualquiera por miedo al vacío.\n\nHoy elijo mejor a quién dejo entrar, porque ya no lo hago desde la desesperación. Aprendí que es mejor estar solo y en paz que rodeado y vacío."]]}, {"fmt": "F3", "n": 190, "bucket": "", "title": "APRENDÍ A ESTAR SOLO Y ME VOLVÍ MÁS FUERTE", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Le tenía pánico a la soledad. Cuando aprendí a estar bien solo, me volví mucho más fuerte.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Le tenía pánico a estar solo. Llenaba cada silencio, cada hueco de la agenda, con ruido, con gente, con planes, con el teléfono. No soportaba quedarme a solas conmigo.</p><p class='g'>Y esa necesidad me hacía débil. Me aferraba a relaciones que me hacían mal, rogaba atención, decía que sí a todo, con tal de no quedarme solo.</p><p class='g'>Un día, por circunstancias de la vida, me tocó estar solo. Y al principio fue duro. Pero, poco a poco, pasó algo inesperado.</p><p class='g'>En ese silencio, sin el ruido de todos, empecé a escucharme de verdad. A saber qué pensaba yo, qué quería yo, sin la influencia constante de los demás. Me conocí como nunca.</p><p class='g'>Y mi paz dejó de depender de tener a alguien al lado. Eso me dio una fortaleza enorme: ya no me aferraba por miedo, ya no rogaba. El que no teme estar solo no necesita; elige.</p><p class='g'>Con el tiempo, hasta empecé a disfrutar mi propia compañía. Y entendí que, cuando te llevas bien contigo, ya nunca estás del todo mal acompañado.</p><p class='g'>Aprendí que la soledad, bien vivida, no es un castigo: es un lugar de recarga, de claridad y de fuerza. Hoy elijo a mi gente desde la libertad, no desde el miedo.</p></div>", "search": "aprendí a estar solo y me volví más fuerte le tenía pánico a la soledad. cuando aprendí a estar bien solo, me volví mucho más fuerte. le tenía pánico a estar solo. llenaba cada silencio, cada hueco de la agenda, con ruido, con gente, con planes, con el teléfono. no soportaba quedarme a solas conmigo.\n\ny esa necesidad me hacía débil. me aferraba a relaciones que me hacían mal, rogaba atención, decía que sí a todo, con tal de no quedarme solo.\n\nun día, por circunstancias de la vida, me tocó estar solo. y al principio fue duro. pero, poco a poco, pasó algo inesperado.\n\nen ese silencio, sin el ruido de todos, empecé a escucharme de verdad. a saber qué pensaba yo, qué quería yo, sin la influencia constante de los demás. me conocí como nunca.\n\ny mi paz dejó de depender de tener a alguien al lado. eso me dio una fortaleza enorme: ya no me aferraba por miedo, ya no rogaba. el que no teme estar solo no necesita; elige.\n\ncon el tiempo, hasta empecé a disfrutar mi propia compañía. y entendí que, cuando te llevas bien contigo, ya nunca estás del todo mal acompañado.\n\naprendí que la soledad, bien vivida, no es un castigo: es un lugar de recarga, de claridad y de fuerza. hoy elijo a mi gente desde la libertad, no desde el miedo.", "copies": [["Copy teaser", "Le tenía pánico a la soledad. Cuando aprendí a estar bien solo, me volví mucho más fuerte."], ["Copy script", "Le tenía pánico a estar solo. Llenaba cada silencio, cada hueco de la agenda, con ruido, con gente, con planes, con el teléfono. No soportaba quedarme a solas conmigo.\n\nY esa necesidad me hacía débil. Me aferraba a relaciones que me hacían mal, rogaba atención, decía que sí a todo, con tal de no quedarme solo.\n\nUn día, por circunstancias de la vida, me tocó estar solo. Y al principio fue duro. Pero, poco a poco, pasó algo inesperado.\n\nEn ese silencio, sin el ruido de todos, empecé a escucharme de verdad. A saber qué pensaba yo, qué quería yo, sin la influencia constante de los demás. Me conocí como nunca.\n\nY mi paz dejó de depender de tener a alguien al lado. Eso me dio una fortaleza enorme: ya no me aferraba por miedo, ya no rogaba. El que no teme estar solo no necesita; elige.\n\nCon el tiempo, hasta empecé a disfrutar mi propia compañía. Y entendí que, cuando te llevas bien contigo, ya nunca estás del todo mal acompañado.\n\nAprendí que la soledad, bien vivida, no es un castigo: es un lugar de recarga, de claridad y de fuerza. Hoy elijo a mi gente desde la libertad, no desde el miedo."]]}, {"fmt": "F3", "n": 191, "bucket": "", "title": "LA GRATITUD ME CAMBIÓ LO QUE VEÍA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Vivía en queja, enfocado en lo que me faltaba. La gratitud no cambió mi vida, cambió cómo la veía.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años viví en queja constante. Siempre enfocado en lo que me faltaba: lo que no tenía, lo que otros sí, lo que aún no lograba. Por más que consiguiera cosas, nunca era suficiente.</p><p class='g'>Y era infeliz, a pesar de tener, objetivamente, una vida bastante buena.</p><p class='g'>Un día alguien me hizo notar algo. Dos personas con la misma vida pueden vivirla de forma opuesta, según dónde pongan la mirada. Yo siempre miraba el hueco, nunca lo lleno.</p><p class='g'>Empecé, casi sin creerlo, a practicar la gratitud. Cada día, a fijarme en lo que sí tenía, en lo bueno, por pequeño que fuera.</p><p class='g'>Y, poco a poco, algo cambió. No mi vida; mi vida era la misma. Cambió el lente con el que la miraba. Empecé a notar lo bueno que antes ignoraba, porque donde pones atención, crece.</p><p class='g'>Entendí que el que solo mira lo que le falta nunca tiene suficiente, porque la carencia es un pozo sin fondo. Y que agradecer no era conformarme: podía valorar lo de hoy y seguir buscando más.</p><p class='g'>La gratitud me sacó de la queja. Descubrí que es muy difícil quejarse y agradecer a la vez. Y, al cambiar lo que veía, cambió cómo me sentía.</p></div>", "search": "la gratitud me cambió lo que veía vivía en queja, enfocado en lo que me faltaba. la gratitud no cambió mi vida, cambió cómo la veía. durante años viví en queja constante. siempre enfocado en lo que me faltaba: lo que no tenía, lo que otros sí, lo que aún no lograba. por más que consiguiera cosas, nunca era suficiente.\n\ny era infeliz, a pesar de tener, objetivamente, una vida bastante buena.\n\nun día alguien me hizo notar algo. dos personas con la misma vida pueden vivirla de forma opuesta, según dónde pongan la mirada. yo siempre miraba el hueco, nunca lo lleno.\n\nempecé, casi sin creerlo, a practicar la gratitud. cada día, a fijarme en lo que sí tenía, en lo bueno, por pequeño que fuera.\n\ny, poco a poco, algo cambió. no mi vida; mi vida era la misma. cambió el lente con el que la miraba. empecé a notar lo bueno que antes ignoraba, porque donde pones atención, crece.\n\nentendí que el que solo mira lo que le falta nunca tiene suficiente, porque la carencia es un pozo sin fondo. y que agradecer no era conformarme: podía valorar lo de hoy y seguir buscando más.\n\nla gratitud me sacó de la queja. descubrí que es muy difícil quejarse y agradecer a la vez. y, al cambiar lo que veía, cambió cómo me sentía.", "copies": [["Copy teaser", "Vivía en queja, enfocado en lo que me faltaba. La gratitud no cambió mi vida, cambió cómo la veía."], ["Copy script", "Durante años viví en queja constante. Siempre enfocado en lo que me faltaba: lo que no tenía, lo que otros sí, lo que aún no lograba. Por más que consiguiera cosas, nunca era suficiente.\n\nY era infeliz, a pesar de tener, objetivamente, una vida bastante buena.\n\nUn día alguien me hizo notar algo. Dos personas con la misma vida pueden vivirla de forma opuesta, según dónde pongan la mirada. Yo siempre miraba el hueco, nunca lo lleno.\n\nEmpecé, casi sin creerlo, a practicar la gratitud. Cada día, a fijarme en lo que sí tenía, en lo bueno, por pequeño que fuera.\n\nY, poco a poco, algo cambió. No mi vida; mi vida era la misma. Cambió el lente con el que la miraba. Empecé a notar lo bueno que antes ignoraba, porque donde pones atención, crece.\n\nEntendí que el que solo mira lo que le falta nunca tiene suficiente, porque la carencia es un pozo sin fondo. Y que agradecer no era conformarme: podía valorar lo de hoy y seguir buscando más.\n\nLa gratitud me sacó de la queja. Descubrí que es muy difícil quejarse y agradecer a la vez. Y, al cambiar lo que veía, cambió cómo me sentía."]]}, {"fmt": "F3", "n": 192, "bucket": "", "title": "ENTENDÍ LO QUE DE VERDAD QUEDA AL FINAL", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Viví acumulando cosas, como si me las fuera a llevar. Entender lo que de verdad queda me reordenó todo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Pasé buena parte de mi vida acumulando. Cosas, logros, dinero, como si me los fuera a llevar, como si eso fuera la medida de una vida bien vivida.</p><p class='g'>Y entonces vi de cerca el final de la vida de alguien. Y eso me reordenó todo.</p><p class='g'>Entendí algo que cambió mis prioridades. No te llevas lo que tuviste, sino lo que viviste. Las cosas se quedan; los momentos, las experiencias, el amor que diste y recibiste, eso fue lo único que de verdad fue tuyo.</p><p class='g'>Me di cuenta de que a esa persona no la recordaban por su cuenta de banco ni por lo que había acumulado. La recordaban por cómo hizo sentir a los demás. Por si estuvo cuando importaba. Por la huella que dejó en otros.</p><p class='g'>Esa huella vivía, incluso cuando ella ya no estaba. El dinero se había gastado, lo que presumió se había olvidado, pero lo que sembró en la gente quedaba.</p><p class='g'>Ahí entendí que, al final, pesa el amor, no el inventario. Que nadie, en su último día, abraza sus cosas.</p><p class='g'>Y empecé a invertir distinto: menos en acumular, más en la gente, en los momentos, en dejar algo bueno a mi paso. Porque eso es lo único que de verdad queda cuando todo lo demás se va.</p></div>", "search": "entendí lo que de verdad queda al final viví acumulando cosas, como si me las fuera a llevar. entender lo que de verdad queda me reordenó todo. pasé buena parte de mi vida acumulando. cosas, logros, dinero, como si me los fuera a  la gente quedaba.\n\nAhí entendí que, al final, pesa el amor, no el inventario. Que nadie, en su último día, abraza sus cosas.\n\nY empecé a invertir distinto: menos en acumular, más en la gente, en los momentos, en dejar algo bueno a mi paso. Porque eso es lo único que de verdad queda cuando todo lo demás se va."]]}, {"fmt": "F3", "n": 193, "bucket": "", "title": "APRENDÍ A SABER CUÁNDO ERA SUFICIENTE", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Vivía en una carrera por más que nunca terminaba. Aprender a decir &quot;es suficiente&quot; me devolvió la paz.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Viví mucho tiempo en una carrera por más. Más dinero, más cosas, más logros. Y por más que conseguía, nunca llegaba, porque la meta se corría sola. Siempre faltaba un poco más.</p><p class='g'>Vivía cansado, insatisfecho, sin disfrutar nada, porque mi mente ya estaba en lo siguiente.</p><p class='g'>Un día me detuve y me hice una pregunta incómoda: ¿cuánto es suficiente? Y me di cuenta de que nunca lo había definido. No tenía punto de llegada, así que nunca llegaba.</p><p class='g'>También entendí que parte de mi insatisfacción venía de compararme. Siempre habría alguien con más, así que, si esa era mi vara, perdía siempre, sin importar cuánto consiguiera.</p><p class='g'>Empecé a practicar algo difícil: saber decir &quot;esto está bien&quot;. Poner un techo consciente. Disfrutar lo que ya tenía en vez de correr siempre detrás de lo que faltaba.</p><p class='g'>No dejé de tener metas; querer crecer no tiene nada de malo. Lo que cambió fue que aprendí a disfrutar el camino, a agradecer mientras avanzaba.</p><p class='g'>Y recuperé la paz. Entendí que lo suficiente, bien disfrutado, vale más que lo mucho ignorado. Que tener no es gozar. Aprender a saber cuándo es suficiente resultó ser uno de los mayores superpoderes que encontré.</p></div>", "search": "aprendí a saber cuándo era suficie ra, perdía siempre, sin importar cuánto consiguiera.\n\nEmpecé a practicar algo difícil: saber decir \"esto está bien\". Poner un techo consciente. Disfrutar lo que ya tenía en vez de correr siempre detrás de lo que faltaba.\n\nNo dejé de tener metas; querer crecer no tiene nada de malo. Lo que cambió fue que aprendí a disfrutar el camino, a agradecer mientras avanzaba.\n\nY recuperé la paz. Entendí que lo suficiente, bien disfrutado, vale más que lo mucho ignorado. Que tener no es gozar. Aprender a saber cuándo es suficiente resultó ser uno de los mayores superpoderes que encontré."]]}, {"fmt": "F3", "n": 194, "bucket": "", "title": "DESCUBRÍ QUE EN LO QUE ME ENFOCABA, CRECÍA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Veía problemas en todo y todo empeoraba. Cambiar mi foco cambió mi mundo entero.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años vi problemas en todo. Me enfocaba en lo que me faltaba, en lo que salía mal, en lo que temía. Y, curiosamente, mi vida parecía estar llena de eso: problemas por todos lados.</p><p class='g'>Hasta que entendí cómo funcionaba mi propia mente.</p><p class='g'>Mi atención era como un foco: lo que iluminaba, se agrandaba; lo que dejaba en sombra, se achicaba. Al pasar el día enfocado en lo malo, lo malo crecía hasta tapar todo lo demás.</p><p class='g'>Y mi mente, además, era una máquina de buscar pruebas de lo que ya creía. Si la ponía a buscar problemas, encontraba problemas en todo. La pregunta que me hacía dirigía lo que encontraba.</p><p class='g'>Empecé a cambiar el foco. En vez de preguntarme &quot;por qué me pasa esto&quot;, me preguntaba &quot;qué puedo hacer con esto&quot;. En vez de rumiar lo que salía mal, buscaba lo que sí funcionaba y lo que podía agradecer.</p><p class='g'>Y mi mundo cambió. No mi realidad, sino lo que veía de ella, y eso lo cambió casi todo.</p><p class='g'>Aprendí que en lo que me enfoco, crece. Que mis pensamientos son como un terreno: crece lo que riego. Hoy cuido mucho en qué gasto mi atención, porque eso, con el tiempo, se vuelve mi manera de vivir.</p></div>", "search": "descubrí que en lo que me enfocaba, crecía veía problemas en todo y todo empeoraba. cambiar mi foco cambió mi mundo entero. durante años vi problemas en todo. me enfocaba en lo que me faltaba, en lo que salía mal, en lo que temía. y, curiosamente, mi vida parecía estar llena de eso: problemas por todos lados.\n\nhasta que entendí cómo funcionaba mi propia mente.\n\nmi atención era como un foco: lo que iluminaba, se agrandaba; lo que dejaba en sombra, se achicaba. al pasar el día enfocado en lo malo, lo malo crecía hasta tapar todo lo demás.\n\ny mi mente, además, era una máquina de buscar pruebas de lo que ya creía. si la ponía a buscar problemas, encontraba problemas en todo. la pregunta que me hacía dirigía lo que encontraba.\n\nempecé a cambiar el foco. en vez de preguntarme \"por qué me pasa esto\", me preguntaba \"qué puedo hacer con esto\". en vez de rumiar lo que salía mal, buscaba lo que sí funcionaba y lo que podía agradecer.\n\ny mi mundo cambió. no mi realidad, sino lo que veía de ella, y eso lo cambió casi todo.\n\naprendí que en lo que me enfoco, crece. que mis pensamientos son como un terreno: crece lo que riego. hoy cuido mucho en qué gasto mi atención, porque eso, con el tiempo, se vuelve mi manera de vivir.", "copies": [["Copy teaser", "Veía problemas en todo y todo empeoraba. Cambiar mi foco cambió mi mundo entero."], ["Copy script", "Durante años vi problemas en todo. Me enfocaba en lo que me faltaba, en lo que salía mal, en lo que temía. Y, curiosamente, mi vida parecía estar llena de eso: problemas por todos lados.\n\nHasta que entendí cómo funcionaba mi propia mente.\n\nMi atención era como un foco: lo que iluminaba, se agrandaba; lo que dejaba en sombra, se achicaba. Al pasar el día enfocado en lo malo, lo malo crecía hasta tapar todo lo demás.\n\nY mi mente, además, era una máquina de buscar pruebas de lo que ya creía. Si la ponía a buscar problemas, encontraba problemas en todo. La pregunta que me hacía dirigía lo que encontraba.\n\nEmpecé a cambiar el foco. En vez de preguntarme \"por qué me pasa esto\", me preguntaba \"qué puedo hacer con esto\". En vez de rumiar lo que salía mal, buscaba lo que sí funcionaba y lo que podía agradecer.\n\nY mi mundo cambió. No mi realidad, sino lo que veía de ella, y eso lo cambió casi todo.\n\nAprendí que en lo que me enfoco, crece. Que mis pensamientos son como un terreno: crece lo que riego. Hoy cuido mucho en qué gasto mi atención, porque eso, con el tiempo, se vuelve mi manera de vivir."]]}, {"fmt": "F3", "n": 195, "bucket": "", "title": "CREÍA QUE DESCANSAR ERA PERDER EL TIEMPO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Me sentía culpable cada vez que descansaba. Hasta que entendí que el descanso era parte del trabajo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo creía que descansar era de flojos. Que parar era perder el tiempo. Así que empujaba sin freno, me sentía culpable cada vez que descansaba, y llevaba el agotamiento como una medalla.</p><p class='g'>Y terminé quemado. Agotado, sin energía, sin ideas, rindiendo cada vez menos justo cuando creía que estaba dando más.</p><p class='g'>Ahí entendí que lo tenía todo al revés.</p><p class='g'>El descanso no era el enemigo del trabajo; era parte de él. Igual que un músculo crece en la recuperación y no solo en el esfuerzo, mi mente y mi cuerpo necesitaban pausa para rendir. Sin descanso no había buen trabajo sostenido, solo agotamiento disfrazado de productividad.</p><p class='g'>Me di cuenta de que el que no para, se quema, y de que el cansancio acumulado cobra factura en la salud, el ánimo y hasta el rendimiento. Que matarme trabajando no era lo mismo que avanzar.</p><p class='g'>Empecé a descansar sin culpa. A parar a tiempo, antes de romperme. Y, para mi sorpresa, empecé a lograr más, con más claridad. Mis mejores ideas llegaban descansado, no agotado.</p><p class='g'>Aprendí que descansar no es flojera: es cuidar la máquina con la que trabajo, que soy yo mismo. Que el descanso, bien usado, no es una pérdida; es una inversión.</p></div>", "search": "creía que descansar era perder el tiempo me sentía culpable cada vez que descansaba. hasta que entendí que el descanso era parte del trabajo. yo creía que descansar era de flojos. que parar era perder el tiempo. así que empujaba sin freno, me sentía culpable cada vez que descansaba, y llevaba el agotamiento como una medalla.\n\ny terminé quemado. agotado, sin energía, sin ideas, rindiendo cada vez menos justo cuando creía que estaba dando más.\n\nahí entendí que lo tenía todo al revés.\n\nel descanso no era el enemigo del trabajo; era parte de él. igual que un músculo crece en la recuperación y no solo en el esfuerzo, mi mente y mi cuerpo necesitaban pausa para rendir. sin descanso no había buen trabajo sostenido, solo agotamiento disfrazado de productividad.\n\nme di cuenta de que el que no para, se quema, y de que el cansancio acumulado cobra factura en la salud, el ánimo y hasta el rendimiento. que matarme trabajando no era lo mismo que avanzar.\n\nempecé a descansar sin culpa. a parar a tiempo, antes de romperme. y, para mi sorpresa, empecé a lograr más, con más claridad. mis mejores ideas llegaban descansado, no agotado.\n\naprendí que descansar no es flojera: es cuidar la máquina con la que trabajo, que soy yo mismo. que el descanso, bien usado, no es una pérdida; es una inversión.", "copies": [["Copy teaser", "Me sentía culpable cada vez que descansaba. Hasta que entendí que el descanso era parte del trabajo."], ["Copy script", "Yo creía que descansar era de flojos. Que parar era perder el tiempo. Así que empujaba sin freno, me sentía culpable cada vez que descansaba, y llevaba el agotamiento como una medalla.\n\nY terminé quemado. Agotado, sin energía, sin ideas, rindiendo cada vez menos justo cuando creía que estaba dando más.\n\nAhí entendí que lo tenía todo al revés.\n\nEl descanso no era el enemigo del trabajo; era parte de él. Igual que un músculo crece en la recuperación y no solo en el esfuerzo, mi mente y mi cuerpo necesitaban pausa para rendir. Sin descanso no había buen trabajo sostenido, solo agotamiento disfrazado de productividad.\n\nMe di cuenta de que el que no para, se quema, y de que el cansancio acumulado cobra factura en la salud, el ánimo y hasta el rendimiento. Que matarme trabajando no era lo mismo que avanzar.\n\nEmpecé a descansar sin culpa. A parar a tiempo, antes de romperme. Y, para mi sorpresa, empecé a lograr más, con más claridad. Mis mejores ideas llegaban descansado, no agotado.\n\nAprendí que descansar no es flojera: es cuidar la máquina con la que trabajo, que soy yo mismo. Que el descanso, bien usado, no es una pérdida; es una inversión."]]}, {"fmt": "F3", "n": 196, "bucket": "", "title": "APRENDÍ A VALORAR MI VIDA ORDINARIA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Despreciaba mis días normales esperando los grandes momentos. Tardé en ver que la vida estaba ahí.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo despreciaba lo ordinario. Vivía esperando los grandes momentos, las vacaciones, los logros enormes, los eventos especiales, como si solo entonces la vida valiera la pena. Los días normales me parecían simple relleno.</p><p class='g'>Y así me perdí, sin darme cuenta, buena parte de mi vida, porque la mayor parte de la vida es ordinaria.</p><p class='g'>Lo entendí, como casi siempre, demasiado tarde para algunas cosas. Cuando ciertos días comunes ya no se podían repetir, fueron justo esos los que más extrañé. Una cena cualquiera, una charla sin importancia, la gente que tenía cerca y daba por sentada.</p><p class='g'>Ahí me cayó la ficha: lo cotidiano de hoy iba a ser lo que extrañaría mañana.</p><p class='g'>Empecé a mirar distinto. A notar lo extraordinario escondido en lo común: un café tranquilo, una buena conversación, abrazar a quien quiero, un día sin problemas graves. Ahí estaba buena parte de la felicidad real, en cosas tan simples que casi no las notaba.</p><p class='g'>Entendí que el que solo vive para los grandes momentos, no vive. Y que lo que yo tenía y daba por sentado, alguien en otra parte lo soñaba.</p><p class='g'>Aprendí a valorar mi vida ordinaria. Y, al hacerlo, dejé de esperar para ser feliz y empecé a serlo en los días comunes.</p></div>", "search": "aprendí a valorar mi vida ordinaria despreciaba mis días normales esperando los grandes momentos. tardé en ver que la vida estaba ahí. yo despreciaba lo ordinario. vivía esperando los grandes momentos, las vacaciones, los logros enormes, los eventos especiales, como si solo entonces la vida valiera la pena. los días normales me parecían simple relleno.\n\ny así me perdí, sin darme cuenta, buena parte de mi vida, porque la mayor parte de la vida es ordinaria.\n\nlo entendí, como casi siempre, demasiado tarde para algunas cosas. cuando ciertos días comunes ya no se podían repetir, fueron justo esos los que más extrañé. una cena cualquiera, una charla sin importancia, la gente que tenía cerca y daba por sentada.\n\nahí me cayó la ficha: lo cotidiano de hoy iba a ser lo que extrañaría mañana.\n\nempecé a mirar distinto. a notar lo extraordinario escondido en lo común: un café tranquilo, una buena conversación, abrazar a quien quiero, un día sin problemas graves. ahí estaba buena parte de la felicidad real, en cosas tan simples que casi no las notaba.\n\nentendí que el que solo vive para los grandes momentos, no vive. y que lo que yo tenía y daba por sentado, alguien en otra parte lo soñaba.\n\naprendí a valorar mi vida ordinaria. y, al hacerlo, dejé de esperar para ser feliz y empecé a serlo en los días comunes.", "copies": [["Copy teaser", "Despreciaba mis días normales esperando los grandes momentos. Tardé en ver que la vida estaba ahí."], ["Copy script", "Yo despreciaba lo ordinario. Vivía esperando los grandes momentos, las vacaciones, los logros enormes, los eventos especiales, como si solo entonces la vida valiera la pena. Los días normales me parecían simple relleno.\n\nY así me perdí, sin darme cuenta, buena parte de mi vida, porque la mayor parte de la vida es ordinaria.\n\nLo entendí, como casi siempre, demasiado tarde para algunas cosas. Cuando ciertos días comunes ya no se podían repetir, fueron justo esos los que más extrañé. Una cena cualquiera, una charla sin importancia, la gente que tenía cerca y daba por sentada.\n\nAhí me cayó la ficha: lo cotidiano de hoy iba a ser lo que extrañaría mañana.\n\nEmpecé a mirar distinto. A notar lo extraordinario escondido en lo común: un café tranquilo, una buena conversación, abrazar a quien quiero, un día sin problemas graves. Ahí estaba buena parte de la felicidad real, en cosas tan simples que casi no las notaba.\n\nEntendí que el que solo vive para los grandes momentos, no vive. Y que lo que yo tenía y daba por sentado, alguien en otra parte lo soñaba.\n\nAprendí a valorar mi vida ordinaria. Y, al hacerlo, dejé de esperar para ser feliz y empecé a serlo en los días comunes."]]}, {"fmt": "F3", "n": 197, "bucket": "", "title": "PERSEGUÍ LA FELICIDAD HASTA QUE ENTENDÍ QUE ASÍ NO ERA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Perseguí la felicidad como una meta y siempre se me escapaba. Entender por qué lo cambió todo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Perseguí la felicidad durante años como quien persigue una meta. &quot;Cuando logre esto, seré feliz.&quot; &quot;Cuando tenga aquello, voy a estar bien.&quot; Vivía obsesionado con ser feliz.</p><p class='g'>Y, curiosamente, mientras más la perseguía, más se me escapaba. Convertía la felicidad en una exigencia más, en algo que siempre me faltaba, y eso me hacía sentir peor.</p><p class='g'>Un día entendí algo que lo cambió todo. La felicidad no es un objetivo que cazas de frente; es un estado que aparece, casi de costado, cuando vives de cierta manera.</p><p class='g'>Me di cuenta de que los momentos en que de verdad me había sentido pleno no habían llegado por perseguir la felicidad, sino mientras hacía cosas con sentido, mientras estaba presente con mi gente, mientras me entregaba a algo más grande que yo. La felicidad había sido un resultado, no una meta directa.</p><p class='g'>También entendí que la había confundido con placer constante. Y el placer fácil es intenso pero corto, y deja vacío. Lo que de verdad llena nace de cosas menos inmediatas: vínculos reales, sentido, crecimiento, dar.</p><p class='g'>Así que dejé de cazarla. Me enfoqué en construir una vida con sentido y buenos vínculos, y dejé que la felicidad viniera sola.</p><p class='g'>Y vino. De lado, sin avisar, justo cuando dejé de perseguirla.</p></div>", "search": "perseguí la felicidad hasta que entendí que así no era perseguí la felicidad como una meta y siempre se me escapaba. entender por qué lo cambió todo. perseguí la felicidad durante años como quien persigue una meta. \"cuando logre esto, seré feliz.\" \"cuando tenga aquello, voy a estar bien.\" vivía obsesionado con ser feliz.\n\ny, curiosamente, mientras más la perseguía, más se me escapaba. convertía la felicidad en una exigencia más, en algo que siempre me faltaba, y eso me hacía sentir peor.\n\nun día entendí algo que lo cambió todo. la felicidad no es un objetivo que cazas de frente; es un estado que aparece, casi de costado, cuando vives de cierta manera.\n\nme di cuenta de que los momentos en que de verdad me había sentido pleno no habían llegado por perseguir la felicidad, sino mientras hacía cosas con sentido, mientras estaba presente con mi gente, mientras me entregaba a algo más grande que yo. la felicidad había sido un resultado, no una meta directa.\n\ntambién entendí que  a los demás. El día que elegí la paz sobre el aplauso, por fin descansé.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Viví mucho tiempo para impresionar. Para mostrar, para que todos vieran lo bien que me iba, para sostener una imagen. Cada decisión la tomaba pensando en cómo se vería, no en cómo se sentía.</p><p class='g'>Y estaba agotado. Vivía pendiente de la mirada ajena, gastando una energía enorme en sostener esa vida de vitrina.</p><p class='g'>Lo peor es que, por dentro, no era feliz. Tenía una vida que, desde afuera, parecía envidiable, y por dentro me sentía vacío y cansado. Descubrí que lo que se ve no es lo que se siente; que hay vidas envidiadas y huecas.</p><p class='g'>Un día me cansé de aparentar. Y tomé una decisión: elegir la paz por encima del aplauso.</p><p class='g'>Empecé a soltar lo que solo era para mostrar. A dejar de demostrarle mi vida a nadie. A construir días tranquilos, sencillos, aunque no fueran espectaculares en una foto.</p><p class='g'>Y, por primera vez en años, descansé. No tener que impresionar a nadie resultó ser una libertad enorme.</p><p class='g'>Aprendí que la vida tranquila vale más que la que impresiona. Que de nada sirve una vida que todos envidian si a ti te tiene vacío. El que vive para los demás nunca descansa; el que vive para su paz, sí. Hoy elijo mi calma. Y, aunque no se vea en una foto, una vida sencilla y en paz es un lujo.</p></div>", "search": "elegí una vida tranquila sobre una que impresionara viví para impresionar a los demás. el día que elegí la paz sobre el aplauso, por fin descansé. viví mucho tiempo para impresionar. para mostrar, para que todos vieran lo bien que me iba, para sostener una imagen. cada decisión la tomaba pensando en cómo se vería, no en cómo se sentía.\n\ny estaba agotado. vivía pendiente de la mirada ajena, gastando una energía enorme en sostener esa vida de vitrina.\n\nlo peor es que, por dentro, no era feliz. tenía una vida que, desde afuera, parecía const LABELS = {F1:"Lists", F2:"3 Points", F3:"Script", F4:"Prompts"};
const store=(()=>{ let mem={}; let ok=true;
  try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k);}catch(e){ ok=false; }
  return { get(k){ try{ return ok?localStorage.getItem(k):mem[k]; }catch(e){ return mem[k]; } },
           set(k,v){ try{ ok?localStorage.setItem(k,v):(mem[k]=v); }catch(e){ mem[k]=v; } } };
})();
const doneKey=it=>"done:"+it.fmt+":"+it.n;
const isDone=it=>store.get(doneKey(it))==="1";
let activeFmt="ALL", query="", hideDone=false;
const grid=document.getElementById("grid"), tabsEl=document.getElementById("tabs"),
      emptyEl=document.getElementById("empty"), toast=document.getElementById("toast");
function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("hide").addEventListener("change",e=>{hideDone=e.target.checked;render();});
document.addEventListener("keydown",e=>{ if(e.key==="/" && document.activeElement.id!=="q"){e.preventDefault();document.getElementById("q").focus();}});
renderTabs(); render();
</script>
