<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content Workshop · Round 1</title>
<style>
:root{
  --bg:#f3f2ee; --surface:#ffffff; --ink:#1b1a17; --muted:#736e65; --line:#e6e2da;
  --accent:#c2410c; --accent-soft:#fbe9df;
  --f1:#2f7d4f; --f2:#c2410c; --f3:#3f5168; --f4:#6d4c7d;
  --shadow:0 1px 2px rgba(20,18,14,.04),0 6px 16px rgba(20,18,14,.05);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px}
header.bar{position:sticky;top:0;z-index:20;background:rgba(243,242,238,.86);
  backdrop-filter:saturate(1.1) blur(8px);border-bottom:1px solid var(--line)}
.bar .wrap{padding-top:14px;padding-bottom:12px}
.brandrow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand{font-weight:700;letter-spacing:.02em;font-size:17px}
.brand b{color:var(--accent)}
.sub{color:var(--muted);font-size:13px}
.controls{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.search input{border:0;outline:0;background:transparent;width:100%;font:inherit;color:var(--ink)}
.search svg{flex:none;color:var(--muted)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;gap:7px;align-items:center;transition:.12s}
.tab:hover{border-color:#d4cfc4}
.tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab .cnt{font-size:11px;opacity:.7;font-weight:600}
.toggle{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none}
.toggle input{accent-color:var(--accent)}
main .wrap{padding-top:20px;padding-bottom:64px}
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));align-items:start}
.card{background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:16px 16px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px}
.card.done{opacity:.5}
.chead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:6px;color:#fff;text-transform:uppercase}
.p-F1{background:var(--f1)} .p-F2{background:var(--f2)} .p-F3{background:var(--f3)} .p-F4{background:var(--f4)}
.bucket{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 7px}
.idx{margin-left:auto;font-size:12px;color:#a9a297;font-variant-numeric:tabular-nums}
.markbtn{border:1px solid var(--line);background:var(--surface);border-radius:7px;
  font-size:12px;padding:4px 9px;color:var(--muted);cursor:pointer;font-weight:600}
.markbtn:hover{border-color:#d4cfc4}
.card.done .markbtn{background:var(--f1);color:#fff;border-color:var(--f1)}
.title{font-weight:800;text-transform:uppercase;letter-spacing:.02em;font-size:15.5px;line-height:1.28;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .title{-webkit-text-fill-color:initial;color:var(--muted);background:none}
.qtitle{font-weight:800;font-size:16px;line-height:1.32;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .qtitle{-webkit-text-fill-color:initial;color:var(--muted);background:none}
ol.lst,ol.pts{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px}
ol.lst li,ol.pts li{padding-left:3px}
ol.lst .d{color:#bdb6aa}
ol.pts li{line-height:1.45}
.note{font-size:12px;color:var(--muted);font-style:italic;margin:2px 0 0}
.f3 .lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--accent);margin:2px 0 4px}
.f3 .teaser{margin:0 0 10px;background:var(--accent-soft);border-radius:8px;padding:9px 11px}
.f3 p.g{margin:0 0 7px}
.prompt{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;
  white-space:pre-wrap;background:#1b1a17;color:#ece6da;border-radius:9px;padding:12px;max-height:220px;overflow:auto}
.cfoot{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.copy{flex:1;min-width:120px;border:0;border-radius:8px;padding:9px 12px;font:inherit;font-weight:700;font-size:13px;
  cursor:pointer;background:var(--accent);color:#fff;transition:.12s}
.copy.secondary{background:var(--ink)}
.copy:hover{filter:brightness(1.06)}
.copy.ok{background:var(--f1)!important}
.empty{text-align:center;color:var(--muted);padding:70px 10px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.18s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<script>
const DATA = [{"fmt": "F1", "n": 151, "bucket": "Power", "title": "LO QUE ESCASEA SE VALORA MÁS", "body": "<ol class='lst'><li><strong>Lo que abunda se ignora; lo escaso se busca</strong> <span class='d'>-</span> tu disponibilidad sin límite te abarata.</li><li><strong>El que está siempre disponible deja de ser especial</strong> <span class='d'>-</span> lo que sobra no se cuida.</li><li><strong>Poner límites a tu tiempo sube tu valor</strong> <span class='d'>-</span> lo difícil de conseguir se aprecia más.</li><li><strong>No te entregues entero de entrada</strong> <span class='d'>-</span> lo que se da fácil, se valora poco.</li><li><strong>Tu presencia vale si no es garantía</strong> <span class='d'>-</span> el que siempre está, se vuelve paisaje.</li></ol>", "search": "lo que escasea se valora más poder lo que abunda se ignora; lo escaso se busca tu disponibilidad sin límite te abarata. el que está siempre disponible deja de ser especial lo que sobra no se cuida. poner límites a tu tiempo sube tu valor lo difícil de conseguir se aprecia más. no te entregues entero de entrada lo que se da fácil, se valora poco. tu presencia vale si no es garantía el que siempre está, se vuelve paisaje.", "copies": [["Copy card", "LO QUE ESCASEA SE VALORA MÁS\n\n1. Lo que abunda se ignora; lo escaso se busca - tu disponibilidad sin límite te abarata.\n2. El que está siempre disponible deja de ser especial - lo que sobra no se cuida.\n3. Poner límites a tu tiempo sube tu valor - lo difícil de conseguir se aprecia más.\n4. No te entregues entero de entrada - lo que se da fácil, se valora poco.\n5. Tu presencia vale si no es garantía - el que siempre está, se vuelve paisaje."]]}, {"fmt": "F1", "n": 152, "bucket": "Power", "title": "POR QUÉ EXPLICAR DE MÁS TE DEBILITA", "body": "<ol class='lst'><li><strong>El que se justifica suena inseguro</strong> <span class='d'>-</span> una decisión firme no necesita defensa larga.</li><li><strong>Mientras más explicas, más das material para rebatirte</strong> <span class='d'>-</span> el que dice de menos, controla.</li><li><strong>&quot;No&quot; es una frase completa</strong> <span class='d'>-</span> no le debes a nadie un ensayo por cada límite.</li><li><strong>Explicar de más se ve como pedir permiso</strong> <span class='d'>-</span> el seguro informa, no suplica.</li><li><strong>El silencio firme pesa más que mil razones</strong> <span class='d'>-</span> a veces la mejor explicación es ninguna.</li></ol>", "search": "por qué explicar de más te debilita poder el que se justifica suena inseguro una decisión firme no necesita defensa larga. mientras más explicas, más das material para rebatirte el que dice de menos, controla. \"no\" es una frase completa no le debes a nadie un ensayo por cada límite. explicar de más se ve como pedir permiso el seguro informa, no suplica. el silencio firme pesa más que mil razones a veces la mejor explicación es ninguna.", "copies": [["Copy card", "POR QUÉ EXPLICAR DE MÁS TE DEBILITA\n\n1. El que se justifica suena inseguro - una decisión firme no necesita defensa larga.\n2. Mientras más explicas, más das material para rebatirte - el que dice de menos, controla.\n3. \"No\" es una frase completa - no le debes a nadie un ensayo por cada límite.\n4. Explicar de más se ve como pedir permiso - el seguro informa, no suplica.\n5. El silencio firme pesa más que mil razones - a veces la mejor explicación es ninguna."]]}, {"fmt": "F1", "n": 153, "bucket": "Power", "title": "EL PODER DE PODER IRTE", "body": "<ol class='lst'><li><strong>El que puede irse, manda</strong> <span class='d'>-</span> la necesidad te encadena, la opción te libera.</li><li><strong>El que no puede perder, no puede negociar</strong> <span class='d'>-</span> el desesperado acepta lo que sea.</li><li><strong>Tener una salida cambia cómo te tratan</strong> <span class='d'>-</span> el que se sabe libre no se deja pisar.</li><li><strong>No amenaces con irte; prepárate para hacerlo</strong> <span class='d'>-</span> el poder real es silencioso.</li><li><strong>Tu mejor carta es no necesitar la mesa</strong> <span class='d'>-</span> el que no depende, decide.</li></ol>", "search": "el poder de poder irte poder el que puede irse, manda la necesidad te encadena, la opción te libera. el que no puede perder, no puede negociar el desesperado acepta lo que sea. tener una salida cambia cómo te tratan el que se sabe libre no se deja pisar. no amenaces con irte; prepárate para hacerlo el poder real es silencioso. tu mejor carta es no necesitar la mesa el que no depende, decide.", "copies": [["Copy card", "EL PODER DE PODER IRTE\n\n1. El que puede irse, manda - la necesidad te encadena, la opción te libera.\n2. El que no puede perder, no puede negociar - el desesperado acepta lo que sea.\n3. Tener una salida cambia cómo te tratan - el que se sabe libre no se deja pisar.\n4. No amenaces con irte; prepárate para hacerlo - el poder real es silencioso.\n5. Tu mejor carta es no necesitar la mesa - el que no depende, decide."]]}, {"fmt": "F1", "n": 154, "bucket": "Power", "title": "POR QUÉ EL QUE MANTIENE LA CALMA CONTROLA TODO", "body": "<ol class='lst'><li><strong>El que pierde los nervios pierde el control</strong> <span class='d'>-</span> la calma es quien manda en el caos.</li><li><strong>Mientras los demás se alteran, tú piensas</strong> <span class='d'>-</span> la cabeza fría ve lo que la caliente no.</li><li><strong>La calma transmite seguridad</strong> <span class='d'>-</span> el tranquilo inspira más que el que grita.</li><li><strong>El que no reacciona, desarma</strong> <span class='d'>-</span> tu serenidad le quita poder a la provocación.</li><li><strong>La compostura es autoridad sin levantar la voz</strong> <span class='d'>-</span> el firme no necesita gritar.</li></ol>", "search": "por qué el que mantiene la calma controla todo poder el que pierde los nervios pierde el control la calma es quien manda en el caos. mientras los demás se alteran, tú piensas la cabeza fría ve lo que la caliente no. la calma transmite seguridad el tranquilo inspira más que el que grita. el que no reacciona, desarma tu serenidad le quita poder a la provocación. la compostura es autoridad sin levantar la voz el firme no necesita gritar.", "copies": [["Copy card", "POR QUÉ EL QUE MANTIENE LA CALMA CONTROLA TODO\n\n1. El que pierde los nervios pierde el control - la calma es quien manda en el caos.\n2. Mientras los demás se alteran, tú piensas - la cabeza fría ve lo que la caliente no.\n3. La calma transmite seguridad - el tranquilo inspira más que el que grita.\n4. El que no reacciona, desarma - tu serenidad le quita poder a la provocación.\n5. La compostura es autoridad sin levantar la voz - el firme no necesita gritar."]]}, {"fmt": "F1", "n": 155, "bucket": "Power", "title": "CÓMO TE EVALÚA LA GENTE EN LOS PRIMEROS MINUTOS", "body": "<ol class='lst'><li><strong>Te leen antes de que hables</strong> <span class='d'>-</span> la postura y la mirada dicen mucho.</li><li><strong>Notan si te respetas a ti mismo</strong> <span class='d'>-</span> el que se valora se nota en cómo se para.</li><li><strong>La seguridad tranquila gana a la palabrería</strong> <span class='d'>-</span> no es hablar mucho, es estar firme.</li><li><strong>Cómo escuchas pesa tanto como lo que dices</strong> <span class='d'>-</span> el que atiende de verdad, marca.</li><li><strong>La primera imagen tarda en borrarse</strong> <span class='d'>-</span> cuida cómo entras, no solo qué dices.</li></ol>", "search": "cómo te evalúa la gente en los primeros minutos poder te leen antes de que hables la postura y la mirada dicen mucho. notan si te respetas a ti mismo el que se valora se nota en cómo se para. la seguridad tranquila gana a la palabrería no es hablar mucho, es estar firme. cómo escuchas pesa tanto como lo que dices el que atiende de verdad, marca. la primera imagen tarda en borrarse cuida cómo entras, no solo qué dices.", "copies": [["Copy card", "CÓMO TE EVALÚA LA GENTE EN LOS PRIMEROS MINUTOS\n\n1. Te leen antes de que hables - la postura y la mirada dicen mucho.\n2. Notan si te respetas a ti mismo - el que se valora se nota en cómo se para.\n3. La seguridad tranquila gana a la palabrería - no es hablar mucho, es estar firme.\n4. Cómo escuchas pesa tanto como lo que dices - el que atiende de verdad, marca.\n5. La primera imagen tarda en borrarse - cuida cómo entras, no solo qué dices."]]}, {"fmt": "F1", "n": 156, "bucket": "Power", "title": "NUNCA MUESTRES TU DESESPERACIÓN", "body": "<ol class='lst'><li><strong>El que huele tu necesidad, la usa</strong> <span class='d'>-</span> la desesperación invita al abuso.</li><li><strong>Lo urgente te hace aceptar lo malo</strong> <span class='d'>-</span> el apuro es mal consejero.</li><li><strong>La calma aparente te da mejor trato</strong> <span class='d'>-</span> el que parece tranquilo recibe más respeto.</li><li><strong>Mostrar la prisa baja tu poder</strong> <span class='d'>-</span> el que no tiene afán, negocia mejor.</li><li><strong>Guarda tu juego</strong> <span class='d'>-</span> el que no enseña sus cartas no es fácil de vencer.</li></ol>", "search": "nunca muestres tu desesperación poder el que huele tu necesidad, la usa la desesperación invita al abuso. lo urgente te hace aceptar lo malo el apuro es mal consejero. la calma aparente te da mejor trato el que parece tranquilo recibe más respeto. mostrar la prisa baja tu poder el que no tiene afán, negocia mejor. guarda tu juego el que no enseña sus cartas no es fácil de vencer.", "copies": [["Copy card", "NUNCA MUESTRES TU DESESPERACIÓN\n\n1. El que huele tu necesidad, la usa - la desesperación invita al abuso.\n2. Lo urgente te hace aceptar lo malo - el apuro es mal consejero.\n3. La calma aparente te da mejor trato - el que parece tranquilo recibe más respeto.\n4. Mostrar la prisa baja tu poder - el que no tiene afán, negocia mejor.\n5. Guarda tu juego - el que no enseña sus cartas no es fácil de vencer."]]}, {"fmt": "F1", "n": 157, "bucket": "Power", "title": "POR QUÉ NO DEBES CONTAR TODOS TUS PLANES", "body": "<ol class='lst'><li><strong>Lo que anuncias, lo expones</strong> <span class='d'>-</span> el plan dicho en voz alta es fácil de frenar.</li><li><strong>Hablar de más invita a opiniones que te frenan</strong> <span class='d'>-</span> contar antes de hacer mata la idea.</li><li><strong>Los resultados hablan mejor que los anuncios</strong> <span class='d'>-</span> muestra hecho, no prometido.</li><li><strong>No todos quieren verte lograrlo</strong> <span class='d'>-</span> lo que callas, nadie lo sabotea.</li><li><strong>La discreción es ventaja</strong> <span class='d'>-</span> el que no revela su jugada, gana terreno.</li></ol>", "search": "por qué no debes contar todos tus planes poder lo que anuncias, lo expones el plan dicho en voz alta es fácil de frenar. hablar de más invita a opiniones que te frenan contar antes de hacer mata la idea. los resultados hablan mejor que los anuncios muestra hecho, no prometido. no todos quieren verte lograrlo lo que callas, nadie lo sabotea. la discreción es ventaja el que no revela su jugada, gana terreno.", "copies": [["Copy card", "POR QUÉ NO DEBES CONTAR TODOS TUS PLANES\n\n1. Lo que anuncias, lo expones - el plan dicho en voz alta es fácil de frenar.\n2. Hablar de más invita a opiniones que te frenan - contar antes de hacer mata la idea.\n3. Los resultados hablan mejor que los anuncios - muestra hecho, no prometido.\n4. No todos quieren verte lograrlo - lo que callas, nadie lo sabotea.\n5. La discreción es ventaja - el que no revela su jugada, gana terreno."]]}, {"fmt": "F1", "n": 158, "bucket": "Awakening", "title": "EL VALIENTE NO ES EL QUE NO TIENE MIEDO", "body": "<ol class='lst'><li><strong>El valiente siente miedo y actúa igual</strong> <span class='d'>-</span> el coraje no es ausencia de miedo, es seguir con él.</li><li><strong>El que no siente miedo es imprudente, no valiente</strong> <span class='d'>-</span> el miedo bien usado cuida.</li><li><strong>El coraje se entrena, no se nace con él</strong> <span class='d'>-</span> cada vez que actúas con miedo, creces.</li><li><strong>Esperar a no tener miedo es no hacer nunca nada</strong> <span class='d'>-</span> el miedo no se va, se enfrenta.</li><li><strong>Hazlo con miedo y todo</strong> <span class='d'>-</span> del otro lado del miedo está lo que quieres.</li></ol>", "search": "el valiente no es el que no tiene miedo despertar el valiente siente miedo y actúa igual el coraje no es ausencia de miedo, es seguir con él. el que no siente miedo es imprudente, no valiente el miedo bien usado cuida. el coraje se entrena, no se nace con él cada vez que actúas con miedo, creces. esperar a no tener miedo es no hacer nunca nada el miedo no se va, se enfrenta. hazlo con miedo y todo del otro lado del miedo está lo que quieres.", "copies": [["Copy card", "EL VALIENTE NO ES EL QUE NO TIENE MIEDO\n\n1. El valiente siente miedo y actúa igual - el coraje no es ausencia de miedo, es seguir con él.\n2. El que no siente miedo es imprudente, no valiente - el miedo bien usado cuida.\n3. El coraje se entrena, no se nace con él - cada vez que actúas con miedo, creces.\n4. Esperar a no tener miedo es no hacer nunca nada - el miedo no se va, se enfrenta.\n5. Hazlo con miedo y todo - del otro lado del miedo está lo que quieres."]]}, {"fmt": "F1", "n": 159, "bucket": "Awakening", "title": "LO QUE EL MIEDO TE COBRA SIN QUE LO NOTES", "body": "<ol class='lst'><li><strong>Sueños que no intentaste</strong> <span class='d'>-</span> el &quot;y si hubiera&quot; pesa más que el fracaso.</li><li><strong>Palabras que no dijiste</strong> <span class='d'>-</span> lo callado por miedo se vuelve arrepentimiento.</li><li><strong>Oportunidades que dejaste pasar</strong> <span class='d'>-</span> el miedo se disfraza de prudencia y te frena.</li><li><strong>Una vida más pequeña de la posible</strong> <span class='d'>-</span> el miedo encoge sin que lo veas.</li><li><strong>Años esperando sentirte listo</strong> <span class='d'>-</span> el miedo te roba el tiempo en silencio.</li></ol>", "search": "lo que el miedo te cobra sin que lo notes despertar sueños que no intentaste el \"y si hubiera\" pesa más que el fracaso. palabras que no dijiste lo callado por miedo se vuelve arrepentimiento. oportunidades que dejaste pasar el miedo se disfraza de prudencia y te frena. una vida más pequeña de la posible el miedo encoge sin que lo veas. años esperando sentirte listo el miedo te roba el tiempo en silencio.", "copies": [["Copy card", "LO QUE EL MIEDO TE COBRA SIN QUE LO NOTES\n\n1. Sueños que no intentaste - el \"y si hubiera\" pesa más que el fracaso.\n2. Palabras que no dijiste - lo callado por miedo se vuelve arrepentimiento.\n3. Oportunidades que dejaste pasar - el miedo se disfraza de prudencia y te frena.\n4. Una vida más pequeña de la posible - el miedo encoge sin que lo veas.\n5. Años esperando sentirte listo - el miedo te roba el tiempo en silencio."]]}, {"fmt": "F1", "n": 160, "bucket": "Awakening", "title": "POR QUÉ EL PRIMER PASO ES EL MÁS DIFÍCIL", "body": "<ol class='lst'><li><strong>El miedo es más grande antes de empezar</strong> <span class='d'>-</span> imaginarlo asusta más que hacerlo.</li><li><strong>Una vez que arrancas, todo se achica</strong> <span class='d'>-</span> el monstruo encoge cuando lo enfrentas.</li><li><strong>No tienes que ver toda la escalera</strong> <span class='d'>-</span> basta con dar el primer escalón.</li><li><strong>La acción mata la duda</strong> <span class='d'>-</span> moverte calla la voz que te frena.</li><li><strong>Empieza mal, pero empieza</strong> <span class='d'>-</span> hecho imperfecto vale más que perfecto sin hacer.</li></ol>", "search": "por qué el primer paso es el más difícil despertar el miedo es más grande antes de empezar imaginarlo asusta más que hacerlo. una vez que arrancas, todo se achica el monstruo encoge cuando lo enfrentas. no tienes que ver toda la escalera basta con dar el primer escalón. la acción mata la duda moverte calla la voz que te frena. empieza mal, pero empieza hecho imperfecto vale más que perfecto sin hacer.", "copies": [["Copy card", "POR QUÉ EL PRIMER PASO ES EL MÁS DIFÍCIL\n\n1. El miedo es más grande antes de empezar - imaginarlo asusta más que hacerlo.\n2. Una vez que arrancas, todo se achica - el monstruo encoge cuando lo enfrentas.\n3. No tienes que ver toda la escalera - basta con dar el primer escalón.\n4. La acción mata la duda - moverte calla la voz que te frena.\n5. Empieza mal, pero empieza - hecho imperfecto vale más que perfecto sin hacer."]]}, {"fmt": "F1", "n": 161, "bucket": "Mindset", "title": "¿QUÉ TEMES MÁS: FALLAR O ARREPENTIRTE?", "body": "<ol class='lst'><li><strong>El miedo a fallar te frena; el miedo a arrepentirte te mueve</strong> <span class='d'>-</span> elige cuál pesa más.</li><li><strong>Casi nadie se arrepiente de intentar</strong> <span class='d'>-</span> el dolor real es no haberlo probado.</li><li><strong>El fracaso enseña; el &quot;y si&quot; tortura</strong> <span class='d'>-</span> uno pasa, el otro se queda.</li><li><strong>De viejo pesan las cosas que no hiciste</strong> <span class='d'>-</span> no las que salieron mal.</li><li><strong>Pregúntate qué vas a lamentar más</strong> <span class='d'>-</span> casi siempre, no haberte atrevido.</li></ol>", "search": "¿qué temes más: fallar o arrepentirte? mindset el miedo a fallar te frena; el miedo a arrepentirte te mueve elige cuál pesa más. casi nadie se arrepiente de intentar el dolor real es no haberlo probado. el fracaso enseña; el \"y si\" tortura uno pasa, el otro se queda. de viejo pesan las cosas que no hiciste no las que salieron mal. pregúntate qué vas a lamentar más casi siempre, no haberte atrevido.", "copies": [["Copy card", "¿QUÉ TEMES MÁS: FALLAR O ARREPENTIRTE?\n\n1. El miedo a fallar te frena; el miedo a arrepentirte te mueve - elige cuál pesa más.\n2. Casi nadie se arrepiente de intentar - el dolor real es no haberlo probado.\n3. El fracaso enseña; el \"y si\" tor que aceptas se vuelven tu jaula despertar \"soy malo para esto\" te cierra la puerta antes de empezar la etiqueta decide por ti. lo que repites de ti, lo refuerzas decirte algo mil veces lo vuelve cierto. aceptaste etiquetas que te pusieron otros cargas ideas que ni son tuyas. una etiqueta vieja no tiene que ser tu presente lo que fuiste no es lo que eres. suelta el rótulo y se abre el camino no eres lo que un día te dijeron.", "copies": [["Copy card", "LAS ETIQUETAS QUE ACEPTAS SE VUELVEN TU JAULA\n\n1. \"Soy malo para esto\" te cierra la puerta antes de empezar - la etiqueta decide por ti.\n2. Lo que repites de ti, lo refuerzas - decirte algo mil veces lo vuelve cierto.\n3. Aceptaste etiquetas que te pusieron otros - cargas ideas que ni son tuyas.\n4. Una etiqueta vieja no tiene que ser tu presente - lo que fuiste no es lo que eres.\n5. Suelta el rótulo y se abre el camino - no eres lo que un día te dijeron."]]}, {"fmt": "F1", "n": 166, "bucket": "Disciplina", "title": "CAMBIA QUIÉN CREES SER Y TUS HÁBITOS CAMBIAN SOLOS", "body": "<ol class='lst'><li><strong>No es &quot;quiero correr&quot;, es &quot;soy de los que corren&quot;</strong> <span class='d'>-</span> el hábito sigue a la identidad.</li><li><strong>Cada acción es un voto por quién eres</strong> <span class='d'>-</span> construyes tu identidad en lo pequeño.</li><li><strong>El que se ve sano elige distinto sin esfuerzo</strong> <span class='d'>-</span> los actos siguen a la imagen propia.</li><li><strong>Cambiar por fuerza cansa; cambiar por identidad dura</strong> <span class='d'>-</span> sé la persona, no solo la meta.</li><li><strong>Pregúntate qué haría quien quieres ser</strong> <span class='d'>-</span> y hazlo, hasta que seas él.</li></ol>", "search": "cambia quién crees ser y tus hábitos cambian solos disciplina no es \"quiero correr\", es \"soy de los que corren\" el hábito sigue a la identidad. cada acción es un voto por quién eres construyes tu identidad en lo pequeño. el que se ve sano elige dis cia.\n2. Te presentas con tus heridas y te quedas en ellas - deja de contarte como víctima.\n3. El pasado explica, no justifica quedarte ahí - entenderlo no es vivir en él.\n4. Puedes empezar distinto desde hoy - nadie te obliga a seguir siendo el de ayer.\n5. Tu identidad la escribes tú, no lo que te pasó - el lápiz lo tienes tú."]]}, {"fmt": "F1", "n": 168, "bucket": "Mindset", "title": "CÓMO TE HABLAS POR DENTRO TERMINA SIENDO TU VIDA", "body": "<ol class='lst'><li><strong>Eres tu compañía más constante</strong> <span class='d'>-</span> lo que te dices todo el día, te moldea.</li><li><strong>Tratarías a un amigo mejor que a ti</strong> <span class='d'>-</span> cambia el tono de tu voz interna.</li><li><strong>Lo que te repites se vuelve tu verdad</strong> <span class='d'>-</span> si te insultas, te lo crees.</li><li><strong>Háblate como quien quiere que te vaya bien</strong> <span class='d'>-</span> tu voz interna debería estar de tu lado.</li><li><strong>La forma en que te tratas enseña cómo te tratan</strong> <span class='d'>-</span> el respeto propio se nota afuera.</li></ol>", "search": "cómo te hablas por dentro termina siendo tu vida mindset eres tu compañía más constante lo que te dices todo el día, te moldea. tratarías a un amigo mejor que a ti cambia el tono de tu voz interna. lo que te repites se vuelve tu verdad si te insultas, te lo crees. háblate como quien quiere que te vaya bien tu voz interna debería estar de tu lado. la forma en que te tratas enseña cómo te tratan el respeto propio se nota afuera.", "copies": [["Copy card", "CÓMO TE HABLAS POR DENTRO TERMINA SIENDO TU VIDA\n\n1. Eres tu compañía más constante - lo que te dices todo el día, te moldea.\n2. Tratarías a un amigo mejor que a ti - cambia el tono de tu voz interna.\n3. Lo que te repites se vuelve tu verdad - si te insultas, te lo crees.\n4. Háblate como quien quiere que te vaya bien - tu voz interna debería estar de tu lado.\n5. La forma en que te tratas enseña cómo te tratan - el respe 'd'>-</span> no la gastes en quien no va a cambiar.</li></ol>", "search": "por qué no debes discutir con cualquiera poder no todas las peleas valen tu energía elegir tus batallas es de sabios. el que solo quiere tener razón no escucha discutir con él es perder el tiempo. bajas a su nivel y te ganan por experiencia hay barro que no conviene pisar. el silencio a veces dice más que mil razones no todo merece respuesta. guarda tu energía para lo que importa no la gastes en quien no va a cambiar.", "copies": [["Copy card", "POR QUÉ NO DEBES DISCUTIR CON CUALQUIERA\n\n1. No todas las peleas valen tu energía - elegir tus batallas es de sabios.\n2. El que solo quiere tener razón no escucha - discutir con él es perder el tiempo.\n3. Bajas a su nivel y te ganan por experiencia - hay barro que no conviene pisar.\n4. El silencio a veces dice más que mil razones - no todo merece respuesta.\n5. Guarda tu energía para lo que importa - no la gastes en quien no va a cambiar."]]}, {"fmt": "F1", "n": 172, "bucket": "Power", "title": "POR QUÉ CONVIENE QUE TE SUBESTIMEN", "body": "<ol class='lst'><li><strong>El que te subestima baja la guardia</strong> <span class='d'>-</span> juega tranquilo quien no te ve venir.</li><li><strong>No tienes que demostrar nada de entrada</strong> <span class='d'>-</span> deja que los resultados hablen.</li><li><strong>El que presume alerta a sus rivales</strong> <span class='d'>-</span> el discreto avanza sin ruido.</li><li><strong>Sorprender vale más que advertir</strong> <span class='d'>-</span> mejor que te midan de menos a que te teman.</li><li><strong>Trabaja en silencio y deja que se sorprendan</strong> <span class='d'>-</span> el callado da el golpe sin avisar.</li></ol>", "search": "por qué conviene que te subestimen poder el que te subestima baja la guardia juega tranquilo quien no te ve venir. no tienes que demostrar nada de entrada deja que los resultados hablen. el que presume alerta a sus rivales el discreto avanza sin ruido. sorprender vale más que advertir mejor que te midan de menos a que te teman. trabaja en silencio y deja que se sorprendan el callado da el golpe sin avisar.", "copies": [["Copy card", "POR QUÉ CONVIENE QUE TE SUBESTIMEN\n\n1. El que te subestima baja la guardia - juega tranquilo quien no te ve venir.\n2. No tienes que demostrar nada de entrada - deja que los resultados hablen.\n3. El que presume alerta a sus rivales - el discreto avanza sin ruido.\n4. Sorprender vale más que advertir - mejor que te midan de menos a que te teman.\n5. Trabaja en silencio y deja que se sorprendan - el callado da el golpe sin avisar."]]}, {"fmt": "F1", "n": 173, "bucket": "Power", "title": "EL PODER DE LA PAUSA ANTES DE HABLAR", "body": "<ol class='lst'><li><strong>El que pausa antes de responder, controla</strong> <span class='d'>-</span> dos segundos te separan del error.</li><li><strong>El silencio incomoda al otro, no a ti</strong> <span class='d'>-</span> el que aguanta la pausa, manda.</li><li><strong>Pensar antes de hablar dice más que hablar rápido</strong> <span class='d'>-</span> la calma se lee como dominio.</li><li><strong>El que no llena cada vacío, intriga</strong> <span class='d'>-</span> la pausa pesa más que la palabra apurada.</li><li><strong>Responde cuando estés listo, no cuando te apuren</strong> <span class='d'>-</span> el tiempo lo pones tú.</li></ol>", "search": "el poder de la pausa antes de hablar poder el que pausa antes de responder, controla dos segundos te separan del error. el silencio incomoda al otro, no a ti el que aguanta la pausa, manda. pensar antes de hablar dice más que hablar rápido la calma se lee como dominio. el que no llena cada vacío, intriga la pausa pesa más que la palabra apurada. responde cuando estés listo, no cuando te apuren el tiempo lo pones tú.", "copies": [["Copy card", "EL PODER DE LA PAUSA ANTES DE HABLAR\n\n1. El que pausa antes de responder, controla - dos segundos te separan del error.\n2. El silencio incomoda al otro, no a ti - el que aguanta la pausa, manda.\n3. Pensar antes de hablar dice más que hablar rápido - la calma se lee como dominio.\n4. El que no llena cada vacío, intriga - la pausa pesa más que la palabra apurada.\n5. Responde cuando estés listo, no cuando te apuren - el tiempo lo pones tú."]]}, {"fmt": "F1", "n": 174, "bucket": "Self-respect", "title": "EL VALOR DE ATREVERTE A CAER MAL", "body": "<ol class='lst'><li><strong>El que necesita gustarle a todos no es libre</strong> <span class='d'>-</span> vive preso de la aprobación.</li><li><strong>Defender lo tuyo va a incomodar a alguien</strong> <span class='d'>-</span> no se puede avanzar sin rozar.</li><li><strong>El que a todos cae bien no defiende nada</strong> <span class='d'>-</span> agradar a todos es no tener postura.</li><li><strong>Caer mal por ser tú vale más que gustar fingiendo</strong> <span class='d'>-</span> mejor real y rechazado que falso y querido.</li><li><strong>Tu paz no puede depender de gustarle a todos</strong> <span class='d'>-</span> suelta esa cadena y respira.</li></ol>", "search": "el valor de atreverte a caer mal autorrespeto el que necesita gustarle a todos no es libre vive preso de la aprobación. defender lo tuyo va a incomodar a alguien no se puede avanzar sin rozar. el que a todos cae bien no defiende nada agradar a todos es no tener postura. caer mal por ser tú vale más que gustar fingiendo mejor real y rechazado que falso y querido. tu paz no puede depender de gustarle a todos suelta esa cadena y respira.", "copies": [["Copy card", "EL VALOR DE ATREVERTE A CAER MAL\n\n1. El que necesita gustarle a todos no es libre - vive preso de la aprobación.\n2. Defender lo tuyo va a incomodar a alguien - no se puede avanzar sin rozar.\n3. El que a todos cae bien no defiende nada - agradar a todos es no tener postura.\n4. Caer mal por ser tú vale más que gustar fingiendo - mejor real y rechazado que falso y querido.\n5. Tu paz no puede depender de gustarle a todos - suelta esa cadena y respira."]]}, {"fmt": "F1", "n ong>Las excusas te consuelan y te frenan</strong> <span class='d'>-</span> dejar de justificarte es el primer paso.</li><li><strong>Pregúntate qué estás evitando ver</strong> <span class='d'>-</span> ahí suele estar lo que más necesitas cambiar.</li><li><strong>La honestidad contigo duele, pero libera</strong> <span class='d'>-</span> solo la verdad te saca de donde estás.</li></ol>", "search": "el valor de ser honesto contigo mismo despertar mentirte es cómodo y caro la verdad que evitas te cobra después. no puedes arreglar lo que no admites todo cambio empieza por ver claro. las excusas te consuelan y te frenan dejar de justificarte es el primer paso. pregúntate qué estás evitando ver ahí suele estar lo que más necesitas cambiar. la honestidad contigo duele, pero libera solo la verdad te saca de donde estás.", "copies": [["Copy card", "EL VALOR DE SER HONESTO CONTIGO MISMO\n\n1. Mentirte es cómodo y caro - la verdad que evitas te cobra después.\n2. No puedes arreglar lo que no admites - todo cambio empieza por ver claro.\n3. Las excusas te consuelan y te frenan - dejar de justificarte es el primer paso.\n4. Pregúntate qué estás evitando ver - ahí suele estar lo que más necesitas cambiar.\n5. La honestidad contigo duele, pero libera - solo la verdad te saca de donde estás."]]}, {"fmt": "F1", "n": 177, "bucket": "Defense", "title": "POR QUÉ A ALGUNOS LES CUESTA ALEGRARSE POR TI", "body": "<ol class='lst'><li><strong>Tu avance les recuerda lo que no hacen</strong> <span class='d'>-</span> tu logro les pesa sin que lo digas.</li><li><strong>Te aplauden de boca y se incomodan por dentro</strong> <span class='d'>-</span> la sonrisa no siempre es sincera.</li><li><strong>La envidia se disfraza de consejo</strong> <span class='d'>-</span> &quot;no te ilusiones&quot; suele ser miedo ajeno.</li><li><strong>Comparten tu caída más rápido que tu logro</strong> <span class='d'>-</span> fíjate quién se alegra de verdad.</li><li><strong>No bajes tu luz por su incomodidad</strong> <span class='d'>-</span> el que te quiere bien, celebra contigo.</li></ol>", "search": "por qué a algunos les cuesta alegrarse por ti defensa tu avance les recuerda lo que no hacen tu logro les pesa sin que lo digas. te aplauden de boca y se incomodan por dentro la sonrisa no siempre es sincera. la envidia se disfraza de consejo \"no te ilusiones\" suele ser miedo ajeno. comparten tu caída más rápido que tu logro fíjate quién se alegra de verdad. no bajes tu luz por su incomodidad el que te quiere bien, celebra contigo.", "copies": [["Copy card", "POR QUÉ A ALGUNOS LES CUESTA ALEGRARSE POR TI\n\n1. Tu avance les recuerda lo que no hacen - tu logro les pesa sin que lo digas.\n2. Te aplauden de boca y se incomodan por dentro - la sonrisa no siempre es sincera.\n3. La envidia se disfraza de consejo - \"no te ilusiones\" suele ser miedo ajeno.\n4. Comparten tu caída más rápido que tu logro - fíjate quién se alegra de verdad.\n5. No bajes tu luz por su incomodidad - el que te quiere bien, celebra contigo."]]}, {"fmt": "F1", "n": 178, "bucket": "Defense", "title": "EL AMIGO QUE EN SECRETO COMPITE CONTIGO", "body": "<ol class='lst'><li><strong>Minimiza tus logros con un chiste</strong> <span class='d'>-</span> &quot;tuviste suerte&quot; disfraza la envidia.</li><li><strong>Aparece más en tus fracasos que en tus éxitos</strong> <span class='d'>-</span> el rival se anima cuando caes.</li><li><strong>Compite donde tú destacas</strong> <span class='d'>-</span> siempre tiene algo &quot;mejor&quot; que contar.</li><li><strong>Te da consejos que te frenan</strong> <span class='d'>-</span> el que compite no quiere verte arriba.</li><li><strong>El amigo real se alegra sin competir</strong> <span class='d'>-</span> el que suma no lleva la cuenta.</li></ol>", "search": "el amigo que en secreto compite contigo defensa minimiza tus logros con un chiste \"tuviste suerte\" disfraza la envidia. aparece más en tus fracasos que en tus éxitos el rival se anima cuando caes. compite donde tú destacas siempre tiene algo \"mejor\" que contar. te da consejos que te frenan el que compite no quiere verte arriba. el amigo real se alegra sin competir el que suma no lleva la cuenta.", "copies": [["Copy card", "EL AMIGO QUE EN SECRETO COMPITE CONTIGO\n\n1. Minimiza tus logros con un chiste - \"tuviste suerte\" disfraza la envidia.\n2. Aparece más en tus fracasos que en tus éxitos - el rival se anima cuando caes.\n3. Compite donde tú destacas - siempre tiene algo \"mejor\" que contar.\n4. Te da consejos que te frenan - el que compite no quiere verte arriba.\n5. El amigo real se alegra sin competir - el que suma no lleva la cuenta."]]}, {"fmt": "F1", "n": 179, "bucket": "Awakening", "title": "POR QUÉ EL ÉXITO CAMBIA A QUIÉN TIENES CERCA", "body": "<ol class='lst'><li><strong>Algunos se acercan por lo que ahora tienes</strong> <span class='d'>-</span> llegan con el resultado, no contigo.</li><li><strong>Otros se alejan porque ya no encajas</strong> <span class='d'>-</span> tu cambio incomoda al que se quedó.</li><li><strong>Ves quién estaba por ti y quién por la foto</strong> <span class='d'>-</span> el éxito filtra sin que lo pidas.</li><li><strong>Aparecen amigos que no recordabas tener</strong> <span class='d'>-</span> el interés tiene buena memoria.</li><li><strong>El que estuvo en la nada es el que vale</strong> <span class='d'>-</span> cuida al que llegó antes del logro.</li></ol>", "search": "por qué el éxito cambia a quién tienes cerca despertar algunos se acercan por lo que ahora tienes llegan con el resultado, no contigo. otros se alejan porque ya no encajas tu cambio incomoda al que se quedó. ves quién estaba por ti y quién por la foto el éxito filtra sin que lo pidas. aparecen amigos que no recordabas tener el interés tiene buena memoria. el que estuvo en la nada es el que vale cuida al que llegó antes del logro.", "copies": [["Copy card", "POR QUÉ EL ÉXITO CAMBIA A QUIÉN TIENES CERCA\n\n1. Algunos se acercan por lo que ahora tienes - llegan con el resultado, no contigo.\n2. Otros se alejan porque ya no encajas - tu cambio incomoda al que se quedó.\n3. Ves quién estaba por ti y quién por la foto - el éxito filtra sin que lo pidas.\n4. Aparecen amigos que no recordabas tener - el interés tiene buena memoria.\n5. El que estuvo en la nada es el que vale - cuida al que llegó antes del logro."]]}, {"fmt": "F1", "n": 180, "bucket": "Mindset", "title": "ESTAR OCUPADO NO ES LO MISMO QUE AVANZAR", "body": "<ol class='lst'><li><strong>Moverse mucho no es ir a algún lado</strong> <span class='d'>-</span> la actividad no siempre es progreso.</li><li><strong>Llenar el día tapa la falta de rumbo</strong> <span class='d'>-</span> ocuparse a veces es esconderse.</li><li><strong>Pocas cosas que importan valen más que mil tareas</strong> <span class='d'>-</span> enfócate, no te disperses.</li><li><strong>El cansancio no mide el avance</strong> <span class='d'>-</span> puedes terminar agotado sin haber avanzado.</li><li><strong>Pregúntate si es importante o solo urgente</strong> <span class='d'>-</span> no confundas correr con llegar.</li></ol>", "search": "estar ocupado no es lo mismo que avanzar mindset moverse mucho no es ir a algún lado la actividad no siempre es progreso. llenar el día tapa la falta de rumbo ocuparse a veces es esconderse. pocas cosas que importan valen más que mil tareas enfócate, no te disperses. el cansancio no mide el avance puedes terminar agotado sin haber avanzado. pregúntate si es importante o solo urgente no confundas correr con llegar.", "copies": [["Copy card", "ESTAR OCUPADO NO ES LO MISMO QUE AVANZAR\n\n1. Moverse mucho no es ir a algún lado - la actividad no siempre es progreso.\n2. Llenar el día tapa la falta de rumbo - ocuparse a veces es esconderse.\n3. Pocas cosas que importan valen más que mil tareas - enfócate, no te disperses.\n4. El cansancio no mide el avance - puedes terminar agotado sin haber avanzado.\n5. Pregúntate si es importante o solo urgente - no confundas correr con llegar."]]}, {"fmt": "F1", "n": 181, "bucket": "Hard truths", "title": "DE QUÉ SE ARREPIENTE LA GENTE AL FINAL", "body": "<ol class='lst'><li><strong>De no haber vivido a su manera</strong> <span class='d'>-</span> de haber vivido para agradar a otros.</li><li><strong>De haber trabajado tanto y disfrutado tan poco</strong> <span class='d'>-</span> de cambiar la vida por la oficina.</li><li><strong>De no haber dicho lo que sentía</strong> <span class='d'>-</span> de los &quot;te quiero&quot; que se quedaron dentro.</li><li><strong>De no haberse atrevido</strong> <span class='d'>-</span> de los sueños que el miedo dejó guardados.</li><li><strong>De no haber valorado a tiempo</strong> <span class='d'>-</span> de darse cuenta tarde de lo que importaba.</li></ol>", "search": "de qué se arrepiente la gente al final verdades amargas de no haber vivido a su manera de haber vivido para agradar a otros. de haber trabajado tanto y disfrutado tan poco de cambiar la vida por la oficina. de no haber dicho lo que sentía de los \"te quiero\" que se quedaron dentro. de no haberse atrevido de los sueños que el miedo dejó guardados. de no haber valorado a tiempo de darse cuenta tarde de lo que importaba.", "copies": [["Copy card", "DE QUÉ SE ARREPIENTE LA GENTE AL FINAL\n\n1. De no haber vivido a su manera - de haber vivido para agradar a otros.\n2. De haber trabajado tanto y disfrutado tan poco - de cambiar la vida por la oficina.\n3. De no haber dicho lo que sentía - de los \"te quiero\" que se quedaron dentro.\n4. De no haberse atrevido - de los sueños que el miedo dejó guardados.\n5. De no haber valorado a tiempo - de darse cuenta tarde de lo que importaba."]]}, {"fmt": "F1", "n": 182, "bucket": "Power", "title": "POR QUÉ LA AMBICIÓN CALLADA LE GANA A LA RUIDOSA", "body": "<ol class='lst'><li><strong>El que anuncia mucho hace poco</strong> <span class='d'>-</span> el ruido reemplaza al trabajo.</li><li><strong>El callado avanza sin que lo frenen</strong> <span class='d'>-</span> nadie sabotea lo que no ve venir.</li><li><strong>Los resultados hablan más que las promesas</strong> <span class='d'>-</span> muestra hecho, no planeado.</li><li><strong>El que presume su meta gasta energía en presumir</strong> <span class='d'>-</span> mejor ponerla en lograrla.</li><li><strong>Trabaja en silencio, deja que se note el resultado</strong> <span class='d'>-</span> el logro hace más ruido que tú.</li></ol>", "search": "por qué la ambición callada le gana a la ruidosa poder el que anuncia mucho hace poco el ruido reemplaza al trabajo. el callado avanza sin que lo frenen nadie sabotea lo que no ve venir. los resultados hablan más que las promesas muestra hecho, no planeado. el que presume su meta gasta energía en presumir mejor ponerla en lograrla. trabaja en silencio, deja que se note el resultado el logro hace más ruido que tú.", "copies": [["Copy card", "POR QUÉ LA AMBICIÓN CALLADA LE GANA A LA RUIDOSA\n\n1. El que anuncia mucho hace poco - el ruido reemplaza al trabajo.\n2. El callado avanza sin que lo frenen - nadie sabotea lo que no ve venir.\n3. Los resultados hablan más que las promesas - muestra hecho, no planeado.\n4. El que presume su meta gasta energía en presumir - mejor ponerla en lograrla.\n5. Trabaja en silencio, deja que se note el resultado - el logro hace más ruido que tú."]]}, {"fmt": "F1", "n": 183, "bucket": "Disciplina", "title": "POR QUÉ LA CONSTANCIA LE GANA A LA INTENSIDAD", "body": "<ol class='lst'><li><strong>Lo poco todos los días vence a lo mucho una vez</strong> <span class='d'>-</span> la gota constante perfora la piedra.</li><li><strong>El que empieza fuerte y para, pierde</strong> <span class='d'>-</span> la chispa sin constancia se apaga.</li><li><strong>No necesitas días perfectos, necesitas no parar</strong> <span class='d'>-</span> mejor avanzar lento que detenerte.</li><li><strong>Lo sostenido se vuelve resultado; lo intenso se olvida</strong> <span class='d'>-</span> el tiempo premia al constante.</li><li><strong>Pequeño y diario le gana a grande y aislado</strong> <span class='d'>-</span> la repetición construye lo grande.</li></ol>", "search": "por qué la constancia le gana a la intensidad disciplina lo poco todos los días vence a lo mucho una vez la gota constante perfora la piedra. el que empieza fuerte y para, pierde la chispa sin constancia se apaga. no necesitas días perfectos, necesitas no parar mejor avanzar lento que detenerte. lo sostenido se vuelve resultado; lo intenso se olvida el tiempo premia al constante. pequeño y diario le gana a grande y aislado la repetición construye lo grande.", "copies": [["Copy card", "POR QUÉ LA CONSTANCIA LE GANA A LA INTENSIDAD\n\n1. Lo poco todos los días vence a lo mucho una vez - la gota constante perfora la piedra.\n2. El que empieza fuerte y para, pierde - la chispa sin constancia se apaga.\n3. No necesitas días perfectos, necesitas no parar - mejor avanzar lento que detenerte.\n4. Lo sostenido se vuelve resultado; lo intenso se olvida - el tiempo premia al constante.\n5. Pequeño y diario le gana a grande y aislado - la repetición construye lo grande."]]}, {"fmt": "F1", "n": 184, "bucket": "Disciplina", "title": "POR QUÉ TU ENTORNO LE GANA A TU FUERZA DE VOLUNTAD", "body": "<ol class='lst'><li><strong>La voluntad se agota; el entorno no</strong> <span class='d'>-</span> lo que tienes cerca decide por ti.</li><li><strong>Si está a la vista, lo consumes</strong> <span class='d'>-</span> quita la tentación en vez de resistirla.</li><li><strong>Es más fácil cambiar el lugar que la persona</strong> <span class='d'>-</span> diseña tu entorno a tu favor.</li><li><strong>Te vuelves lo que te rodea</strong> <span class='d'>-</span> lo que ves todos los días te moldea.</li><li><strong>No pelees con tu voluntad, acomoda tu ambiente</strong> <span class='d'>-</span> haz fácil lo bueno y difícil lo malo.</li></ol>", "search": "por qué tu entorno le gana a tu fuerza de voluntad disciplina la voluntad se agota; el entorno no lo que tienes cerca decide por ti. si está a la vista, lo consumes quita la tentación en vez de resistirla. es más fácil cambiar el lugar que la persona diseña tu entorno a tu favor. te vuelves lo que te rodea lo que ves todos los días te moldea. no pelees con tu voluntad, acomoda tu ambiente haz fácil lo bueno y difícil lo malo.", "copies": [["Copy card", "POR QUÉ TU ENTORNO LE GANA A TU FUERZA DE VOLUNTAD\n\n1. La voluntad se agota; el entorno no - lo que tienes cerca decide por ti.\n2. Si está a la vista, lo consumes - quita la tentación en vez de resistirla.\n3. Es más fácil cambiar el lugar que la persona - diseña tu entorno a tu favor.\n4. Te vuelves lo que te rodea - lo que ves todos los días te moldea.\n5. No pelees con tu voluntad, acomoda tu ambiente - haz fácil lo bueno y difícil lo malo."]]}, {"fmt": "F1", "n": 185, "bucket": "Defense", "title": "LO QUE LA REACCIÓN DE ALGUIEN DICE DE ÉL, NO DE TI", "body": "<ol class='lst'><li><strong>El que te ataca habla de su herida, no de tu falta</strong> <span class='d'>-</span> lo que dispara, ya estaba dentro.</li><li><strong>La gente reacciona desde lo que carga</strong> <span class='d'>-</span> su veneno es suyo, no tuyo.</li><li><strong>No tomes como tuyo lo que es de otro</strong> <span class='d'>-</span> su mal humor no es tu culpa.</li><li><strong>El que critica todo, sufre con todo</strong> <span class='d'>-</span> su lupa dice más de él que de ti.</li><li><strong>Suelta lo que no te pertenece</strong> <span class='d'>-</span> no cargues la mochila ajena.</li></ol>", "search": "lo que la reacción de alguien dice de él, no de ti defensa el que te ataca habla de su herida, no de tu falta lo que dispara, ya estaba dentro. la gente reacciona desde lo que carga su veneno es suyo, no tuyo. no tomes como tuyo lo que es de otro su mal humor no es tu culpa. el que critica todo, sufre con todo su lupa dice más de él que de ti. suelta lo que no te pertenece no cargues la mochila ajena.", "copies": [["Copy card", "LO QUE LA REACCIÓN DE ALGUIEN DICE DE ÉL, NO DE TI\n\n1. El que te ataca habla de su herida, no de tu falta - lo que dispara, ya estaba dentro.\n2. La gente reacciona desde lo que carga - su veneno es suyo, no tuyo.\n3. No tomes como tuyo lo que es de otro - su mal humor no es tu culpa.\n4. El que critica todo, sufre con todo - su lupa dice más de él que de ti.\n5. Suelta lo que no te pertenece - no cargues la mochila ajena."]]}, {"fmt": "F1", "n": 186, "bucket": "Awakening", "title": "POR QUÉ EL QUE DUDA DE TI MUESTRA SUS PROPIOS LÍMITES", "body": "<ol class='lst'><li><strong>Te dice &quot;no puedes&quot; porque él no pudo</strong> <span class='d'>-</span> proyecta su techo sobre ti.</li><li><strong>Lo imposible para uno no lo es para todos</strong> <span class='d'>-</span> su límite no es tu límite.</li><li><strong>El que no se atrevió quiere que tú tampoco</strong> <span class='d'>-</span> tu intento le incomoda.</li><li><strong>Los consejos miedosos vienen de gente miedosa</strong> <span class='d'>-</span> filtra de quién recibes el &quot;no&quot;.</li><li><strong>Que alguien no lo vea posible no lo hace imposible</strong> <span class='d'>-</span> el límite era suyo.</li></ol>", "search": "por qué el que duda de ti muestra sus propios límites despertar te dice \"no puedes\" porque él no pudo proyecta su techo sobre ti. lo imposible para uno no lo es para todos su límite no es tu límite. el que no se atrevió quiere que tú tampoco tu intento le incomoda. los consejos miedosos vienen de gente miedosa filtra de quién recibes el \"no\". que alguien no lo vea posible no lo hace imposible el límite era suyo.", "copies": [["Copy card", "POR QUÉ EL QUE DUDA DE TI MUESTRA SUS PROPIOS LÍMITES\n\n1. Te dice \"no puedes\" porque él no pudo - proyecta su techo sobre ti.\n2. Lo imposible para uno no lo es para todos - su límite no es tu límite.\n3. El que no se atrevió quiere que tú tampoco - tu intento le incomoda.\n4. Los consejos miedosos vienen de gente miedosa - filtra de quién recibes el \"no\".\n5. Que alguien no lo vea posible no lo hace imposible - el límite era suyo."]]}, {"fmt": "F1", "n": 187, "bucket": "Power", "title": "LA FUERZA DE SABER DECIR \"NO LO SÉ\"", "body": "<ol class='lst'><li><strong>Admitir lo que no sabes es de seguros</strong> <span class='d'>-</span> solo el inseguro finge saberlo todo.</li><li><strong>El que pregunta aprende; el que finge se estanca</strong> <span class='d'>-</span> no saber no es vergüenza.</li><li><strong>Decir &quot;no sé&quot; te da credibilidad</strong> <span class='d'>-</span> el que admite límites inspira confianza.</li><li><strong>Fingir saber tarde o temprano se nota</strong> <span class='d'>-</span> la mentira de saber sale cara.</li><li><strong>El que reconoce su ignorancia puede crecer</strong> <span class='d'>-</span> no se aprende desde el &quot;ya lo sé&quot;.</li></ol>", "search": "la fuerza de saber decir \"no lo sé\" poder admitir lo que no sabes es de seguros solo el inseguro finge saberlo todo. el que pregunta aprende; el que finge se estanca no saber no es vergüenza. decir \"no sé\" te da credibilidad el que admite límites inspira confianza. fingir saber tarde o temprano se nota la mentira de saber sale cara. el que reconoce su ignorancia puede crecer no se aprende desde el \"ya lo sé\".", "copies": [["Copy card", "LA FUERZA DE SABER DECIR \"NO LO SÉ\"\n\n1. Admitir lo que no sabes es de seguros - solo el inseguro finge saberlo todo.\n2. El que pregunta aprende; el que finge se estanca - no saber no es vergüenza.\n3. Decir \"no sé\" te da credibilidad - el que admite límites inspira confianza.\n4. Fingir saber tarde o temprano se nota - la mentira de saber sale cara.\n5. El que reconoce su ignorancia puede crecer - no se aprende desde el \"ya lo sé\"."]]}, {"fmt": "F1", "n": 188, "bucket": "Self-respect", "title": "POR QUÉ NO TODOS MERECEN ACCESO A TI", "body": "<ol class='lst'><li><strong>Tu tiempo y tu energía son limitados</strong> <span class='d'>-</span> no alcanzan para todo el mundo.</li><li><strong>No todo el que toca la puerta debe entrar</strong> <span class='d'>-</span> elige a quién dejas cerca.</li><li><strong>El acceso a ti se gana, no se debe</strong> <span class='d'>-</span> la cercanía es un privilegio, no un derecho.</li><li><strong>Cuidar quién entra es cuidarte</strong> <span class='d'>-</span> tu círculo decide tu paz.</li><li><strong>Cerrar la puerta a algunos es abrirte a ti</strong> <span class='d'>-</span> proteger tu espacio no es egoísmo.</li></ol>", "search": "por qué no todos merecen acceso a ti autorrespeto tu tiempo y tu energía son limitados no alcanzan para todo el mundo. no todo el que toca la puerta debe entrar elige a quién dejas cerca. el acceso a ti se gana, no se debe la cercanía es un privilegio, no un derecho. cuidar quién entra es cuidarte tu círculo decide tu paz. cerrar la puerta a algunos es abrirte a ti proteger tu espacio no es egoísmo.", "copies": [["Copy card", "POR QUÉ NO TODOS MERECEN ACCESO A TI\n\n1. Tu tiempo y tu energía son limitados - no alcanzan para todo el mundo.\n2. No todo el que toca la puerta debe entrar - elige a quién dejas cerca.\n3. El acceso a ti se gana, no se debe - la cercanía es un privilegio, no un derecho.\n4. Cuidar quién entra es cuidarte - tu círculo decide tu paz.\n5. Cerrar la puerta a algunos es abrirte a ti - proteger tu espacio no es egoísmo."]]}, {"fmt": "F1", "n": 189, "bucket": "Awakening", "title": "LA DIFERENCIA ENTRE ESTAR SOLO Y SENTIRSE SOLO", "body": "<ol class='lst'><li><strong>Puedes estar rodeado y sentirte solo</strong> <span class='d'>-</span> la soledad no es de cuerpos, es de vínculos.</li><li><strong>Y puedes estar solo y en paz</strong> <span class='d'>-</span> estar contigo no siempre es estar solo.</li><li><strong>La mala compañía es más sola que el silencio</strong> <span class='d'>-</span> peor que solo es mal acompañado.</li><li><strong>Aprender a estar contigo te libera</strong> <span class='d'>-</span> el que se aguanta solo, elige mejor a quién deja entrar.</li><li><strong>No llenes el vacío con cualquiera</strong> <span class='d'>-</span> estar solo un tiempo es mejor que mal acompañado siempre.</li></ol>", "search": "la diferencia entre estar solo y sentirse solo despertar puedes estar rodeado y sentirte solo la soledad no es de cuerpos, es de vínculos. y puedes estar solo y en paz estar contigo no siempre es estar solo. la mala compañía es más sola que el silencio peor que solo es mal acompañado. aprender a estar contigo te libera el que se aguanta solo, elige mejor a quién deja entrar. no llenes el vacío con cualquiera estar solo un tiempo es mejor que mal acompañado siempre.", "copies": [["Copy card", "LA DIFERENCIA ENTRE ESTAR SOLO Y SENTIRSE SOLO\n\n1. Puedes estar rodeado y sentirte solo - la soledad no es de cuerpos, es de vínculos.\n2. Y puedes estar solo y en paz - estar contigo no siempre es estar solo.\n3. La mala compañía es más sola que el silencio - peor que solo es mal acompañado.\n4. Aprender a estar contigo te libera - el que se aguanta solo, elige mejor a quién deja entrar.\n5. No llenes el vacío con cualquiera - estar solo un tiempo es mejor que mal acompañado siempre."]]}, {"fmt": "F1", "n": 190, "bucket": "Awakening", "title": "POR QUÉ LA SOLEDAD BIEN VIVIDA TE FORTALECE", "body": "<ol class='lst'><li><strong>A solas te conoces de verdad</strong> <span class='d'>-</span> sin ruido ajeno, escuchas lo que piensas.</li><li><strong>El que se basta solo no ruega compañía</strong> <span class='d'>-</span> su paz no depende de tener a alguien al lado.</li><li><strong>En el silencio nacen tus mejores ideas</strong> <span class='d'>-</span> el ruido constante no deja pensar.</li><li><strong>Dejas de necesitar para empezar a elegir</strong> <span class='d'>-</span> el que no teme estar solo elige mejor.</li><li><strong>Disfrutar tu compañía lo cambia todo</strong> <span class='d'>-</span> si te caes bien, nunca estás mal acompañado.</li></ol>", "search": "por qué la soledad bien vivida te fortalece despertar a solas te conoces de verdad sin ruido ajeno, escuchas lo que piensas. el que se basta solo no ruega compañía su paz no depende de tener a alguien al lado. en el silencio nacen tus mejores ideas el ruido constante no deja pensar. dejas de necesitar para empezar a elegir el que no teme estar solo elige mejor. disfrutar tu compañía lo cambia todo si te caes bien, nunca estás mal acompañado.", "copies": [["Copy card", "POR QUÉ LA SOLEDAD BIEN VIVIDA TE FORTALECE\n\n1. A solas te conoces de verdad - sin ruido ajeno, escuchas lo que piensas.\n2. El que se basta solo no ruega compañía - su paz no depende de tener a alguien al lado.\n3. En el silencio nacen tus mejores ideas - el ruido constante no deja pensar.\n4. Dejas de necesitar para empezar a elegir - el que no teme estar solo elige mejor.\n5. Disfrutar tu compañía lo cambia todo - si te caes bien, nunca estás mal acompañado."]]}, {"fmt": "F1", "n": 191, "bucket": "Mindset", "title": "POR QUÉ LA GRATITUD CAMBIA LO QUE VES", "body": "<ol class='lst'><li><strong>Ves lo que te falta o lo que tienes</strong> <span class='d'>-</span> la gratitud cambia el lente, no la realidad.</li><li><strong>El que solo mira lo que le falta nunca tiene suficiente</strong> <span class='d'>-</span> la carencia es un pozo sin fondo.</li><li><strong>Agradecer no es conformarse</strong> <span class='d'>-</span> es valorar lo de hoy mientras buscas más.</li><li><strong>Lo que agradeces, lo notas más</strong> <span class='d'>-</span> donde pones atención, crece.</li><li><strong>La gratitud te saca de la queja</strong> <span class='d'>-</span> difícil quejarte y agradecer a la vez.</li></ol>", "search": "por qué la gratitud cambia lo que ves mindset ves lo que te falta o lo que tienes la gratitud cambia el lente, no la realidad. el que solo mira lo que le falta nunca tiene suficiente la carencia es un pozo sin fondo. agradecer no es conformarse es valorar lo de hoy mientras buscas más. lo que agradeces, lo notas más donde pones atención, crece. la gratitud te saca de la queja difícil quejarte y agradecer a la vez.", "copies": [["Copy card", "POR QUÉ LA GRATITUD CAMBIA LO QUE VES\n\n1. Ves lo que te falta o lo que tienes - la gratitud cambia el lente, no la realidad.\n2. El que solo mira lo que le falta nunca tiene suficiente - la carencia es un pozo sin fondo.\n3. Agradecer no es conformarse - es valorar lo de hoy mientras buscas más.\n4. Lo que agradeces, lo notas más - donde pones atención, crece.\n5. La gratitud te saca de la queja - difícil quejarte y agradecer a la vez."]]}, {"fmt": "F1", "n": 192, "bucket": "Hard truths", "title": "LO QUE DE VERDAD QUEDA CUANDO TODO LO DEMÁS SE VA", "body": "<ol class='lst'><li><strong>No te llevas lo que tuviste, sino lo que viviste</strong> <span class='d'>-</span> las cosas se quedan, los momentos no.</li><li><strong>Te recuerdan por cómo hiciste sentir</strong> <span class='d'>-</span> no por lo que acumulaste.</li><li><strong>El dinero se gasta; lo que sembraste en otros, queda</strong> <span class='d'>-</span> la huella vive más que tú.</li><li><strong>Lo que presumiste se olvida rápido</strong> <span class='d'>-</span> lo que diste de verdad, no.</li><li><strong>Al final pesa el amor, no el inventario</strong> <span class='d'>-</span> nadie abraza sus cosas en el último día.</li></ol>", "search": "lo que de verdad queda cuando todo lo demás se va verdades amargas no te llevas lo que tuviste, sino lo que viviste las cosas se quedan, los momentos no. te recuerdan por cómo hiciste sentir no por lo que acumulaste. el dinero se gasta; lo que sembraste en otros, queda la huella vive más que tú. lo que presumiste se olvida rápido lo que diste de verdad, no. al final pesa el amor, no el inventario nadie abraza sus cosas en el último día.", "copies": [["Copy card", "LO QUE DE VERDAD QUEDA CUANDO TODO LO DEMÁS SE VA\n\n1. No te llevas lo que tuviste, sino lo que viviste - las cosas se quedan, los momentos no.\n2. Te recuerdan por cómo hiciste sentir - no por lo que acumulaste.\n3. El dinero se gasta; lo que sembraste en otros, queda - la huella vive más que tú.\n4. Lo que presumiste se olvida rápido - lo que diste de verdad, no.\n5. Al final pesa el amor, no el inventario - nadie abraza sus cosas en el último día."]]}, {"fmt": "F1", "n": 193, "bucket": "Mindset", "title": "POR QUÉ SABER CUÁNDO ES SUFICIENTE ES UN SUPERPODER", "body": "<ol class='lst'><li><strong>El que nunca tiene suficiente nunca descansa</strong> <span class='d'>-</span> el &quot;más&quot; sin freno no llena.</li><li><strong>Siempre habrá alguien con más</strong> <span class='d'>-</span> si esa es tu vara, pierdes siempre.</li><li><strong>Lo suficiente disfrutado vale más que lo mucho ignorado</strong> <span class='d'>-</span> tener no es gozar.</li><li><strong>El que sabe parar, gana paz</strong> <span class='d'>-</span> poner un techo al &quot;más&quot; te libera.</li><li><strong>Querer más no es malo; no disfrutar lo que hay, sí</strong> <span class='d'>-</span> agradece mientras avanzas.</li></ol>", "search": "por qué saber cuándo es suficiente es un superpoder mindset el que nunca tiene suficiente nunca descansa el \"más\" sin freno no llena. siempre habrá alguien con más si esa es tu vara, pierdes siempre. lo suficiente disfrutado vale más que lo mucho ignorado tener no es gozar. el que sabe parar, gana paz poner un techo al \"más\" te libera. querer más no es malo; no disfrutar lo que hay, sí agradece mientras avanzas.", "copies": [["Copy card", "POR QUÉ SABER CUÁNDO ES SUFICIENTE ES UN SUPERPODER\n\n1. El que nunca tiene suficiente nunca descansa - el \"más\" sin freno no llena.\n2. Siempre habrá alguien con más - si esa es tu vara, pierdes siempre.\n3. Lo suficiente disfrutado vale más que lo mucho ignorado - tener no es gozar.\n4. El que sabe parar, gana paz - poner un techo al \"más\" te libera.\n5. Querer más no es malo; no disfrutar lo que hay, sí - agradece mientras avanzas."]]}, {"fmt": "F1", "n": 194, "bucket": "Mindset", "title": "EN LO QUE TE ENFOCAS, CRECE", "body": "<ol class='lst'><li><strong>Lo que miras todo el día, se agranda</strong> <span class='d'>-</span> tu atención alimenta lo que sea.</li><li><strong>Busca problemas y solo verás problemas</strong> <span class='d'>-</span> busca salidas y aparecen.</li><li><strong>Tu mente encuentra lo que le pides</strong> <span class='d'>-</span> decide qué quieres que encuentre.</li><li><strong>Lo que repasas, lo refuerzas</strong> <span class='d'>-</span> cuida en qué gastas tus pensamientos.</li><li><strong>Cambia el foco y cambia tu mundo</strong> <span class='d'>-</span> no la realidad, sino lo que ves de ella.</li></ol>", "search": "en lo que te enfocas, crece mindset lo que miras todo el día, se agranda tu atención alimenta lo que sea. busca problemas y solo verás problemas busca salidas y aparecen. tu mente encuentra lo que le pides decide qué quieres que encuentre. lo que repasas, lo refuerzas cuida en qué gastas tus pensamientos. cambia el foco y cambia tu mundo no la realidad, sino lo que ves de ella.", "copies": [["Copy card", "EN LO QUE TE ENFOCAS, CRECE\n\n1. Lo que miras todo el día, se agranda - tu atención alimenta lo que sea.\n2. Busca problemas y solo verás problemas - busca salidas y aparecen.\n3. Tu mente encuentra lo que le pides - decide qué quieres que encuentre.\n4. Lo que repasas, lo refuerzas - cuida en qué gastas tus pensamientos.\n5. Cambia el foco y cambia tu mundo - no la realidad, sino lo que ves de ella."]]}, {"fmt": "F1", "n": 195, "bucket": "Awakening", "title": "POR QUÉ DESCANSAR NO ES FLOJERA", "body": "<ol class='lst'><li><strong>El descanso es parte del trabajo, no su enemigo</strong> <span class='d'>-</span> sin pausa no hay rendimiento.</li><li><strong>El que no para, se quema</strong> <span class='d'>-</span> el cansancio acumulado cobra factura.</li><li><strong>Las mejores ideas llegan descansado</strong> <span class='d'>-</span> la mente agotada no crea, solo aguanta.</li><li><strong>Confundir agotamiento con esfuerzo te destruye</strong> <span class='d'>-</span> matarte no es avanzar.</li><li><strong>Descansar a tiempo es cuidar la máquina</strong> <span class='d'>-</span> no esperes a romperte para parar.</li></ol>", "search": "por qué descansar no es flojera despertar el descanso es parte del trabajo, no su enemigo sin pausa no hay rendimiento. el que no para, se quema el cansancio acumulado cobra factura. las mejores ideas llegan descansado la mente agotada no crea, solo aguanta. confundir agotamiento con esfuerzo te destruye matarte no es avanzar. descansar a tiempo es cuidar la máquina no esperes a romperte para parar.", "copies": [["Copy card", "POR QUÉ DESCANSAR NO ES FLOJERA\n\n1. El descanso es parte del trabajo, no su enemigo - sin pausa no hay rendimiento.\n2. El que no para, se quema - el cansancio acumulado cobra factura.\n3. Las mejores ideas llegan descansado - la mente agotada no crea, solo aguanta.\n4. Confundir agotamiento con esfuerzo te destruye - matarte no es avanzar.\n5. Descansar a tiempo es cuidar la máquina - no esperes a romperte para parar."]]}, {"fmt": "F1", "n": 196, "bucket": "Mindset", "title": "POR QUÉ DEBERÍAS VALORAR TU VIDA ORDINARIA", "body": "<ol class='lst'><li><strong>Lo cotidiano de hoy será lo que extrañes mañana</strong> <span class='d'>-</span> lo simple es más valioso de lo que crees.</li><li><strong>No esperes lo grande para disfrutar lo pequeño</strong> <span class='d'>-</span> la vida está en los días comunes.</li><li><strong>El que solo vive para los grandes momentos, no vive</strong> <span class='d'>-</span> la mayoría de la vida es ordinaria.</li><li><strong>Una cena, una charla, un café tranquilo</strong> <span class='d'>-</span> ahí está buena parte de la felicidad real.</li><li><strong>Aprende a ver lo extraordinario en lo común</strong> <span class='d'>-</span> lo que tienes hoy, alguien lo sueña.</li></ol>", "search": "por qué deberías valorar tu vida ordinaria mindset lo cotidiano de hoy será lo que extrañes mañana lo simple es más valioso de lo que crees. no esperes lo grande para disfrutar lo pequeño la vida está en los días comunes. el que solo vive para los grandes momentos, no vive la mayoría de la vida es ordinaria. una cena, una charla, un café tranquilo ahí está buena parte de la felicidad real. aprende a ver lo extraordinario en lo común lo que tienes hoy, alguien lo sueña.", "copies": [["Copy card", "POR QUÉ DEBERÍAS VALORAR TU VIDA ORDINARIA\n\n1. Lo cotidiano de hoy será lo que extrañes mañana - lo simple es más valioso de lo que crees.\n2. No esperes lo grande para disfrutar lo pequeño - la vida está en los días comunes.\n3. El que solo vive para los grandes momentos, no vive - la mayoría de la vida es ordinaria.\n4. Una cena, una charla, un café tranquilo - ahí está buena parte de la felicidad real.\n5. Aprende a ver lo extraordinario en lo común - lo que tienes hoy, alguien lo sueña."]]}, {"fmt": "F1", "n": 197, "bucket": "Mindset", "title": "POR QUÉ PERSEGUIR LA FELICIDAD DE FRENTE NO FUNCIONA", "body": "<ol class='lst'><li><strong>Mientras más la persigues, más se escapa</strong> <span class='d'>-</span> la felicidad no se busca, se construye.</li><li><strong>Llega de lado, haciendo lo que importa</strong> <span class='d'>-</span> es resultado, no meta directa.</li><li><strong>Vivir esperando &quot;ser feliz&quot; te roba el presente</strong> <span class='d'>-</span> la pones siempre en el futuro.</li><li><strong>Nace de sentido y vínculos, no de placer constante</strong> <span class='d'>-</span> lo profundo dura, lo fácil no.</li><li><strong>Deja de cazarla y empieza a vivir</strong> <span class='d'>-</span> aparece cuando dejas de perseguirla.</li></ol>", "search": "por qué perseguir la felicidad de frente no funciona mindset mientras más la persigues, más se escapa la felicidad no se busca, se construye. llega de lado, haciendo lo que importa es resultado, no meta directa. vivir esperando \"ser feliz\" te roba el presente la pones siempre en el futuro. nace de sentido y vínculos, no de placer constante lo profundo dura, lo fácil no. deja de cazarla y empieza a vivir aparece cuando dejas de perseguirla.", "copies": [["Copy card", "POR QUÉ PERSEGUIR LA FELICIDAD DE FRENTE NO FUNCIONA\n\n1. Mientras más la persigues, más se escapa - la felicidad no se busca, se construye.\n2. Llega de lado, haciendo lo que importa - es resultado, no meta directa.\n3. Vivir esperando \"ser feliz\" te roba el presente - la pones siempre en el futuro.\n4. Nace de sentido y vínculos, no de placer constante - lo profundo dura, lo fácil no.\n5. Deja de cazarla y empieza a vivir - aparece cuando dejas de perseguirla."]]}, {"fmt": "F1", "n": 198, "bucket": "Awakening", "title": "LA VIDA TRANQUILA VALE MÁS QUE LA QUE IMPRESIONA", "body": "<ol class='lst'><li><strong>Aparentar agota; vivir en paz descansa</strong> <span class='d'>-</span> la vida de vitrina cuesta caro.</li><li><strong>No tienes que demostrarle tu vida a nadie</strong> <span class='d'>-</span> la paz no necesita público.</li><li><strong>Lo que impresiona afuera no siempre se siente adentro</strong> <span class='d'>-</span> hay vidas envidiadas y vacías.</li><li><strong>Elige tu calma, no el aplauso ajeno</strong> <span class='d'>-</span> el que vive para los demás nunca descansa.</li><li><strong>Una vida sencilla y en paz es un lujo</strong> <span class='d'>-</span> aunque no se vea en una foto.</li></ol>", "search": "la vida tranquila vale más que la que impresiona despertar aparentar agota; vivir en paz descansa la vida de vitrina cuesta caro. no tienes que demostrarle tu vida a nadie la paz no necesita público. lo que impresiona afuera no siempre se siente adentro hay vidas envidiadas y vacías. elige tu calma, no el aplauso ajeno el que vive para los demás nunca descansa. una vida sencilla y en paz es un lujo aunque no se vea en una foto.", "copies": [["Copy card", "LA VIDA TRANQUILA VALE MÁS QUE LA QUE IMPRESIONA\n\n1. Aparentar agota; vivir en paz descansa - la vida de vitrina cuesta caro.\n2. No tienes que demostrarle tu vida a nadie - la paz no necesita público.\n3. Lo que impresiona afuera no siempre se siente adentro - hay vidas envidiadas y vacías.\n4. Elige tu calma, no el aplauso ajeno - el que vive para los demás nunca descansa.\n5. Una vida sencilla y en paz es un lujo - aunque no se vea en una foto."]]}, {"fmt": "F1", "n": 199, "bucket": "Hard truths", "title": "LO QUE EL DINERO NO PUEDE COMPRAR", "body": "<ol class='lst'><li><strong>El tiempo perdido</strong> <span class='d'>-</span> ningún dinero te devuelve un día.</li><li><strong>La salud que descuidaste</strong> <span class='d'>-</span> se cuida antes, no se compra después.</li><li><strong>El cariño verdadero</strong> <span class='d'>-</span> lo que se compra no es amor, es interés.</li><li><strong>La paz interior</strong> <span class='d'>-</span> se construye dentro, no se paga.</li><li><strong>El respeto que se gana con actos</strong> <span class='d'>-</span> eso no tiene precio ni se vende.</li></ol>", "search": "lo que el dinero no puede comprar verdades amargas el tiempo perdido ningún dinero te devuelve un día. la salud que descuidaste se cuida antes, no se compra después. el cariño verdadero lo que se compra no es amor, es interés. la paz interior se construye dentro, no se paga. el respeto que se gana con actos eso no tiene precio ni se vende.", "copies": [["Copy card", "LO QUE EL DINERO NO PUEDE COMPRAR\n\n1. El tiempo perdido - ningún dinero te devuelve un día.\n2. La salud que descuidaste - se cuida antes, no se compra después.\n3. El cariño verdadero - lo que se compra no es amor, es interés.\n4. La paz interior - se construye dentro, no se paga.\n5. El respeto que se gana con actos - eso no tiene precio ni se vende."]]}, {"fmt": "F1", "n": 200, "bucket": "Hard truths", "title": "LAS POCAS COSAS QUE DE VERDAD IMPORTAN", "body": "<ol class='lst'><li><strong>Tu paz por encima de tener la razón</strong> <span class='d'>-</span> soltar la pelea es ganar.</li><li><strong>La gente que está cuando no tienes nada</strong> <span class='d'>-</span> esos son los de verdad.</li><li><strong>Hacer hoy lo que pospones para &quot;algún día&quot;</strong> <span class='d'>-</span> el después no está garantizado.</li><li><strong>Vivir tu vida, no la que otros aprueban</strong> <span class='d'>-</span> es la única que vas a vivir.</li><li><strong>Atreverte, aunque tengas miedo</strong> <span class='d'>-</span> al final pesa más lo que no hiciste.</li></ol>", "search": "las pocas cosas que de verdad importan verdades amargas tu paz por encima de tener la razón soltar la pelea es ganar. la gente que está cuando no tienes nada esos son los de verdad. hacer hoy lo que pospones para \"algún día\" el después no está garantizado. vivir tu vida, no la que otros aprueban es la única que vas a vivir. atreverte, aunque tengas miedo al final pesa más lo que no hiciste.", "copies": [["Copy card", "LAS POCAS COSAS QUE DE VERDAD IMPORTAN\n\n1. Tu paz por encima de tener la razón - soltar la pelea es ganar.\n2. La gente que está cuando no tienes nada - esos son los de verdad.\n3. Hacer hoy lo que pospones para \"algún día\" - el después no está garantizado.\n4. Vivir tu vida, no la que otros aprueban - es la única que vas a vivir.\n5. Atreverte, aunque tengas miedo - al final pesa más lo que no hiciste."]]}, {"fmt": "F2", "n": 151, "bucket": "", "title": "LO QUE ESCASEA SE VALORA MÁS", "body": "<ol class='pts'><li><strong>Lo que abunda se ignora; lo escaso se busca.</strong> Es una ley simple de la naturaleza humana: valoramos más lo que cuesta conseguir. Cuando estás siempre disponible, cuando das todo de entrada, cuando nunca faltas, dejas de ser especial. No porque valgas menos, sino porque lo que sobra no se cuida. Tu disponibilidad sin límites, en vez de acercar a la gente, muchas veces te abarata a sus ojos.</li><li><strong>El que está siempre disponible deja de ser especial.</strong> Cuando alguien sabe que vas a estar pase lo que pase, que vas a contestar al instante, que nunca vas a decir que no, deja de valorar tu presencia. Se vuelve garantía, y lo garantizado no se aprecia. No se trata de jugar ni de fingir; se trata de tener tu propia vida, tus límites, y no entregarte entero antes de que te valoren.</li><li><strong>Poner límites a tu tiempo sube tu valor.</strong> Cuando tu tiempo y tu presencia tienen un límite, cuando no estás disponible para todo y para todos, la gente los aprecia más. No por estrategia, sino porque lo difícil de conseguir se valora. Cuida tu tiempo, ten tu vida, no seas garantía para nadie. El que siempre está se vuelve paisaje; el que tiene su lugar, se nota.</li></ol>", "search": "lo que escasea se valora más lo que abunda se ignora; lo escaso se busca. es una ley simple de la naturaleza humana: valoramos más lo que cuesta conseguir. cuando estás siempre disponible, cuando das todo de entrada, cuando nunca faltas, dejas de ser especial. no porque valgas menos, sino porque lo que sobra no se cuida. tu disponibilidad sin límites, en vez de acercar a la gente, muchas veces te abarata a sus ojos. el que está siempre disponible deja de ser especial. cuando alguien sabe que vas a estar pase lo que pase, que vas a contestar al instante, que nunca vas a decir que no, deja de valorar tu presencia. se vuelve garantía, y lo garantizado no se aprecia. no se trata de jugar ni de fingir; se trata de tener tu propia vida, tus límites, y no entregarte entero antes de que te valoren. poner límites a tu tiempo sube tu valor. cuando tu tiempo y tu presencia tienen un límite, cuando no estás disponible para todo y para todos, la gente los aprecia más. no por estrategia, sino porque lo difícil de conseguir se valora. cuida tu tiempo, ten tu vida, no seas garantía para nadie. el que siempre está se vuelve paisaje; el que tiene su lugar, se nota.", "copies": [["Copy card", "LO QUE ESCASEA SE VALORA MÁS\n\n1. Lo que abunda se ignora; lo escaso se busca. Es una ley simple de la naturaleza humana: valoramos más lo que cuesta conseguir. Cuando estás siempre disponible, cuando das todo de entrada, cuando nunca faltas, dejas de ser especial. No porque valgas menos, sino porque lo que sobra no se cuida. Tu disponibilidad sin límites, en vez de acercar a la gente, muchas veces te abarata a sus ojos.\n\n2. El que está siempre disponible deja de ser especial. Cuando alguien sabe que vas a estar pase lo que pase, que vas a contestar al instante, que nunca vas a decir que no, deja de valorar tu presencia. Se vuelve garantía, y lo garantizado no se aprecia. No se trata de jugar ni de fingir; se trata de tener tu propia vida, tus límites, y no entregarte entero antes de que te valoren.\n\n3. Poner límites a tu tiempo sube tu valor. Cuando tu tiempo y tu presencia tienen un límite, cuando no estás disponible para todo y para todos, la gente los aprecia más. No por estrategia, sino porque lo difícil de conseguir se valora. Cuida tu tiempo, ten tu vida, no seas garantía para nadie. El que siempre está se vuelve paisaje; el que tiene su lugar, se nota."]]}, {"fmt": "F2", "n": 152, "bucket": "", "title": "POR QUÉ EXPLICAR DE MÁS TE DEBILITA", "body": "<ol class='pts'><li><strong>El que se justifica suena inseguro.</strong> Cuando das mil explicaciones para una decisión, transmites que no estás tan seguro de ella, que necesitas la aprobación del otro. Una decisión firme no necesita un discurso para sostenerse. Mientras más te justificas, más débil suenas. A veces, un &quot;así es&quot; o un &quot;decidí esto&quot; con calma pesa mucho más que una explicación larga llena de razones.</li><li><strong>Mientras más explicas, más das material para rebatirte.</strong> Cada razón que ofreces es una puerta que el otro puede atacar, discutir o usar en tu contra. El que dice de menos controla la conversación; el que explica de más se expone. No tienes que justificar cada límite, cada no, cada decisión. &quot;No puedo&quot; es una frase completa. No le debes a nadie un ensayo por cada cosa q
