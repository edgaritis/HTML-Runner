<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Content Workshop · Round 1</title>
<style>
:root{
  --bg:#f3f2ee; --surface:#ffffff; --ink:#1b1a17; --muted:#736e65; --line:#e6e2da;
  --accent:#c2410c; --accent-soft:#fbe9df;
  --f1:#2f7d4f; --f2:#c2410c; --f3:#3f5168; --f4:#6d4c7d;
  --shadow:0 1px 2px rgba(20,18,14,.04),0 6px 16px rgba(20,18,14,.05);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px}
header.bar{position:sticky;top:0;z-index:20;background:rgba(243,242,238,.86);
  backdrop-filter:saturate(1.1) blur(8px);border-bottom:1px solid var(--line)}
.bar .wrap{padding-top:14px;padding-bottom:12px}
.brandrow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand{font-weight:700;letter-spacing:.02em;font-size:17px}
.brand b{color:var(--accent)}
.sub{color:var(--muted);font-size:13px}
.controls{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.search input{border:0;outline:0;background:transparent;width:100%;font:inherit;color:var(--ink)}
.search svg{flex:none;color:var(--muted)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;gap:7px;align-items:center;transition:.12s}
.tab:hover{border-color:#d4cfc4}
.tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab .cnt{font-size:11px;opacity:.7;font-weight:600}
.toggle{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none}
.toggle input{accent-color:var(--accent)}
main .wrap{padding-top:20px;padding-bottom:64px}
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));align-items:start}
.card{background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:16px 16px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px}
.card.done{opacity:.5}
.chead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:6px;color:#fff;text-transform:uppercase}
.p-F1{background:var(--f1)} .p-F2{background:var(--f2)} .p-F3{background:var(--f3)} .p-F4{background:var(--f4)}
.bucket{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 7px}
.idx{margin-left:auto;font-size:12px;color:#a9a297;font-variant-numeric:tabular-nums}
.markbtn{border:1px solid var(--line);background:var(--surface);border-radius:7px;
  font-size:12px;padding:4px 9px;color:var(--muted);cursor:pointer;font-weight:600}
.markbtn:hover{border-color:#d4cfc4}
.card.done .markbtn{background:var(--f1);color:#fff;border-color:var(--f1)}
.title{font-weight:800;text-transform:uppercase;letter-spacing:.02em;font-size:15.5px;line-height:1.28;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .title{-webkit-text-fill-color:initial;color:var(--muted);background:none}
.qtitle{font-weight:800;font-size:16px;line-height:1.32;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .qtitle{-webkit-text-fill-color:initial;color:var(--muted);background:none}
ol.lst,ol.pts{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px}
ol.lst li,ol.pts li{padding-left:3px}
ol.lst .d{color:#bdb6aa}
ol.pts li{line-height:1.45}
.note{font-size:12px;color:var(--muted);font-style:italic;margin:2px 0 0}
.f3 .lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--accent);margin:2px 0 4px}
.f3 .teaser{margin:0 0 10px;background:var(--accent-soft);border-radius:8px;padding:9px 11px}
.f3 p.g{margin:0 0 7px}
.prompt{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;
  white-space:pre-wrap;background:#1b1a17;color:#ece6da;border-radius:9px;padding:12px;max-height:220px;overflow:auto}
.cfoot{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.copy{flex:1;min-width:120px;border:0;border-radius:8px;padding:9px 12px;font:inherit;font-weight:700;font-size:13px;
  cursor:pointer;background:var(--accent);color:#fff;transition:.12s}
.copy.secondary{background:var(--ink)}
.copy:hover{filter:brightness(1.06)}
.copy.ok{background:var(--f1)!important}
.empty{text-align:center;color:var(--muted);padding:70px 10px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.18s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}

/* ---- Export & Edit feature ---- */
.exportbtn{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);border-radius:8px;
  padding:9px 11px;font:inherit;font-weight:700;font-size:12px;color:var(--ink);cursor:pointer;
  display:inline-flex;align-items:center;gap:6px;transition:.12s}
.exportbtn:hover{border-color:#d4cfc4;background:#faf8f3}
.exportbtn svg{width:13px;height:13px}
.expanel{display:none;margin-top:10px;padding:12px;background:#f9f7f1;border:1px solid var(--line);
  border-radius:9px;font-size:12px;flex-direction:column;gap:10px}
.expanel.open{display:flex}
.exrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.exrow label{color:var(--muted);font-weight:600;min-width:62px}
.exrow .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:#fff}
.exrow .seg button{border:0;background:transparent;font:inherit;font-size:11px;padding:5px 9px;cursor:pointer;color:var(--muted);font-weight:600}
.exrow .seg button.on{background:var(--ink);color:#fff}
.exrow input[type=number]{width:62px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:12px;background:#fff}
.exrow input[type=range]{flex:1;accent-color:var(--accent);max-width:160px}
.exrow input[type=color]{width:28px;height:24px;padding:0;border:1px solid var(--line);border-radius:6px;cursor:pointer;background:#fff}
.exrow .swatches{display:flex;gap:4px;flex-wrap:wrap}
.exrow .sw{width:22px;height:22px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:.1s}
.exrow .sw.on{border-color:var(--accent);transform:scale(1.1)}
.exrow .sw:hover{transform:scale(1.08)}
.exgo{background:var(--accent);color:#fff;border:0;border-radius:7px;padding:8px 14px;font:inherit;font-weight:700;font-size:12px;cursor:pointer;flex:1;min-width:120px}
.exgo:hover{filter:brightness(1.06)}
.exgo:disabled{opacity:.6;cursor:wait}
.exgo.ok{background:var(--f1)!important}
.exhint{color:var(--muted);font-size:11px;font-style:italic;margin-top:-2px}

/* Hidden render area (the actual exportable card) */
.exrender{position:fixed;top:0;left:-99999px;pointer-events:none}
.excard{display:flex;flex-direction:column;justify-content:center;align-items:flex-start;
  padding:80px 70px;font-family:'Lato','Inter',ui-sans-serif,system-ui,sans-serif;
  font-weight:400;line-height:1.45;text-align:left;letter-spacing:.01em}
.excard.center{align-items:center;text-align:center;justify-content:center}
.excard .extitle{font-weight:900;text-transform:uppercase;letter-spacing:.025em;line-height:1.18;margin:0 0 28px}
.excard ol{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:18px;width:100%}
.excard ol li{display:flex;gap:14px;align-items:flex-start}
.excard ol li .num{font-weight:700;flex:0 0 auto;opacity:.95}
.excard ol li .ltext{flex:1}
.excard ol li .ltext strong{font-weight:900}
.excard ol li .ltext .dash{opacity:.55;margin:0 4px}
.excard .ftext{font-weight:600;line-height:1.35}
.excard .ptext{font-weight:500;line-height:1.5}
</style>

const DATA = [{"fmt": "F1", "n": 351, "bucket": "Operador", "title": "EMPEZAR DE CERO NO ES VOLVER ATRÁS, ES EMPEZAR CON TODO LO QUE APRENDISTE", "body": "<ol class='lst'><li><strong>El que empieza de cero por segunda vez no empieza igual que la primera</strong> <span class='d'>-</span> lleva cicatrices, pero también lleva mapa.</li><li><strong>Lo que perdiste fue la posición, no lo que aprendiste para llegar ahí</strong> <span class='d'>-</span> el conocimiento no se pierde con la cuenta bancaria.</li><li><strong>El segundo intento es más rápido porque ya sabes qué funciona y qué no</strong> <span class='d'>-</span> lo que tomó años la primera vez toma meses la segunda.</li><li><strong>Empezar de cero se siente como retroceso pero funciona como ventaja</strong> <span class='d'>-</span> ves lo que el principiante no puede ver porque ya recorriste el camino.</li><li><strong>Lo que construyes después de perder es más sólido porque lo construyes sin las ilusiones de la primera vez</strong> <span class='d'>-</span> la experiencia del fracaso es el material más fuerte.</li></ol>", "search": "empezar de cero no es volver atrás, es empezar con todo lo que aprendiste operador el que empieza de cero por segunda vez no empieza igual que la primera lleva cicatrices, pero también lleva mapa. lo que perdiste fue la posición, no lo que aprendiste para llegar ahí el conocimiento no se pierde con la cuenta bancaria. el segundo intento es más rápido porque ya sabes qué funciona y qué no lo que tomó años la primera vez toma meses la segunda. empezar de cero se siente como retroceso pero funciona como ventaja ves lo que el principiante no puede ver porque ya recorriste el camino. lo que construyes después de perder es más sólido porque lo construyes sin las ilusiones de la primera vez la experiencia del fracaso es el material más fuerte.", "copies": [["Copy card", "EMPEZAR DE CERO NO ES VOLVER ATRÁS, ES EMPEZAR CON TODO LO QUE APRENDISTE\n\n1. El que empieza de cero por segunda vez no empieza igual que la primera - lleva cicatrices, pero también lleva mapa.\n2. Lo que perdiste fue la posición, no lo que aprendiste para llegar ahí - el conocimiento no se pierde con la cuenta bancaria.\n3. El segundo intento es más rápido porque ya sabes qué funciona y qué no - lo que tomó años la primera vez toma meses la segunda.\n4. Empezar de cero se siente como retroceso pero funciona como ventaja - ves lo que el principiante no puede ver porque ya recorriste el camino.\n5. Lo que construyes después de perder es más sólido porque lo construyes sin las ilusiones de la primera vez - la experiencia del fracaso es el material más fuerte."]]}, {"fmt": "F1", "n": 352, "bucket": "Operador", "title": "EL ORGULLO TE IMPIDE PEDIR AYUDA CUANDO MÁS LA NECESITAS", "body": "<ol class='lst'><li><strong>El que no pide ayuda por orgullo no se protege, se aísla</strong> <span class='d'>-</span> el silencio que parece dignidad es distancia que te cuesta tiempo.</li><li><strong>Pedir ayuda no es admitir debilidad, es usar todos los recursos disponibles</strong> <span class='d'>-</span> el que opera bien usa lo que tiene, incluida la gente.</li><li><strong>El orgullo te hace tardar el doble porque te obliga a resolver solo lo que otros ya resolvieron</strong> <span class='d'>-</span> reinventas lo que podrías preguntar.</li><li><strong>La persona que pide ayuda específica y concreta la recibe más rápido que la que pide ayuda vaga</strong> <span class='d'>-</span> di exactamente qué necesitas y a quién.</li><li><strong>Lo que te frena no es la falta de recursos, es la resistencia a admitir que los necesitas</strong> <span class='d'>-</span> el recurso existe, el orgullo lo bloquea.</li></ol>", "search": "el orgullo te impide pedir ayuda cuando más la necesitas operador el que no pide ayuda por orgullo no se protege, se aísla el silencio que parece dignidad es distancia que te cuesta tiempo. pedir ayuda no es admitir debilidad, es usar todos los recursos disponibles el que opera bien usa lo que tiene, incluida la gente. el orgullo te hace tardar el doble porque te obliga a resolver solo lo que otros ya resolvieron reinventas lo que podrías preguntar. la persona que pide ayuda específica y concreta la recibe más rápido que la que pide ayuda vaga di exactamente qué necesitas y a quién. lo que te frena no es la falta de recursos, es la resistencia a admitir que los necesitas el recurso existe, el orgullo lo bloquea.", "copies": [["Copy card", "EL ORGULLO TE IMPIDE PEDIR AYUDA CUANDO MÁS LA NECESITAS\n\n1. El que no pide ayuda por orgullo no se protege, se aísla - el silencio que parece dignidad es distancia que te cuesta tiempo.\n2. Pedir ayuda no es admitir debilidad, es usar todos los recursos disponibles - el que opera bien usa lo que tiene, incluida la gente.\n3. El orgullo te hace tardar el doble porque te obliga a resolver solo lo que otros ya resolvieron - reinventas lo que podrías preguntar.\n4. La persona que pide ayuda específica y concreta la recibe más rápido que la que pide ayuda vaga - di exactamente qué necesitas y a quién.\n5. Lo que te frena no es la falta de recursos, es la resistencia a admitir que los necesitas - el recurso existe, el orgullo lo bloquea."]]}, {"fmt": "F1", "n": 353, "bucket": "Operador", "title": "PERDER TODO TE ENSEÑA QUÉ ERA REALMENTE TUYO", "body": "<ol class='lst'><li><strong>Lo que se va cuando pierdes posición no era tuyo, era de tu posición</strong> <span class='d'>-</span> las personas que se fueron seguían al puesto, no a ti.</li><li><strong>Lo que se queda después de perder es lo único que vale contar</strong> <span class='d'>-</span> las relaciones que sobreviven a la caída son las reales.</li><li><strong>El dinero perdido muestra qué relaciones dependían de tu solvencia</strong> <span class='d'>-</span> lo que era amistad real no cambia con tu cuenta.</li><li><strong>El fracaso funciona como filtro que separa lo genuino de lo circunstancial</strong> <span class='d'>-</span> pierdes cosas, pero ganas claridad sobre lo que tenías.</li><li><strong>Lo que descubres que es tuyo después de perder todo es la base más sólida para reconstruir</strong> <span class='d'>-</span> el resto era decoración que pesaba sin aportar.</li></ol>", "search": "perder todo te enseña qué era realmente tuyo operador lo que se va cuando pierdes posición no era tuyo, era de tu posición las personas que se fueron seguían al puesto, no a ti. lo que se queda después de perder es lo único que vale contar las relaciones que sobreviven a la caída son las reales. el dinero perdido muestra qué relaciones dependían de tu solvencia lo que era amistad real no cambia con tu cuenta. el fracaso funciona como filtro que separa lo genuino de lo circunstancial pierdes cosas, pero ganas claridad sobre lo que tenías. lo que descubres que es tuyo después de perder todo es la base más sólida para reconstruir el resto era decoración que pesaba sin aportar.", "copies": [["Copy card", "PERDER TODO TE ENSEÑA QUÉ ERA REALMENTE TUYO\n\n1. Lo que se va cuando pierdes posición no era tuyo, era de tu posición - las personas que se fueron seguían al puesto, no a ti.\n2. Lo que se queda después de perder es lo único que vale contar - las relaciones que sobreviven a la caída son las reales.\n3. El dinero perdido muestra qué relaciones dependían de tu solvencia - lo que era amistad real no cambia con tu cuenta.\n4. El fracaso funciona como filtro que separa lo genuino de lo circunstancial - pierdes cosas, pero ganas claridad sobre lo que tenías.\n5. Lo que descubres que es tuyo después de perder todo es la base más sólida para reconstruir - el resto era decoración que pesaba sin aportar."]]}, {"fmt": "F1", "n": 354, "bucket": "Operador", "title": "RECONSTRUIR ES MÁS LENTO QUE CONSTRUIR PORQUE CARGAS EL PESO DE LO ANTERIOR", "body": "<ol class='lst'><li><strong>La primera vez construyes sin saber lo que puede salir mal, la segunda construyes sabiéndolo</strong> <span class='d'>-</span> el conocimiento te hace más cuidadoso y más lento.</li><li><strong>El recuerdo de lo que perdiste pesa mientras trabajas en lo nuevo</strong> <span class='d'>-</span> construir y procesar al mismo tiempo divide la energía.</li><li><strong>La gente espera que te recuperes rápido, pero la reconstrucción lleva su propio ritmo</strong> <span class='d'>-</span> las expectativas ajenas no cambian la realidad del proceso.</li><li><strong>Lo lento no es señal de que vas mal, es señal de que esta vez estás construyendo con cuidado</strong> <span class='d'>-</span> la velocidad de la primera vez incluía errores que ahora evitas.</li><li><strong>Aceptar que la reconstrucción es lenta te quita la presión que la hace más lenta todavía</strong> <span class='d'>-</span> la impaciencia contigo mismo es peso que no necesitas cargar.</li></ol>", "search": "reconstruir es más lento que construir porque cargas el peso de lo anterior operador la primera vez construyes sin saber lo que puede salir mal, la segunda construyes sabiéndolo el conocimiento te hace más cuidadoso y más lento. el recuerdo de lo que perdiste pesa mientras trabajas en lo nuevo construir y procesar al mismo tiempo divide la energía. la gente espera que te recuperes rápido, pero la reconstrucción lleva su propio ritmo las expectativas ajenas no cambian la realidad del proceso. lo lento no es señal de que vas mal, es señal de que esta vez estás construyendo con cuidado la velocidad de la primera vez incluía errores que ahora evitas. aceptar que la reconstrucción es lenta te quita la presión que la hace más lenta todavía la impaciencia contigo mismo es peso que no necesitas cargar.", "copies": [["Copy card", "RECONSTRUIR ES MÁS LENTO QUE CONSTRUIR PORQUE CARGAS EL PESO DE LO ANTERIOR\n\n1. La primera vez construyes sin saber lo que puede salir mal, la segunda construyes sabiéndolo - el conocimiento te hace más cuidadoso y más lento.\n2. El recuerdo de lo que perdiste pesa mientras trabajas en lo nuevo - construir y procesar al mismo tiempo divide la energía.\n3. La gente espera que te recuperes rápido, pero la reconstrucción lleva su propio ritmo - las expectativas ajenas no cambian la realidad del proceso.\n4. Lo lento no es señal de que vas mal, es señal de que esta vez estás construyendo con cuidado - la velocidad de la primera vez incluía errores que ahora evitas.\n5. Aceptar que la reconstrucción es lenta te quita la presión que la hace más lenta todavía - la impaciencia contigo mismo es peso que no necesitas cargar."]]}, {"fmt": "F1", "n": 355, "bucket": "Operador", "title": "NADIE TE ESPERA MIENTRAS TE RECUPERAS", "body": "<ol class='lst'><li><strong>El mercado no hace pausa porque tú estás en crisis</strong> <span class='d'>-</span> las oportunidades siguen moviéndose mientras tú te detienes.</li><li><strong>La gente tiene su propia vida y sus propios problemas mientras tú resuelves los tuyos</strong> <span class='d'>-</span> esperar rescate de otros es planificar con recursos que no controlas.</li><li><strong>El que espera estar bien antes de actuar pierde el tiempo que necesita para estar bien</strong> <span class='d'>-</span> la acción es parte de la recuperación, no lo que viene después.</li><li><strong>Nadie va a venir a decirte que ya puedes empezar de nuevo</strong> <span class='d'>-</span> la señal de arranque la das tú o no se da.</li><li><strong>Moverte antes de sentirte listo es la única forma de empezar a sentirte listo</strong> <span class='d'>-</span> la preparación emocional llega con el movimiento, no antes.</li></ol>", "search": "nadie te espera mientras te recuperas operador el mercado no hace pausa porque tú estás en crisis las oportunidades siguen moviéndose mientras tú te detienes. la gente tiene su propia vida y sus propios problemas mientras tú resuelves los tuyos esperar rescate de otros es planificar con recursos que no controlas. el que espera estar bien antes de actuar pierde el tiempo que necesita para estar bien la acción es parte de la recuperación, no lo que viene después. nadie va a venir a decirte que ya puedes empezar de nuevo la señal de arranque la das tú o no se da. moverte antes de sentirte listo es la única forma de empezar a sentirte listo la preparación emocional llega con el movimiento, no antes.", "copies": [["Copy card", "NADIE TE ESPERA MIENTRAS TE RECUPERAS\n\n1. El mercado no hace pausa porque tú estás en crisis - las oportunidades siguen moviéndose mientras tú te detienes.\n2. La gente tiene su propia vida y sus propios problemas mientras tú resuelves los tuyos - esperar rescate de otros es planificar con recursos que no controlas.\n3. El que espera estar bien antes de actuar pierde el tiempo que necesita para estar bien - la acción es parte de la recuperación, no lo que viene después.\n4. Nadie va a venir a decirte que ya puedes empezar de nuevo - la señal de arranque la das tú o no se da.\n5. Moverte antes de sentirte listo es la única forma de empezar a sentirte listo - la preparación emocional llega con el movimiento, no antes."]]}, {"fmt": "F1", "n": 356, "bucket": "Operador", "title": "EL PRIMER PASO DESPUÉS DE CAER ES EL MÁS FEO Y EL MÁS IMPORTANTE", "body": "<ol class='lst'><li><strong>El primer paso no es inspirador ni bonito, es mecánico y pesado</strong> <span class='d'>-</span> empezar después de perder se siente como arrastrar peso.</li><li><strong>Lo que importa del primer paso no es su calidad sino su existencia</strong> <span class='d'>-</span> el primer movimiento vale por el hecho de moverse, no por el resultado.</li><li><strong>El primer paso rompe la inercia de la inacción y eso es lo más difícil</strong> <span class='d'>-</span> después del primero, el segundo cuesta menos.</li><li><strong>No tienes que saber los diez pasos que siguen para dar el primero</strong> <span class='d'>-</span> uno a la vez es suficiente cuando todo se derrumbó.</li><li><strong>El primer paso después de la caída define el ritmo de todo lo que viene</strong> <span class='d'>-</span> guarda esto para el día que sientas que no puedes moverte.</li></ol>", "search": "el primer paso después de caer es el más feo y el más importante operador el primer paso no es inspirador ni bonito, es mecánico y pesado empezar después de perder se siente como arrastrar peso. lo que importa del primer paso no es su calidad sino su existencia el primer movimiento vale por el hecho de moverse, no por el resultado. el primer paso rompe la inercia de la inacción y eso es lo más difícil después del primero, el segundo cuesta menos. no tienes que saber los diez pasos que siguen para dar el primero uno a la vez es suficiente cuando todo se derrumbó. el primer paso después de la caída define el ritmo de todo lo que viene guarda esto para el día que sientas que no puedes moverte.", "copies": [["Copy card", "EL PRIMER PASO DESPUÉS DE CAER ES EL MÁS FEO Y EL MÁS IMPORTANTE\n\n1. El primer paso no es inspirador ni bonito, es mecánico y pesado - empezar después de perder se siente como arrastrar peso.\n2. Lo que importa del primer paso no es su calidad sino su existencia - el primer movimiento vale por el hecho de moverse, no por el resultado.\n3. El primer paso rompe la inercia de la inacción y eso es lo más difícil - después del primero, el segundo cuesta menos.\n4. No tienes que saber los diez pasos que siguen para dar el primero - uno a la vez es suficiente cuando todo se derrumbó.\n5. El primer paso después de la caída define el ritmo de todo lo que viene - guarda esto para el día que sientas que no puedes moverte."]]}, {"fmt": "F1", "n": 357, "bucket": "Operador", "title": "VOLVER A EMPEZAR CON MENOS RECURSOS TE OBLIGA A SER MÁS PRECISO", "body": "<ol class='lst'><li><strong>Cuando tienes mucho, desperdicias sin notarlo</strong> <span class='d'>-</span> el recurso abundante se usa sin cuestionarse.</li><li><strong>El que reconstruye con poco elige con más cuidado dónde pone cada peso y cada hora</strong> <span class='d'>-</span> la escasez te obliga a priorizar con precisión.</li><li><strong>Lo que se construye con poco suele ser más eficiente que lo que se construye con mucho</strong> <span class='d'>-</span> el exceso crea desperdicio invisible.</li><li><strong>La restricción te fuerza a encontrar soluciones que la abundancia esconde</strong> <span class='d'>-</span> el ingenio aparece cuando el presupuesto desaparece.</li><li><strong>Lo que sobrevive a la restricción de recursos es lo que realmente funciona</strong> <span class='d'>-</span> el resto era lujo disfrazado de necesidad.</li></ol>", "search": "volver a empezar con menos recursos te obliga a ser más preciso operador cuando tienes mucho, desperdicias sin notarlo el recurso abundante se usa sin cuestionarse. el que reconstruye con poco elige con más cuidado dónde pone cada peso y cada hora la escasez te obliga a priorizar con precisión. lo que se construye con poco suele ser más eficiente que lo que se construye con mucho el exceso crea desperdicio invisible. la restricción te fuerza a encontrar soluciones que la abundancia esconde el ingenio aparece cuando el presupuesto desaparece. lo que sobrevive a la restricción de recursos es lo que realmente funciona el resto era lujo disfrazado de necesidad.", "copies": [["Copy card", "VOLVER A EMPEZAR CON MENOS RECURSOS TE OBLIGA A SER MÁS PRECISO\n\n1. Cuando tienes mucho, desperdicias sin notarlo - el recurso abundante se usa sin cuestionarse.\n2. El que reconstruye con poco elige con más cuidado dónde pone cada peso y cada hora - la escasez te obliga a priorizar con precisión.\n3. Lo que se construye con poco suele ser más eficiente que lo que se construye con mucho - el exceso crea desperdicio invisible.\n4. La restricción te fuerza a encontrar soluciones que la abundancia esconde - el ingenio aparece cuando el presupuesto desaparece.\n5. Lo que sobrevive a la restricción de recursos es lo que realmente funciona - el resto era lujo disfrazado de necesidad."]]}, {"fmt": "F1", "n": 358, "bucket": "Operador", "title": "LA GENTE QUE SE FUE CUANDO CAÍSTE TE MOSTRÓ LO QUE ERAN", "body": "<ol class='lst'><li><strong>Lo que ves cuando pierdes posición es la versión real de las personas que te rodean</strong> <span class='d'>-</span> la caída quita el disfraz que la abundancia mantenía.</li><li><strong>El que se fue cuando dejaste de ser útil nunca estuvo contigo, estaba con lo que podías darle</strong> <span class='d'>-</span> su presencia tenía precio de entrada que dejaste de pagar.</li><li><strong>Enojarte con los que se fueron es gastar energía que necesitas para reconstruir</strong> <span class='d'>-</span> la información que te dieron al irse es más valiosa que su presencia.</li><li><strong>Lo que queda después de que se van los oportunistas es tu círculo real</strong> <span class='d'>-</span> esas personas son la base sobre la que se reconstruye.</li><li><strong>La caída te ahorra años de descubrir quién era quién</strong> <span class='d'>-</span> la información que te tomó un fracaso obtener te habría tomado una década sin él.</li></ol>", "search": "la gente que se fue cuando caíste te mostró lo que eran operador lo que ves cuando pierdes posición es la versión real de las personas que te rodean la caída quita el disfraz que la abundancia mantenía. el que se fue cuando dejaste de ser útil nunca estuvo contigo, estaba con lo que podías darle su presencia tenía precio de entrada que dejaste de pagar. enojarte con los que se fueron es gastar energía que necesitas para reconstruir la información que te dieron al irse es más valiosa que su presencia. lo que queda después de que se van los oportunistas es tu círculo real esas personas son la base sobre la que se reconstruye. la caída te ahorra años de descubrir quién era quién la información que te tomó un fracaso obtener te habría tomado una década sin él.", "copies": [["Copy card", "LA GENTE QUE SE FUE CUANDO CAÍSTE TE MOSTRÓ LO QUE ERAN\n\n1. Lo que ves cuando pierdes posición es la versión real de las personas que te rodean - la caída quita el disfraz que la abundancia mantenía.\n2. El que se fue cuando dejaste de ser útil nunca estuvo contigo, estaba con lo que podías darle - su presencia tenía precio de entrada que dejaste de pagar.\n3. Enojarte con los que se fueron es gastar energía que necesitas para reconstruir - la información que te dieron al irse es más valiosa que su presencia.\n4. Lo que queda después de que se van los oportunistas es tu círculo real - esas personas son la base sobre la que se reconstruye.\n5. La caída te ahorra años de descubrir quién era quién - la información que te tomó un fracaso obtener te habría tomado una década sin él."]]}, {"fmt": "F1", "n": 359, "bucket": "Operador", "title": "MEDIR TU PRESENTE CON TU PASADO TE FRENA MÁS QUE EL PROBLEMA MISMO", "body": "<ol class='lst'><li><strong>Compararte con donde estabas antes convierte cada avance en insuficiencia</strong> <span class='d'>-</span> lo que avanzaste hoy no se ve cuando lo mides contra lo que tenías ayer.</li><li><strong>El pasado que recuerdas es una versión editada que no incluye los problemas que tenía</strong> <span class='d'>-</span> idealizas lo que perdiste y eso hace más pesado lo que tienes.</li><li><strong>El punto de referencia correcto es donde estabas cuando decidiste empezar de nuevo, no donde estabas antes de caer</strong> <span class='d'>-</span> desde ahí se mide el progreso real.</li><li><strong>Cada vez que te comparas con tu mejor momento pasado, le restas valor a tu esfuerzo presente</strong> <span class='d'>-</span> el presente merece su propia métrica.</li><li><strong>Soltar la referencia del pasado te libera para ver lo que estás construyendo por lo que es</strong> <span class='d'>-</span> lo nuevo no tiene que parecerse a lo viejo para ser bueno.</li></ol>", "search": "medir tu presente con tu pasado te frena más que el problema mismo operador compararte con donde estabas antes convierte cada avance en insuficiencia lo que avanzaste hoy no se ve cuando lo mides contra lo que tenías ayer. el pasado que recuerdas es una versión editada que no incluye los problemas que tenía idealizas lo que perdiste y eso hace más pesado lo que tienes. el punto de referencia correcto es donde estabas cuando decidiste empezar de nuevo, no donde estabas antes de caer desde ahí se mide el progreso real. cada vez que te comparas con tu mejor momento pasado, le restas valor a tu esfuerzo presente el presente merece su propia métrica. soltar la referencia del pasado te libera para ver lo que estás construyendo por lo que es lo nuevo no tiene que parecerse a lo viejo para ser bueno.", "copies": [["Copy card", "MEDIR TU PRESENTE CON TU PASADO TE FRENA MÁS QUE EL PROBLEMA MISMO\n\n1. Compararte con donde estabas antes convierte cada avance en insuficiencia - lo que avanzaste hoy no se ve cuando lo mides contra lo que tenías ayer.\n2. El pasado que recuerdas es una versión editada que no incluye los problemas que tenía - idealizas lo que perdiste y eso hace más pesado lo que tienes.\n3. El punto de referencia correcto es donde estabas cuando decidiste empezar de nuevo, no donde estabas antes de caer - desde ahí se mide el progreso real.\n4. Cada vez que te comparas con tu mejor momento pasado, le restas valor a tu esfuerzo presente - el presente merece su propia métrica.\n5. Soltar la referencia del pasado te libera para ver lo que estás construyendo por lo que es - lo nuevo no tiene que parecerse a lo viejo para ser bueno."]]}, {"fmt": "F1", "n": 360, "bucket": "Operador", "title": "EL FRACASO NO TE DEFINE, PERO LO QUE HACES DESPUÉS SÍ", "body": "<ol class='lst'><li><strong>Todo el mundo fracasa, la diferencia está en lo que sigue</strong> <span class='d'>-</span> el fracaso es evento, lo que haces después es carácter.</li><li><strong>Quedarte en el fracaso es darle poder para definirte, moverte es quitarle ese poder</strong> <span class='d'>-</span> el tiempo que pasas inmóvil es tiempo que el fracaso gana.</li><li><strong>Lo que la gente recuerda no es que caíste sino cómo te levantaste</strong> <span class='d'>-</span> la historia se reescribe con lo que viene después.</li><li><strong>Usar el fracaso como excusa permanente es elegir que te defina</strong> <span class='d'>-</span> la excusa tiene fecha de vencimiento.</li><li><strong>Cada día que haces algo después de fracasar le resta peso al fracaso y le suma peso a lo que eres</strong> <span class='d'>-</span> la acción diluye lo que la inacción concentra.</li></ol>", "search": "el fracaso no te define, pero lo que haces después sí operador todo el mundo fracasa, la diferencia está en lo que sigue el fracaso es evento, lo que haces después es carácter. quedarte en el fracaso es darle poder para definirte, moverte es quitarle ese poder el tiempo que pasas inmóvil es tiempo que el fracaso gana. lo que la gente recuerda no es que caíste sino cómo te levantaste la historia se reescribe con lo que viene después. usar el fracaso como excusa permanente es elegir que te defina la excusa tiene fecha de vencimiento. cada día que haces algo después de fracasar le resta peso al fracaso y le suma peso a lo que eres la acción diluye lo que la inacción concentra.", "copies": [["Copy card", "EL FRACASO NO TE DEFINE, PERO LO QUE HACES DESPUÉS SÍ\n\n1. Todo el mundo fracasa, la diferencia está en lo que sigue - el fracaso es evento, lo que haces después es carácter.\n2. Quedarte en el fracaso es darle poder para definirte, moverte es quitarle ese poder - el tiempo que pasas inmóvil es tiempo que el fracaso gana.\n3. Lo que la gente recuerda no es que caíste sino cómo te levantaste - la historia se reescribe con lo que viene después.\n4. Usar el fracaso como excusa permanente es elegir que te defina - la excusa tiene fecha de vencimiento.\n5. Cada día que haces algo después de fracasar le resta peso al fracaso y le suma peso a lo que eres - la acción diluye lo que la inacción concentra."]]}, {"fmt": "F1", "n": 361, "bucket": "Operador", "title": "ACEPTAR QUE PERDISTE ES EL PRIMER PASO PARA DEJAR DE PERDER", "body": "<ol class='lst'><li><strong>Mientras niegues la pérdida, sigues invirtiendo en algo que ya terminó</strong> <span class='d'>-</span> la negación cuesta tiempo y energía que necesitas para reconstruir.</li><li><strong>Aceptar no es resignarse, es dejar de pelear contra lo que ya pasó para pelear por lo que sigue</strong> <span class='d'>-</span> suelta lo que fue para agarrar lo que puede ser.</li><li><strong>El que no acepta que perdió sigue gastando recursos en intentar recuperar lo irrecuperable</strong> <span class='d'>-</span> la aceptación libera recursos, la negación los consume.</li><li><strong>Decir perdí en voz alta duele una vez, negarlo duele cada día</strong> <span class='d'>-</span> el dolor de la aceptación es agudo pero breve, el de la negación es sordo y permanente.</li><li><strong>La reconstrucción empieza el día que dejas de intentar salvar lo que ya se perdió</strong> <span class='d'>-</span> no puedes construir nuevo mientras sostienes los escombros del viejo.</li></ol>", "search": "aceptar que perdiste es el primer paso para dejar de perder operador mientras niegues la pérdida, sigues invirtiendo en algo que ya terminó la negación cuesta tiempo y energía que necesitas para reconstruir. aceptar no es resignarse, es dejar de pelear contra lo que ya pasó para pelear por lo que sigue suelta lo que fue para agarrar lo que puede ser. el que no acepta que perdió sigue gastando recursos en intentar recuperar lo irrecuperable la aceptación libera recursos, la negación los consume. decir perdí en voz alta duele una vez, negarlo duele cada día el dolor de la aceptación es agudo pero breve, el de la negación es sordo y permanente. la reconstrucción empieza el día que dejas de intentar salvar lo que ya se perdió no puedes construir nuevo mientras sostienes los escombros del viejo.", "copies": [["Copy card", "ACEPTAR QUE PERDISTE ES EL PRIMER PASO PARA DEJAR DE PERDER\n\n1. Mientras niegues la pérdida, sigues invirtiendo en algo que ya terminó - la negación cuesta tiempo y energía que necesitas para reconstruir.\n2. Aceptar no es resignarse, es dejar de pelear contra lo que ya pasó para pelear por lo que sigue - suelta lo que fue para agarrar lo que puede ser.\n3. El que no acepta que perdió sigue gastando recursos en intentar recuperar lo irrecuperable - la aceptación libera recursos, la negación los consume.\n4. Decir perdí en voz alta duele una vez, negarlo duele cada día - el dolor de la aceptación es agudo pero breve, el de la negación es sordo y permanente.\n5. La reconstrucción empieza el día que dejas de intentar salvar lo que ya se perdió - no puedes construir nuevo mientras sostienes los escombros del viejo."]]}, {"fmt": "F1", "n": 362, "bucket": "Operador", "title": "NO TODO LO QUE SE ROMPE SE RECONSTRUYE IGUAL, ALGUNAS COSAS SE CONSTRUYEN MEJOR", "body": "<ol class='lst'><li><strong>La versión que construyes después de perder incluye lecciones que la original no tenía</strong> <span class='d'>-</span> lo nuevo se construye con el manual que solo el fracaso te puede dar.</li><li><strong>Lo que se reconstruye con experiencia es más resistente que lo que se construye con entusiasmo</strong> <span class='d'>-</span> la solidez viene de saber dónde están las grietas.</li><li><strong>No intentes replicar lo que tenías, intenta construir lo que necesitas ahora</strong> <span class='d'>-</span> lo viejo servía para una versión de ti que ya no existe.</li><li><strong>La reconstrucción es oportunidad de corregir los errores que estaban en la versión original</strong> <span class='d'>-</span> lo que se rompió tal vez tenía problemas que no habías visto.</li><li><strong>Lo mejor de empezar de nuevo es que puedes diseñar en lugar de improvisar</strong> <span class='d'>-</span> la segunda vez, sabes lo que quieres y lo que no.</li></ol>", "search": "no todo lo que se rompe se reconstruye igual, algunas cosas se construyen mejor operador la versión que construyes después de perder incluye lecciones que la original no tenía lo nuevo se construye con el manual que solo el fracaso te puede dar. lo que se reconstruye con experiencia es más resistente que lo que se construye con entusiasmo la solidez viene de saber dónde están las grietas. no intentes replicar lo que tenías, intenta construir lo que necesitas ahora lo viejo servía para una versión de ti que ya no existe. la reconstrucción es oportunidad de corregir los errores que estaban en la versión original lo que se rompió tal vez tenía problemas que no habías visto. lo mejor de empezar de nuevo es que puedes diseñar en lugar de improvisar la segunda vez, sabes lo que quieres y lo que no.", "copies": [["Copy card", "NO TODO LO QUE SE ROMPE SE RECONSTRUYE IGUAL, ALGUNAS COSAS SE CONSTRUYEN MEJOR\n\n1. La versión que construyes después de perder incluye lecciones que la original no tenía - lo nuevo se construye con el manual que solo el fracaso te puede dar.\n2. Lo que se reconstruye con experiencia es más resistente que lo que se construye con entusiasmo - la solidez viene de saber dónde están las grietas.\n3. No intentes replicar lo que tenías, intenta construir lo que necesitas ahora - lo viejo servía para una versión de ti que ya no existe.\n4. La reconstrucción es oportunidad de corregir los errores que estaban en la versión original - lo que se rompió tal vez tenía problemas que no habías visto.\n5. Lo mejor de empezar de nuevo es que puedes diseñar en lugar de improvisar - la segunda vez, sabes lo que quieres y lo que no."]]}, {"fmt": "F1", "n": 363, "bucket": "Operador", "title": "LA VELOCIDAD DE TU RECUPERACIÓN DEPENDE DE LO QUE SUELTES, NO DE LO QUE AGREGUES", "body": "<ol class='lst'><li><strong>Agregar esfuerzo sobre peso muerto no te acelera, te cansa más</strong> <span class='d'>-</span> primero suelta lo que sobra, después agrega lo que falta.</li><li><strong>La culpa, el resentimiento y la comparación con el pasado son los tres pesos que más frenan la reconstrucción</strong> <span class='d'>-</span> soltar esos tres cambia la velocidad sin  Cada cosa que sueltas te devuelve energía que estabas gastando en sostenerla - soltar no es perder, es liberar capacidad.\n5. La recuperación más rápida no es la que más hace sino la que menos carga - guarda esto para cuando sientas que no avanzas a pesar de intentar todo."]]}, {"fmt": "F1", "n": 364, "bucket": "Operador", "title": "TU PEOR MOMENTO NO ES TU HISTORIA COMPLETA", "body": "<ol class='lst'><li><strong>La gente que te vio caer solo vio un capítulo, no el libro entero</strong> <span class='d'>-</span> una caída no resume lo que construiste ni lo que puedes construir.</li><li><strong>Definirte por tu peor momento es darle al fracaso un poder que no merece</strong> <span class='d'>-</span> el fracaso es evento, no identidad.</li><li><strong>La persona que eras antes de caer y la persona que serás después importan más que el momento de la caída</strong> <span class='d'>-</span> el piso no es el techo.</li><li><strong>Nadie se define por un solo día, ni el mejor ni el peor</strong> <span class='d'>-</span> la historia es acumulación, no instante.</li><li><strong>Lo que haces mañana tiene más peso que lo que pasó ayer</strong> <span class='d'>-</span> el próximo capítulo se escribe con lo que decidas hoy.</li></ol>", "search": "tu peor momento no es tu historia completa operador la gente que te vio caer solo vio un capítulo, no el libro entero una caída no resume lo que construiste ni lo que puedes construir. definirte por tu peor momento es darle al fracaso un poder que no merece el fracaso es evento, no identidad. la persona que eras antes de caer y la persona que serás después importan más que el momento de la caída el piso no es el techo. nadie se define por un solo día, ni el mejor ni el peor la historia es acumulación, no instante. lo que haces mañana tiene más peso que lo que pasó ayer el próximo capítulo se escribe con lo que decidas hoy.", "copies": [["Copy card", "TU PEOR MOMENTO NO ES TU HISTORIA COMPLETA\n\n1. La gente que te vio caer solo vio un c ue lo original.</li></ol>", "search": "donde te quebraste te muestra dónde eras frágil operador lo que se rompe primero señala el punto más débil de toda la estructura la quiebra es diagnóstico, no solo daño. ignorar el punto de quiebre y reconstruir igual es preparar la próxima caída el que no corrige la debilidad la repite. la fragilidad no es defecto, es información sobre dónde reforzar saber dónde eres débil es ventaja si actúas sobre ella. cada fracaso tiene un punto exacto donde todo empezó a fallar encontrarlo te da el mapa de lo que hay que cambiar. reforzar el punto de quiebre convierte tu debilidad más grande en tu zona más resistente lo que se repara con conocimiento queda más fuerte que lo original.", "copies": [["Copy card", "DONDE TE QUEBRASTE TE MUESTRA DÓNDE ERAS FRÁGIL\n\n1. Lo que se rompe primero señala el punto más débil de toda la estructura - la quiebra es diagnóstico, no solo daño.\n2. Ignorar el punto de quiebre y reconstruir igual es preparar la próxima caída - el que no corrige la debilidad la repite.\n3. La fragilidad no es defecto, es información sobre dónde reforzar - saber dónde eres débil es ventaja si actúas sobre ella.\n4. Cada fracaso tiene un punto exacto donde todo empezó a fallar - encontrarlo te da el mapa de lo que hay que cambiar.\n5. Reforzar el punto de quiebre convierte tu debilidad más grande en tu zona más resistente - lo que se repara con conocimiento queda más fuerte que lo original."]]}, {"fmt": "F1", "n": 367, "bucket": "Operador", "title": "BAJAR TU NIVEL DE VIDA DESPUÉS DE CAER NO ES FRACASO, ES ESTRATEGIA", "body": "<ol class='lst'><li><strong>Reducir gastos voluntariamente te devuelve margen que la caída te quitó</strong> <span class='d'>-</span> el margen es lo que te permite respirar y decidir sin desesperación.</li><li><strong>Mantener un nivel de vida que ya no puedes sostener acelera la caída en lugar de frenarla</strong> <span class='d'>-</span> la apariencia cuesta el dinero que necesitas para reconstruir.< rd", "LA RUTINA ES LO QUE TE SOSTIENE CUANDO LA MOTIVACIÓN NO ESTÁ\n\n1. La motivación va y viene, la rutina se queda si la construyes - depender de la motivación es planificar con un recurso que no controlas.\n2. Los días donde menos ganas tienes son los días donde la rutina trabaja por ti - la estructura te lleva cuando la energía no te alcanza.\n3. La rutina elimina la necesidad de decidir cada día si haces algo o no - la decisión ya se tomó, solo se ejecuta.\n4. Lo que construyes con rutina avanza aunque tú sientas que no - el progreso invisible es progreso real.\n5. Construir una rutina pequeña y cumplirla todos los días produce más que los arranques de motivación que duran tres días - guarda esto para cuando sientas que no puedes moverte."]]}, {"fmt": "F1", "n": 369, "bucket": "Operador", "title": "ADMITIR RESPONSABILIDAD LIBERA MÁS DE LO QUE CREES", "body": "<ol class='lst'><li><strong>Culpar a otros te protege del dolor pero te deja sin poder para cambiar nada</strong> <span class='d'>-</span> si todo fue culpa de otro, no tienes nada que corregir y nada que mejorar.</li><li><strong>Admitir tu parte no es aceptar toda la culpa, es separar lo que controlabas de lo que no</strong> <span class='d'>-</span> la responsabilidad tiene límites y nombrarlos te da claridad.</li><li><strong>Lo que fue tu responsabilidad es lo único que puedes corregir para la próxima vez</strong> <span class='d'>-</span> lo demás está fuera de tu control y siempre lo estuvo.</li><li><strong>La persona que admite su parte recupera el control que la víctima entrega</strong> <span class='d'>-</span> responsabilidad y poder van juntos.</li><li><strong>Decir esto fue mi parte y esto es lo que voy a hacer diferente cierra el capítulo más rápido que cualquier excusa</strong> <span class='d'>-</span> la responsabilidad es la ruta más corta hacia adelante.</li></ol>", "search": "admitir responsabilidad libera más de lo que crees operador culpar a otros te protege del dolor pero te deja sin poder para cambiar nada si todo fue culpa de otro, no tienes nada que corregir y nada que mejorar. admitir tu parte no es aceptar toda la culpa, es separar lo que controlabas de lo que no la responsabilidad tiene límites y nombrarlos te da claridad. lo que fue tu responsabilidad es lo único que puedes corregir para la próxima vez lo demás está fuera de tu control y siempre lo estuvo. la persona que admite su parte recupera el control que la víctima entrega responsabilidad y poder van juntos. decir esto fue mi parte y esto es lo que voy a hacer diferente cierra el capítulo más rápido que cualquier excusa la responsabilidad es la ruta más corta hacia adelante.", "copies": [["Copy card", "ADMITIR RESPONSABILIDAD LIBERA MÁS DE LO QUE CREES\n\n1. Culpar a otros te protege del dolor pero te deja sin poder para cambiar nada - si todo fue culpa de otro, no tienes nada que corregir y nada que mejorar.\n2. Admitir tu parte no es aceptar toda la culpa, es separar lo que controlabas de lo que no - la responsabilidad tiene límites y nombrarlos te da claridad.\n3. Lo que fue tu responsabilidad es lo único que puedes corregir para la próxima vez - lo demás está fuera de tu control y siempre lo estuvo.\n4. La persona que admite su parte recupera el control que la víctima entrega - responsabilidad y poder van juntos.\n5. Decir esto fue mi parte y esto es lo que voy a hacer diferente cierra el capítulo más rápido que cualquier excusa - la responsabilidad es la ruta más corta hacia adelante."]]}, {"fmt": "F1", "n": 370, "bucket": "Operador", "title": "NO NECESITAS VOLVER A DONDE ESTABAS, NECESITAS LLEGAR A DONDE TE CONVIENE", "body": "<ol class='lst'><li><strong>El lugar donde estabas antes incluía los problemas que te llevaron a caer</strong> <span class='d'>-</span> volver ahí es volver a las condiciones que produjeron la caída.</li><li><strong>Usar tu posición anterior como meta te impide ver opciones mejores que no existían antes</strong> <span class='d'>-</span> la nostalgia cierra p ntusiasmo la prueba real es hacer lo que toca cuando no te dan ganas. los días donde menos quieres hacer algo son los que más definen tu progreso cualquiera trabaja cuando tiene energía, pocos trabajan cuando no la tienen. la disciplina no se siente bien en el momento, se siente bien cuando miras los resultados el costo se paga hoy, el beneficio llega después. hacer poco con disciplina produce más que hacer mucho con impulso el impulso desaparece, la disciplina acumula. la disciplina es decisión repetida, no don natural nadie nace disciplinado, todos lo construyen una decisión a la vez.", "copies": [["Copy card", "DISCIPLINA CUANDO NO TIENES GANAS ES LA ÚNICA QUE CUENTA\n\n1. Tener disciplina cuando estás motivado no es disciplina, es entusiasmo - la prueba real es hacer lo que toca cuando no te dan ganas.\n2. Los días donde menos quieres hacer algo son los que más definen tu progreso - cualquiera trabaja cuando tiene energía, pocos trabajan cuando no la tienen.\n3. La disciplina no se siente bien en el momento, se siente bien cuando miras los resultados - el costo se paga hoy, el beneficio llega después.\n4. Hacer poco con disciplina produce más que hacer mucho con impulso - el impulso desaparece, la disciplina acumula.\n5. La disciplina es decisión repetida, no don natural - nadie nace disciplinado, todos lo construyen una decisión a la vez."]]}, {"fmt": "F1", "n": 373, "bucket": "Operador", "title": "TU HISTORIA DE REGRESO LA ESCRIBES EN PRIVADO ANTES DE QUE ALGUIEN LA VEA", "body": "<ol class='lst'><li><strong>Lo que la gente ve cuando regresas es el resultado, no el proceso</strong> <span class='d'>-</span> nadie ve las mañanas difíciles, los meses lentos, los días sin avance.</li><li><strong>El trabajo privado es donde se construye todo lo que después parece talento o suerte</strong> <span class='d'>-</span> lo invisible es lo que sostiene lo visible.</li><li><strong>Proteger tu proceso del juicio externo te da espacio para fallar sin consecuencia pública</str
