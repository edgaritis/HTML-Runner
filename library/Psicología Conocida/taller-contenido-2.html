<style>
:root{
  --bg:#f3f2ee; --surface:#ffffff; --ink:#1b1a17; --muted:#736e65; --line:#e6e2da;

*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);

.wrap{max-width:1180px;margin:0 auto;padding:0 18px}
header.bar{position:sticky;top:0;z-index:20;background:rgba(243,242,238,.86);

.bar .wrap{padding-top:14px;padding-bottom:12px}
.brandrow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand{font-weight:700;letter-spacing:.02em;font-size:17px}
.brand b{color:var(--accent)}
.sub{color:var(--muted);font-size:13px}
.controls{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.search input{border:0;outline:0;background:transparent;width:100%;font:inherit;color:var(--ink)}
.search svg{flex:none;color:var(--muted)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;

.toggle{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none}

.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));align-items:start}

.card.done{opacity:.5}
.chead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:6px;color:#fff;text-transform:uppercase}
.p-F1{background:var(--f1)} .p-F2{background:var(--f2)} .p-F3{background:var(--f3)} .p-F4{background:var(--f4)}
.bucket{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 7px}
.idx{margin-left:auto;font-size:12px;color:#a9a297;font-variant-numeric:tabular-nums}
.markbtn{border:1px solid var(--line);background:var(--surface);border-radius:7px;
  font-size:12px;padding:4px 9px;color:var(--muted);cursor:pointer;font-weight:600}
.markbtn:hover{border-color:#d4cfc4}
.card.done .markbtn{background:var(--f1);color:#fff;border-color:var(--f1)}
.title{font-weight:800;text-transform:uppercase;letter-spacing:.02em;font-size:15.5px;line-height:1.28;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .title{-webkit-text-fill-color:initial;color:var(--muted);background:none}
.qtitle{font-weight:800;font-size:16px;line-height:1.32;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .qtitle{-webkit-text-fill-color:initial;color:var(--muted);background:none}
ol.lst,ol.pts{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px}
ol.lst li,ol.pts li{padding-left:3px}
ol.lst .d{color:#bdb6aa}
ol.pts li{line-height:1.45}
.note{font-size:12px;color:var(--muted);font-style:italic;margin:2px 0 0}
.f3 .lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--accent);margin:2px 0 4px}
.f3 .teaser{margin:0 0 10px;background:var(--accent-soft);border-radius:8px;padding:9px 11px}
.f3 p.g{margin:0 0 7px}
.prompt{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;
  white-space:pre-wrap;background:#1b1a17;color:#ece6da;border-radius:9px;padding:12px;max-height:220px;overflow:auto}
.cfoot{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.copy{flex:1;min-width:120px;border:0;border-radius:8px;padding:9px 12px;font:inherit;font-weight:700;font-size:13px;
  cursor:pointer;background:var(--accent);color:#fff;transition:.12s}
.copy.secondary{background:var(--ink)}
.copy:hover{filter:brightness(1.06)}
.copy.ok{background:var(--f1)!important}
.empty{text-align:center;color:var(--muted);padding:70px 10px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.18s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

.\n5. No esperes premio por disculparte - pedir perdón es reparar, no cobrar."]]}, {"fmt": "F1", "n": 92, "bucket": "Disciplina", "title": "POR QUÉ DEBES CUMPLIR LAS PROMESAS QUE TE HACES", "body": "<ol class='lst'><li><strong>Cada promesa rota a ti mismo te baja la confianza</strong> <span class='d'>-</span> dejas de creerte tu propia palabra.</li><li><strong>El que se falla a sí mismo se acostumbra a fallar</strong> <span class='d'>-</span> lo pequeño enseña lo grande.</li><li><strong>Cumplirte construye autoestima real</strong> <span class='d'>-</span> la seguridad nace de hacer lo que dices.</li><li><strong>Nadie te respeta si tú no te respetas</strong> <span class='d'>-</span> empieza por cumplir lo que te prometes.</li><li><strong>Las metas mueren en los &quot;mañana empiezo&quot;</strong> <span class='d'>-</span> cumplir hoy lo pequeño sostiene lo grande.</li></ol>", "search": "por qué debes cumplir las promesas que te haces disciplina cada promesa rota a ti mismo te baja la confianza dejas de creerte tu propia palabra. el que se falla a sí mismo se acostumbra a fallar lo pequeño enseña lo grande. cumplirte construye autoestima real la seguridad nace de hacer lo que dices. nadie te respeta si tú no te respetas empieza por cumplir lo que te prometes. las metas mueren en los \"mañana empiezo\" cumplir hoy lo pequeño sostiene lo grande.", "copies": [["Copy card", "POR QUÉ DEBES CUMPLIR LAS PROMESAS QUE TE HACES\n\n1. Cada promesa rota a ti mismo te baja la confianza - dejas de creerte tu propia palabra.\n2. El que se falla a sí mismo se acostumbra a fallar - lo pequeño enseña lo grande.\n3. Cumplirte construye autoestima real - la seguridad nace de hacer lo que dices.\n4. Nadie te respeta si tú no te respetas - empieza por cumplir lo que te prometes.\n5. Las metas mueren en los \"mañana empiezo\" - cumplir hoy lo pequeño sostiene lo grande."]]}, {"fmt": "F1", "n": 93, "bucket": "Mindset", "title": "LA ZONA DE CONFORT TE CUESTA MÁS DE LO QUE CREES", "body": "<ol class='lst'><li><strong>Te sientes seguro mientras te estancas</strong> <span class='d'>-</span> la comodidad de hoy es el techo de mañana.</li><li><strong>Cambias crecer por no incomodarte</strong> <span class='d'>-</span> lo conocido es cómodo aunque te haga mal.</li><li><strong>El tiempo pasa igual, avances o no</strong> <span class='d'>-</span> quedarte quieto también tiene un costo.</li><li><strong>Lo que no usas se oxida</strong> <span class='d'>-</span> habilidades, sueños y ganas se apagan sin movimiento.</li><li><strong>Te acostumbras a una vida pequeña</strong> <span class='d'>-</span> y un día confundes resignación con paz.</li></ol>", "search": "la zona de confort te cuesta más de lo que crees mindset te sientes seguro mientras te estancas la comodidad de hoy es el techo de mañana. cambias crecer por no incomodarte lo conocido es cómodo aunque te haga mal. el tiempo pasa igual, avances o no quedarte quieto también tiene un costo. lo que no usas se oxida habilidades, sueños y ganas se apagan sin movimiento. te acostumbras a una vida pequeña y un día confundes resignación con paz.", "copies": [["Copy card", "LA ZONA DE CONFORT TE CUESTA MÁS DE LO QUE CREES\n\n1. Te sientes seguro mientras te estancas - la comodidad de hoy es el techo de mañana.\n2. Cambias crecer por no incomodarte - lo conocido es cómodo aunque te haga mal.\n3. El tiempo pasa igual, avances o no - quedarte quieto también tiene un costo.\n4. Lo que no usas se oxida - habilidades, sueños y ganas se apagan sin movimiento.\n5. Te acostumbras a una vida pequeña - y un día confundes resignación con paz."]]}, {"fmt": "F1", "n": 94, "bucket": "Self-respect", "title": "QUÉ HACER CON LAS CRÍTICAS QUE RECIBES", "body": "<ol class='lst'><li><strong>Separa la crítica útil del veneno</strong> <span class='d'>-</span> una corrige, la otra solo busca herir.</li><li><strong>Mira quién te critica</strong> <span class='d'>-</span> la opinión de quien no admiras no debería pesarte tanto.</li><li><strong>No te derrumbes por una opinión</strong> <span class='d'>-</span> un comentario no define tu valor.</li><li><strong>Quédate con lo que te sirve, suelta el resto</strong> <span class='d'>-</span> aprende sin tragarte el ataque.</li><li><strong>Al que hace, lo critican</strong> <span class='d'>-</span> el que no intenta nada nunca recibe críticas.</li></ol>", "search": "qué hacer con las críticas que recibes autorrespeto separa la crítica útil del veneno una corrige, la otra solo busca herir. mira quién te critica la opinión de quien no admiras no debería pesarte tanto. no te derrumbes por una opinión un comentario no define tu valor. quédate con lo que te sirve, suelta el resto aprende sin tragarte el ataque. al que hace, lo critican el que no intenta nada nunca recibe críticas.", "copies": [["Copy card", "QUÉ HACER CON LAS CRÍTICAS QUE RECIBES\n\n1. Separa la crítica útil del veneno - una corrige, la otra solo busca herir.\n2. Mira quién te critica - la opinión de quien no admiras no debería pesarte tanto.\n3. No te derrumbes por una opinión - un comentario no define tu valor.\n4. Quédate con lo que te sirve, suelta el resto - aprende sin tragarte el ataque.\n5. Al que hace, lo critican - el que no intenta nada nunca recibe críticas."]]}, {"fmt": "F1", "n": 95, "bucket": "Awakening", "title": "DEJA DE CASTIGARTE POR TUS ERRORES", "body": "<ol class='lst'><li><strong>Equivocarte no te hace menos</strong> <span class='d'>-</span> el error es parte de aprender, no prueba de que no sirves.</li><li><strong>Repetir la culpa no arregla nada</strong> <span class='d'>-</span> sirve para corregir, no para torturarte.</li><li><strong>Trátate como tratarías a un amigo</strong> <span class='d'>-</span> no le dirías a otro lo que te dices a ti.</li><li><strong>Cargar el pasado no cambia el pasado</strong> <span class='d'>-</span> solo te impide avanzar en el presente.</li><li><strong>Perdónate para poder seguir</strong> <span class='d'>-</span> el que se castiga sin parar deja de intentar.</li></ol>", "search": "deja de castigarte por tus errores despertar equivocarte no te hace menos el error es parte de aprender, no prueba de que no sirves. repetir la culpa no arregla nada sirve para corregir, no para torturarte. trátate como tratarías a un amigo no le dirías a otro lo que te dices a ti. cargar el pasado no cambia el pasado solo te impide avanzar en el presente. perdónate para poder seguir el que se castiga sin parar deja de intentar.", "copies": [["Copy card", "DEJA DE CASTIGARTE POR TUS ERRORES\n\n1. Equivocarte no te hace menos - el error es parte de aprender, no prueba de que no sirves.\n2. Repetir la culpa no arregla nada - sirve para corregir, no para torturarte.\n3. Trátate como tratarías a un amigo - no le dirías a otro lo que te dices a ti.\n4. Cargar el pasado no cambia el pasado - solo te impide avanzar en el presente.\n5. Perdónate para poder seguir - el que se castiga sin parar deja de intentar."]]}, {"fmt": "F1", "n": 96, "bucket": "Mindset", "title": "CÓMO DISCUTE LA GENTE EMOCIONALMENTE MADURA", "body": "<ol class='lst'><li><strong>Habla del problema, no ataca a la persona</strong> <span class='d'>-</span> busca resolver, no ganar.</li><li><strong>No saca el pasado en cada pelea</strong> <span class='d'>-</span> se queda en lo de ahora, no junta rencores.</li><li><strong>Sabe pedir una pausa</strong> <span class='d'>-</span> se aleja a calmarse antes de decir algo de lo que se arrepienta.</li><li><strong>Escucha para entender, no para responder</strong> <span class='d'>-</span> deja hablar sin interrumpir.</li><li><strong>Cede cuando se equivoca</strong> <span class='d'>-</span> reconocer un error no le quita fuerza, le da respeto.</li></ol>", "search": "cómo discute la gente emocionalmente madura mindset habla del problema, no ataca a la persona busca resolver, no ganar. no saca el pasado en cada pelea se queda en lo de ahora, no junta rencores. sabe pedir una pausa se aleja a calmarse antes de decir algo de lo que se arrepienta. escucha para entender, no para responder deja hablar sin interrumpir. cede cuando se equivoca reconocer un error no le quita fuerza, le da respeto.", "copies": [["Copy card", "CÓMO DISCUTE LA GENTE EMOCIONALMENTE MADURA\n\n1. Habla del problema, no ataca a la persona - busca resolver, no ganar.\n2. No saca el pasado en cada pelea - se queda en lo de ahora, no junta rencores.\n3. Sabe pedir una pausa - se aleja a calmarse antes de decir algo de lo que se arrepienta.\n4. Escucha para entender, no para responder - deja hablar sin interrumpir.\n5. Cede cuando se equivoca - reconocer un error no le quita fuerza, le da respeto."]]}, {"fmt": "F1", "n": 97, "bucket": "Defense", "title": "CUÁNDO HACERLE CASO A TU INTUICIÓN SOBRE ALGUIEN", "body": "<ol class='lst'><li><strong>Cuando algo no te cuadra sin saber por qué</strong> <span class='d'>-</span> tu instinto nota lo que la razón no explica.</li><li><strong>Cuando sus palabras no coinciden con sus actos</strong> <span class='d'>-</span> tu malestar te avisa antes que las pruebas.</li><li><strong>Cuando te sientes en alerta a su lado</strong> <span class='d'>-</span> el cuerpo detecta el peligro antes que la mente.</li><li><strong>Cuando tienes que convencerte de que es buena persona</strong> <span class='d'>-</span> lo bueno no necesita que lo justifiques.</li><li><strong>Cuando la primera impresión te dijo algo</strong> <span class='d'>-</span> muchas veces el primer instinto tenía razón.</li></ol>", "search": "cuándo hacerle caso a tu intuición sobre alguien defensa cuando algo no te cuadra sin saber por qué tu instinto nota lo que la razón no explica. cuando sus palabras no coinciden con sus actos tu malestar te avisa antes que las pruebas. cuando te sientes en alerta a su lado el cuerpo detecta el peligro antes que la mente. cuando tienes que convencerte de que es buena persona lo bueno no necesita que lo justifiques. cuando la primera impresión te dijo algo muchas veces el primer instinto tenía razón.", "copies": [["Copy card", "CUÁNDO HACERLE CASO A TU INTUICIÓN SOBRE ALGUIEN\n\n1. Cuando algo no te cuadra sin saber por qué - tu instinto nota lo que la razón no explica.\n2. Cuando sus palabras no coinciden con sus actos - tu malestar te avisa antes que las pruebas.\n3. Cuando te sientes en alerta a su lado - el cuerpo detecta el peligro antes que la mente.\n4. Cuando tienes que convencerte de que es buena persona - lo bueno no necesita que lo justifiques.\n5. Cuando la primera impresión te dijo algo - muchas veces el primer instinto tenía razón."]]}, {"fmt": "F1", "n": 98, "bucket": "Defense", "title": "ANTES DE AMAR A ALGUIEN MÁS QUE A TI MISMO, LEE ESTO", "body": "<ol class='lst'><li><strong>El que se ama de menos acepta cualquier trato</strong> <span class='d'>-</span> sin amor propio, ruegas migajas.</li><li><strong>Darlo todo y olvidarte de ti no es amor, es vacío</strong> <span class='d'>-</span> te pierdes intentando llenar al otro.</li><li><strong>El que se anula por amor termina solo y cansado</strong> <span class='d'>-</span> nadie cuida al que no se cuida.</li><li><strong>No puedes dar lo que no tienes</strong> <span class='d'>-</span> quiérete primero para querer bien.</li><li><strong>Amar no es desaparecer</strong> <span class='d'>-</span> el amor sano suma dos, no borra a uno.</li></ol>", "search": "antes de amar a alguien más que a ti mismo, lee esto defensa el que se ama de menos acepta cualquier trato sin amor propio, ruegas migajas. darlo todo y olvidarte de ti no es amor, es vacío te pierdes intentando llenar al otro. el que se anula por amor termina solo y cansado nadie cuida al que no se cuida. no puedes dar lo que no tienes quiérete primero para querer bien. amar no es desaparecer el amor sano suma dos, no borra a uno.", "copies": [["Copy card", "ANTES DE AMAR A ALGUIEN MÁS QUE A TI MISMO, LEE ESTO\n\n1. El que se ama de menos acepta cualquier trato - sin amor propio, ruegas migajas.\n2. Darlo todo y olvidarte de ti no es amor, es vacío - te pierdes intentando llenar al otro.\n3. El que se anula por amor termina solo y cansado - nadie cuida al que no se cuida.\n4. No puedes dar lo que no tienes - quiérete primero para querer bien.\n5. Amar no es desaparecer - el amor sano suma dos, no borra a uno."]]}, {"fmt": "F1", "n": 99, "bucket": "Self-respect", "title": "LO QUE GANAS CUANDO DICES LO QUE PIENSAS", "body": "<ol class='lst'><li><strong>Recuperas tu voz</strong> <span class='d'>-</span> cada vez que te callabas, te encogías un poco.</li><li><strong>La gente te respeta más</strong> <span class='d'>-</span> el que se hace oír deja de ser pisado.</li><li><strong>Sueltas el rencor que guardabas</strong> <span class='d'>-</span> lo que no dices se pudre por dentro.</li><li><strong>Atraes a quien sí te valora</strong> <span class='d'>-</span> mostrar quién eres filtra a los demás.</li><li><strong>Vives más libre</strong> <span class='d'>-</span> no cargar con lo que callaste es un alivio enorme.</li></ol>", "search": "lo que ganas cuando dices lo que piensas autorrespeto recuperas tu voz cada vez que te callabas, te encogías un poco. la gente te respeta más el que se hace oír deja de ser pisado. sueltas el rencor que guardabas lo que no dices se pudre por dentro. atraes a quien sí te valora mostrar quién eres filtra a los demás. vives más libre no cargar con lo que callaste es un alivio enorme.", "copies": [["Copy card", "LO QUE GANAS CUANDO DICES LO QUE PIENSAS\n\n1. Recuperas tu voz - cada vez que te callabas, te encogías un poco.\n2. La gente te respeta más - el que se hace oír deja de ser pisado.\n3. Sueltas el rencor que guardabas - lo que no dices se pudre por dentro.\n4. Atraes a quien sí te valora - mostrar quién eres filtra a los demás.\n5. Vives más libre - no cargar con lo que callaste es un alivio enorme."]]}, {"fmt": "F1", "n": 100, "bucket": "Hard truths", "title": "VERDADES DURAS QUE, CUANDO LAS ACEPTAS, TE LIBERAN", "body": "<ol class='lst'><li><strong>Nadie va a venir a salvarte</strong> <span class='d'>-</span> tu vida es tu responsabilidad, y ahí está tu poder.</li><li><strong>No le vas a caer bien a todos</strong> <span class='d'>-</span> y está bien, no naciste para gustar a todos.</li><li><strong>El tiempo perdido no vuelve</strong> <span class='d'>-</span> por eso cada día cuenta más de lo que crees.</li><li><strong>La gente muestra quién es; créele</strong> <span class='d'>-</span> deja de esperar a la versión que imaginabas.</li><li><strong>Tu paz vale más que tener la razón</strong> <span class='d'>-</span> soltar la pelea muchas veces es ganar.</li></ol>", "search": "verdades duras que, cuando las aceptas, te liberan verdades amargas nadie va a venir a salvarte tu vida es tu responsabilidad, y ahí está tu poder. no le vas a caer bien a todos y está bien, no naciste para gustar a todos. el tiempo perdido no vuelve por eso cada día cuenta más de lo que crees. la gente muestra quién es; créele deja de esperar a la versión que imaginabas. tu paz vale más que tener la razón soltar la pelea muchas veces es ganar.", "copies": [["Copy card", "VERDADES DURAS QUE, CUANDO LAS ACEPTAS, TE LIBERAN\n\n1. Nadie va a venir a salvarte - tu vida es tu responsabilidad, y ahí está tu poder.\n2. No le vas a caer bien a todos - y está bien, no naciste para gustar a todos.\n3. El tiempo perdido no vuelve - por eso cada día cuenta más de lo que crees.\n4. La gente muestra quién es; créele - deja de esperar a la versión que imaginabas.\n5. Tu paz vale más que tener la razón - soltar la pelea muchas veces es ganar."]]}, {"fmt": "F2", "n": 51, "bucket": "", "title": "POR QUÉ ENFRENTAR TUS MIEDOS TE CAMBIA LA VIDA", "body": "<ol class='pts'><li><strong>El miedo crece cuando lo evitas.</strong> Cada vez que huyes de algo que te asusta, ese miedo se hace más grande en tu cabeza. Lo que no enfrentas, manda sobre ti. En cambio, cuando lo miras de frente, casi siempre descubres que no era tan grande como lo pintabas. Evitar calma un rato, pero alimenta el miedo a largo plazo.</li><li><strong>Del otro lado del miedo casi siempre está lo que quieres.</strong> Lo que más deseas suele estar justo detrás de lo que más te asusta: hablar, intentar, empezar, soltar. El miedo cuida la puerta de tu crecimiento. Por eso, cuando algo te da miedo pero sabes que es bueno para ti, esa es la señal de que hay que hacerlo.</li><li><strong>Cada miedo que enfrentas te hace más fuerte.</strong> No necesitas vencer todos tus miedos de golpe. Cada paso que das contra el miedo te da pruebas de que puedes, y esa confianza se acumula. El que enfrenta cosas pequeñas hoy, mañana enfrenta las grandes. La valentía no es no tener miedo, es avanzar a pesar de él.</li></ol>", "search": "por qué enfrentar tus miedos te cambia la vida el miedo crece cuando lo evitas. cada vez que huyes de algo que te asusta, ese miedo se hace más grande en tu cabeza. lo que no enfrentas, manda sobre ti. en cambio, cuando lo miras de frente, casi siempre descubres que no era tan grande como lo pintabas. evitar calma un rato, pero alimenta el miedo a largo plazo. del otro lado del miedo casi siempre está lo que quieres. lo que más deseas suele estar justo detrás de lo que más te asusta: hablar, intentar, empezar, soltar. el miedo cuida la puerta de tu crecimiento. por eso, cuando algo te da miedo pero sabes que es bueno para ti, esa es la señal de que hay que hacerlo. cada miedo que enfrentas te hace más fuerte. no necesitas vencer todos tus miedos de golpe. cada paso que das contra el miedo te da pruebas de que puedes, y esa confianza se acumula. el que enfrenta cosas pequeñas hoy, mañana enfrenta las grandes. la valentía no es no tener miedo, es avanzar a pesar de él.", "copies": [["Copy card", "POR QUÉ ENFRENTAR TUS MIEDOS TE CAMBIA LA VIDA\n\n1. El miedo crece cuando lo evitas. Cada vez que huyes de algo que te asusta, ese miedo se hace más grande en tu cabeza. Lo que no enfrentas, manda sobre ti. En cambio, cuando lo miras de frente, casi siempre descubres que no era tan grande como lo pintabas. Evitar calma un rato, pero alimenta el miedo a largo plazo.\n\n2. Del otro lado del miedo casi siempre está lo que quieres. Lo que más deseas suele estar justo detrás de lo que más te asusta: hablar, intentar, empezar, soltar. El miedo cuida la puerta de tu crecimiento. Por eso, cuando algo te da miedo pero sabes que es bueno para ti, esa es la señal de que hay que hacerlo.\n\n3. Cada miedo que enfrentas te hace más fuerte. No necesitas vencer todos tus miedos de golpe. Cada paso que das contra el miedo te da pruebas de que puedes, y esa confianza se acumula. El que enfrenta cosas pequeñas hoy, mañana enfrenta las grandes. La valentía no es no tener miedo, es avanzar a pesar de él."]]}, {"fmt": "F2", "n": 52, "bucket": "", "title": "3 MENTIRAS QUE TE DICES PARA NO CAMBIAR", "body": "<ol class='pts'><li><strong>&quot;Es que yo soy así.&quot;</strong> Lo usas como excusa para no esforzarte en mejorar. Pero la mayoría de lo que llamas &quot;ser así&quot; es solo costumbre, y las costumbres se cambian. Decir &quot;yo soy así&quot; es cerrar la puerta antes de intentar. No naciste terminado; lo que repites te formó, y lo que decidas repetir te puede formar distinto.</li><li><strong>&quot;Cuando tenga tiempo, lo hago.&quot;</strong> El tiempo casi nunca llega solo; se hace. Si algo te importa de verdad, le sacas el rato; si no, siempre habrá una excusa. &quot;Cuando tenga tiempo&quot; suele ser una forma amable de decir &quot;no es prioridad&quot;. Sé honesto: no es que no tengas tiempo, es que no lo has puesto primero.</li><li><strong>&quot;No es el momento.&quot;</strong> Esperas una señal perfecta que nunca llega. Siempre faltará algo: dinero, ánimo, seguridad. El momento ideal es un invento de la mente para no arriesgarse. Casi todo lo bueno empezó en un mal momento, con miedo y sin garantías. El mejor momento para empezar casi siempre es este, aunque no se sienta así.</li></ol>", "search": "3 mentiras que te dices para no cambiar \"es que yo soy así.\" lo usas
