o fue perfecto. Me llenaba de halagos, me trataba como a nadie, me prometía el mundo. Yo estaba encantado, sentía que había encontrado algo único. No me di cuenta de que iba demasiado rápido.\n\nPoco a poco empezaron los cambios. Críticas suaves a mis amigos, celos disfrazados de amor, comentarios que me alejaban de mi familia. Sin notarlo, me fui quedando solo, dependiendo solo de esa persona. Y su trato pasaba de cálido a frío sin razón, y yo me esforzaba por recuperar al que era dulce.\n\nTarde entendí que todo eso era control, no amor. El exceso del principio, el aislamiento, el premio y el castigo. Una trampa para que dependiera de él.\n\nEl cariño real no te apura, no te aísla ni te confunde. Si alguien te ama demasiado y demasiado pronto, y empieza a alejarte de los tuyos, presta atención. A veces eso no es amor, es una jaula bonita."]]}, {"fmt": "F3", "n": 68, "bucket": "", "title": "ME DI CUENTA DE QUE MI PEOR ENEMIGO ERA YO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Buscaba culpables afuera de por qué no avanzaba. El verdadero obstáculo era yo mismo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Por años culpé a todo de por qué mi vida no avanzaba. A la suerte, a la gente, al momento. Estaba seguro de que el problema venía de afuera. Hasta que, mirando con honestidad, vi la verdad.</p><p class='g'>El que me frenaba era yo. Postergaba lo que me daba miedo y lo llamaba pereza. Me conformaba y le decía madurez. Me rodeaba de gente que no me exigía. Y cada vez que avanzaba un poco, me rendía justo antes de ver el fruto.</p><p class='g'>No era falta de oportunidades. Era yo saboteándome sin darme cuenta, una y otra vez, de formas que no veía.</p><p class='g'>Aceptarlo fue duro, pero también liberador. Porque si el obstáculo era yo, entonces la solución también estaba en mí. Empecé a notar mis propios sabotajes y a frenarlos. A veces el primer enemigo a vencer no está afuera; es LLO ME COSTÓ A LA GENTE QUE QUERÍA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Por no ceder, por querer tener siempre la razón, perdí relaciones que valían más que mi ego.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Fui orgulloso durante mucho tiempo. No pedía perdón, no daba el primer paso, no aceptaba cuando me equivocaba. Para mí, ceder era perder, y prefería tener la razón antes que arreglar las cosas.</p><p class='g'>Ese orgullo me fue costando caro. Discusiones que se podían cerrar con una disculpa se volvieron silencios de meses. Amistades y vínculos que valían mucho se rompieron porque ninguno de los dos quería ceder, y yo menos.</p><p class='g'>Con el tiempo miré atrás y vi a toda la gente que perdí por no tragarme el orgullo a tiempo. Por ganar discusiones que nadie recuerda, perdí personas que sí importaban.</p><p class='g'>Aprendí que pedir perdón no te hace débil, y que ceder a veces es de los más fuertes. El orgullo te da la razón y te quita a la gente. Hoy elijo conservar a las personas antes que ganar una pelea.</p></div>", "search": "mi orgullo me costó a la gente que quería por no ceder, por querer tener siempre la razón, perdí relaciones que valían más que mi ego. fui orgulloso durante mucho tiempo. no pedía perdón, no daba el primer paso, no aceptaba cuando me equivocaba. para mí, ceder era perder, y prefería tener la razón antes que arreglar las cosas.\n\nese orgullo me fue costando caro. discusiones que se podían cerrar con una disculpa se volvieron silencios de meses. amistades y vínculos que valían mucho se rompieron porque ninguno de los dos quería ceder, y yo menos.\n\ncon el tiempo miré atrás y vi a toda la gente que perdí por no tragarme el orgullo a tiempo. por ganar discusiones que nadie recuerda, perdí personas que sí importaban.\n\naprendí que pedir perdón no te hace débil, y que ceder a veces es de los más fuertes. el orgullo te da la razón y te quita a la gente. hoy elijo conservar a las personas antes que ganar una pelea.", "copies": [["Copy teaser", "Por no ceder, por querer tener siempre la razón, perdí relaciones que valían más que mi ego."], ["Copy script", "Fui orgulloso durante mucho tiempo. No pedía perdón, no daba el primer paso, no aceptaba cuando me equivocaba. Para mí, ceder era perder, y prefería tener la razón antes que arreglar las cosas.\n\nEse orgullo me fue costando caro. Discusiones que se podían cerrar con una disculpa se volvieron silencios de meses. Amistades y vínculos que valían mucho se rompieron porque ninguno de los dos quería ceder, y yo menos.\n\nCon el tiempo miré atrás y vi a toda la gente que perdí por no tragarme el orgullo a tiempo. Por ganar discusiones que nadie recuerda, perdí personas que sí importaban.\n\nAprendí que pedir perdón no te hace débil, y que ceder a veces es de los más fuertes. El orgullo te da la razón y te quita a la gente. Hoy elijo conservar a las personas antes que ganar una pelea."]]}, {"fmt": "F3", "n": 70, "bucket": "", "title": "APRENDÍ A DISTINGUIR LA LEALTAD DE LA CONVENIENCIA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Creía que tenía mucha gente leal. Cuando dejé de servirles, descubrí quién lo era de verdad.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Por años confundí cercanía con lealtad. Tenía mucha gente alrededor, que me buscaba, que estaba en mis buenos momentos. Pensaba que todos eran leales.</p><p class='g'>Pero cuando vinieron las épocas difíciles, cuando dejé de tener algo que ofrecer, la mayoría desapareció. Los que en la fiesta sobraban, en la caída no estaban. Ahí entendí la diferencia entre quien te es leal y quien solo está por conveniencia.</p><p class='g'>El leal me defendía cuando no estaba, se alegraba de mis logros sin envidia, aparecía en lo difícil cuando no había nada que ganar. Esos fueron poquísimos. El resto solo estaba mientras les se contaba de verdad. La lealtad no se mide en lo fácil, sino en lo difícil. Quédate con los pocos que están cuando no tienes nada que darles; esos son los reales."]]}, {"fmt": "F3", "n": 71, "bucket": "", "title": "POR SER DEMASIADO BUENO, ME PASARON POR ENCIMA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Ayudaba a todos, decía que sí a todo, perdonaba siempre. Aprendí que la bondad sin límites invita al abuso.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo era el bueno. El que ayudaba a todos, el que nunca decía que no, el que perdonaba una y otra vez. Creía que así era una buena persona, y que la gente lo valoraría.</p><p class='g'>Pero pasó lo contrario. Mientras más daba, más se aprovechaban. Me cargaban sus problemas, sus tareas, sus pedidos. Confundían mi bondad con debilidad. Y como nunca ponía límites ni había consecuencias, repetían el abuso sin pena.</p><p class='g'>Un día me cansé de que todos se aprovecharan. Entendí que ser bueno no significa dejar que te pisen. Que se puede ser amable y firme a la vez.</p><p class='g'>Empecé a decir que no, a poner límites, a dejar de perdonar lo imperdonable. Y, curiosamente, me empezaron a respetar más. La bondad sin límites atrae abusadores. La bondad con carácter, en cambio, se hace respetar. Ser bueno no es ser fácil de usar.</p></div>", "search": "por ser demasiado bueno, me pasaron por encima ayudaba a todos, decía que sí a todo, perdonaba siempre. aprendí que la bondad sin límites invita al abuso. yo era el bueno. el que ayudaba a todos, el que nunca decía que no, el que perdonaba una y otra vez. creía que así era una buena persona, y que la gente lo valoraría.\n\npero pasó lo contrario. mientras más daba, más se aprovechaban. me cargaban sus problemas, sus tareas, sus pedidos. confundían mi bondad con debilidad. y como nunca ponía límites ni había consecuencias, repetían el abuso sin pena.\n\nun día me cansé de que todos se aprovecharan. entendí que ser bueno no significa dejar que te pisen. que se puede ser amable y firme a la vez.\n\nempecé a decir que no, a poner límites, a dejar de perdonar lo imperdonable. y, curiosamente, me empezaron a respetar más. la bondad sin límites atrae abusadores. la bondad con carácter, en cambio, se hace respetar. ser bueno no es ser fácil de usar.", "copies": [["Copy teaser", "Ayudaba a todos, decía que sí a todo, perdonaba siempre. Aprendí que la bondad sin límites invita al abuso."], ["Copy script", "Yo era el bueno. El que ayudaba a todos, el que nunca decía que no, el que perdonaba una y otra vez. Creía que así era una buena persona, y que la gente lo valoraría.\n\nPero pasó lo contrario. Mientras más daba, más se aprovechaban. Me cargaban sus problemas, sus tareas, sus pedidos. Confundían mi bondad con debilidad. Y como nunca ponía límites ni había consecuencias, repetían el abuso sin pena.\n\nUn día me cansé de que todos se aprovecharan. Entendí que ser bueno no significa dejar que te pisen. Que se puede ser amable y firme a la vez.\n\nEmpecé a decir que no, a poner límites, a dejar de perdonar lo imperdonable. Y, curiosamente, me empezaron a respetar más. La bondad sin límites atrae abusadores. La bondad con carácter, en cambio, se hace respetar. Ser bueno no es ser fácil de usar."]]}, {"fmt": "F3", "n": 72, "bucket": "", "title": "ENTENDÍ TARDE LOS JUEGOS DE PODER EN EL TRABAJO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Creía que con trabajar bien bastaba. Aprendí que en toda oficina hay juegos que también debes saber jugar.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Llegué al mundo del trabajo creyendo que con esforzarme y hacer bien mi parte bastaba. Pensaba que el mérito hablaría solo. Tardé en darme cuenta de lo ingenuo que era.</p><p class='g'>Vi cómo otros se llevaban el crédito de lo que yo hacía. Cómo guardaban información para tener ventaja. Cómo te sonreían de frente y te jugaban en contra por detrás. Mientras yo solo trabajaba callado, otros movían piezas.</p><p class='g'>No se trataba de volverme como ellos, pero sí de despertar. Empecé a dejar registro de lo que hacía, a mostrar mi trabajo, a cuidar con quién me desahogaba, a no creerme cada sonrisa.</p><p class='g'>Aprendí que en el trabajo, además de hacer bien tu tarea, hay que saber moverse. No para pisar a nadie, sino para que no te pisen. Ser bueno en lo tuyo no basta si no sabes protegerte de los juegos que de todos modos van a existir.</p></div>", "search": "entendí tarde los juegos de poder en el trabajo creía que con trabajar bien bastaba. aprendí que en toda oficina hay juegos que también debes saber jugar. llegué al mundo del trabajo creyendo que con esforzarme y hacer bien mi parte bastaba. pensaba que el mérito hablaría solo. tardé en darme cuenta de lo ingenuo que era.\n\nvi cómo otros se llevaban el crédito de lo que yo hacía. cómo guardaban información para tener ventaja. cómo te sonreían de frente y te jugaban en contra por detrás. mientras yo solo trabajaba callado, otros movían piezas.\n\nno se trataba de volverme como ellos, pero sí de despertar. empecé a dejar registro de lo que hacía, a mostrar mi trabajo, a cuidar con quién me desahogaba, a no creerme cada sonrisa.\n\naprendí que en el trabajo, además de hacer bien tu tarea, hay que saber moverse. no para pisar a nadie, sino para que no te pisen. ser bueno en lo tuyo no basta si no sabes protegerte de los juegos que de todos modos van a existir.", "copies": [["Copy teaser", "Creía que con trabajar bien bastaba. Aprendí que en toda oficina hay juegos que también debes saber jugar."], ["Copy script", "Llegué al mundo del trabajo creyendo que con esforzarme y hacer bien mi parte bastaba. Pensaba que el mérito hablaría solo. Tardé en darme cuenta de lo ingenuo que era.\n\nVi cómo otros se llevaban el crédito de lo que yo hacía. Cómo guardaban información para tener ventaja. Cómo te sonreían de frente y te jugaban en contra por detrás. Mientras yo solo trabajaba callado, otros movían piezas.\n\nNo se trataba de volverme como ellos, pero sí de despertar. Empecé a dejar registro de lo que hacía, a mostrar mi trabajo, a cuidar con quién me desahogaba, a no creerme cada sonrisa.\n\nAprendí que en el trabajo, además de hacer bien tu tarea, hay que saber moverse. No para pisar a nadie, sino para que no te pisen. Ser bueno en lo tuyo no basta si no sabes protegerte de los juegos que de todos modos van a existir."]]}, {"fmt": "F3", "n": 73, "bucket": "", "title": "DEJÉ DE BUSCAR REVANCHA Y EMPECÉ A VIVIR BIEN", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Quería que quien me hizo daño pagara. Entendí que mi mejor revancha era simplemente vivir bien.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Cuando alguien me hizo daño, durante un tiempo viví pensando en la revancha. Imaginaba cómo cobrársela, esperaba el momento, alimentaba el rencor. Esa rabia me consumía por dentro.</p><p class='g'>Un día me di cuenta de algo. Mientras yo gastaba mi energía odiando, esa persona vivía tranquila, sin pagar renta en mi cabeza. Mi rencor no le hacía nada a él; solo me envenenaba a mí.</p><p class='g'>Entonces cambié de estrategia. Dejé de mirar hacia él y empecé a mirar hacia mí. Puse esa energía en mejorar mi vida, en avanzar, en estar bien. Y, sin proponérmelo, esa fue la mejor respuesta.</p><p class='g'>Porque nada incomoda más al que te quería abajo que verte arriba. No tuve que cobrarle nada; el tiempo y mi propia vida hablaron por mí. La mejor revancha no es la venganza, es vivir tan bien que ya no te importe lo que te hicieron.</p></div>", "search": "dejé de buscar revancha y empecé a vivir bien quería que quien me hizo daño pagara. entendí que mi mejor revancha era simplemente vivir bien. cuando alguien me hizo daño, durante un tiempo viví pensando en la revancha. imaginaba cómo cobrársela, esperaba el momento, alimentaba el rencor. esa rabia me consumía por dentro.\n\nun día me di cuenta de algo. mientras yo gastaba mi energía odiando, esa persona vivía tranquila, sin pagar renta en mi cabeza. mi rencor no le hacía nada a él; solo me envenenaba a mí.\n\nentonces cambié de estrategia. dejé de mirar hacia él y empecé a mirar hacia mí. puse esa energía en mejorar mi vida, en avanzar, en estar bien. y, sin proponérmelo, esa fue la mejor respuesta.\n\nporque nada incomoda más al que te quería abajo que verte arriba. no tuve que cobrarle nada; el tiempo y mi propia vida hablaron por mí. la mejor revancha no es la venganza, es vivir tan bien que ya no te importe lo que te hicieron.", "copies": [["Copy teaser", "Quería que quien me hizo daño pagara. Entendí que mi mejor revancha era simplemente vivir bien."], ["Copy script", "Cuando alguien me hizo daño, durante un tiempo viví pensando en la revancha. Imaginaba cómo cobrársela, esperaba el momento, alimentaba el rencor. Esa rabia me consumía por dentro.\n\nUn día me di cuenta de algo. Mientras yo gastaba mi energía odiando, esa persona vivía tranquila, sin pagar renta en mi cabeza. Mi rencor no le hacía nada a él; solo me envenenaba a mí.\n\nEntonces cambié de estrategia. Dejé de mirar hacia él y empecé a mirar hacia mí. Puse esa energía en mejorar mi vida, en avanzar, en estar bien. Y, sin proponérmelo, esa fue la mejor respuesta.\n\nPorque nada incomoda más al que te quería abajo que verte arriba. No tuve que cobrarle nada; el tiempo y mi propia vida hablaron por mí. La mejor revancha no es la venganza, es vivir tan bien que ya no te importe lo que te hicieron."]]}, {"fmt": "F3", "n": 74, "bucket": "", "title": "APRENDÍ QUE NO TODO MERECE UNA SEGUNDA OPORTUNIDAD", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Daba segundas oportunidades a todos. Aprendí que algunas solo sirven para que te vuelvan a fallar.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo era de los que daban segundas oportunidades a todo el mundo. Creía que siempre había que perdonar, que la gente cambiaba, que merecían otra chance. Y muchas veces, esa generosidad se me volvió en contra.</p><p class='g'>Porque hay gente que no falla por error, sino sabiendo el daño que hace. Gente que solo se disculpa cuando la descubren, que promete cambiar y repite lo mismo. A esos, mi segunda oportunidad solo les daba permiso para volver a lastimarme.</p><p class='g'>Con el tiempo aprendí a distinguir. Una segunda oportunidad se le da a quien se equivocó de verdad y muestra con hechos que cambió. No a quien usa tu perdón como vía libre para repetir.</p><p class='g'>Perdonar no me obliga a volver a ponerme donde me dañaron. A veces, la decisión más sana no es dar otra chance, sino cerrar la puerta. No todo merece una segunda oportunidad, y está bien protegerte de quien ya te mostró quién es.</p></div>", "search": "aprendí que no todo merece una segunda oportunidad daba segundas oportunidades a todos. aprendí que algunas solo sirven para que te vuelvan a fallar. yo era de los que daban segundas oportunidades a todo el mundo. creía que siempre había que perdonar, que la gente cambiaba, que merecían otra chance. y muchas veces, esa generosidad se me volvió en contra.\n\nporque hay gente que no falla por error, sino sabiendo el daño que hace. gente que solo se disculpa cuando la descubren, que promete cambiar y repite lo mismo. a esos, mi segunda oportunidad solo les daba permiso para volver a lastimarme.\n\ncon el tiempo aprendí a distinguir. una segunda oportunidad se le da a quien se equivocó de verdad y muestra con hechos que cambió. no a quien usa tu perdón como vía libre para repetir.\n\nperdonar no me obliga a volver a ponerme donde me dañaron. a veces, la decisión más sana no es dar otra chance, sino cerrar la puerta. no todo merece una segunda oportunidad, y está bien protegerte de quien ya te mostró quién es.", "copies": [["Copy teaser", "Daba segundas oportunidades a todos. Aprendí que algunas solo sirven para que te vuelvan a fallar."], ["Copy script", "Yo era de los que daban segundas oportunidades a todo el mundo. Creía que siempre había que perdonar, que la gente cambiaba, que merecían otra chance. Y muchas veces, esa generosidad se me volvió en contra.\n\nPorque hay gente que no falla por error, sino sabiendo el daño que hace. Gente que solo se disculpa cuando la descubren, que promete cambiar y repite lo mismo. A esos, mi segunda oportunidad solo les daba permiso para volver a lastimarme.\n\nCon el tiempo aprendí a distinguir. Una segunda oportunidad se le da a quien se equivocó de verdad y muestra con hechos que cambió. No a quien usa tu perdón como vía libre para repetir.\n\nPerdonar no me obliga a volver a ponerme donde me dañaron. A veces, la decisión más sana no es dar otra chance, sino cerrar la puerta. No todo merece una segunda oportunidad, y está bien protegerte de quien ya te mostró quién es."]]}, {"fmt": "F3", "n": 75, "bucket": "", "title": "TUVE QUE PONERLE LÍMITES A MI PROPIA FAMILIA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Aguantaba de mi familia lo que no aceptaría de nadie. Poner límites con ellos me costó, pero me dio paz.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años aguanté de mi familia cosas que jamás habría aceptado de otra persona. Control, comentarios que dolían, decisiones que querían tomar por mí. Lo aguantaba porque &quot;es la familia&quot;, porque ponerles un límite me hacía sentir mal hijo o mal hermano.</p><p class='g'>Pero esa falta de límites me iba gastando. Vivía haciendo lo que esperaban, callando para no causar problemas, cediendo siempre. Mi paz dependía de tenerlos contentos.</p><p class='g'>Un día entendí que querer a mi familia no me obligaba a aceptarlo todo. Que escuchar sus consejos no era obedecer sus órdenes. Que el cariño no les daba d ue hay que dejarlo ir.", "copies": [["Copy teaser", "Me enseñaron que rendirse era de débiles. Aprendí que insistir en lo que no es para ti también es una trampa."], ["Copy script", "Crecí creyendo que insistir siempre era lo correcto. Que el que no se rinde, gana. Así que insistía en todo: en relaciones de un solo lado, en proyectos que no daban, en gente que no me elegía. Insistir me parecía valentía.\n\nPero me agotaba en cosas que no respondían. Daba todo y recibía nada. Rogaba un lugar donde no me querían. Y entre más insistía, peor me sentía, porque confundía aguantar con luchar.\n\nCon el tiempo entendí que no todo merece insistencia. Que hay cosas que se sostienen de un solo lado y se caen igual. Que no se ruega un lugar en la vida de nadie.\n\nAprendí a notar la diferencia. Cuando soltar algo me daba paz en vez de tristeza, esa calma era la respuesta. Soltar no siempre es rendirse; a veces es lo más sabio que puedes hacer. Insistir en lo que no es para ti no es fuerza, es miedo a aceptar que hay que dejarlo ir."]]}, {"fmt": "F3", "n": 80, "bucket": "", "title": "APRENDÍ A ESCUCHAR LO QUE LA GENTE NO DICE CON PALABRAS", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Esperaba que la gente me explicara con palabras lo que ya me decía con hechos. Aprender a leer los actos me ahorró mucho.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Por mucho tiempo me quedé esperando que la gente me dijera las cosas de frente. Esperaba la explicación, la conversación, las palabras. Y mientras esperaba, ignoraba lo que sus actos ya me estaban gritando.</p><p class='g'>Si alguien no me hacía tiempo, yo buscaba excusas en vez de entender que no era prioridad. Si alguien me evitaba, esperaba una explicación en vez de aceptar que ya había decidido. Si alguien solo aparecía cuando necesitaba, yo lo justificaba.</p><p class='g'>Un día entendí que la gente te dice quién eres para ella sin usar palabras. Co ar.</p><p class='g'>Y entendí algo que me liberó: al que hace, lo critican. El que no intenta nada nunca recibe críticas, porque no se expone. Si me critican, en parte es porque estoy haciendo algo. Hoy me quedo con lo que me sirve para mejorar y suelto el resto. Una opinión ya no define mi valor.</p></div>", "search": "aprendí a recibir críticas sin derrumbarme una crítica me arruinaba el día. aprender a filtrarlas me devolvió la tranquilidad. antes, una sola crítica me derrumbaba. le daba vueltas durante días, me sentía atacado, dudaba de todo lo que hacía. cualquier opinión negativa tenía el poder de arruinarme el ánimo.\n\ncon el tiempo aprendí a manejarlas distinto. primero, a separar la crítica útil del puro veneno. una busca ayudarme a mejorar; la otra solo quiere herir. de la primera tomo lo que sirve; de la segunda, nada.\n\ntambién aprendí a mirar quién criticaba. no le iba a dar el mismo peso a alguien que admiro y sabe del tema que a cualquiera que opina por opinar.\n\ny entendí algo que me liberó: al que hace, lo critican. el que no intenta nada nunca recibe críticas, porque no se expone. si me critican, en parte es porque estoy haciendo algo. hoy me quedo con lo que me sirve para mejorar y suelto el resto. una opinión ya no define mi valor.", "copies": [["Copy teaser", "Una crítica me arruinaba el día. Aprender a filtrarlas me devolvió la tranquilidad."], ["Copy script", "Antes, una sola crítica me derrumbaba. Le daba vueltas durante días, me sentía atacado, dudaba de todo lo que hacía. Cualquier opinión negativa tenía el poder de arruinarme el ánimo.\n\nCon el tiempo aprendí a manejarlas distinto. Primero, a separar la crítica útil del puro veneno. Una busca ayudarme a mejorar; la otra solo quiere herir. De la primera tomo lo que sirve; de la segunda, nada.\n\nTambién aprendí a mirar quién criticaba. No le iba a dar el mismo peso a alguien que admiro y sabe del tema que a cualquiera que opina por opinar.\n\nY entendí algo que me liberó: al que hace, l const LABELS = {F1:"Lists", F2:"3 Points", F3:"Script", F4:"Prompts"};
const store=(()=>{ let mem={}; let ok=true;
  try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k);}catch(e){ ok=false; }
  return { get(k){ try{ return ok?localStorage.getItem(k):mem[k]; }catch(e){ return mem[k]; } },
           set(k,v){ try{ ok?localStorage.setItem(k,v):(mem[k]=v); }catch(e){ mem[k]=v; } } };
})();
const doneKey=it=>"done:"+it.fmt+":"+it.n;
const isDone=it=>store.get(doneKey(it))==="1";
let activeFmt="ALL", query="", hideDone=false;
const grid=document.getElementById("grid"), tabsEl=document.getElementById("tabs"),
      emptyEl=document.getElementById("empty"), toast=document.getElementById("toast");
function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("hide").addEventListener("change",e=>{hideDone=e.target.checked;render();});
document.addEventListener("keydown",e=>{ if(e.key==="/" && document.activeElement.id!=="q"){e.preventDefault();document.getElementById("q").focus();}});
renderTabs(); render();
