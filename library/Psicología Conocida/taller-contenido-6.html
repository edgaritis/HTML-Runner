g'>Y noté algo: algunos se alejaron casi en automático. Sin pelea, sin pelea formal, simplemente se enfriaron y desaparecieron de mi vida.</p><p class='g'>Al principio me dolió. Pensé que había hecho algo mal, que ya no les caía bien, que mi cambio los había molestado.</p><p class='g'>Con el tiempo entendí que era todo lo contrario. Su distancia no era pérdida; era información.</p><p class='g'>Entendí que para algunas personas mi interés era su escenario. Mi insistencia, mi preocupación por ellos, mi atención constante, les daba un lugar central, los hacía sentirse importantes. Cuando dejé de hacer todo eso, descubrieron que sin mi atención no sabían cómo estar conmigo. Su distancia no era venganza; era desorientación.</p><p class='g'>También entendí que algunos me buscaban porque era fácil. Era accesible, disponible, dispuesto a complacer. Cuando dejé de serlo, cuando empecé a tener mis propios criterios, a no estar siempre, perdí interés para esa gente. No porque hubiera hecho algo malo; porque dejé de ser el blanco fácil que cómodamente buscaban.</p><p class='g'>Y entendí que su distancia, dolorosa al principio, fue uno de los regalos más grandes que la vida me dio sin que lo pidiera. Funcionó como filtro: se cayeron del cuadro los que estaban por la atención que yo les daba, y se quedaron los que estaban por mí.</p><p class='g'>Hoy tengo alrededor a las personas reales, y tengo silencio donde antes había gente que solo me restaba. Esa distancia ajena, vista con tiempo, fue justo lo que necesitaba.</p></div>", "search": "entendí por qué algunos se alejaron cuando dejé de perseguirlos pensé que se alejaban porque yo había hecho algo mal. entendí que era todo lo contrario. hubo un tiempo en que dejé de perseguir a ciertas personas. de insistir en planes, de mandar el segundo mensaje, de buscar conversaciones, de preocuparme por su vida más de lo que ellos se preocupaban por la mía.\n\ny noté algo: algunos se alejaron casi en automático. sin pelea, sin pelea formal, ue era todo lo contrario. Su distancia no era pérdida; era información.\n\nEntendí que para algunas personas mi interés era su escenario. Mi insistencia, mi preocupación por ellos, mi atención constante, les daba un lugar central, los hacía sentirse importantes. Cuando dejé de hacer todo eso, descubrieron que sin mi atención no sabían cómo estar conmigo. Su distancia no era venganza; era desorientación.\n\nTambién entendí que algunos me buscaban porque era fácil. Era accesible, disponible, dispuesto a complacer. Cuando dejé de serlo, cuando empecé a tener mis propios criterios, a no estar siempre, perdí interés para esa gente. No porque hubiera hecho algo malo; porque dejé de ser el blanco fácil que cómodamente buscaban.\n\nY entendí que su distancia, dolorosa al principio, fue uno de los regalos más grandes que la vida me dio sin que lo pidiera. Funcionó como filtro: se cayeron del cuadro los que estaban por la atención que yo les daba, y se quedaron los que estaban por mí.\n\nHoy tengo alrededor a las personas reales, y tengo silencio donde antes había gente que solo me restaba. Esa distancia ajena, vista con tiempo, fue justo lo que necesitaba."]]}, {"fmt": "F3", "n": 300, "bucket": "", "title": "ENTENDÍ EN QUÉ ME HABÍA VUELTO A LO LARGO DE TODO LO QUE VIVÍ", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Un día sumé todo lo que había aprendido. Y vi en qué me había convertido sin notarlo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Un día me senté a hacer balance de todo lo que había vivido. No para regodearme ni para quejarme, sino para entender en qué me había convertido a lo largo de tanto.</p><p class='g'>Y vi cosas que no había sumado antes.</p><p class='g'>Me había vuelto alguien que lee a la gente antes de que se muestre. No nací con esa habilidad; la fui construyendo con cada decepción, cada traición, cada engaño, cada uso. Hoy entro a una situación y, en minutos, ya tengo una lectura razonable de quién es quién. La gente que no ha pasado por lo que pasé todavía se equivoca donde yo ya no me equivoco.</p><p class='g'>Me había vuelto alguien que cuida con quién habla y de qué. Aprendí, golpe por golpe, que no todo el mundo merece acceso a mi vida. Que la información sobre lo mío es valor, y se entrega solo a quien lo merece. Esa selectividad, antes me habría parecido fría; hoy sé que es supervivencia.</p><p class='g'>Me había vuelto alguien que elige su paz por encima de tener la razón. Entendí algo que la mayoría no entiende: que ganar discusiones no compensa la energía que cuesta, que tener razón ante quien no quiere entender no sirve de nada, que mi paz vale infinitamente más que el ego de la última palabra.</p><p class='g'>Me había vuelto alguien que ya no se explica, ni se ruega, ni se aferra. Solté las defensas constantes, dejé de mendigar comprensión, no me aferro a quien no quiere quedarse. Eso, descubrí, es libertad.</p><p class='g'>Y, sobre todo, me había vuelto alguien que carga su fuerza en silencio. Ya no presumo lo que sostengo. No busco reconocimiento por lo que cargo. Simplemente llevo lo mío, sabiéndolo mío, sin necesitar que nadie lo confirme.</p><p class='g'>Eso, descubrí, era la madurez emocional más alta a la que podía aspirar. Y, sin notarlo del todo, había llegado ahí.</p><p class='g'>No fue talento. Fue lo que la vida me obligó a aprender, y yo aguanté hasta hacerlo mío. Comenta cuál señal te describe más, y sigue por más.</p></div>", "search": "entendí en qué me había vuelto a lo largo de todo lo que viví un día sumé todo lo que había aprendido. y vi en qué me había convertido sin notarlo. un día me senté a hacer balance de todo lo que había vivido. no para regodearme ni para quejarme, sino para entender en qué me había convertido a lo largo de tanto.\n\ny vi cosas que no había sumado antes.\n\nme había vuelto alguien que lee a la gente antes de que se muestre. no nací con esa habilidad; la fui construyendo con const LABELS = {F1:"Lists", F2:"3 Points", F3:"Script", F4:"Prompts"};
const store=(()=>{ let mem={}; let ok=true;
  try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k);}catch(e){ ok=false; }
  return { get(k){ try{ return ok?localStorage.getItem(k):mem[k]; }catch(e){ return mem[k]; } },
           set(k,v){ try{ ok?localStorage.setItem(k,v):(mem[k]=v); }catch(e){ mem[k]=v; } } };
})();
const doneKey=it=>"done:"+it.fmt+":"+it.n;
const isDone=it=>store.get(doneKey(it))==="1";
let activeFmt="ALL", query="", hideDone=false;
const grid=document.getElementById("grid"), tabsEl=document.getElementById("tabs"),
      emptyEl=document.getElementById("empty"), toast=document.getElementById("toast");
function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("hide").addEventListener("change",e=>{hideDone=e.target.checked;render();});
document.addEventListener("keydown",e=>{ if(e.key==="/" && document.activeElement.id!=="q"){e.preventDefault();document.getElementById("q").focus();}});
renderTabs(); render();
</script>
