<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Psicología Conocida — Engagement Posts</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#fff;font-family:'Segoe UI',system-ui,sans-serif}

.topbar{position:sticky;top:0;z-index:100;background:#111;border-bottom:1px solid #333;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:14px;color:#888;flex-shrink:0}
.topbar .counter{font-size:13px;color:#666}
.topbar select,.topbar input{background:#222;color:#fff;border:1px solid #444;padding:4px 8px;border-radius:4px;font-size:13px}
.topbar button{background:#333;color:#fff;border:1px solid #555;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:13px}
.topbar button:hover{background:#444}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;padding:20px}

/* ── Card wrapper (gallery) ── */
.card-container{border-radius:8px;overflow:hidden;border:1px solid #2a2a2a}
.card-toolbar{display:flex;gap:6px;padding:8px 10px;background:#1a1a1a;align-items:center;flex-wrap:wrap}
.card-toolbar button{background:#2a2a2a;color:#ccc;border:1px solid #444;padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px}
.card-toolbar button:hover{background:#3a3a3a;color:#fff}
.card-toolbar .sep{width:1px;height:16px;background:#333;margin:0 2px}
.bg-chip{width:20px;height:20px;border-radius:3px;border:2px solid #444;cursor:pointer;display:inline-block;vertical-align:middle}
.bg-chip.active{border-color:#fff}
.bg-chip:hover{border-color:#aaa}
.card-toolbar .lbl{font-size:10px;color:#666;margin-right:2px}

/* ── Card (the exportable unit) ── */
.card{width:100%;padding:28px 30px 24px;display:flex;flex-direction:column;position:relative;min-height:200px}
.card .watermark{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:9px;letter-spacing:1.5px;font-weight:600}

/* List */
.card .card-title{font-weight:900;text-align:center;margin-bottom:16px}
.card.format-list .card-title{font-size:18px;text-transform:uppercase;line-height:1.15}
.card.format-list .item{margin-bottom:6px;font-size:13px;line-height:1.35}
.card.format-list .item .num,.card.format-list .item .kw{font-weight:800}
.card.format-list .closer{margin-top:auto;padding-top:12px;font-size:10px;text-align:center;line-height:1.4}

/* Identity */
.card.format-identity .card-title{font-size:17px;line-height:1.2}
.card.format-identity .item{margin-bottom:5px;font-size:12.5px;line-height:1.3}
.card.format-identity .item .label{font-weight:800}
.card.format-identity .item .hi{font-weight:700}
.card.format-identity .closer{margin-top:auto;padding-top:10px;font-size:10px;text-align:center;line-height:1.4}

/* ── Full view overlay ── */
.overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);overflow-y:auto}
.overlay.active{display:flex;flex-direction:column;align-items:center;padding:20px}
.overlay .nav-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;justify-content:center}
.overlay .nav-bar button{background:#333;color:#fff;border:1px solid #555;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px}
.overlay .nav-bar button:hover{background:#444}
.overlay .nav-bar .idx{color:#888;font-size:14px;min-width:70px;text-align:center}

/* Full-size card in overlay */
.overlay .card{width:1080px;min-height:800px;padding:60px 70px 50px}
.overlay .card .watermark{font-size:16px;bottom:16px}
.overlay .card.format-list .card-title{font-size:52px;margin-bottom:40px}
.overlay .card.format-list .item{margin-bottom:22px;font-size:30px;line-height:1.4}
.overlay .card.format-list .closer{padding-top:30px;font-size:24px}
.overlay .card.format-identity .card-title{font-size:46px;margin-bottom:36px}
.overlay .card.format-identity .item{margin-bottom:16px;font-size:28px;line-height:1.35}
.overlay .card.format-identity .closer{padding-top:24px;font-size:22px}

.export-stage{position:absolute;left:-9999px;top:0}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:6px;font-size:14px;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>

<div class="topbar">

function renderCard(post,pidx,pbi){

      <div class="card-title" style="color:${P.title}">${post.title}</div>
      ${items}
      <div class="closer" style="color:${P.closer}">${post.closer}</div>

    let items=post.items.map(it=>{
      let d=it.desc.replace(/\*([^*]+)\*/g,`<span class="hi" style="color:${P.hi}">$1</span>`);
      return `<div class="item"><span class="label" style="color:${P.label}">${it.label}</span><span class="sep" style="color:${P.sep}"> : </span><span class="desc" style="color:${P.desc}">${d}</span></div>`;
    }).join('');
    let t=post.title.replace(/\*([^*]+)\*/g,`<span class="accent" style="color:${P.accent}">$1</span>`);
    return `<div class="card format-identity" style="background:${P.bg}">
      <div class="card-title" style="color:${P.titleC}">${t}</div>
      ${items}
      <div class="closer" style="color:${P.closer}">${post.closer}</div>
      <div class="watermark" style="color:${P.wm}">PSICOLOGÍA CONOCIDA</div>
    </div>`;
  }
}

// ── BG chips HTML ──
function bgChipsHTML(pidx,context){
  const fmt=POSTS[pidx].format;
  const cur=cardBG[pidx];
  return PRESETS[fmt].map((p,i)=>
    `<span class="bg-chip${i===cur?' active':''}" style="background:${p.chipColor}" title="${p.name}" onclick="setBG(${pidx},${i},'${context}')"></span>`
  ).join('');
}

function setBG(pidx,bi,context){
  cardBG[pidx]=bi;
  if(context==='gallery'){
    const el=document.getElementById('gc-'+pidx);
    if(el) el.innerHTML=buildCardContainer(pidx);
  }
  if(context==='overlay') renderOverlay();
}

// ── Gallery ──
let filtered=[];
let filteredMap=[];// maps filtered index -> POSTS index

function buildCardContainer(pidx){
  const post=POSTS[pidx];
  const fmt=post.format;
  return `<div class="card-container" id="gc-${pidx}">
    ${renderCard(post,pidx)}
    <div class="card-toolbar">
      <button onclick="event.stopPropagation();copyTitle(${pidx})">Copy Title</button>
      <button onclick="event.stopPropagation();copyCardText(${pidx})">Copy Card</button>
      <div class="sep"></div>
      <span class="lbl">BG</span>
      ${bgChipsHTML(pidx,'gallery')}
      <div class="sep"></div>
      <button onclick="event.stopPropagation();openOverlay(${pidx})">Full View</button>
    </div>
  </div>`;
}

function buildGallery(){
  const type=document.getElementById('filterType').value;
  if(type==='all'){filtered=[...POSTS];filteredMap=POSTS.map((_,i)=>i);}
  else{filtered=[];filteredMap=[];POSTS.forEach((p,i)=>{if(p.format===type){filtered.push(p);filteredMap.push(i);}});}
  document.getElementById('counter').textContent=`${filtered.length} / ${POSTS.length}`;
  document.getElementById('gallery').innerHTML=filteredMap.map(pidx=>buildCardContainer(pidx)).join('');
}
document.getElementById('filterType').onchange=buildGallery;

// ── Overlay ──
let currentPidx=0;
function openOverlay(pidx){
  currentPidx=pidx;
  renderOverlay();
  document.getElementById('overlay').classList.add('active');
}
function closeOverlay(){document.getElementById('overlay').classList.remove('active');}
function navPost(d){
  // find current in filteredMap
  let fi=filteredMap.indexOf(currentPidx);
  fi=(fi+d+filteredMap.length)%filteredMap.length;
  currentPidx=filteredMap[fi];
  renderOverlay();
}
function renderOverlay(){
  const fi=filteredMap.indexOf(currentPidx);
  document.getElementById('overlayIdx').textContent=`${fi+1} / ${filtered.length}`;
  document.getElementById('overlayCard').innerHTML=renderCard(POSTS[currentPidx],currentPidx);
  document.getElementById('ovBgChips').innerHTML='<span class="lbl" style="color:#888;font-size:12px;margin-right:4px">BG</span>'+bgChipsHTML(currentPidx,'overlay');
}
function jumpTo(){
  const v=parseInt(document.getElementById('jumpInput').value);
  if(v>=1&&v<=filteredMap.length){currentPidx=filteredMap[v-1];renderOverlay();document.getElementById('overlay').classList.add('active');}
}

// ── Export ──
async function exportCurrent(){
  const post=POSTS[currentPidx];
  const stage=document.getElementById('exportStage');
  stage.innerHTML=renderCard(post,currentPidx);
  const card=stage.querySelector('.card');
  card.style.width='1080px';card.style.minHeight='800px';card.style.padding='60px 70px 50px';card.style.position='relative';
  card.querySelector('.watermark').style.fontSize='16px';
  card.querySelector('.watermark').style.bottom='16px';
  card.querySelector('.card-title').style.fontSize=post.format==='list'?'52px':'46px';
  card.querySelector('.card-title').style.marginBottom=post.format==='list'?'40px':'36px';
  card.querySelectorAll('.item').forEach(el=>{el.style.fontSize=post.format==='list'?'30px':'28px';el.style.marginBottom=post.format==='list'?'22px':'16px';el.style.lineHeight=post.format==='list'?'1.4':'1.35';});
  card.querySelector('.closer').style.fontSize=post.format==='list'?'24px':'22px';
  card.querySelector('.closer').style.paddingTop=post.format==='list'?'30px':'24px';
  const canvas=await html2canvas(card,{backgroundColor:null,scale:2});
  const a=document.createElement('a');
  a.download=`pc_post_${String(currentPidx+1).padStart(3,'0')}.png`;
  a.href=canvas.toDataURL('image/png');a.click();
  stage.innerHTML='';
}

// ── Copy ──
function strip(s){return s.replace(/\*([^*]+)\*/g,'$1');}
function copyTitle(pidx){
  navigator.clipboard.writeText(strip(POSTS[pidx].title)).then(()=>toast('Title copied'));
}
function copyCardText(pidx){
  const p=POSTS[pidx];
  let lines=[strip(p.title),''];
  if(p.format==='list') p.items.forEach((it,i)=>lines.push(`${i+1}. ${it.kw} - ${it.desc}`));
  else p.items.forEach(it=>lines.push(`${it.label} : ${strip(it.desc)}`));
  lines.push('',p.closer);
  navigator.clipboard.writeText(lines.join('\n')).then(()=>toast('Card copied'));
}
function copyTitleOv(){copyTitle(currentPidx);}
function copyCardOv(){copyCardText(currentPidx);}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}

buildGallery();
</script>
</body>
