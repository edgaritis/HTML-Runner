ue no tenía certeza suficiente para justificar cerrar opciones que no necesitaba cerrar.</p><p class='g'>Seis meses después, un proyecto personal que no había planeado apareció como oportunidad. Si hubiera firmado la exclusividad, no habría podido tomarlo. Ese proyecto terminó siendo más importante para mí que cualquiera de las dos ofertas iniciales.</p><p class='g'>No lo sabía cuando elegí. No podía saberlo. Pero la regla de preservar opciones me protegió de un cierre que habría lamentado.</p><p class='g'>La regla operativa es esta. Cuando no puedes saber cuál opción es mejor, elige la que deje más caminos abiertos. El compromiso total merece certeza total. Cuando la certeza no existe, la flexibilidad es la segunda mejor respuesta. Las puertas que cierras sin necesidad son las que más duelen cuando las necesitas abiertas después.</p></div>", "search": "elegí la opción que me dejaba más puertas abiertas y aprendí por qué era regla tuve que elegir entre dos opciones casi iguales. no tenía forma de saber cuál era mejor. elegí la que me dejaba más opciones después. cuando una de las opciones cerradas habría sido un error, entendí por qué la flexibilidad valía más que la optimización. recibí dos ofertas laborales en el mismo mes. las dos eran buenas. los sueldos eran similares. el trabajo era interesante en ambas. no tenía forma clara de saber cuál era mejor.\n\nuna de las ofertas tenía una cláusula de exclusividad que me cerraba la posibilidad de hacer proyectos propios por un año. la otra no tenía esa restricción. todo lo demás era parecido.\n\nelegí la que no me cerraba puertas. no porque la otra fuera mala. sino porque no tenía certeza suficiente para justificar cerrar opciones que no necesitaba cerrar.\n\nseis meses después, un proyecto personal que no había planeado apareció como oportunidad. si hubiera firmado la exclusividad, no habría podido tomarlo. ese proyecto terminó siendo más importante para mí que cualquiera de las dos ofertas iniciales.\n\nno lo sabía cuando elegí. no podía saberlo. pero la regla de preservar opciones me protegió de un cierre que habría lamentado.\n\nla regla operativa es esta. cuando no puedes saber cuál opción es mejor, elige la que deje más caminos abiertos. el compromiso total merece certeza total. cuando la certeza no existe, la flexibilidad es la segunda mejor respuesta. las puertas que cierras sin necesidad son las que más duelen cuando las necesitas abiertas después.", "copies": [["Copy teaser", "Tuve que elegir entre dos opciones casi iguales. No tenía forma de saber cuál era mejor. Elegí la que me dejaba más opciones después. Cuando una de las opciones cerradas habría sido un error, entendí por qué la flexibilidad valía más que la optimización."], ["Copy script", "Recibí dos ofertas laborales en el mismo mes. Las dos eran buenas. Los sueldos eran similares. El trabajo era interesante en ambas. No tenía forma clara de saber cuál era mejor.\n\nUna de las ofertas tenía una cláusula de exclusividad que me cerraba la posibilidad de hacer proyectos propios por un año. La otra no tenía esa restricción. Todo lo demás era parecido.\n\nElegí la que no me cerraba puertas. No porque la otra fuera mala. Sino porque no tenía certeza suficiente para justificar cerrar opciones que no necesitaba cerrar.\n\nSeis meses después, un proyecto personal que no había planeado apareció como oportunidad. Si hubiera firmado la exclusividad, no habría podido tomarlo. Ese proyecto terminó siendo más importante para mí que cualquiera de las dos ofertas iniciales.\n\nNo lo sabía cuando elegí. No podía saberlo. Pero la regla de preservar opciones me protegió de un cierre que habría lamentado.\n\nLa regla operativa es esta. Cuando no puedes saber cuál opción es mejor, elige la que deje más caminos abiertos. El compromiso total merece certeza total. Cuando la certeza no existe, la flexibilidad es la segunda mejor respuesta. Las puertas que cierras sin necesidad son las que más duelen cuando las necesitas abiertas después."]]}, {"fmt": "F3", "n": 335, "bucket": "", "title": "IMAGINÉ EL FRACASO ANTES DE COMPROMETERME Y DESCUBRÍ FALLOS QUE NO HABÍA VISTO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Antes de aceptar un proyecto grande, me senté a imaginar que había fracasado. Escribí las razones. Encontré dos riesgos que no había considerado. Los corregí antes de empezar. La decisión sobrevivió a su peor escenario.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Estaba por aceptar un proyecto que me entusiasmaba. Todo parecía alineado. El cliente era bueno. El pago era justo. El trabajo era interesante. Mi instinto decía que sí.</p><p class='g'>Antes de confirmar, hice un ejercicio que había aprendido y nunca había practicado. Me senté y me imaginé seis meses en el futuro. El proyecto había fracasado. Escribí las cinco razones más probables de por qué había fallado.</p><p class='g'>Lo que salió me sorprendió. Dos de las razones eran cosas que yo controlaba y que no había considerado. Una era un problema de alcance que no estaba definido en el acuerdo. La otra era un riesgo de depender de un proveedor externo que no tenía alternativa.</p><p class='g'>No cancelé el proyecto. Pero antes de confirmar, ajusté el acuerdo para definir el alcance con precisión. Y busqué un proveedor alternativo como respaldo.</p><p class='g'>El proyecto salió bien. No sé si habría salido bien sin esos ajustes. Pero sé que la probabilidad de que saliera mal bajó porque los vi antes de que aparecieran, no después.</p><p class='g'>La regla operativa es esta. Antes de comprometerte a algo, imagina que falló y escribe por qué. Los motivos que inventes son los riesgos que no habías visto. La lista suele ser corta. Las correcciones suelen ser simples. Pero solo funcionan si las ves antes de empezar. El optimismo te hace sentir bien. El examen previo te protege. Los dos son útiles. Pero solo uno te salva cuando las cosas no salen como esperabas.</p></div>", "search": "imaginé el fracaso antes de comprometerme y descubrí fallos que no había visto antes de aceptar un proyecto grande, me senté a imaginar que había fracasado. escribí las razones. encontré dos riesgos que no había considerado. los corregí antes de empezar. la decisión sobrevivió a su peor escenario. estaba por aceptar un proyecto que me entusiasmaba. todo parecía alineado. el cliente era bueno. el pago era justo. el trabajo era interesante. mi instinto decía que sí.\n\nantes de confirmar, hice un ejercicio que había aprendido y nunca había practicado. me senté y me imaginé seis meses en el futuro. el proyecto había fracasado. escribí las cinco razones más probables de por qué había fallado.\n\nlo que salió me sorprendió. dos de las razones eran cosas que yo controlaba y que no había considerado. una era un problema de alcance que no estaba definido en el acuerdo. la otra era un riesgo de depender de un proveedor externo que no tenía alternativa.\n\nno cancelé el proyecto. pero antes de confirmar, ajusté el acuerdo para definir el alcance con precisión. y busqué un proveedor alternativo como respaldo.\n\nel proyecto salió bien. no sé si habría salido bien sin esos ajustes. pero sé que la probabilidad de que saliera mal bajó porque los vi antes de que aparecieran, no después.\n\nla regla operativa es esta. antes de comprometerte a algo, imagina que falló y escribe por qué. los motivos que inventes son los riesgos que no habías visto. la lista suele ser corta. las correcciones suelen ser simples. pero solo funcionan si las ves antes de empezar. el optimismo te hace sentir bien. el examen previo te protege. los dos son útiles. pero solo uno te salva cuando las cosas no salen como esperabas.", "copies": [["Copy teaser", "Antes de aceptar un proyecto grande, me senté a imaginar que había fracasado. Escribí las razones. Encontré dos riesgos que no había considerado. Los corregí antes de empezar. La decisión sobrevivió a su peor escenario."], ["Copy script", "Estaba por aceptar un proyecto que me entusiasmaba. Todo parecía alineado. El cliente era bueno. El pago era justo. El trabajo era interesante. Mi instinto decía que sí.\n\nAntes de confirmar, hice un ejercicio que había aprendido y nunca había practicado. Me senté y me imaginé seis meses en el futuro. El proyecto había fracasado. Escribí las cinco razones más probables de por qué había fallado.\n\nLo que salió me sorprendió. Dos de las razones eran cosas que yo controlaba y que no había considerado. Una era un problema de alcance que no estaba definido en el acuerdo. La otra era un riesgo de depender de un proveedor externo que no tenía alternativa.\n\nNo cancelé el proyecto. Pero antes de confirmar, ajusté el acuerdo para definir el alcance con precisión. Y busqué un proveedor alternativo como respaldo.\n\nEl proyecto salió bien. No sé si habría salido bien sin esos ajustes. Pero sé que la probabilidad de que saliera mal bajó porque los vi antes de que aparecieran, no después.\n\nLa regla operativa es esta. Antes de comprometerte a algo, imagina que falló y escribe por qué. Los motivos que inventes son los riesgos que no habías visto. La lista suele ser corta. Las correcciones suelen ser simples. Pero solo funcionan si las ves antes de empezar. El optimismo te hace sentir bien. El examen previo te protege. Los dos son útiles. Pero solo uno te salva cuando las cosas no salen como esperabas."]]}, {"fmt": "F3", "n": 336, "bucket": "", "title": "EMPECÉ A DECIR QUE NO A TODO LO QUE NO ERA UN SÍ CLARO Y MI VIDA SE SIMPLIFICÓ", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Aceptaba casi todo. Reuniones, proyectos, invitaciones, favores. Cuando empecé a aplicar el filtro de sí claro, eliminé el ochenta por ciento de mis compromisos. Lo que quedó era lo que de verdad me importaba.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Tenía la agenda llena. Proyectos abiertos, reuniones se de el primer mes.\n\nLa diferencia era que el no habría cerrado el tema y me habría devuelto la energía mental. La postergación mantuvo el tema abierto, consumiendo espacio en mi cabeza, durante doce meses. Pagué el costo del no sin obtener su beneficio, que es la claridad.\n\nAhora aplico una regla de un mes. Si pospongo algo más de treinta días, me obligo a decidir. Sí o no. Sin moverlo al mes siguiente. Porque si en treinta días no lo hice, la respuesta ya se dio. Solo falta que la admita.\n\nLa regla operativa es esta. Lo que llevas más de un mes posponiendo ya lo decidiste. La postergación es el no del que no quiere decir no. Nombrarla como lo que es te devuelve claridad y energía. Lo que importa de verdad no espera un mes. Se hace con incomodidad, con información incompleta, con miedo incluido.\n\nGuarda esto para la decisión que llevas posponiendo desde hace meses."]]}, {"fmt": "F3", "n": 338, "bucket": "", "title": "TOMÉ UNA BUENA DECISIÓN QUE SALIÓ MAL Y APRENDÍ QUE EL RESULTADO NO ERA LA MEDIDA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Tomé una decisión con toda la información disponible, hice bien el proceso, y aun así salió mal. La primera reacción fue culparme. Después entendí que el resultado no era la medida de la decisión. El proceso lo era.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Evalué una oportunidad de negocio con cuidado. Hice los números. Consulté a personas con experiencia. Consideré los riesgos. Imaginé los escenarios de fracaso. Todo era razonable. Acepté.</p><p class='g'>Salió mal. No por un error mío, sino por una variable externa que nadie podía prever. El mercado cambió. Lo que era una oportunidad sólida dejó de serlo por circunstancias fuera de mi control.</p><p class='g'>Mi primera reacción fue culparme. Debí haberlo visto. Debí haber esperado más. Debí haber sido más cuidadoso. Pero cuando revisé con honestidad, no encontré un fallo en el proceso. La información que tenía cuando decidí apuntaba en una dirección clara. Lo que cambió después no estaba disponible antes.</p><p class='g'>Al mismo tiempo, conocía gente que había tomado decisiones malas que salieron bien. Apostaron sin evaluar, arriesgaron sin calcular, decidieron por impulso. Y ganaron. No porque su decisión fuera buena. Porque la suerte los favoreció. Y ellos creían que habían sido inteligentes.</p><p class='g'>Eso me enseñó algo fundamental. Juzgar decisiones por resultados te enseña las lecciones equivocadas. Repites lo que funcionó por suerte pensando que fue habilidad. Abandonas lo que falló por circunstancia pensando que fue error. Las dos conclusiones son falsas.</p><p class='g'>La regla operativa es esta. Lo que puedes mejorar es cómo decides, no lo que pasa después. Un buen proceso no garantiza buen resultado. Pero es lo único que puedes controlar. Evalúa la decisión con la información que tenías cuando la tomaste, no con la que tienes ahora. Si el proceso era bueno, la decisión fue buena, independientemente de cómo salió. Lo que puedes afinar es el proceso para la próxima vez. La suerte no se afina.</p></div>", "search": "tomé una buena decisión que salió mal y aprendí que el resultado no era la medida tomé una decisión con toda la información disponible, hice bien el proceso, y aun así salió mal. la primera reacción fue culparme. después entendí que el resultado no era la medida de la decisión. el proceso lo era. evalué una oportunidad de negocio con cuidado. hice los números. consulté a personas con experiencia. consideré los riesgos. imaginé los escenarios de fracaso. todo era razonable. acepté.\n\nsalió mal. no por un error mío, sino por una variable externa que nadie podía prever. el mercado cambió. lo que era una oportunidad sólida dejó de serlo por circunstancias fuera de mi control.\n\nmi primera reacción fue culparme. debí haberlo visto. debí haber esperado más. debí haber sido más cuidadoso. pero cuando revisé con honestidad n dicho que sí pensando que los demás sabían algo que ellos no sabían.</p><p class='g'>Lo que pasó fue presión de grupo en estado puro. Individualmente, la mayoría habría dicho que no. Colectivamente, todos dijeron que sí. Y cuando salió mal, cada uno pagó individualmente las consecuencias de una decisión colectiva.</p><p class='g'>Desde entonces aplico una regla. Cuando alguien me propone algo en grupo y espera respuesta inmediata, pido veinticuatro horas. Me alejo del grupo. Evalúo solo. Me pregunto: si nadie estuviera mirando, tomaría esta decisión. Si la respuesta es no, mi respuesta al grupo es no, independientemente de lo que hagan los demás.</p><p class='g'>La regla operativa es esta. Las decisiones que se toman en grupo se pagan individualmente. Tu criterio solo vale cuando lo ejerces solo, sin audiencia. La prueba no es si te atreves a decir que sí con todos. Es si te atreves a decir que no cuando todos dicen que sí.</p></div>", "search": "acepté algo por presión del grupo y aprendí que mi criterio valía más que su aprobación un grupo de colegas me invitó a una inversión que todos iban a hacer. dije que sí para no quedar fuera. cuando salió mal, cada uno pagó individualmente lo que el grupo había decidido colectivamente. aprendí a pedir veinticuatro horas antes de responder en grupo. un grupo de colegas estaba entusiasmado con una inversión. todos iban a participar. me invitaron. la presentación era convincente. el entusiasmo del grupo era contagioso. cada uno confirmaba y miraba al siguiente esperando la misma respuesta.\n\ntenía dudas. algo no me cerraba del todo. pero todos estaban adentro. decir que no me habría hecho quedar como el miedoso, el que no confía, el que se queda atrás. dije que sí.\n\nla inversión no salió bien. no fue desastre total, pero el retorno fue mucho menor de lo prometido. y lo que noté después fue revelador. cada uno de los que participó admitió, por separado, que había tenido dudas. pero ninguno las había expresado en el grupo. const LABELS = {F1:"Lists", F2:"3 Points", F3:"Script", F4:"Prompts"};
const store=(()=>{ let mem={}; let ok=true;
  try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k);}catch(e){ ok=false; }
  return { get(k){ try{ return ok?localStorage.getItem(k):mem[k]; }catch(e){ return mem[k]; } },
           set(k,v){ try{ ok?localStorage.setItem(k,v):(mem[k]=v); }catch(e){ mem[k]=v; } } };
})();
const doneKey=it=>"done:"+it.fmt+":"+it.n;
const isDone=it=>store.get(doneKey(it))==="1";
let activeFmt="ALL", query="", hideDone=false;
const grid=document.getElementById("grid"), tabsEl=document.getElementById("tabs"),
      emptyEl=document.getElementById("empty"), toast=document.getElementById("toast");
function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("hide").addEventListener("change",e=>{hideDone=e.target.checked;render();});
document.addEventListener("keydown",e=>{ if(e.key==="/" && document.activeElement.id!=="q"){e.preventDefault();document.getElementById("q").focus();}});
renderTabs(); render();
</script>
