ten de verdad a que solo te aplaudan mientras les sirves.</p></div>", "search": "aprendí que el respeto vale más que caer bien vivía para caerle bien a todos. por eso nadie me respetaba. durante años viví para agradar. decía que sí a todo, evitaba incomodar, me adaptaba a lo que cada quien quería. quería caerle bien a todo el mundo, y lo lograba. era el simpático, el buena gente.\n\npero notaba algo raro. a pesar de caer bien, no me respetaban. me pasaban por encima, no tomaban en cuenta mi opinión, abusaban de mi disposición. caía bien, pero no contaba.\n\ncon el tiempo entendí por qué. el respeto no se gana agradando; se gana con límites, con palabra, con firmeza. el que solo busca gustar, sin marcar líneas, termina pisado. yo había confundido caer bien con ser respetado, y no son lo mismo.\n\nempecé a poner límites. a decir que no. a cumplir lo que prometía, siempre. a no tener miedo de no agradarle a alguien.\n\ny todo cambió. no le caía bien a todos, pero me empezaron a respetar. aprendí que la simpatía se gasta y el respeto dura. y que es mucho mejor que te respeten de verdad a que solo te aplaudan mientras les sirves.", "copies": [["Copy teaser", "Vivía para caerle bien a todos. Por eso nadie me respetaba."], ["Copy script", "Durante años viví para agradar. Decía que sí a todo, evitaba incomodar, me adaptaba a lo que cada quien quería. Quería caerle bien a todo el mundo, y lo lograba. Era el simpático, el buena gente.\n\nPero notaba algo raro. A pesar de caer bien, no me respetaban. Me pasaban por encima, no tomaban en cuenta mi opinión, abusaban de mi disposición. Caía bien, pero no contaba.\n\nCon el tiempo entendí por qué. El respeto no se gana agradando; se gana con límites, con palabra, con firmeza. El que solo busca gustar, sin marcar líneas, termina pisado. Yo había confundido caer bien con ser respetado, y no son lo mismo.\n\nEmpecé a poner límites. A decir que no. A cumplir lo que prometía, siempre. A no tener miedo de no agradarle a alguien.\n\nY todo cambió. No le caía bien a todos, pero me empezaron a respetar. Aprendí que la simpatía se gasta y el respeto dura. Y que es mucho mejor que te respeten de verdad a que solo te aplaudan mientras les sirves."]]}, {"fmt": "F3", "n": 132, "bucket": "", "title": "MIENTRAS MÁS PERSEGUÍA, MÁS SE ALEJABA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Perseguía a la gente y a las cosas con desesperación. Justo eso las alejaba.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Tenía la costumbre de perseguir. A las personas, a las oportunidades, a lo que quería. Insistía, rogaba, me mostraba siempre disponible, hacía hasta lo imposible por conseguirlo. Y, curiosamente, mientras más perseguía, más se alejaba.</p><p class='g'>No entendía por qué. Daba todo, y aun así se me escapaba.</p><p class='g'>Hasta que vi el patrón. Lo que ruegas pierde valor a ojos del otro. La desesperación se nota, y la desesperación espanta. Cuando persigues desde la necesidad, transmites falta, urgencia, y eso, en vez de atraer, aleja. Lo que se consigue rogando se aprecia poco.</p><p class='g'>Decidí cambiar. Dejé de perseguir y empecé a trabajarme a mí mismo. A construir mi vida, a volverme alguien valioso, a estar bien solo.</p><p class='g'>Y pasó lo que no esperaba. Lo que antes corría detrás de mí empezó a acercarse. La gente notó mi ausencia, mi calma, mi valor. Aprendí que tu valor no se ruega, se nota. Y que lo que dejas de perseguir, muchas veces, termina volviendo solo.</p></div>", "search": "mientras más perseguía, más se alejaba perseguía a la gente y a las cosas con desesperación. justo eso las alejaba. tenía la costumbre de perseguir. a las personas, a las oportunidades, a lo que quería. insistía, rogaba, me mostraba siempre disponible, hacía hasta lo imposible por conseguirlo. y, curiosamente, mientras más perseguía, más se alejaba.\n\nno entendía por qué. daba todo, y aun así se me escapaba.\n\nhasta que vi el patrón. lo que ruegas pierde valor a ojos del otro. la desesperación se nota, y la desesperación espanta. cuando persigues desde la necesidad, transmites falta, urgencia, y eso, en vez de atraer, aleja. lo que se consigue rogando se aprecia poco.\n\ndecidí cambiar. dejé de perseguir y empecé a trabajarme a mí mismo. a construir mi vida, a volverme alguien valioso, a estar bien solo.\n\ny pasó lo que no esperaba. lo que antes corría detrás de mí empezó a acercarse. la gente notó mi ausencia, mi calma, mi valor. aprendí que tu valor no se ruega, se nota. y que lo que dejas de perseguir, muchas veces, termina volviendo solo.", "copies": [["Copy teaser", "Perseguía a la gente y a las cosas con desesperación. Justo eso las alejaba."], ["Copy script", "Tenía la costumbre de perseguir. A las personas, a las oportunidades, a lo que quería. Insistía, rogaba, me mostraba siempre disponible, hacía hasta lo imposible por conseguirlo. Y, curiosamente, mientras más perseguía, más se alejaba.\n\nNo entendía por qué. Daba todo, y aun así se me escapaba.\n\nHasta que vi el patrón. Lo que ruegas pierde valor a ojos del otro. La desesperación se nota, y la desesperación espanta. Cuando persigues desde la necesidad, transmites falta, urgencia, y eso, en vez de atraer, aleja. Lo que se consigue rogando se aprecia poco.\n\nDecidí cambiar. Dejé de perseguir y empecé a trabajarme a mí mismo. A construir mi vida, a volverme alguien valioso, a estar bien solo.\n\nY pasó lo que no esperaba. Lo que antes corría detrás de mí empezó a acercarse. La gente notó mi ausencia, mi calma, mi valor. Aprendí que tu valor no se ruega, se nota. Y que lo que dejas de perseguir, muchas veces, termina volviendo solo."]]}, {"fmt": "F3", "n": 133, "bucket": "", "title": "CAMBIÉ DE CÍRCULO Y MI VIDA CAMBIÓ CON ÉL", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>No entendía por qué no avanzaba. La respuesta estaba en la gente que me rodeaba.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años me pregunté por qué no avanzaba, por qué seguía estancado a pesar de querer más. Buscaba la respuesta en mí, en mi falta de disciplina, en la mala suerte. Pero había algo que no veía: la gente con la que pasaba mis días.</p><p class='g'>Mi círculo de entonces se quejaba todo el tiempo, se conformaba, se burlaba de cualquier sueño grande. Sin darme cuenta, yo había adoptado su forma de pensar, sus límites, su conformismo. Me había vuelto el promedio de los que me rodeaban.</p><p class='g'>Cuando intentaba crecer, no me apoyaban; me bajaban. Me hacían sentir raro por querer más, como si ambicionar algo fuera traicionarlos.</p><p class='g'>Tomé una decisión difícil. Me alejé, con cariño, de quienes me frenaban, y busqué rodearme de gente que sumara, que me retara, que fuera hacia donde yo quería ir.</p><p class='g'>Y mi vida cambió con el círculo. Mis conversaciones cambiaron, mis metas crecieron, mi energía subió. Aprendí que te vuelves el promedio de quienes te rodean, y que a veces crecer significa, simplemente, cambiar de compañías.</p></div>", "search": "cambié de círculo y mi vida cambió con él no entendía por qué no avanzaba. la respuesta estaba en la gente que me rodeaba. durante años me pregunté por qué no avanzaba, por qué seguía estancado a pesar de querer más. buscaba la respuesta en mí, en mi falta de disciplina, en la mala suerte. pero había algo que no veía: la gente con la que pasaba mis días.\n\nmi círculo de entonces se quejaba todo el tiempo, se conformaba, se burlaba de cualquier sueño grande. sin darme cuenta, yo había adoptado su forma de pensar, sus límites, su conformismo. me había vuelto el promedio de los que me rodeaban.\n\ncuando intentaba crecer, no me apoyaban; me bajaban. me hacían sentir raro por querer más, como si ambicionar algo fuera traicionarlos.\n\ntomé una decisión difícil. me alejé, con cariño, de quienes me frenaban, y busqué rodearme de gente que sumara, que me retara, que fuera hacia donde yo quería ir.\n\ny mi vida cambió con el círculo. mis conversaciones cambiaron, mis metas crecieron, mi energía subió. aprendí que te vuelves el promedio de quienes te rodean, y que a veces crecer significa, simplemente, cambiar de compañías.", "copies": [["Copy teaser", "No entendía por qué no avanzaba. La respuesta estaba en la gente que me rodeaba."], ["Copy script", "Durante años me pregunté por qué no avanzaba, por qué seguía estancado a pesar de querer más. Buscaba la respuesta en mí, en mi falta de disciplina, en la mala suerte. Pero había algo que no veía: la gente con la que pasaba mis días.\n\nMi círculo de entonces se quejaba todo el tiempo, se conformaba, se burlaba de cualquier sueño grande. Sin darme cuenta, yo había adoptado su forma de pensar, sus límites, su conformismo. Me había vuelto el promedio de los que me rodeaban.\n\nCuando intentaba crecer, no me apoyaban; me bajaban. Me hacían sentir raro por querer más, como si ambicionar algo fuera traicionarlos.\n\nTomé una decisión difícil. Me alejé, con cariño, de quienes me frenaban, y busqué rodearme de gente que sumara, que me retara, que fuera hacia donde yo quería ir.\n\nY mi vida cambió con el círculo. Mis conversaciones cambiaron, mis metas crecieron, mi energía subió. Aprendí que te vuelves el promedio de quienes te rodean, y que a veces crecer significa, simplemente, cambiar de compañías."]]}, {"fmt": "F3", "n": 134, "bucket": "", "title": "APRENDÍ A NO REACCIONAR CUANDO ME PROVOCABAN", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Cualquiera podía arruinarme el día con un comentario. Aprender a no reaccionar fue recuperar el poder.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Antes, cualquiera podía sacarme de mis casillas. Un comentario, una provocación, una mala cara, y yo explotaba. Reaccionaba en caliente, decía cosas de las que me arrepentía, me arruinaba el día por algo que otro había dicho.</p><p class='g'>Un día entendí algo que me cambió. El que me hacía reaccionar, me controlaba. Le estaba entregando el poder sobre mis emociones a cualquiera que supiera apretar el botón correcto. Mi paz dependía del peor comportamiento de los demás.</p><p class='g'>Empecé a entrenar otra cosa: no reaccionar de inmediato. Respirar antes de responder. Darme esos dos segundos que separan al que mantiene el control del que estalla y luego lamenta.</p><p class='g'>Y aprendí que no todo merece mi reacción. Que responder a cada provocación es agotarme por gusto. Que muchas veces el silencio incomoda más que cualquier grito y me deja en mejor lugar.</p><p class='g'>Hoy elijo cuándo responder, en vez de reaccionar cuando me empujan. Y esa calma, que antes no tenía, resultó ser la mayor muestra de fuerza. El control no es contestar rápido; es no reaccionar en caliente.</p></div>", "search": "aprendí a no reaccionar cuando me provocaban cualquiera podía arruinarme el día con un comentario. aprender a no reaccionar fue recuperar el poder. antes, cualquiera podía sacarme de mis casillas. un comentario, una provocación, una mala cara, y yo explotaba. reaccionaba en caliente, decía cosas de las que me arrepentía, me arruinaba el día por algo que otro había dicho.\n\nun día entendí algo que me cambió. el que me hacía reaccionar, me controlaba. le estaba entregando el poder sobre mis emociones a cualquiera que supiera apretar el botón correcto. mi paz dependía del peor comportamiento de los demás.\n\nempecé a entrenar otra cosa: no reaccionar de inmediato. respirar antes de responder. darme esos dos segundos que separan al que mantiene el control del que estalla y luego lamenta.\n\ny aprendí que no todo merece mi reacción. que responder a cada provocación es agotarme por gusto. que muchas veces el silencio incomoda más que cualquier grito y me deja en mejor lugar.\n\nhoy elijo cuándo responder, en vez de reaccionar cuando me empujan. y esa calma, que antes no tenía, resultó ser la mayor muestra de fuerza. el control no es contestar rápido; es no reaccionar en caliente.", "copies": [["Copy teaser", "Cualquiera podía arruinarme el día con un comentario. Aprender a no reaccionar fue recuperar el poder."], ["Copy script", "Antes, cualquiera podía sacarme de mis casillas. Un comentario, una provocación, una mala cara, y yo explotaba. Reaccionaba en caliente, decía cosas de las que me arrepentía, me arruinaba el día por algo que otro había dicho.\n\nUn día entendí algo que me cambió. El que me hacía reaccionar, me controlaba. Le estaba entregando el poder sobre mis emociones a cualquiera que supiera apretar el botón correcto. Mi paz dependía del peor comportamiento de los demás.\n\nEmpecé a entrenar otra cosa: no reaccionar de inmediato. Respirar antes de responder. Darme esos dos segundos que separan al que mantiene el control del que estalla y luego lamenta.\n\nY aprendí que no todo merece mi reacción. Que responder a cada provocación es agotarme por gusto. Que muchas veces el silencio incomoda más que cualquier grito y me deja en mejor lugar.\n\nHoy elijo cuándo responder, en vez de reaccionar cuando me empujan. Y esa calma, que antes no tenía, resultó ser la mayor muestra de fuerza. El control no es contestar rápido; es no reaccionar en caliente."]]}, {"fmt": "F3", "n": 135, "bucket": "", "title": "NECESITABA TENER LA RAZÓN HASTA QUE ME QUEDÉ SOLO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Ganaba todas las discusiones. Y, una a una, perdía a las personas.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo siempre tenía que tener la razón. En cada conversación, en cada discusión, mi objetivo era ganar. No paraba hasta que el otro admitiera que yo tenía razón. Y casi siempre lo lograba, a fuerza de insistir.</p><p class='g'>Pero un día miré a mi alrededor y noté algo. La gente se cansaba de mí. Las discusiones que yo &quot;ganaba&quot; dejaban h na a una, perdía a las personas."], ["Copy script", "Yo siempre tenía que tener la razón. En cada conversación, en cada discusión, mi objetivo era ganar. No paraba hasta que el otro admitiera que yo tenía razón. Y casi siempre lo lograba, a fuerza de insistir.\n\nPero un día miré a mi alrededor y noté algo. La gente se cansaba de mí. Las discusiones que yo \"ganaba\" dejaban heridas. Las relaciones se enfriaban. Tenía razón en todo, y me estaba quedando solo.\n\nAhí entendí el precio. Ganar una discusión y perder a la persona no es ganar nada. Mi necesidad de tener razón estaba costándome mucho más de lo que valía.\n\nTambién me di cuenta de que, de tanto creerme dueño de la verdad, había dejado de aprender. No escuchaba, porque ya \"sabía\". Confundía mi terquedad con tener razón.\n\nEmpecé a soltar. A preguntarme si quería tener razón o quería estar en paz. A reconocer cuando el otro tenía un punto, o cuando yo me equivocaba.\n\nY mis relaciones mejoraron. Aprendí que tu paz vale más que ganar, y que soltar la última palabra, muchas veces, es la verdadera victoria."]]}, {"fmt": "F3", "n": 136, "bucket": "", "title": "VIVÍ AÑOS PRESO DEL \"QUÉ DIRÁN\"", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Dejé de hacer media vida por miedo a la opinión de los demás. Un día entendí que casi nadie estaba mirando.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Viví buena parte de mi vida preso de una pregunta: ¿qué van a decir? Dejé de hacer cosas que quería, callé opiniones, elegí caminos seguros, todo por miedo a la crítica, al ridículo, a la opinión de los demás.</p><p class='g'>Vivía la vida que otros aprobaban, no la que yo quería. Cada decisión pasaba primero por el filtro del qué dirán. Y así dejé pasar oportunidades, sueños y años enteros.</p><p class='g'>Un día caí en cuenta de algo liberador. Toda esa gente cuya opinión tanto temía no iba a vivir mi vida por mí. Si me equivocaba por segu le dan.\n\nUna conversación incómoda de cinco minutos, aprendí, puede valer más que semanas de trabajo."]]}, {"fmt": "F3", "n": 140, "bucket": "", "title": "APRENDÍ A VER EL VALOR, NO SOLO EL PRECIO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Compraba siempre lo más barato para ahorrar. Tarde entendí que lo barato me estaba saliendo caro.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Toda mi vida compré pensando solo en el precio. Buscaba lo más barato, lo que menos costara en el momento, y me sentía listo por ahorrar. Pero el dinero igual no me cuadraba.</p><p class='g'>Con el tiempo entendí mi error. El precio es lo que pagas; el valor es lo que recibes. Y no son lo mismo. Lo barato que compraba se rompía, fallaba, no servía, y tenía que reemplazarlo una y otra vez. Al final, pagaba dos o tres veces lo que habría costado algo bueno.</p><p class='g'>Empecé a mirar distinto. A preguntarme no solo cuánto costaba algo, sino cuánto me iba a servir y cuánto iba a durar. Descubrí que pagar un poco más por lo que uso todos los días, por mi salud, por lo que me ahorra tiempo, por aprender, no era gasto: era de las mejores inversiones.</p><p class='g'>Y que lo que compraba y no usaba había sido caro aunque costara poco.</p><p class='g'>Aprendí que lo barato muchas veces sale caro, y que el verdadero ahorro no está en pagar menos, sino en pagar por lo que de verdad vale. El precio se ve enseguida; el valor, con el tiempo.</p></div>", "search": "aprendí a ver el valor, no solo el precio compraba siempre lo más barato para ahorrar. tarde entendí que lo barato me estaba saliendo caro. toda mi vida compré pensando solo en el precio. buscaba lo más barato, lo que menos costara en el momento, y me sentía listo por ahorrar. pero el dinero igual no me cuadraba.\n\ncon el tiempo entendí mi error. el precio es lo que pagas; el valor es lo que recibes. y no son lo mismo. lo barato que compraba se rompía, fallaba, no servía, y tenía que reemplazarlo una y otra vez. al final, pagaba dos o tres veces lo que habría costado algo bueno.\n\nempecé a mirar distinto. a preguntarme no solo cuánto costaba algo, sino cuánto me iba a servir y cuánto iba a durar. descubrí que pagar un poco más por lo que uso todos los días, por mi salud, por lo que me ahorra tiempo, por aprender, no era gasto: era de las mejores inversiones.\n\ny que lo que compraba y no usaba había sido caro aunque costara poco.\n\naprendí que lo barato muchas veces sale caro, y que el verdadero ahorro no está en pagar menos, sino en pagar por lo que de verdad vale. el precio se ve enseguida; el valor, con el tiempo.", "copies": [["Copy teaser", "Compraba siempre lo más barato para ahorrar. Tarde entendí que lo barato me estaba saliendo caro."], ["Copy script", "Toda mi vida compré pensando solo en el precio. Buscaba lo más barato, lo que menos costara en el momento, y me sentía listo por ahorrar. Pero el dinero igual no me cuadraba.\n\nCon el tiempo entendí mi error. El precio es lo que pagas; el valor es lo que recibes. Y no son lo mismo. Lo barato que compraba se rompía, fallaba, no servía, y tenía que reemplazarlo una y otra vez. Al final, pagaba dos o tres veces lo que habría costado algo bueno.\n\nEmpecé a mirar distinto. A preguntarme no solo cuánto costaba algo, sino cuánto me iba a servir y cuánto iba a durar. Descubrí que pagar un poco más por lo que uso todos los días, por mi salud, por lo que me ahorra tiempo, por aprender, no era gasto: era de las mejores inversiones.\n\nY que lo que compraba y no usaba había sido caro aunque costara poco.\n\nAprendí que lo barato muchas veces sale caro, y que el verdadero ahorro no está en pagar menos, sino en pagar por lo que de verdad vale. El precio se ve enseguida; el valor, con el tiempo."]]}, {"fmt": "F3", "n": 141, "bucket": "", "title": "VIVÍA PARA DEMOSTRARLE A QUIENES DUDARON DE MÍ", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Todo lo que hacía era para demostrarle algo a los que no creyeron en mí. Vivía atado a ellos sin darme cuenta.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años, mi motor fue demostrarles. A los que dudaron de mí, a los que se rieron, a los que dijeron que no podría. Cada cosa que lograba, la lograba pensando en su cara, en su sorpresa, en el momento en que tendrían que tragarse sus palabras.</p><p class='g'>Me empujaba, sí. Pero un día me di cuenta de algo. Estaba viviendo en función de ellos. Mi motor era el rencor, no mis ganas. Le había entregado el control de mi vida justo a la gente que quería dejar atrás.</p><p class='g'>Y lo más absurdo: ellos ni se acordaban. Mientras yo me mataba para demostrarles algo, habían seguido con su vida sin pensar en mí. Me estaba esforzando para un público que ya no estaba.</p><p class='g'>Cuando conseguía las cosas por rabia, además, no me llenaban. La satisfacción del &quot;se lo demostré&quot; duraba un suspiro, porque nunca se había tratado de mí.</p><p class='g'>Entonces cambié el motor. Empecé a hacer las cosas por mí, por quien quería ser, no contra nadie. Y todo cambió. Lo que construyes por ti se queda; lo que haces para demostrarle a otros se va con ellos. Dejé de vivir atado a quien dudó de mí.</p></div>", "search": "vivía para demostrarle a quienes dudaron de mí todo lo que hacía era para demostrarle algo a los que no creyeron en mí. vivía atado a ellos sin darme cuenta. durante años, mi motor fue demostrarles. a los que dudaron de mí, a los que se rieron, a los que dijeron que no podría. cada cosa que lograba, la lograba pensando en su cara, en su sorpresa, en el momento en que tendrían que tragarse sus palabras.\n\nme empujaba, sí. pero un día me di cuenta de algo. estaba viviendo en función de ellos. mi motor era el rencor, no mis ganas. le había entregado el control de mi vida justo a la gente que quería dejar atrás.\n\ny lo más absurdo: ellos ni se o de pelear porque estábamos en paz. En realidad, ella ya se había rendido.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>En una relación importante, llegó un momento en que dejamos de discutir. Yo lo interpreté como algo bueno. &quot;Por fin estamos en paz&quot;, pensé. Ya no había reclamos, ya no había peleas. Me confié.</p><p class='g'>Lo que no entendí a tiempo es que ese silencio no era paz. Era que ella ya había dejado de esperar. Mientras reclamaba, todavía le importaba, todavía creía que algo podía cambiar. Cuando dejó de reclamar, no era que estuviera contenta: era que se había rendido por dentro.</p><p class='g'>Dejó de contarme sus cosas. Dejó de pelear por lo que antes le molestaba. Se fue guardando todo, no porque estuviera bien, sino porque ya se había ido un poco cada día.</p><p class='g'>Para cuando me di cuenta, el silencio ya era total. Y entendí, tarde, que no todos avisan gritando; muchos avisan callando.</p><p class='g'>Aprendí que en una relación hay silencios que no son calma, sino desconexión. Que cuando el otro deja de reclamar, a veces dejó de esperar. Y que vale más preguntar y acercarse a tiempo que celebrar una tranquilidad que, en realidad, era una despedida silenciosa.</p></div>", "search": "su silencio no era paz, era que ya se había ido creí que habíamos dejado de pelear porque estábamos en paz. en realidad, ella ya se había rendido. en una relación importante, llegó un momento en que dejamos de discutir. yo lo interpreté como algo bueno. \"por fin estamos en paz\", pensé. ya no había reclamos, ya no había peleas. me confié.\n\nlo que no entendí a tiempo es que ese silencio no era paz. era que ella ya había dejado de esperar. mientras reclamaba, todavía le importaba, todavía creía que algo podía cambiar. cuando dejó de reclamar, no era que estuviera contenta: era que se había rendido por dentro.\n\ndejó de contarme sus cosas. dejó de pelear por lo que antes le molestaba. se fue guardando todo, no porque estuviera bien, sino porque ya se había ido un poco cada día.\n\npara cuando me di cuenta, el silencio ya era total. y entendí, tarde, que no todos avisan gritando; muchos avisan callando.\n\naprendí que en una relación hay silencios que no son calma, sino desconexión. que cuando el otro deja de reclamar, a veces dejó de esperar. y que vale más preguntar y acercarse a tiempo que celebrar una tranquilidad que, en realidad, era una despedida silenciosa.", "copies": [["Copy teaser", "Creí que habíamos dejado de pelear porque estábamos en paz. En realidad, ella ya se había rendido."], ["Copy script", "En una relación importante, llegó un momento en que dejamos de discutir. Yo lo interpreté como algo bueno. \"Por fin estamos en paz\", pensé. Ya no había reclamos, ya no había peleas. Me confié.\n\nLo que no entendí a tiempo es que ese silencio no era paz. Era que ella ya había dejado de esperar. Mientras reclamaba, todavía le importaba, todavía creía que algo podía cambiar. Cuando dejó de reclamar, no era que estuviera contenta: era que se había rendido por dentro.\n\nDejó de contarme sus cosas. Dejó de pelear por lo que antes le molestaba. Se fue guardando todo, no porque estuviera bien, sino porque ya se había ido un poco cada día.\n\nPara cuando me di cuenta, el silencio ya era total. Y entendí, tarde, que no todos avisan gritando; muchos avisan callando.\n\nAprendí que en una relación hay silencios que no son calma, sino desconexión. Que cuando el otro deja de reclamar, a veces dejó de esperar. Y que vale más preguntar y acercarse a tiempo que celebrar una tranquilidad que, en realidad, era una despedida silenciosa."]]}, {"fmt": "F3", "n": 143, "bucket": "", "title": "APRENDÍ A DISTINGUIR RENDIRME DE SOLTAR A TIEMPO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Me enseñaron que rendirse era de débiles. Aprendí que a veces soltar es lo más inteligente.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Crecí con la idea de que rendirse era de débiles, que había que insistir siempre, no abandonar nunca. Así que me aferraba a cosas mucho después de que dejaran de tener sentido. A proyectos, a relaciones, a caminos que solo me desgastaban.</p><p class='g'>Con el tiempo entendí que hay una línea fina entre ser constante y ser terco. Insistir cuando avanzas, aunque sea lento, es fortaleza. Insistir cuando solo te agotas y nada cambia, muchas veces es miedo a soltar disfrazado de perseverancia.</p><p class='g'>Aprendí a hacerme una pregunta honesta: ¿sigo en esto porque lo quiero, o porque no quiero perder lo que ya invertí? Muchas veces insistía solo por orgullo, por no admitir que me había equivocado.</p><p class='g'>Y entendí algo que me liberó: rendirse a tiempo no es fracasar. A veces, soltar es la decisión más inteligente que puedes tomar. No todo lo que dejas es una derrota; mucho es liberación.</p><p class='g'>También aprendí a no confundir mi identidad con una meta. Podía soltar un camino y elegir otro sin perderme a mí mismo. Hoy sé cuándo apretar los dientes y seguir, y cuándo soltar con paz. Y esa diferencia me ahorró años de desgaste.</p></div>", "search": "aprendí a distinguir rendirme de soltar a tiempo me enseñaron que rendirse era de débiles. aprendí que a veces soltar es lo más inteligente. crecí con la idea de que rendirse era de débiles, que había que insistir siempre, no abandonar nunca. así que me aferraba a cosas mucho después de que dejaran de tener sentido. a proyectos, a relaciones, a caminos que solo me desgastaban.\n\ncon el tiempo entendí que hay una línea fina entre ser constante y ser terco. insistir cuando avanzas, aunque sea lento, es fortaleza. insistir cuando solo te agotas y nada cambia, muchas veces es miedo a soltar disfrazado de perseverancia.\n\naprendí a hacerme una pregunta honesta: ¿sigo en esto porque lo quiero, o porque no quiero perder lo que ya invertí? muchas veces insistía solo por orgullo, por no admitir que endía todo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Antes creía que para destacar había que hablar mucho. Llenaba los silencios, opinaba de todo, contaba lo que sabía. Quería parecer inteligente, importante, presente.</p><p class='g'>Con el tiempo, observando, noté algo. En muchos grupos, el que más hablaba no era el que más sabía. Y el que se quedaba callado, escuchando, muchas veces era el que de verdad entendía todo lo que pasaba.</p><p class='g'>Mientras yo hablaba, no aprendía nada nuevo; solo repetía lo que ya sabía y, encima, revelaba mis cartas. El callado, en cambio, recogía información, leía a la gente, entendía el terreno sin entregar el suyo.</p><p class='g'>Entendí que el que sabe no necesita demostrarlo a gritos. Que muchas veces el vacío es el que hace más ruido. Y que hablar de más te expone, mientras observar de más te da poder.</p><p class='g'>Empecé a hablar menos y a escuchar más. A pensar antes de decir, a decir menos pero mejor. Y curiosamente, empecé a entender más, a equivocarme menos y a que mi palabra pesara más cuando sí la usaba. Aprendí que el silencio, bien usado, no es falta de respuesta; es una forma de inteligencia.</p></div>", "search": "entendí que el que menos hablaba era el que más sabía yo hablaba para parecer inteligente. tarde noté que el callado del grupo era el que de verdad entendía todo. antes creía que para destacar había que hablar mucho. llenaba los silencios, opinaba de todo, contaba lo que sabía. quería parecer inteligente, importante, presente.\n\ncon el tiempo, observando, noté algo. en muchos grupos, el que más hablaba no era el que más sabía. y el que se quedaba callado, escuchando, muchas veces era el que de verdad entendía todo lo que pasaba.\n\nmientras yo hablaba, no aprendía nada nuevo; solo repetía lo que ya sabía y, encima, revelaba mis cartas. el callado, en cambio, recogía información, leía a la gente, entendía el terreno sin entregar el suyo.\n\nentendí que el que sabe no necesita demostrarlo a gritos. que muchas veces el vacío es el que hace más ruido. y que hablar de más te expone, mientras observar de más te da poder.\n\nempecé a hablar menos y a escuchar más. a pensar antes de decir, a decir menos pero mejor. y curiosamente, empecé a entender más, a equivocarme menos y a que mi palabra pesara más cuando sí la usaba. aprendí que el silencio, bien usado, no es falta de respuesta; es una forma de inteligencia.", "copies": [["Copy teaser", "Yo hablaba para parecer inteligente. Tarde noté que el callado del grupo era el que de verdad entendía todo."], ["Copy script", "Antes creía que para destacar había que hablar mucho. Llenaba los silencios, opinaba de todo, contaba lo que sabía. Quería parecer inteligente, importante, presente.\n\nCon el tiempo, observando, noté algo. En muchos grupos, el que más hablaba no era el que más sabía. Y el que se quedaba callado, escuchando, muchas veces era el que de verdad entendía todo lo que pasaba.\n\nMientras yo hablaba, no aprendía nada nuevo; solo repetía lo que ya sabía y, encima, revelaba mis cartas. El callado, en cambio, recogía información, leía a la gente, entendía el terreno sin entregar el suyo.\n\nEntendí que el que sabe no necesita demostrarlo a gritos. Que muchas veces el vacío es el que hace más ruido. Y que hablar de más te expone, mientras observar de más te da poder.\n\nEmpecé a hablar menos y a escuchar más. A pensar antes de decir, a decir menos pero mejor. Y curiosamente, empecé a entender más, a equivocarme menos y a que mi palabra pesara más cuando sí la usaba. Aprendí que el silencio, bien usado, no es falta de respuesta; es una forma de inteligencia."]]}, {"fmt": "F3", "n": 145, "bucket": "", "title": "ENTENDÍ QUE ATRAÍA LO QUE TOLERABA", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Me preguntaba por qué siempre me trataban mal. La respuesta era incómoda: lo estaba permitiendo.</p><span class='lbl'>Full script · goes in   return { get(k){ try{ return ok?localStorage.getItem(k):mem[k]; }catch(e){ return mem[k]; } },
           set(k,v){ try{ ok?localStorage.setItem(k,v):(mem[k]=v); }catch(e){ mem[k]=v; } } };
})();
const doneKey=it=>"done:"+it.fmt+":"+it.n;
const isDone=it=>store.get(doneKey(it))==="1";
let activeFmt="ALL", query="", hideDone=false;
const grid=document.getElementById("grid"), tabsEl=document.getElementById("tabs"),
      emptyEl=document.getElementById("empty"), toast=document.getElementById("toast");
function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("hide").addEventListener("change",e=>{hideDone=e.target.checked;render();});
document.addEventListener("keydown",e=>{ if(e.key==="/" && document.activeElement.id!=="q"){e.preventDefault();document.getElementById("q").focus();}});
renderTabs(); render();
</script>
</body>
</html>
