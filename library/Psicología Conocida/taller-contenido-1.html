e que valen. Cuando alguien respeta tu tiempo, respeta tu vida. El que siempre te hace esperar te está diciendo en silencio el lugar que ocupas en su lista."]]}, {"fmt": "F2", "n": 37, "bucket": "", "title": "3 VERDADES SOBRE CUIDAR TU PAZ", "body": "<ol class='pts'><li><strong>No todo merece tu reacción.</strong> Hay comentarios, mensajes y personas que solo buscan sacarte de tu calma. Responder a todo te mantiene alterado por cosas que no valen. Elegir qué ignorar es una forma de cuidarte. La paz no es que nada te moleste, es decidir a qué le das el poder de afectarte.</li><li><strong>Alejarte de lo que te daña no es egoísmo.</strong> Poner distancia con personas o situaciones que te quitan la calma es cuidarte, no abandonar a nadie. No tienes que quedarte donde te lastiman por miedo al qué dirán. Proteger tu paz a veces significa soltar, y eso está bien. Primero tú, para poder con lo demás.</li><li><strong>Tu paz vale más que tener la razón.</strong> Ganar una discusión inútil te deja alterado y sin nada. A veces es mejor soltar la última palabra y quedarte tranquilo. No todo se trata de demostrar quién tiene razón. Elige tu calma antes que el orgullo; al final, la tranquilidad pesa más que cualquier victoria en una pelea.</li></ol>", "search": "3 verdades sobre cuidar tu paz no todo merece tu reacción. hay comentarios, mensajes y personas que solo buscan sacarte de tu calma. responder a todo te mantiene alterado por cosas que no valen. elegir qué ignorar es una forma de cuidarte. la paz no es que nada te moleste, es decidir a qué le das el poder de afectarte. alejarte de lo que te daña no es egoísmo. poner distancia con personas o situaciones que te quitan la calma es cuidarte, no abandonar a nadie. no tienes que quedarte donde te lastiman por miedo al qué dirán. proteger tu paz a veces significa soltar, y eso está bien. primero tú, para poder con lo demás. tu paz vale más que tener la razón. ganar una discusión inútil te deja alterado y sin nada. a veces es mejor soltar la última palabra y quedarte tranquilo. no todo se trata de demostrar quién tiene razón. elige tu calma antes que el orgullo; al final, la tranquilidad pesa más que cualquier victoria en una pelea.", "copies": [["Copy card", "3 VERDADES SOBRE CUIDAR TU PAZ\n\n1. No todo merece tu reacción. Hay comentarios, mensajes y personas que solo buscan sacarte de tu calma. Responder a todo te mantiene alterado por cosas que no valen. Elegir qué ignorar es una forma de cuidarte. La paz no es que nada te moleste, es decidir a qué le das el poder de afectarte.\n\n2. Alejarte de lo que te daña no es egoísmo. Poner distancia con personas o situaciones que te quitan la calma es cuidarte, no abandonar a nadie. No tienes que quedarte donde te lastiman por miedo al qué dirán. Proteger tu paz a veces significa soltar, y eso está bien. Primero tú, para poder con lo demás.\n\n3. Tu paz vale más que tener la razón. Ganar una discusión inútil te deja alterado y sin nada. A veces es mejor soltar la última palabra y quedarte tranquilo. No todo se trata de demostrar quién tiene razón. Elige tu calma antes que el orgullo; al final, la tranquilidad pesa más que cualquier victoria en una pelea."]]}, {"fmt": "F2", "n": 38, "bucket": "", "title": "POR QUÉ LA DISCIPLINA VENCE A LA MOTIVACIÓN", "body": "<ol class='pts'><li><strong>La motivación viene y se va; la disciplina se queda.</strong> La motivación es una chispa que se apaga rápido. Si dependes de tener ganas, vas a fallar el día que no las tengas. La disciplina es hacer lo que toca aunque no quieras. Por eso el constante le gana al motivado: uno depende del ánimo, el otro no.</li><li><strong>Los días sin ganas son los que de verdad cuentan.</strong> Cualquiera avanza cuando está inspirado. La diferencia la hacen los días grises, cuando estás cansado y aun así cumples. Esos días, que nadie ve y que nadie aplaude, son los que construyen los resultados. Lo fácil lo hace todo el mundo; lo que te separa es lo que haces sin ganas.</li><li><strong>No esperes el impulso, crea el hábito.</strong> Cuando algo se vuelve rutina, dejas de pelear contigo cada día para hacerlo. La disciplina no es fuerza de voluntad infinita, es repetir hasta que sea automático. Empieza pequeño, hazlo a la misma hora, y deja que la costumbre haga el trabajo que la motivación no puede sostener.</li></ol>", "search": "por qué la disciplina vence a la motivación la motivación viene y se va; la disciplina se queda. la motivación es una chispa que se apaga rápido. si dependes de tener ganas, vas a fallar el día que no las tengas. la disciplina es hacer lo que toca aunque no quieras. por eso el constante le gana al motivado: uno depende del ánimo, el otro no. los días sin ganas son los que de verdad cuentan. cualquiera avanza cuando está inspirado. la diferencia la hacen los días grises, cuando estás cansado y aun así cumples. esos días, que nadie ve y que nadie aplaude, son los que construyen los resultados. lo fácil lo hace todo el mundo; lo que te separa es lo que haces sin ganas. no esperes el impulso, crea el hábito. cuando algo se vuelve rutina, dejas de pelear contigo cada día para hacerlo. la disciplina no es fuerza de voluntad infinita, es repetir hasta que sea automático. empieza pequeño, hazlo a la misma hora, y deja que la costumbre haga el trabajo que la motivación no puede sostener.", "copies": [["Copy card", "POR QUÉ LA DISCIPLINA VENCE A LA MOTIVACIÓN\n\n1. La motivación viene y se va; la disciplina se queda. La motivación es una chispa que se apaga rápido. Si dependes de tener ganas, vas a fallar el día que no las tengas. La disciplina es hacer lo que toca aunque no quieras. Por eso el constante le gana al motivado: uno depende del ánimo, el otro no.\n\n2. Los días sin ganas son los que de verdad cuentan. Cualquiera avanza cuando está inspirado. La diferencia la hacen los días grises, cuando estás cansado y aun así cumples. Esos días, que nadie ve y que nadie aplaude, son los que construyen los resultados. Lo fácil lo hace todo el mundo; lo que te separa es lo que haces sin ganas.\n\n3. No esperes el impulso, crea el hábito. Cuando algo se vuelve rutina, dejas de pelear contigo cada día para hacerlo. La disciplina no es fuerza de voluntad infinita, es repetir hasta que sea automático. Empieza pequeño, hazlo a la misma hora, y deja que la costumbre haga el trabajo que la motivación no puede sostener."]]}, {"fmt": "F2", "n": 39, "bucket": "", "title": "3 LECCIONES DE DINERO QUE CAMBIAN TU VIDA", "body": "<ol class='pts'><li><strong>Págate a ti primero, antes de gastar en lo demás.</strong> La mayoría guarda lo que sobra al final del mes, y casi nunca sobra. Si apartas una parte apenas cobras, aprendes a vivir con el resto. Ese pequeño cambio, hecho cada mes, es lo que separa al que avanza del que siempre vive justo.</li><li><strong>Tu mayor gasto suele ser querer impresionar.</strong> Mucho de lo que compras no es por necesidad, es para que otros lo vean. Ropa, autos y lujos que pagas por meses solo para aparentar. La gente olvida rápido lo que mostraste, pero tú sigues pagando la deuda. Aparentar es el camino más corto a quedarte sin nada.</li><li><strong>El dinero te da opciones, y las opciones son libertad.</strong> Ahorrar no es para presumir después. Es para poder decir que no a lo que no quieres, dejar lo que te hace mal y decidir cómo vives. El que tiene un respaldo no depende de nadie. Esa tranquilidad vale más que cualquier cosa que puedas comprar.</li></ol>", "search": "3 lecciones de dinero que cambian tu vida págate a ti primero, antes de gastar en lo demás. la mayoría guarda lo que sobra al final del mes, y casi nunca sobra. si apartas una parte apenas cobras, aprendes a vivir con el resto. ese pequeño cambio, hecho cada mes, es lo que separa al que avanza del que siempre vive justo. tu mayor gasto suele ser querer impresionar. mucho de lo que compras no es por necesidad, es para que otros lo vean. ropa, autos y lujos que pagas por meses solo para aparentar. la gente olvida rápido lo que mostraste, pero tú sigues pagando la deuda. aparentar es el camino más corto a quedarte sin nada. el dinero te da opciones, y las opciones son libertad. ahorrar no es para presumir después. es para poder decir que no a lo que no quieres, dejar lo que te hace mal y decidir cómo vives. el que tiene un respaldo no depende de nadie. esa tranquilidad vale más que cualquier cosa que puedas comprar.", "copies": [["Copy card", "3 LECCIONES DE DINERO QUE CAMBIAN TU VIDA\n\n1. Págate a ti primero, antes de gastar en lo demás. La mayoría guarda lo que sobra al final del mes, y casi nunca sobra. Si apartas una parte apenas cobras, aprendes a vivir con el resto. Ese pequeño cambio, hecho cada mes, es lo que separa al que avanza del que siempre vive justo.\n\n2. Tu mayor gasto suele ser querer impresionar. Mucho de lo que compras no es por necesidad, es para que otros lo vean. Ropa, autos y lujos que pagas por meses solo para aparentar. La gente olvida rápido lo que mostraste, pero tú sigues pagando la deuda. Aparentar es el camino más corto a quedarte sin nada.\n\n3. El dinero te da opciones, y las opciones son libertad. Ahorrar no es para presumir después. Es para poder decir que no a lo que no quieres, dejar lo que te hace mal y decidir cómo vives. El que tiene un respaldo no depende de nadie. Esa tranquilidad vale más que cualquier cosa que puedas comprar."]]}, {"fmt": "F2", "n": 40, "bucket": "", "title": "3 FORMAS EN QUE LA GENTE TE MANIPULA SIN QUE LO NOTES", "body": "<ol class='pts'><li><strong>Te hacen sentir culpable para que cedas.</strong> Te recuerdan lo que hicieron por ti, exageran un error tuyo, te hacen sentir en deuda. Cuando ya te sientes mal, piden lo que querían desde el principio. La culpa bien puesta te hace obedecer sin que te des cuenta. Aprende a notar cuándo una culpa fue sembrada a propósito.</li><li><strong>Crean prisa para que no pienses.</strong> &quot;Es ahora o nunca&quot;, &quot;decide ya&quot;. La urgencia es una trampa: sin tiempo para pensar, eliges con miedo. La gente honesta te da espacio. El que te apura casi siempre esconde algo que no quiere que veas. Frente a la prisa, detente; ahí se cae el engaño.</li><li><strong>Se hacen las víctimas para no responder.</strong> Cuando deberían dar la cara, le dan la vuelta y terminan haciéndose los heridos. Así nunca asumen lo que hacen, y tú terminas pidiendo perdón sin deber nada. Cuídate de quien siempre es la víctima; muchas veces es el que controla, disfrazado de débil.</li></ol>", "search": "3 formas en que la gente te manipula sin que lo notes te hacen sentir culpable para que cedas. te recuerdan lo que hicieron por ti, exageran un error tuyo, te hacen sentir en deuda. cuando ya te sientes mal, piden lo que querían desde el principio. la culpa bien puesta te hace obedecer sin que te des cuenta. aprende a notar cuándo una culpa fue sembrada a propósito. crean prisa para que no pienses. \"es ahora o nunca\", \"decide ya\". la urgencia es una trampa: sin tiempo para pensar, eliges con miedo. la gente honesta te da espacio. el que te apura casi siempre esconde algo que no quiere que veas. frente a la prisa, detente; ahí se cae el engaño. se hacen las víctimas para no responder. cuando deberían dar la cara, le dan la vuelta y terminan haciéndose los heridos. así nunca asumen lo que hacen, y tú terminas pidiendo perdón sin deber nada. cuídate de quien siempre es la víctima; muchas veces es el que controla, disfrazado de débil.", "copies": [["Copy card", "3 FORMAS EN QUE LA GENTE TE MANIPULA SIN QUE LO NOTES\n\n1. Te hacen sentir culpable para que cedas. Te recuerdan lo que hicieron por ti, exageran un error tuyo, te hacen sentir en deuda. Cuando ya te sientes mal, piden lo que querían desde el principio. La culpa bien puesta te hace obedecer sin que te des cuenta. Aprende a notar cuándo una culpa fue sembrada a propósito.\n\n2. Crean prisa para que no pienses. \"Es ahora o nunca\", \"decide ya\". La urgencia es una trampa: sin tiempo para pensar, eliges con miedo. La gente honesta te da espacio. El que te apura casi siempre esconde algo que no quiere que veas. Frente a la prisa, detente; ahí se cae el engaño.\n\n3. Se hacen las víctimas para no responder. Cuando deberían dar la cara, le dan la vuelta y terminan haciéndose los heridos. Así nunca asumen lo que hacen, y tú terminas pidiendo perdón sin deber nada. Cuídate de quien siempre es la víctima; muchas veces es el que controla, disfrazado de débil."]]}, {"fmt": "F2", "n": 41, "bucket": "", "title": "3 VERDADES SOBRE EL PODER Y EL SILENCIO", "body": "<ol class='pts'><li><strong>El que habla de más entrega información.</strong> Cada cosa que cuentas de ti, alguien la puede usar después. El que habla todo el tiempo regala sus planes, sus miedos y sus debilidades sin notarlo. El que escucha y calla observa, aprende y guarda. En cualquier mesa, el que menos habla suele ser el que más control tiene.</li><li><strong>El que controla su reacción controla la situación.</strong> Cuando te alteras fácil, le entregas el mando a quien te provoca. Basta una palabra para moverte. El que mantiene la calma desarma al otro, porque no sabe qué hacer con alguien que no reacciona. Tu tranquilidad, frente a la provocación, es una de las formas más altas de poder.</li><li><strong>Mostrar todo lo que tienes te deja sin defensa.</strong> El que enseña sus cartas, sus planes y sus recursos queda expuesto. La gente usa lo que sabe de ti cuando le conviene. Guardar algo para ti no es desconfianza, es protección. Mientras menos sepan de tus movimientos, menos podrán anticiparlos o frenarlos.</li></ol>", "search": "3 verdades sobre el poder y el silencio el que habla de más entrega información. cada cosa que cuentas de ti, alguien la puede usar después. el que habla todo el tiempo regala sus planes, sus miedos y sus debilidades sin notarlo. el que escucha y calla observa, aprende y guarda. en cualquier mesa, el que menos habla suele ser el que más control tiene. el que controla su reacción controla la situación. cuando te alteras fácil, le entregas el mando a quien te provoca. basta una palabra para moverte. el que mantiene la calma desarma al otro, porque no sabe qué hacer con alguien que no reacciona. tu tranquilidad, frente a la provocación, es una de las formas más altas de poder. mostrar todo lo que tienes te deja sin defensa. el que enseña sus cartas, sus planes y sus recursos queda expuesto. la gente usa lo que sabe de ti cuando le conviene. guardar algo para ti no es desconfianza, es protección. mientras menos sepan de tus movimientos, menos podrán anticiparlos o frenarlos.", "copies": [["Copy card", "3 VERDADES SOBRE EL PODER Y EL SILENCIO\n\n1. El que habla de más entrega información. Cada cosa que cuentas de ti, alguien la puede usar después. El que habla todo el tiempo regala sus planes, sus miedos y sus debilidades sin notarlo. El que escucha y calla observa, aprende y guarda. En cualquier mesa, el que menos habla suele ser el que más control tiene.\n\n2. El que controla su reacción controla la situación. Cuando te alteras fácil, le entregas el mando a quien te provoca. Basta una palabra para moverte. El que mantiene la calma desarma al otro, porque no sabe qué hacer con alguien que no reacciona. Tu tranquilidad, frente a la provocación, es una de las formas más altas de poder.\n\n3. Mostrar todo lo que tienes te deja sin defensa. El que enseña sus cartas, sus planes y sus recursos queda expuesto. La gente usa lo que sabe de ti cuando le conviene. Guardar algo para ti no es desconfianza, es protección. Mientras menos sepan de tus movimientos, menos podrán anticiparlos o frenarlos."]]}, {"fmt": "F2", "n": 42, "bucket": "", "title": "POR QUÉ LA CONSTANCIA VENCE AL TALENTO", "body": "<ol class='pts'><li><strong>El talento sin trabajo se queda en promesa.</strong> Hay gente con mucho talento que nunca logra nada, porque cree que con eso basta. El talento abre la puerta, pero el trabajo es el que entra. Sin esfuerzo constante, el don más grande se desperdicia. Por eso muchos &quot;menos talentosos&quot; llegan más lejos: hicieron lo que el talentoso no quiso.</li><li><strong>El que aparece todos los días le gana al inspirado de a ratos.</strong> La inspiración llega cuando quiere y se va igual. La constancia, en cambio, no depende del ánimo. El que trabaja también los días sin ganas acumula avances que el inspirado de vez en cuando nunca alcanza. Ganar no es cuestión de chispa, es de presencia.</li><li><strong>Los resultados se construyen aburridos y lentos.</strong> Casi nada bueno llega rápido. Detrás de cada logro hay meses repitiendo lo mismo sin ver cambios. El que entiende esto no se rinde en la parte aburrida, que es justo donde la mayoría abandona. Lo lento y constante construye lo que lo rápido e intenso nunca sostiene.</li></ol>", "search": "por qué la constancia vence al talento el talento sin trabajo se queda en promesa. hay gente con mucho talento que nunca logra nada, porque cree que con eso basta. el talento abre la puerta, pero el trabajo es el que entra. sin esfuerzo constante, el don más grande se desperdicia. por eso muchos \"menos talentosos\" llegan más lejos: hicieron lo que el talentoso no quiso. el que aparece todos los días le gana al inspirado de a ratos. la inspiración llega cuando quiere y se va igual. la constancia, en cambio, no depende del ánimo. el que trabaja también los días sin ganas acumula avances que el inspirado de vez en cuando nunca alcanza. ganar no es cuestión de chispa, es de presencia. los resultados se construyen aburridos y lentos. casi nada bueno llega rápido. detrás de cada logro hay meses repitiendo lo mismo sin ver cambios. el que entiende esto no se rinde en la parte aburrida, que es justo donde la mayoría abandona. lo lento y constante construye lo que lo rápido e intenso nunca sostiene.", "copies": [["Copy card", "POR QUÉ LA CONSTANCIA VENCE AL TALENTO\n\n1. El talento sin trabajo se queda en promesa. Hay gente con mucho talento que nunca logra nada, porque cree que con eso basta. El talento abre la puerta, pero el trabajo es el que entra. Sin esfuerzo constante, el don más grande se desperdicia. Por eso muchos \"menos talentosos\" llegan más lejos: hicieron lo que el talentoso no quiso.\n\n2. El que aparece todos los días le gana al inspirado de a ratos. La inspiración llega cuando quiere y se va igual. La constancia, en cambio, no depende del ánimo. El que trabaja también los días sin ganas acumula avances que el inspirado de vez en cuando nunca alcanza. Ganar no es cuestión de chispa, es de presencia.\n\n3. Los resultados se construyen aburridos y lentos. Casi nada bueno llega rápido. Detrás de cada logro hay meses repitiendo lo mismo sin ver cambios. El que entiende esto no se rinde en la parte aburrida, que es justo donde la mayoría abandona. Lo lento y constante construye lo que lo rápido e intenso nunca sostiene."]]}, {"fmt": "F2", "n": 43, "bucket": "", "title": "3 VERDADES SOBRE GASTAR PARA IMPRESIONAR", "body": "<ol class='pts'><li><strong>Compras cosas que se ven para gente que no te ayuda.</strong> Gastas en ropa, autos y lujos para impresionar a personas que ni se acuerdan de ti al día siguiente. Pagas por una mirada de aprobación que dura segundos. Mientras tanto, te quedas ajustado. Nadie que te admira por tus cosas va a pagar tus cuentas cuando aprieten.</li><li><strong>La deuda queda; la admiración se va rápido.</strong> El lujo que compras a crédito se disfruta un momento y se paga por meses. La gente se impresiona un día y olvida al siguiente, pero la cuota sigue llegando. Cambiar tranquilidad por aparentar es mal negocio. Lo que se ve impresiona poco; lo que tienes guardado sostiene.</li><li><strong>La verdadera tranquilidad no se muestra, se siente.</strong> El que de verdad está bien no necesita probarlo. La calma de tener con qué responder no se ve en una foto. Mientras unos gastan en parecer ricos, otros, en silencio, construyen para serlo. No confundas mostrar con tener; muchas veces el que más enseña es el que menos tiene.</li></ol>", "search": "3 verdades sobre gastar para impresionar compras cosas que se ven para gente que no te ayuda. gastas en ropa, autos y lujos para impresionar a personas que ni se acuerdan de ti al día siguiente. pagas por una mirada de aprobación que dura segundos. mientras tanto, te quedas ajustado. nadie que te admira por tus cosas va a pagar tus cuentas cuando aprieten. la deuda queda; la admiración se va rápido. el lujo que compras a crédito se disfruta un momento y se paga por meses. la gente se impresiona un día y olvida al siguiente, pero la cuota sigue llegando. cambiar tranquilidad por aparentar es mal negocio. lo que se ve impresiona poco; lo que tienes guardado sostiene. la verdadera tranquilidad no se muestra, se siente. el que de verdad está bien no necesita probarlo. la calma de tener con qué responder no se ve en una foto. mientras unos gastan en parecer ricos, otros, en silencio, construyen para serlo. no confundas mostrar con tener; muchas veces el que más enseña es el que menos tiene.", "copies": [["Copy card", "3 VERDADES SOBRE GASTAR PARA IMPRESIONAR\n\n1. Compras cosas que se ven para gente que no te ayuda. Gastas en ropa, autos y lujos para impresionar a personas que ni se acuerdan de ti al día siguiente. Pagas por una mirada de aprobación que dura segundos. Mientras tanto, te quedas ajustado. Nadie que te admira por tus cosas va a pagar tus cuentas cuando aprieten.\n\n2. La deuda queda; la admiración se va rápido. El lujo que compras a crédito se disfruta un momento y se paga por meses. La gente se impresiona un día y olvida al siguiente, pero la cuota sigue llegando. Cambiar tranquilidad por aparentar es mal negocio. Lo que se ve impresiona poco; lo que tienes guardado sostiene.\n\n3. La verdadera tranquilidad no se muestra, se siente. El que de verdad está bien no necesita probarlo. La calma de tener con qué responder no se ve en una foto. Mientras unos gastan en parecer ricos, otros, en silencio, construyen para serlo. No confundas mostrar con tener; muchas veces el que más enseña es el que menos tiene."]]}, {"fmt": "F2", "n": 44, "bucket": "", "title": "3 SEÑALES DE QUE ALGUIEN QUIERE APROVECHARSE DE TI", "body": "<ol class='pts'><li><strong>Te pide favores pero nunca los devuelve.</strong> La relación es de un solo lado: tú das, él recibe. Cuando tú necesitas algo, siempre tiene una excusa. El que te valora busca el equilibrio; el que se aprovecha solo busca su beneficio. Fíjate si después de ayudarlo sientes que te usó o que de verdad lo agradeció.</li><li><strong>Aparece solo cuando necesita algo.</strong> Desaparece cuando estás bien y vuelve cuando le falta algo. Tu valor para esa persona depende de lo que le puedas dar. Cuando dejas de servirle, deja de buscarte. La gente real está también cuando no te necesita; el aprovechado, solo cuando le conviene.</li><li><strong>Usa tu culpa para conseguir lo que quiere.</strong> Te hace sentir mal por decir que no, te recuerda lo que hizo por ti, te presiona con suavidad. Convierte tu bondad en una herramienta. Aprende a poner límites sin sentir culpa. El que te quiere respeta tu &quot;no&quot;; el que se aprovecha lo trata como un problema.</li></ol>", "search": "3 señales de que alguien quiere aprovecharse de ti te pide favores pero nunca los devuelve. la relación es de un solo lado: tú das, él recibe. cuando tú necesitas algo, siempre tiene una excusa. el que te valora busca el equilibrio; el que se aprovecha solo busca su beneficio. fíjate si después de ayudarlo sientes que te usó o que de verdad lo agradeció. aparece solo cuando necesita algo. desaparece cuando estás bien y vuelve cuando le falta algo. tu valor para esa persona depende de lo que le puedas dar. cuando dejas de servirle, deja de buscarte. la gente real está también cuando no te necesita; el aprovechado, solo cuando le conviene. usa tu culpa para conseguir lo que quiere. te hace sentir mal por decir que no, te recuerda lo que hizo por ti, te presiona con suavidad. convierte tu bondad en una herramienta. aprende a poner límites sin sentir culpa. el que te quiere respeta tu \"no\"; el que se aprovecha lo trata como un problema.", "copies": [["Copy card", "3 SEÑALES DE QUE ALGUIEN QUIERE APROVECHARSE DE TI\n\n1. Te pide favores pero nunca los devuelve. La relación es de un solo lado: tú das, él recibe. Cuando tú necesitas algo, siempre tiene una excusa. El que te valora busca el equilibrio; el que se aprovecha solo busca su beneficio. Fíjate si después de ayudarlo sientes que te usó o que de verdad lo agradeció.\n\n2. Aparece solo cuando necesita algo. Desaparece cuando estás bien y vuelve cuando le falta algo. Tu valor para esa persona depende de lo que le puedas dar. Cuando dejas de servirle, deja de buscarte. La gente real está también cuando no te necesita; el aprovechado, solo cuando le conviene.\n\n3. Usa tu culpa para conseguir lo que quiere. Te hace sentir mal por decir que no, te recuerda lo que hizo por ti, te presiona con suavidad. Convierte tu bondad en una herramienta. Aprende a poner límites sin sentir culpa. El que te quiere respeta tu \"no\"; el que se aprovecha lo trata como un problema."]]}, {"fmt": "F2", "n": 45, "bucket": "", "title": "POR QUÉ DEBES INVERTIR EN TI ANTES QUE EN COSAS", "body": "<ol class='pts'><li><strong>Lo que aprendes nadie te lo quita.</strong> Las cosas se pierden, se rompen o se gastan. El conocimiento y las habilidades se quedan contigo para siempre. Cada cosa que aprendes aumenta lo que puedes hacer y lo que puedes ganar. Invertir en ti es la única compra que nunca pierde valor y que casi siempre se multiplica.</li><li><strong>Las cosas se gastan; tú puedes seguir creciendo.</strong> Un lujo te da una alegría corta y luego se vuelve normal. Mejorar una habilidad te abre puertas durante años. Cuando dudes entre gastar en algo que se ve o en algo que te hace mejor, elige lo segundo. Lo que te transforma vale más que lo que solo te entretiene.</li><li><strong>Mejorar tú es la inversión que más rinde.</strong> Puedes perder dinero, trabajo o cosas, pero si tú vales más, siempre puedes recuperarte. La mejor garantía para tu futuro no es lo que guardas, es en quién te conviertes. Trabaja en ti con la misma seriedad con la que trabajas por dinero, y el dinero terminará siguiéndote.</li></ol>", "search": "por qué debes invertir en ti antes que en cosas lo que aprendes nadie te lo quita. las cosas se pierden, se rompen o se gastan. el conocimiento y las habilidades se quedan contigo para siempre. cada cosa que aprendes aumenta lo que puedes hacer y lo que puedes ganar. invertir en ti es la única compra que nunca pierde valor y que casi siempre se multiplica. las cosas se gastan; tú puedes seguir creciendo. un lujo te da una alegría corta y luego se vuelve normal. mejorar una habilidad te abre puertas durante años. cuando dudes entre gastar en algo que se ve o en algo que te hace mejor, elige lo segundo. lo que te transforma vale más que lo que solo te entretiene. mejorar tú es la inversión que más rinde. puedes perder dinero, trabajo o cosas, pero si tú vales más, siempre puedes recuperarte. la mejor garantía para tu futuro no es lo que guardas, es en quién te conviertes. trabaja en ti con la misma seriedad con la que trabajas por dinero, y el dinero terminará siguiéndote.", "copies": [["Copy card", "POR QUÉ DEBES INVERTIR EN TI ANTES QUE EN COSAS\n\n1. Lo que aprendes nadie te lo quita. Las cosas se pierden, se rompen o se gastan. El conocimiento y las habilidades se quedan contigo para siempre. Cada cosa que aprendes aumenta lo que puedes hacer y lo que puedes ganar. Invertir en ti es la única compra que nunca pierde valor y que casi siempre se multiplica.\n\n2. Las cosas se gastan; tú puedes seguir creciendo. Un lujo te da una alegría corta y luego se vuelve normal. Mejorar una habilidad te abre puertas durante años. Cuando dudes entre gastar en algo que se ve o en algo que te hace mejor, elige lo segundo. Lo que te transforma vale más que lo que solo te entretiene.\n\n3. Mejorar tú es la inversión que más rinde. Puedes perder dinero, trabajo o cosas, pero si tú vales más, siempre puedes recuperarte. La mejor garantía para tu futuro no es lo que guardas, es en quién te conviertes. Trabaja en ti con la misma seriedad con la que trabajas por dinero, y el dinero terminará siguiéndote."]]}, {"fmt": "F2", "n": 46, "bucket": "", "title": "3 RAZONES POR LAS QUE EL DINERO CALLADO CRECE MÁS", "body": "<ol class='pts'><li><strong>El que muestra todo lo que tiene atrae pedidos y envidia.</strong> Cuando la gente sabe cuánto ganas, cambia cómo te trata. Unos se acercan por interés, otros se alejan por envidia, y casi todos esperan algo. Hablar de tu dinero solo trae problemas. Lo que callas no genera comparaciones ni pedidos; tu cuenta es asunto tuyo.</li><li><strong>Lo que no saben de ti, no te lo pueden quitar ni pedir.</strong> Mientras menos conozcan de tus recursos, más tranquilo vives. El que presume despierta el interés de quien quiere aprovecharse. La discreción no es esconderse, es protegerte. Mostrar de menos casi nunca trae problemas; mostrar de más, casi siempre.</li><li><strong>La discreción te ahorra problemas que el lujo atrae.</strong> El que vive mostrando se vuelve blanco de envidias, pedidos y hasta peligros. El que vive tranquilo, sin alardear, evita todo eso. No tienes que demostrarle a nadie lo que tienes. La paz de pasar desapercibido vale más que la atención que da presumir.</li></ol>", "search": "3 razones por las que el dinero callado crece más el que muestra todo lo que tiene atrae pedidos y envidia. cuando la gente sabe cuánto ganas, cambia cómo te trata. unos se acercan por interés, otros se alejan por envidia, y casi todos esperan algo. hablar de tu dinero solo trae problemas. lo que callas no genera comparaciones ni pedidos; tu cuenta es asunto tuyo. lo que no saben de ti, no te lo pueden quitar ni pedir. mientras menos conozcan de tus recursos, más tranquilo vives. el que presume despierta el interés de quien quiere aprovecharse. la discreción no es esconderse, es protegerte. mostrar de menos casi nunca trae problemas; mostrar de más, casi siempre. la discreción te ahorra problemas que el lujo atrae. el que vive mostrando se vuelve blanco de envidias, pedidos y hasta peligros. el que vive tranquilo, sin alardear, evita todo eso. no tienes que demostrarle a nadie lo que tienes. la paz de pasar desapercibido vale más que la atención que da presumir.", "copies": [["Copy card", "3 RAZONES POR LAS QUE EL DINERO CALLADO CRECE MÁS\n\n1. El que muestra todo lo que tiene atrae pedidos y envidia. Cuando la gente sabe cuánto ganas, cambia cómo te trata. Unos se acercan por interés, otros se alejan por envidia, y casi todos esperan algo. Hablar de tu dinero solo trae problemas. Lo que callas no genera comparaciones ni pedidos; tu cuenta es asunto tuyo.\n\n2. Lo que no saben de ti, no te lo pueden quitar ni pedir. Mientras menos conozcan de tus recursos, más tranquilo vives. El que presume despierta el interés de quien quiere aprovecharse. La discreción no es esconderse, es protegerte. Mostrar de menos casi nunca trae problemas; mostrar de más, casi siempre.\n\n3. La discreción te ahorra problemas que el lujo atrae. El que vive mostrando se vuelve blanco de envidias, pedidos y hasta peligros. El que vive tranquilo, sin alardear, evita todo eso. No tienes que demostrarle a nadie lo que tienes. La paz de pasar desapercibido vale más que la atención que da presumir."]]}, {"fmt": "F2", "n": 47, "bucket": "", "title": "3 HÁBITOS QUE TE HACEN MENTALMENTE FUERTE", "body": "<ol class='pts'><li><strong>Hacer lo difícil aunque no quieras.</strong> La fuerza mental se entrena haciendo lo que cuesta, no lo que apetece. Cada vez que cumples sin ganas, te vuelves un poco más fuerte. El que solo actúa motivado depende de algo que va y viene. El que hace lo difícil por costumbre ya no necesita ganas para avanzar.</li><li><strong>No reaccionar nte.</strong> No toda la gente que tienes cerca te quiere ver crecer. A medida que avanzas, algunos se alejan y otros cambian contigo. Subir tiene un precio que pocos mencionan: te quedas con menos compañía, pero más verdadera. No te asustes si al mejorar tu círculo se hace más pequeño.</li><li><strong>No todos se alegran de verte ganar.</strong> Esperas que tu gente celebre tus logros, y descubres que a algunos les molesta. Tu avance les recuerda lo que no han hecho. No siempre es maldad, a veces es envidia disfrazada de cariño. Aprende a compartir tus alegrías solo con los pocos que se alegran de verdad.</li><li><strong>Cada meta nueva trae un reto nuevo.</strong> Crees que al llegar vas a descansar, y descubres que arriba hay otros problemas. El éxito no es un punto final, es un camino que sigue. Eso no debe desanimarte, debe prepararte. Disfruta cada logro, pero no esperes que la vida deje de pedirte cosas; nunca lo hace.</li></ol>", "search": "3 verdades sobre el éxito que nadie te advierte cuanto más subes, a veces más solo se siente. no toda la gente que tienes cerca te quiere ver crecer. a medida que avanzas, algunos se alejan y otros cambian contigo. subir tiene un precio que pocos mencionan: te quedas con menos compañía, pero más verdadera. no te asustes si al mejorar tu círculo se hace más pequeño. no todos se alegran de verte ganar. esperas que tu gente celebre tus logros, y descubres que a algunos les molesta. tu avance les recuerda lo que no han hecho. no siempre es maldad, a veces es envidia disfrazada de cariño. aprende a compartir tus alegrías solo con los pocos que se alegran de verdad. cada meta nueva trae un reto nuevo. crees que al llegar vas a descansar, y descubres que arriba hay otros problemas. el éxito no es un punto final, es un camino que sigue. eso no debe desanimarte, debe prepararte. disfruta cada logro, pero no esperes que la vida deje de pedirte cosas; nunca lo hace.", "copies": [["Copy card", "3 VERDADES SOBRE EL ÉXITO QUE NADIE TE ADVIERTE\n\n1. Cuanto más subes, a veces más solo se siente. No toda la gente que tienes cerca te quiere ver crecer. A medida que avanzas, algunos se alejan y otros cambian contigo. Subir tiene un precio que pocos mencionan: te quedas con menos compañía, pero más verdadera. No te asustes si al mejorar tu círculo se hace más pequeño.\n\n2. No todos se alegran de verte ganar. Esperas que tu gente celebre tus logros, y descubres que a algunos les molesta. Tu avance les recuerda lo que no han hecho. No siempre es maldad, a veces es envidia disfrazada de cariño. Aprende a compartir tus alegrías solo con los pocos que se alegran de verdad.\n\n3. Cada meta nueva trae un reto nuevo. Crees que al llegar vas a descansar, y descubres que arriba hay otros problemas. El éxito no es un punto final, es un camino que sigue. Eso no debe desanimarte, debe prepararte. Disfruta cada logro, pero no esperes que la vida deje de pedirte cosas; nunca lo hace."]]}, {"fmt": "F2", "n": 50, "bucket": "", "title": "POR QUÉ TU ENTORNO DECIDE MÁS QUE TU ESFUERZO", "body": "<ol class='pts'><li><strong>Te vuelves parecido a la gente con la que pasas el tiempo.</strong> Sin darte cuenta, copias sus hábitos, su forma de hablar y hasta sus metas. Si te rodeas de gente que no hace nada, te cuesta avanzar; si te rodeas de gente que crece, te empujas a crecer. Tu círculo te sube o te baja, aunque no lo notes.</li><li><strong>Un mal entorno apaga hasta al más motivado.</strong> Puedes tener todas las ganas, pero si vives entre quejas, burlas y desánimo, terminas igual. El ambiente pesa más que la fuerza de voluntad. Por eso a veces el mayor avance no es esforzarte más, es cambiar de quién te rodeas. Cuida tu entorno como cuidas tus metas.</li><li><strong>Cambia tu círculo y cambias tu rumbo.</strong> Si quieres una vida distinta, mira con quién la estás compartiendo. A veces lo que te frena no es tu capacidad, son las personas que te rodean. No tienes que pelear con nadie, solo acercarte a quien suma y alejarte de quien resta. Tu rumbo cambia cuando cambia tu compañía.</li></ol>", "search": "por qué tu entorno decide más que tu esfuerzo te vuelves parecido a la gente con la que pasas el tiempo. sin darte cuenta, copias sus hábitos, su forma de hablar y hasta sus metas. si te rodeas de gente que no hace nada, te cuesta avanzar; si te rodeas de gente que crece, te empujas a crecer. tu círculo te sube o te baja, aunque no lo notes. un mal entorno apaga hasta al más motivado. puedes tener todas las ganas, pero si vives entre quejas, burlas y desánimo, terminas igual. el ambiente pesa más que la fuerza de voluntad. por eso a veces el mayor avance no es esforzarte más, es cambiar de quién te rodeas. cuida tu entorno como cuidas tus metas. cambia tu círculo y cambias tu rumbo. si quieres una vida distinta, mira con quién la estás compartiendo. a veces lo que te frena no es tu capacidad, son las personas que te rodean. no tienes que pelear con nadie, solo acercarte a quien suma y alejarte de quien resta. tu rumbo cambia cuando cambia tu compañía.", "copies": [["Copy card", "POR QUÉ TU ENTORNO DECIDE MÁS QUE TU ESFUERZO\n\n1. Te vuelves parecido a la gente con la que pasas el tiempo. Sin darte cuenta, copias sus hábitos, su forma de hablar y hasta sus metas. Si te rodeas de gente que no hace nada, te cuesta avanzar; si te rodeas de gente que crece, te empujas a crecer. Tu círculo te sube o te baja, aunque no lo notes.\n\n2. Un mal entorno apaga hasta al más motivado. Puedes tener todas las ganas, pero si vives entre quejas, burlas y desánimo, terminas igual. El ambiente pesa más que la fuerza de voluntad. Por eso a veces el mayor avance no es esforzarte más, es cambiar de quién te rodeas. Cuida tu entorno como cuidas tus metas.\n\n3. Cambia tu círculo y cambias tu rumbo. Si quieres una vida distinta, mira con quién la estás compartiendo. A veces lo que te frena no es tu capacidad, son las personas que te rodean. No tienes que pelear con nadie, solo acercarte a quien suma y alejarte de quien resta. Tu rumbo cambia cuando cambia tu compañía."]]}, {"fmt": "F3", "n": 1, "bucket": "", "title": "LA GENTE NO CAMBIA, SOLO SE CANSA DE FINGIR", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Pensabas que la gente cambió contigo. La verdad es más dura. No cambiaron. Solo dejaron de fingir lo que nunca sintieron. Lo que viste al final siempre estuvo ahí.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Por mucho tiempo creí que las personas cambiaban de un día para otro. Que alguien podía quererte hoy y olvidarte mañana sin razón. Con los años entendí algo distinto.</p><p class='g'>La gente casi nunca cambia. Solo se cansa de aparentar. El que un día te dio la espalda no se transformó. Siempre fue así. Lo que pasó es que dejó de hacer el esfuerzo de esconderlo.</p><p class='g'>Al principio duele. Sientes que perdiste a alguien. Después entiendes que no perdiste nada real, porque lo real no se finge.</p><p class='g'>Esto no debe volverte frío. Debe volverte atento. Aprende a mirar los hechos, no las palabras bonitas. La gente te muestra quién es desde el principio, pero a veces tú no quieres verlo.</p><p class='g'>Cuando alguien te enseñe su verdadera cara, créele. No esperes que vuelva la versión que te mostró solo para quedarse.</p></div>", "search": "la gente no cambia, solo se cansa de fingir pensabas que la gente cambió contigo. la verdad es más dura. no cambiaron. solo dejaron de fingir lo que nunca sintieron. lo que viste al final siempre estuvo ahí. por mucho tiempo creí que las personas cambiaban de un día para otro. que alguien podía quererte hoy y olvidarte mañana sin razón. con los años entendí algo distinto.\n\nla gente casi nunca cambia. solo se cansa de aparentar. el que un día te dio la espalda no se transformó. siempre fue así. lo que pasó es que dejó de hacer el esfuerzo de esconderlo.\n\nal principio duele. sientes que perdiste a alguien. después entiendes que no perdiste nada real, porque lo real no se finge.\n\nesto no debe volverte frío. debe volverte atento. aprende a mirar los hechos, no las palabras bonitas. la gente te muestra quién es desde el principio, pero a veces tú no quieres verlo.\n\ncuando alguien te enseñe su verdadera cara, créele. no esperes que vuelva la versión que te mostró solo para quedarse.", "copies": [["Copy teaser", "Pensabas que la gente cambió contigo. La verdad es más dura. No cambiaron. Solo dejaron de fingir lo que nunca sintieron. Lo que viste al final siempre estuvo ahí."], ["Copy script", "Por mucho tiempo creí que las personas cambiaban de un día para otro. Que alguien podía quererte hoy y olvidarte mañana sin razón. Con los años entendí algo distinto.\n\nLa gente casi nunca cambia. Solo se cansa de aparentar. El que un día te dio la espalda no se transformó. Siempre fue así. Lo que pasó es que dejó de hacer el esfuerzo de esconderlo.\n\nAl principio duele. Sientes que perdiste a alguien. Después entiendes que no perdiste nada real, porque lo real no se finge.\n\nEsto no debe volverte frío. Debe volverte atento. Aprende a mirar los hechos, no las palabras bonitas. La gente te muestra quién es desde el principio, pero a veces tú no quieres verlo.\n\nCuando alguien te enseñe su verdadera cara, créele. No esperes que vuelva la versión que te mostró solo para quedarse."]]}, {"fmt": "F3", "n": 2, "bucket": "", "title": "EL DÍA QUE DEJÉ DE EXPLICARME", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Durante años creí que si explicaba bien mis razones, la gente me entendería. Tardé en aceptar algo difícil: muchos no quieren entenderte. Solo quieren tener la razón.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Pasé gran parte de mi vida tratando de que los demás me entendieran. Si alguien me malinterpretaba, yo explicaba. Si seguía sin entender, explicaba otra vez, con más detalle y más paciencia. Pensaba que la a sin entender, explicaba otra vez, con más detalle y más paciencia. Pensaba que la verdad siempre gana si la dices bien.\n\nUn día me cansé. Discutía con alguien que no escuchaba ninguna palabra. Solo esperaba su turno para hablar. Ahí entendí algo que cambió mi forma de vivir: no todas las personas discuten para encontrar la verdad. Algunas discuten para ganar.\n\nDesde ese día dejé de explicarme tanto. Cuando alguien quiere entenderme, pocas palabras bastan. Cuando no quiere, ninguna palabra alcanza.\n\nNo pelees por convencer a quien ya decidió no escucharte. Tu paz vale más que tener la última palabra. Explícate una vez. Si no quieren verlo, sigue tu camino sin ruido."]]}, {"fmt": "F3", "n": 3, "bucket": "", "title": "NADIE TE AVISA CUÁNDO EMPIEZAS A CAMBIAR", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>El cambio no llega con un anuncio. Llega el día en que algo que antes te dolía mucho, de repente ya no te quita el sueño.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Nadie te avisa el día exacto en que empiezas a cambiar. No hay una señal. No hay un antes y un después claro. Solo un día te das cuenta de que reaccionas distinto.</p><p class='g'>Alguien dice algo que antes te habría arruinado la semana, y ahora solo te encoges de hombros. Una persona que antes te importaba demasiado te escribe, y ya no sientes esa urgencia de responder. No es que te hayas vuelto frío. Es que aprendiste lo que vale tu energía.</p><p class='g'>El crecimiento casi nunca se siente como crecimiento. Se siente como cansancio, como soledad, como soltar cosas que creías necesitar. Por dentro estás dejando atrás a la persona que aguantaba todo por miedo a quedarse sola.</p><p class='g'>Si hoy te cuesta reconocerte, no estás perdido. Estás cambiando. Y eso casi siempre duele antes de servir.</p></div>", "search": "nadie te avisa cuándo empiezas a cambiar el cambio no llega con un anuncio. llega el día en que volvían, personas que desaparecían sin decir nada. yo seguía esperando una explicación, creyendo que merecía al menos unas palabras.\n\ntardé años en entender algo. el silencio también es una respuesta. cuando alguien no te responde, ya te dijo lo que sentía. cuando alguien deja de buscarte, ya tomó su decisión. no siempre va a llegar la conversación que esperas para cerrar el tema.\n\nal principio eso me dolía. quería un motivo, una razón clara. después entendí que esperar esa explicación solo me mantenía esperando algo que el otro ya había dejado.\n\naprendí a aceptar las respuestas que no vienen con palabras. si alguien quiere estar, lo demuestra. si no, su ausencia lo dice todo.\n\ndeja de pedir explicaciones a quien ya te respondió con su silencio. a veces, soltar es la única respuesta que te queda.", "copies": [["Copy teaser", "Esperaba explicaciones que nunca llegaban. Me costó aceptar que cuando alguien no te responde, ya te respondió."], ["Copy script", "Pasé mucho tiempo esperando respuestas. Mensajes sin contestar, llamadas que no devolvían, personas que desaparecían sin decir nada. Yo seguía esperando una explicación, creyendo que merecía al menos unas palabras.\n\nTardé años en entender algo. El silencio también es una respuesta. Cuando alguien no te responde, ya te dijo lo que sentía. Cuando alguien deja de buscarte, ya tomó su decisión. No siempre va a llegar la conversación que esperas para cerrar el tema.\n\nAl principio eso me dolía. Quería un motivo, una razón clara. Después entendí que esperar esa explicación solo me mantenía esperando algo que el otro ya había dejado.\n\nAprendí a aceptar las respuestas que no vienen con palabras. Si alguien quiere estar, lo demuestra. Si no, su ausencia lo dice todo.\n\nDeja de pedir explicaciones a quien ya te respondió con su silencio. A veces, soltar es la única respuesta que te queda."]]}, {"fmt": "F3", "n": 7, "bucket": "", "title": "DESCUBRÍ QUE NO TODOS SE ALEGRAN CUANDO TE VA BIEN", "body": "<div class= dia disfrazada de cariño.\n\nno dejé de avanzar por eso. solo aprendí a ser más cuidadoso con quién comparto mis alegrías. las celebro con los pocos que se alegran sin medir.\n\nguarda tus logros para quien se alegra de verdad. los demás no necesitan saberlo todo.", "copies": [["Copy teaser", "Creía que mi gente celebraría mis logros. Aprendí que a algunos tu éxito les recuerda lo que no tienen."], ["Copy script", "Cuando empecé a mejorar mi vida, pensé que la gente cercana se alegraría conmigo. Esperaba llamadas, felicitaciones, esa emoción que uno cree que comparten los que te quieren.\n\nAlgunos se alegraron de verdad. Otros no. Y los que no, fueron justo los que menos esperaba.\n\nNoté cosas pequeñas. Comentarios secos. Felicitaciones sin ganas. Personas que celebraban más mis caídas que mis avances. Ahí entendí una verdad incómoda. No todos los que están cerca quieren verte crecer.\n\nA veces tu éxito le recuerda a alguien lo que no ha logrado. Y en vez de alegrarse, se incomoda. No siempre es maldad. A veces es envidia disfrazada de cariño.\n\nNo dejé de avanzar por eso. Solo aprendí a ser más cuidadoso con quién comparto mis alegrías. Las celebro con los pocos que se alegran sin medir.\n\nGuarda tus logros para quien se alegra de verdad. Los demás no necesitan saberlo todo."]]}, {"fmt": "F3", "n": 8, "bucket": "", "title": "POR MUCHO TIEMPO CONFUNDÍ APEGO CON AMOR", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Creía que extrañar tanto a alguien era amor. Después entendí que muchas veces solo era miedo a quedarme solo.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años pensé que mientras más me costara soltar a alguien, más lo quería. Si dolía, era amor. Si no podía dejar de pensar en esa persona, era amor. Así medía lo que sentía.</p><p class='g'>Con el tiempo empecé a dudar de esa idea. Me di cuenta de que a veces no extrañaba a la persona, extrañaba la compañía. No me d ados, dudando si valía la pena.</p><p class='g'>Así funciona casi siempre. La gente ve el momento del logro, no el camino largo y aburrido que llevó hasta ahí. Ven el resultado, no el esfuerzo que costó.</p><p class='g'>Eso me enseñó a no juzgar a otros por lo que muestran, y a no esperar que entiendan mi esfuerzo. El que no caminó tu camino no sabe lo que costó.</p><p class='g'>No trabajes para que vean tu esfuerzo. Trabaja por el resultado. El reconocimiento es raro, pero lo que construyes se queda contigo.</p></div>", "search": "nadie vio las horas que me costó la gente vio el resultado y creyó que fue suerte. nadie vio las noches, los intentos y las veces que casi me rindo. cuando por fin logré algo que quería, mucha gente lo vio fácil. \"qué suerte tuviste\", me decían. algunos pensaban que no me había costado nada, que todo había sido simple.\n\nnadie vio lo de atrás. las noches sin dormir, los intentos que salieron mal, las veces que quise rendirme y seguí. nadie vio los meses haciendo lo mismo sin ver resultados, dudando si valía la pena.\n\nasí funciona casi siempre. la gente ve el momento del logro, no el camino largo y aburrido que llevó hasta ahí. ven el resultado, no el esfuerzo que costó.\n\neso me enseñó a no juzgar a otros por lo que muestran, y a no esperar que entiendan mi esfuerzo. el que no caminó tu camino no sabe lo que costó.\n\nno trabajes para que vean tu esfuerzo. trabaja por el resultado. el reconocimiento es raro, pero lo que construyes se queda contigo.", "copies": [["Copy teaser", "La gente vio el resultado y creyó que fue suerte. Nadie vio las noches, los intentos y las veces que casi me rindo."], ["Copy script", "Cuando por fin logré algo que quería, mucha gente lo vio fácil. \"Qué suerte tuviste\", me decían. Algunos pensaban que no me había costado nada, que todo había sido simple.\n\nNadie vio lo de atrás. Las noches sin dormir, los intentos que salieron mal, las veces que quise rendirme y seguí. Nadie vio los meses haciendo lo mismo sin ver resultados, dudando si valía la pena.\n\nAsí funciona casi siempre. La gente ve el momento del logro, no el camino largo y aburrido que llevó hasta ahí. Ven el resultado, no el esfuerzo que costó.\n\nEso me enseñó a no juzgar a otros por lo que muestran, y a no esperar que entiendan mi esfuerzo. El que no caminó tu camino no sabe lo que costó.\n\nNo trabajes para que vean tu esfuerzo. Trabaja por el resultado. El reconocimiento es raro, pero lo que construyes se queda contigo."]]}, {"fmt": "F3", "n": 23, "bucket": "", "title": "CONFIÉ DEMASIADO RÁPIDO Y LO PAGUÉ", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Le abría mi vida a cualquiera que fuera amable conmigo. Aprendí, a golpes, que la confianza se gana, no se regala.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Antes confiaba en la gente demasiado rápido. Si alguien era amable conmigo unos días, ya le contaba mi vida, mis planes, mis miedos. Pensaba que ser abierto era algo bueno, que así se hacían los amigos de verdad.</p><p class='g'>Varias veces lo pagué caro. Conté cosas que después se usaron en mi contra. Confié secretos que terminaron en boca de otros. Me apoyé en personas que apenas conocía y que desaparecieron cuando las necesité.</p><p class='g'>Con el tiempo entendí que la confianza no se regala, se gana. Que ser amable los primeros días no dice quién es alguien de verdad. El tiempo y los hechos lo dicen, no las palabras bonitas del principio.</p><p class='g'>No me volví frío. Solo más cuidadoso. Ahora dejo que la gente me muestre quién es antes de abrirle mi vida.</p><p class='g'>No le entregues tu confianza a cualquiera por unos gestos amables. Deja que el tiempo te muestre quién merece entrar.</p></div>", "search": "confié demasiado rápido y lo pagué le abría mi vida a cualquiera que fuera amable conmigo. aprendí, a golpes, que la confianza se gana, no se regala. antes confiaba en la gente demasiado rápido. ean lo que hiciste, no lo que piensas hacer.", "copies": [["Copy teaser", "Antes contaba todos mis planes. Casi ninguno se cumplía. Cuando empecé a callar y solo hacer, todo cambió."], ["Copy script", "Antes contaba todos mis planes. Apenas tenía una idea, ya se la había dicho a medio mundo. Lo que iba a estudiar, el negocio que iba a empezar, los cambios que haría. Me gustaba el aplauso del comienzo.\n\nPero casi ningún plan se cumplía. Me di cuenta de algo curioso. Al contarlo, sentía que ya había avanzado, aunque no hubiera hecho nada. Esa satisfacción de hablar me quitaba las ganas de actuar.\n\nAdemás, no faltaba quien dudara, criticara o me bajara el ánimo antes de empezar. Sin querer, dejaba que otros apagaran la idea.\n\nUn día decidí callar. Empecé a trabajar en silencio, sin anunciar nada. Solo hacía. Y cuando había resultados, ahí los mostraba, ya hechos, no como promesa.\n\nDesde entonces logro más. Guarda tus planes hasta cumplirlos. Que vean lo que hiciste, no lo que piensas hacer."]]}, {"fmt": "F3", "n": 25, "bucket": "", "title": "DEJÉ DE PROBARLE MI VALOR A LA GENTE", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Me esforzaba para que me valoraran. Cuanto más probaba, menos me valoraban. Aprendí que mi valor no se discute.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años viví tratando de probar mi valor. Me esforzaba para que me aceptaran, para que me vieran, para que me valoraran. Daba de más, ayudaba de más, explicaba de más, esperando que la gente reconociera lo que valía.</p><p class='g'>Pero pasaba algo extraño. Cuanto más me esforzaba por probar mi valor, menos parecían valorarme. La gente se acostumbraba a recibir sin dar nada a cambio. Mientras más rogaba reconocimiento, menos lo recibía.</p><p class='g'>Un día me cansé. Entendí que el que tiene que rogar para que lo valoren está en el lugar equivocado, con la gente equivocada. Mi valor no debería estar const LABELS = {F1:"Lists", F2:"3 Points", F3:"Script", F4:"Prompts"};
const store=(()=>{ let mem={}; let ok=true;
  try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k);}catch(e){ ok=false; }
  return { get(k){ try{ return ok?localStorage.getItem(k):mem[k]; }catch(e){ return mem[k]; } },
           set(k,v){ try{ ok?localStorage.setItem(k,v):(mem[k]=v); }catch(e){ mem[k]=v; } } };
})();
const doneKey=it=>"done:"+it.fmt+":"+it.n;
const isDone=it=>store.get(doneKey(it))==="1";
let activeFmt="ALL", query="", hideDone=false;
const grid=document.getElementById("grid"), tabsEl=document.getElementById("tabs"),
      emptyEl=document.getElementById("empty"), toast=document.getElementById("toast");
function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
