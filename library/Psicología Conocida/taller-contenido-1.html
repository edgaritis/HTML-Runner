<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Content Workshop · Round 1</title>
<style>
:root{
  --bg:#f3f2ee; --surface:#ffffff; --ink:#1b1a17; --muted:#736e65; --line:#e6e2da;
  --accent:#c2410c; --accent-soft:#fbe9df;
  --f1:#2f7d4f; --f2:#c2410c; --f3:#3f5168; --f4:#6d4c7d;
  --shadow:0 1px 2px rgba(20,18,14,.04),0 6px 16px rgba(20,18,14,.05);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px}
header.bar{position:sticky;top:0;z-index:20;background:rgba(243,242,238,.86);
  backdrop-filter:saturate(1.1) blur(8px);border-bottom:1px solid var(--line)}
.bar .wrap{padding-top:14px;padding-bottom:12px}
.brandrow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.brand{font-weight:700;letter-spacing:.02em;font-size:17px}
.brand b{color:var(--accent)}
.sub{color:var(--muted);font-size:13px}
.controls{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap}
.search{flex:1;min-width:200px;display:flex;align-items:center;gap:8px;
  background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:8px 11px}
.search input{border:0;outline:0;background:transparent;width:100%;font:inherit;color:var(--ink)}
.search svg{flex:none;color:var(--muted)}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab{border:1px solid var(--line);background:var(--surface);color:var(--muted);
  border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;
  display:inline-flex;gap:7px;align-items:center;transition:.12s}
.tab:hover{border-color:#d4cfc4}
.tab[aria-selected="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.tab .cnt{font-size:11px;opacity:.7;font-weight:600}
.toggle{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;cursor:pointer;user-select:none}
.toggle input{accent-color:var(--accent)}
main .wrap{padding-top:20px;padding-bottom:64px}
.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));align-items:start}
.card{background:var(--surface);border:1px solid var(--line);border-radius:13px;
  padding:16px 16px 14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:11px}
.card.done{opacity:.5}
.chead{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 8px;border-radius:6px;color:#fff;text-transform:uppercase}
.p-F1{background:var(--f1)} .p-F2{background:var(--f2)} .p-F3{background:var(--f3)} .p-F4{background:var(--f4)}
.bucket{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:6px;padding:3px 7px}
.idx{margin-left:auto;font-size:12px;color:#a9a297;font-variant-numeric:tabular-nums}
.markbtn{border:1px solid var(--line);background:var(--surface);border-radius:7px;
  font-size:12px;padding:4px 9px;color:var(--muted);cursor:pointer;font-weight:600}
.markbtn:hover{border-color:#d4cfc4}
.card.done .markbtn{background:var(--f1);color:#fff;border-color:var(--f1)}
.title{font-weight:800;text-transform:uppercase;letter-spacing:.02em;font-size:15.5px;line-height:1.28;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .title{-webkit-text-fill-color:initial;color:var(--muted);background:none}
.qtitle{font-weight:800;font-size:16px;line-height:1.32;
  background:linear-gradient(90deg,#d9a441,#c2410c);-webkit-background-clip:text;background-clip:text;color:transparent}
.card.done .qtitle{-webkit-text-fill-color:initial;color:var(--muted);background:none}
ol.lst,ol.pts{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:8px}
ol.lst li,ol.pts li{padding-left:3px}
ol.lst .d{color:#bdb6aa}
ol.pts li{line-height:1.45}
.note{font-size:12px;color:var(--muted);font-style:italic;margin:2px 0 0}
.f3 .lbl{display:block;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;
  color:var(--accent);margin:2px 0 4px}
.f3 .teaser{margin:0 0 10px;background:var(--accent-soft);border-radius:8px;padding:9px 11px}
.f3 p.g{margin:0 0 7px}
.prompt{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;
  white-space:pre-wrap;background:#1b1a17;color:#ece6da;border-radius:9px;padding:12px;max-height:220px;overflow:auto}
.cfoot{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.copy{flex:1;min-width:120px;border:0;border-radius:8px;padding:9px 12px;font:inherit;font-weight:700;font-size:13px;
  cursor:pointer;background:var(--accent);color:#fff;transition:.12s}
.copy.secondary{background:var(--ink)}
.copy:hover{filter:brightness(1.06)}
.copy.ok{background:var(--f1)!important}
.empty{text-align:center;color:var(--muted);padding:70px 10px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:.18s;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

lo contigo.", "copies": [["Copy card", "5 COSAS QUE NUNCA DEBES REVELAR DE TI\n\n1. Tu próximo movimiento - el que conoce tu plan puede adelantarse a frenarlo.\n2. Cuánto te duele algo - quien sabe tu herida, sabe dónde apretar.\n3. Todo tu pasado de golpe - lo que cuentas hoy puede volver mañana.\n4. Tus metas a quien no las comparte - hay quien escucha solo para desanimarte.\n5. Lo que más quieres - el que sabe tu deseo aprende a usarlo contigo."]]}, {"fmt": "F1", "n": 42, "bucket": "Habits", "title": "5 COSAS QUE HACE LA GENTE QUE SÍ CUMPLE SUS METAS", "body": "<ol class='lst'><li><strong>Empieza aunque no tenga ganas</strong> <span class='d'>-</span> la acción primero, el ánimo después.</li><li><strong>Convierte la meta en un hábito diario</strong> <span class='d'>-</span> lo constante vence a lo intenso.</li><li><strong>Mide su avance</strong> <span class='d'>-</span> lo que se mide, mejora.</li><li><strong>Se rodea de quien la empuja</strong> <span class='d'>-</span> el entorno influye más que la voluntad.</li><li><strong>No se rinde por un mal día</strong> <span class='d'>-</span> un tropiezo no borra el camino recorrido.</li></ol>", "search": "5 cosas que hace la gente que sí cumple sus metas hábitos empieza aunque no tenga ganas la acción primero, el ánimo después. convierte la meta en un hábito diario lo constante vence a lo intenso. mide su avance lo que se mide, mejora. se rodea de quien la empuja el entorno influye más que la voluntad. no se rinde por un mal día un tropiezo no borra el camino recorrido.", "copies": [["Copy card", "5 COSAS QUE HACE LA GENTE QUE SÍ CUMPLE SUS METAS\n\n1. Empieza aunque no tenga ganas - la acción primero, el ánimo después.\n2. Convierte la meta en un hábito diario - lo constante vence a lo intenso.\n3. Mide su avance - lo que se mide, mejora.\n4. Se rodea de quien la empuja - el entorno influye más que la voluntad.\n5. No se rinde por un mal día - un tropiezo no borra el camino recorrido."]]}, {"fmt": "F1", "n": 43, "bucke lvidan</strong> <span class='d'>-</span> lo que tanto temes se borra rápido de sus cabezas.</li><li><strong>Tu vida la vives tú, no ellos</strong> <span class='d'>-</span> el que opina no carga tus consecuencias.</li></ol>", "search": "5 verdades que te liberan de la opinión de los demás mindset la mayoría piensa en sí misma, no en ti te observan menos de lo que crees. no puedes gustarle a todo el mundo el que intenta agradar a todos se pierde a sí mismo. las críticas dicen más del que critica hablan de su envidia, no de tu valor. hoy hablan, mañana se olvidan lo que tanto temes se borra rápido de sus cabezas. tu vida la vives tú, no ellos el que opina no carga tus consecuencias.", "copies": [["Copy card", "5 VERDADES QUE TE LIBERAN DE LA OPINIÓN DE LOS DEMÁS\n\n1. La mayoría piensa en sí misma, no en ti - te observan menos de lo que crees.\n2. No puedes gustarle a todo el mundo - el que intenta agradar a todos se pierde a sí mismo.\n3. Las críticas dicen más del que critica - hablan de su envidia, no de tu valor.\n4. Hoy hablan, mañana se olvidan - lo que tanto temes se borra rápido de sus cabezas.\n5. Tu vida la vives tú, no ellos - el que opina no carga tus consecuencias."]]}, {"fmt": "F1", "n": 46, "bucket": "Power", "title": "5 SEÑALES DE QUE TIENES PRESENCIA SIN DECIR NADA", "body": "<ol class='lst'><li><strong>Hablas poco pero firme</strong> <span class='d'>-</span> el que mide sus palabras se hace escuchar.</li><li><strong>No reaccionas a cada provocación</strong> <span class='d'>-</span> tu calma incomoda más que cualquier respuesta.</li><li><strong>Cumples lo que dices</strong> <span class='d'>-</span> tu palabra pesa porque la respaldas con hechos.</li><li><strong>No buscas agradar a todos</strong> <span class='d'>-</span> tu seguridad no depende de caer bien.</li><li><strong>Sabes cuándo retirarte</strong> <span class='d'>-</span> el que se va a tiempo deja más huella que el que se queda.</li></ol>", "search": "5 señales de que tienes presencia sin decir nada poder hablas poco pero firme el que mide sus palabras se hace escuchar. no reaccionas a cada provocación tu calma incomoda más que cualquier respuesta. cumples lo que dices tu palabra pesa porque la respaldas con hechos. no buscas agradar a todos tu seguridad no depende de caer bien. sabes cuándo retirarte el que se va a tiempo deja más huella que el que se queda.", "copies": [["Copy card", "5 SEÑALES DE QUE TIENES PRESENCIA SIN DECIR NADA\n\n1. Hablas poco pero firme - el que mide sus palabras se hace escuchar.\n2. No reaccionas a cada provocación - tu calma incomoda más que cualquier respuesta.\n3. Cumples lo que dices - tu palabra pesa porque la respaldas con hechos.\n4. No buscas agradar a todos - tu seguridad no depende de caer bien.\n5. Sabes cuándo retirarte - el que se va a tiempo deja más huella que el que se queda."]]}, {"fmt": "F1", "n": 47, "bucket": "Mindset", "title": "5 SEÑALES DE QUE TIENES MENTALIDAD DE ESCASEZ", "body": "<ol class='lst'><li><strong>Gastas en mostrar, no en crecer</strong> <span class='d'>-</span> inviertes en parecer, no en avanzar.</li><li><strong>Te molesta que a otros les vaya bien</strong> <span class='d'>-</span> crees que su éxito te quita el tuyo.</li><li><strong>Buscas lo barato aunque dure poco</strong> <span class='d'>-</span> terminas pagando dos veces por ahorrar mal.</li><li><strong>Sientes que nunca alcanza</strong> <span class='d'>-</span> el problema muchas veces no es cuánto tienes, es cómo piensas.</li><li><strong>Esperas que alguien te rescate</strong> <span class='d'>-</span> mientras esperas, dejas de construir lo tuyo.</li></ol>", "search": "5 señales de que tienes mentalidad de escasez mindset gastas en mostrar, no en crecer inviertes en parecer, no en avanzar. te molesta que a otros les vaya bien crees que su éxito te quita el tuyo. buscas lo barato aunque dure poco terminas pagando dos veces por ahorrar mal. sientes que nunca alcanza el problema muchas veces no es cuánto tienes, es cómo piensas. esperas que alguien te rescate mientras esperas, dejas de construir lo tuyo.", "copies": [["Copy card", "5 SEÑALES DE QUE TIENES MENTALIDAD DE ESCASEZ\n\n1. Gastas en mostrar, no en crecer - inviertes en parecer, no en avanzar.\n2. Te molesta que a otros les vaya bien - crees que su éxito te quita el tuyo.\n3. Buscas lo barato aunque dure poco - terminas pagando dos veces por ahorrar mal.\n4. Sientes que nunca alcanza - el problema muchas veces no es cuánto tienes, es cómo piensas.\n5. Esperas que alguien te rescate - mientras esperas, dejas de construir lo tuyo."]]}, {"fmt": "F1", "n": 48, "bucket": "Time", "title": "5 COSAS QUE VAS A DESEAR HABER EMPEZADO ANTES", "body": "<ol class='lst'><li><strong>Cuidar tu salud</strong> <span class='d'>-</span> el cuerpo cobra tarde lo que descuidas hoy.</li><li><strong>Ahorrar e invertir</strong> <span class='d'>-</span> el dinero guardado temprano crece con el tiempo.</li><li><strong>Aprender algo nuevo</strong> <span class='d'>-</span> lo que pospones por años se aprende en meses si empiezas.</li><li><strong>Soltar lo que te hacía daño</strong> <span class='d'>-</span> cada año aguantando es un año que no vuelve.</li><li><strong>Vivir para ti y no para otros</strong> <span class='d'>-</span> tarde entiendes que la aprobación ajena no llena.</li></ol>", "search": "5 cosas que vas a desear haber empezado antes tiempo cuidar tu salud el cuerpo cobra tarde lo que descuidas hoy. ahorrar e invertir el dinero guardado temprano crece con el tiempo. aprender algo nuevo lo que pospones por años se aprende en meses si empiezas. soltar lo que te hacía daño cada año aguantando es un año que no vuelve. vivir para ti y no para otros tarde entiendes que la aprobación ajena no llena.", "copies": [["Copy card", "5 COSAS QUE VAS A DESEAR HABER EMPEZADO ANTES\n\n1. Cuidar tu salud - el cuerpo cobra tarde lo que descuidas hoy.\n2. Ahorrar e invertir - el dinero guardado temprano crece con el tiempo.\n3. Aprender algo nuevo - lo que pospones por años se aprende en meses si empiezas.\n4. Soltar lo que te hacía daño - cada año aguantando es un año que no vuelve.\n5. Vivir para ti y no para otros - tarde entiendes que la aprobación ajena no llena."]]}, {"fmt": "F1", "n": 49, "bucket": "Disciplina", "title": "5 EXCUSAS QUE TE MANTIENEN EN EL MISMO LUGAR", "body": "<ol class='lst'><li><strong>&quot;No tengo tiempo&quot;</strong> <span class='d'>-</span> casi siempre hay tiempo, falta prioridad.</li><li><strong>&quot;Empiezo el lunes&quot;</strong> <span class='d'>-</span> el lunes del que pospone nunca llega.</li><li><strong>&quot;No sé por dónde empezar&quot;</strong> <span class='d'>-</span> se aprende avanzando, no esperando.</li><li><strong>&quot;Cuando tenga más dinero&quot;</strong> <span class='d'>-</span> el que no ordena lo poco, tampoco ordena lo mucho.</li><li><strong>&quot;Es que soy así&quot;</strong> <span class='d'>-</span> lo que llamas &quot;así&quot; muchas veces es solo costumbre.</li></ol>", "search": "5 excusas que te mantienen en el mismo lugar disciplina \"no tengo tiempo\" casi siempre hay tiempo, falta prioridad. \"empiezo el lunes\" el lunes del que pospone nunca llega. \"no sé por dónde empezar\" se aprende avanzando, no esperando. \"cuando tenga más dinero\" el que no ordena lo poco, tampoco ordena lo mucho. \"es que soy así\" lo que llamas \"así\" muchas veces es solo costumbre.", "copies": [["Copy card", "5 EXCUSAS QUE TE MANTIENEN EN EL MISMO LUGAR\n\n1. \"No tengo tiempo\" - casi siempre hay tiempo, falta prioridad.\n2. \"Empiezo el lunes\" - el lunes del que pospone nunca llega.\n3. \"No sé por dónde empezar\" - se aprende avanzando, no esperando.\n4. \"Cuando tenga más dinero\" - el que no ordena lo poco, tampoco ordena lo mucho.\n5. \"Es que soy así\" - lo que llamas \"así\" muchas veces es solo costumbre."]]}, {"fmt": "F1", "n": 50, "bucket": "Hard truths", "title": "5 VERDADES QUE LA VIDA TE ENSEÑA A LOS GOLPES", "body": "<ol class='lst'><li><strong>Nadie viene a salvarte</strong> <span class='d'>-</span> tu vida es tu responsabilidad, aunque no sea tu culpa.</li><li><strong>La gente muestra quién es con el tiempo</strong> <span class='d'>-</span> cree en lo que hacen, no en lo que dicen.</li><li><strong>El que se fue, no era para quedarse</strong> <span class='d'>-</span> lo que es tuyo no necesita súplicas.</li><li><strong>El dinero importa más de lo que admiten</strong> <span class='d'>-</span> no compra todo, pero evita muchos males.</li><li><strong>El tiempo perdido no se recupera</strong> <span class='d'>-</span> cuida con quién y en qué lo gastas.</li></ol>", "search": "5 verdades que la vida te enseña a los golpes verdades amargas nadie viene a salvarte tu vida es tu responsabilidad, aunque no sea tu culpa. la gente muestra quién es con el tiempo cree en lo que hacen, no en lo que dicen. el que se fue, no era para quedarse lo que es tuyo no necesita súplicas. el dinero importa más de lo que admiten no compra todo, pero evita muchos males. el tiempo perdido no se recupera cuida con quién y en qué lo gastas.", "copies": [["Copy card", "5 VERDADES QUE LA VIDA TE ENSEÑA A LOS GOLPES\n\n1. Nadie viene a salvarte - tu vida es tu responsabilidad, aunque no sea tu culpa.\n2. La gente muestra quién es con el tiempo - cree en lo que hacen, no en lo que dicen.\n3. El que se fue, no era para quedarse - lo que es tuyo no necesita súplicas.\n4. El dinero importa más de lo que admiten - no compra todo, pero evita muchos males.\n5. El tiempo perdido no se recupera - cuida con quién y en qué lo gastas."]]}, {"fmt": "F2", "n": 1, "bucket": "", "title": "3 VERDADES SOBRE LA GENTE QUE TE ENVIDIA", "body": "<ol class='pts'><li><strong>La envidia no se ve, se disfraza.</strong> Quien te envidia casi nunca te lo dice. Te sonríe, te felicita, y por dentro le molesta tu avance. Lo notas en los detalles: celebra poco tus logros y aparece rápido cuando algo te sale mal. No esperes que lo admita. La envidia trabaja callada y casi siempre parece amistad.</li><li><strong>El que te envidia estudia tu vida más que la suya.</strong> Sabe cuánto ganas, con quién sales y qué compraste. No es interés, es comparación. Mientras tú vives, él mide. Le importa más tu avance que el propio. Por eso, mientras menos sepan de ti, menos podrán compararse. Tu silencio les quita el material que tanto buscan.</li><li><strong>No todos los que están cerca quieren verte crecer.</strong> Algunos te quieren igual o por debajo de ellos. Cuando subes, se incomodan, aunque no lo digan. Cuídate de quien solo aparece en tus malos momentos y desaparece en los buenos. El que se alegra de verdad por ti es raro. Cuando lo encuentres, cuídalo.</li></ol>", "search": "3 verdades sobre la gente que te envidia la envidia no se ve, se disfraza. quien te envidia casi nunca te lo dice. te sonríe, te felicita, y por dentro le molesta tu avance. lo notas en los detalles: celebra poco tus logros y aparece rápido cuando algo te sale mal. no esperes que lo admita. la envidia trabaja callada y casi siempre parece amistad. el que te envidia estudia tu vida más que la suya. sabe cuánto ganas, con quién sales y qué compraste. no es interés, es comparación. mientras tú vives, él mide. le importa más tu avance que el propio. por eso, mientras menos sepan de ti, menos podrán compararse. tu silencio les quita el material que tanto buscan. no todos los que están cerca quieren verte crecer. algunos te quieren igual o por debajo de ellos. cuando subes, se incomodan, aunque no lo digan. cuídate de quien solo aparece en tus malos momentos y desaparece en los buenos. el que se alegra de verdad por ti es raro. cuando lo encuentres, cuídalo.", "copies": [["Copy card", "3 VERDADES SOBRE LA GENTE QUE TE ENVIDIA\n\n1. La envidia no se ve, se disfraza. Quien te envidia casi nunca te lo dice. Te sonríe, te felicita, y por dentro le molesta tu avance. Lo notas en los detalles: celebra poco tus logros y aparece rápido cuando algo te sale mal. No esperes que lo admita. La envidia trabaja callada y casi siempre parece amistad.\n\n2. El que te envidia estudia tu vida más que la suya. Sabe cuánto ganas, con quién sales y qué compraste. No es interés, es comparación. Mientras tú vives, él mide. Le importa más tu avance que el propio. Por eso, mientras menos sepan de ti, menos podrán compararse. Tu silencio les quita el material que tanto buscan.\n\n3. No todos los que están cerca quieren verte crecer. Algunos te quieren igual o por debajo de ellos. Cuando subes, se incomodan, aunque no lo digan. Cuídate de quien solo aparece en tus malos momentos y desaparece en los buenos. El que se alegra de verdad por ti es raro. Cuando lo encuentres, cuídalo."]]}, {"fmt": "F2", "n": 2, "bucket": "", "title": "POR QUÉ ALGUNAS PERSONAS SE ALEJAN DE TI", "body": "<ol class='pts'><li><strong>No todas las personas se van porque hiciste algo malo.</strong> Algunas se quedan solo mientras reciben algo de ti. Cuando tenías tiempo, atención o ayuda para dar, estaban cerca. El día que ya no tuviste nada que ofrecer, encontraron otra puerta. No siempre es traición. A veces solo era interés disfrazado de cariño.</li><li><strong>La gente cambia cuando cambia lo que gana contigo.</strong> Mientras les servías, eras importante. Cuando dejaste de ser útil, te volviste invisible. Esto no te hace débil ni a ellos completamente malos. Solo te muestra una verdad simple: mucha cercanía depende del beneficio. Observa quién se queda cuando ya no puedes dar nada.</li><li><strong>El silencio te enseña quién era real.</strong> Cuando dejas de buscar a las personas, ves cuántas te buscan a ti. Algunas desaparecen en una semana. Otras siguen ahí sin que las llames. Esa diferencia te dice todo. No necesitas pelear para saber quién te valora. Solo deja de insistir y observa.</li></ol>", "search": "por qué algunas personas se alejan de ti no todas las personas se van porque hiciste algo malo. algunas se quedan solo mientras reciben algo de ti. cuando tenías tiempo, atención o ayuda para dar, estaban ia cómo te trata. Algunos se acercan por interés, otros se alejan por envidia. El dinero callado no genera comparaciones ni pedidos. No es que mientas, es que no todo lo que ganas le importa a los demás. Tu cuenta es tuya.</li><li><strong>Tus planes pierden fuerza cuando los anuncias antes de tiempo.</strong> Al contar lo que vas a hacer, sientes que ya avanzaste, y te relajas. Además, le das a otros la oportunidad de dudar o de frenarte. La gente que logra cosas habla poco de lo que viene. Primero lo hace, después lo muestra. El resultado convence más que la promesa.</li><li><strong>Tus debilidades en la boca equivocada se vuelven armas.</strong> No todo el que escucha tus miedos quiere ayudarte. Algunos guardan esa información para usarla el día que les convenga. Contar lo que te duele a cualquiera te deja expuesto. Elige bien a quién le abres tu vida. La confianza se gana, no se reparte por pena o por costumbre.</li></ol>", "search": "3 cosas que la gente inteligente nunca cuenta lo que ganas es la información que más te puede costar. cuando la gente sabe cuánto tienes, cambia cómo te trata. algunos se acercan por interés, otros se alejan por envidia. el dinero callado no genera comparaciones ni pedidos. no es que mientas, es que no todo lo que ganas le importa a los demás. tu cuenta es tuya. tus planes pierden fuerza cuando los anuncias antes de tiempo. al contar lo que vas a hacer, sientes que ya avanzaste, y te relajas. además, le das a otros la oportunidad de dudar o de frenarte. la gente que logra cosas habla poco de lo que viene. primero lo hace, después lo muestra. el resultado convence más que la promesa. tus debilidades en la boca equivocada se vuelven armas. no todo el que escucha tus miedos quiere ayudarte. algunos guardan esa información para usarla el día que les convenga. contar lo que te duele a cualquiera te deja expuesto. elige bien a quién le abres tu vida. la confianza se gana, no se reparte por pena o por costumbre.", "copies": [["Copy card", s que vean todas tus cartas. El que muestra todo lo que sabe, lo que tiene y lo que planea, queda expuesto. La gente usa esa información cuando le conviene. Guardar algo para ti no es mentir, es protegerte. Mientras menos sepan de tus movimientos, menos podrán anticiparlos o frenarlos. La reserva también es defensa.\n\n2. Hazte valioso, no disponible a toda hora. Lo que abunda se valora poco. Si siempre estás disponible para todo y para todos, dejas de ser especial. El que pone límites a su tiempo y su energía termina siendo más respetado. No es un juego; es entender que tu presencia vale más cuando no se regala.\n\n3. Controla tu reacción y controlas la situación. El que se altera fácil entrega el control a quien lo provoca. Cuando guardas la calma, la otra persona no sabe qué hacer. Tu reacción es lo único que de verdad puedes manejar. Aprende a responder despacio, no a explotar rápido. La calma, frente a la provocación, es poder."]]}, {"fmt": "F2", "n": 16, "bucket": "", "title": "3 HÁBITOS QUE SEPARAN A QUIEN AVANZA DE QUIEN SE QUEDA", "body": "<ol class='pts'><li><strong>Hacen lo importante aunque no tengan ganas.</strong> El que avanza no espera sentirse motivado. Sabe que las ganas llegan después de empezar, no antes. Mientras unos esperan el momento perfecto, otros ya hicieron el trabajo. La diferencia no es el talento, es aparecer todos los días, con ánimo o sin él. La constancia gana.</li><li><strong>Cuidan su tiempo como cuidan su dinero.</strong> Quien avanza no regala sus horas a cualquier cosa. Sabe que el tiempo no vuelve, así que elige en qué y con quién lo gasta. Dice no a lo que no suma. Mientras otros pierden el día en distracciones, él avanza un poco más. Sumar pequeños días construye grandes resultados.</li><li><strong>Mejoran un poco cada día, sin prisa pero sin parar.</strong> No buscan cambiarlo todo de golpe. Saben que el progreso real es lento y aburrido. Un poco hoy, un poco mañana, y en un año la diferencia es enorme. El que quiere todo rápido se rinde rápido. El que avanza despacio, llega.</li></ol>", "search": "3 hábitos que separan a quien avanza de quien se queda hacen lo importante aunque no tengan ganas. el que avanza no espera sentirse motivado. sabe que las ganas llegan después de empezar, no antes. mientras unos esperan el momento perfecto, otros ya hicieron el trabajo. la diferencia no es el talento, es aparecer todos los días, con ánimo o sin él. la constancia gana. cuidan su tiempo como cuidan su dinero. quien avanza no regala sus horas a cualquier cosa. sabe que el tiempo no vuelve, así que elige en qué y con quién lo gasta. dice no a lo que no suma. mientras otros pierden el día en distracciones, él avanza un poco más. sumar pequeños días construye grandes resultados. mejoran un poco cada día, sin prisa pero sin parar. no buscan cambiarlo todo de golpe. saben que el progreso real es lento y aburrido. un poco hoy, un poco mañana, y en un año la diferencia es enorme. el que quiere todo rápido se rinde rápido. el que avanza despacio, llega.", "copies": [["Copy card", "3 HÁBITOS QUE SEPARAN A QUIEN AVANZA DE QUIEN SE QUEDA\n\n1. Hacen lo importante aunque no tengan ganas. El que avanza no espera sentirse motivado. Sabe que las ganas llegan después de empezar, no antes. Mientras unos esperan el momento perfecto, otros ya hicieron el trabajo. La diferencia no es el talento, es aparecer todos los días, con ánimo o sin él. La constancia gana.\n\n2. Cuidan su tiempo como cuidan su dinero. Quien avanza no regala sus horas a cualquier cosa. Sabe que el tiempo no vuelve, así que elige en qué y con quién lo gasta. Dice no a lo que no suma. Mientras otros pierden el día en distracciones, él avanza un poco más. Sumar pequeños días construye grandes resultados.\n\n3. Mejoran un poco cada día, sin prisa pero sin parar. No buscan cambiarlo todo de golpe. Saben que el progreso real es lento y aburrido. Un poco hoy, un poco mañana, y en un año la diferencia es enorme. El que quiere todo rápido se rinde rápido. El que avanza despacio, llega."]]}, {"fmt": "F2", "n": 17, "bucket": "", "title": "3 VERDADES SOBRE EL MIEDO QUE TE FRENA", "body": "<ol class='pts'><li><strong>La mayoría de lo que temes nunca pasa.</strong> Pasas horas imaginando lo peor, y casi nunca ocurre. Tu mente inventa problemas que no existen todavía. Ese miedo te quita el sueño y la calma por algo que quizá jamás llegue. Aprende a separar lo que de verdad pasa de lo que solo imaginas. Casi todo el miedo vive en tu cabeza.</li><li><strong>El miedo crece cuando lo evitas.</strong> Mientras más huyes de algo que te asusta, más grande lo haces. Lo que no enfrentas, te persigue. La única forma de quitarle poder al miedo es acercarte poco a poco a eso que evitas. Cada vez que lo enfrentas, se hace más pequeño. Evitarlo lo alimenta; enfrentarlo lo apaga.</li><li><strong>Esperar a no tener miedo es esperar para siempre.</strong> Mucha gente quiere sentirse lista antes de empezar. La verdad es que esa seguridad total nunca llega. Los que logran cosas también sienten miedo, solo que actúan con él. No esperes a que el miedo se vaya. Da el paso con miedo y el miedo se reduce al avanzar.</li></ol>", "search": "3 verdades sobre el miedo que te frena la mayoría de lo que temes nunca pasa. pasas horas imaginando lo peor, y casi nunca ocurre. tu mente inventa problemas que no existen todavía. ese miedo te quita el sueño y la calma por algo que quizá jamás llegue. aprende a separar lo que de verdad pasa de lo que solo imaginas. casi todo el miedo vive en tu cabeza. el miedo crece cuando lo evitas. mientras más huyes de algo que te asusta, más grande lo haces. lo que no enfrentas, te persigue. la única forma de quitarle poder al miedo es acercarte poco a poco a eso que evitas. cada vez que lo enfrentas, se hace más pequeño. evitarlo lo alimenta; enfrentarlo lo apaga. esperar a no tener miedo es esperar para siempre. mucha gente quiere sentirse lista antes de empezar. la verdad es que esa seguridad total nunca llega. los que logran cosas también sienten miedo, solo que actúan con él. no esperes a que el miedo se vaya. da el paso con miedo y el miedo se reduce al avanzar.", "copies": [["Copy card", "3 VERDADES SOBRE EL MIEDO QUE TE FRENA\n\n1. La mayoría de lo que temes nunca pasa. Pasas horas imaginando lo peor, y casi nunca ocurre. Tu mente inventa problemas que no existen todavía. Ese miedo te quita el sueño y la calma por algo que quizá jamás llegue. Aprende a separar lo que de verdad pasa de lo que solo imaginas. Casi todo el miedo vive en tu cabeza.\n\n2. El miedo crece cuando lo evitas. Mientras más huyes de algo que te asusta, más grande lo haces. Lo que no enfrentas, te persigue. La única forma de quitarle poder al miedo es acercarte poco a poco a eso que evitas. Cada vez que lo enfrentas, se hace más pequeño. Evitarlo lo alimenta; enfrentarlo lo apaga.\n\n3. Esperar a no tener miedo es esperar para siempre. Mucha gente quiere sentirse lista antes de empezar. La verdad es que esa seguridad total nunca llega. Los que logran cosas también sienten miedo, solo que actúan con él. No esperes a que el miedo se vaya. Da el paso con miedo y el miedo se reduce al avanzar."]]}, {"fmt": "F2", "n": 18, "bucket": "", "title": "3 COSAS QUE PASAN CUANDO APRENDES A CONTROLAR TUS EMOCIONES", "body": "<ol class='pts'><li><strong>Dejas de tomar decisiones que después lamentas.</strong> Cuando reaccionas en caliente, dices y haces cosas de las que luego te arrepientes. Aprender a esperar antes de responder te ahorra muchos problemas. La emoción del momento pasa, pero el daño de una mala reacción se queda. Respirar y pensar antes de actuar cambia tu vida más de lo que crees.</li><li><strong>La gente deja de poder manejarte.</strong> El que se altera fácil es fácil de controlar. Basta una palabra para alterarlo por completo. Cuando controlas tus emociones, nadie puede usarte con un comentario o una provocación. Tu calma te vuelve difícil de manipular. El que no reacciona como esperan, recupera trolas tus emociones, nadie puede usarte con un comentario o una provocación. Tu calma te vuelve difícil de manipular. El que no reacciona como esperan, recupera el control de la situación.\n\n3. Empiezas a responder, no a explotar. Hay una diferencia enorme entre reaccionar y responder. Reaccionar es soltar lo primero que sientes. Responder es elegir qué decir y cuándo. El que responde piensa, el que reacciona se deja llevar. Aprender esa pausa, ese segundo antes de hablar, te separa de la mayoría."]]}, {"fmt": "F2", "n": 19, "bucket": "", "title": "3 RAZONES POR LAS QUE COMPARARTE TE HACE INFELIZ", "body": "<ol class='pts'><li><strong>Comparas tu vida real con la versión editada de otros.</strong> En redes solo ves lo mejor de cada persona: el viaje, el logro, la sonrisa. No ves las deudas, los problemas ni las noches difíciles. Comparar tu día completo con el mejor momento de otro es injusto contigo. Lo que muestran no es toda su vida, es solo la parte que eligieron enseñar.</li><li><strong>Siempre habrá alguien más adelante, y eso nunca termina.</strong> Por más que logres, siempre vas a encontrar a alguien con más. Si tu paz depende de estar por encima de otros, nunca vas a estar tranquilo. La comparación es una carrera sin meta. El día que compites contra ti mismo, y no contra los demás, empiezas a ganar de verdad.</li><li><strong>Mirar la vida de otros te distrae de la tuya.</strong> Cada minuto que pasas pendiente de lo que otros tienen, dejas de construir lo tuyo. La envidia y la comparación gastan energía que podrías usar en avanzar. Baja la cabeza y trabaja en tu camino. Cuando te enfocas en ti, dejas de medir tu valor con la regla de otro.</li></ol>", "search": "3 razones por las que compararte te hace infeliz comparas tu vida real con la versión editada de otros. en redes solo ves lo mejor de cada persona: el viaje, el logro, la sonrisa. no ves las deudas, los problemas ni las noches difíciles. comparar tu día completo con el mejor momento de otro es injusto contigo. lo que muestran no es toda su vida, es solo la parte que eligieron enseñar. siempre habrá alguien más adelante, y eso nunca termina. por más que logres, siempre vas a encontrar a alguien con más. si tu paz depende de estar por encima de otros, nunca vas a estar tranquilo. la comparación es una carrera sin meta. el día que compites contra ti mismo, y no contra los demás, empiezas a ganar de verdad. mirar la vida de otros te distrae de la tuya. cada minuto que pasas pendiente de lo que otros tienen, dejas de construir lo tuyo. la envidia y la comparación gastan energía que podrías usar en avanzar. baja la cabeza y trabaja en tu camino. cuando te enfocas en ti, dejas de medir tu valor con la regla de otro.", "copies": [["Copy card", "3 RAZONES POR LAS QUE COMPARARTE TE HACE INFELIZ\n\n1. Comparas tu vida real con la versión editada de otros. En redes solo ves lo mejor de cada persona: el viaje, el logro, la sonrisa. No ves las deudas, los problemas ni las noches difíciles. Comparar tu día completo con el mejor momento de otro es injusto contigo. Lo que muestran no es toda su vida, es solo la parte que eligieron enseñar.\n\n2. Siempre habrá alguien más adelante, y eso nunca termina. Por más que logres, siempre vas a encontrar a alguien con más. Si tu paz depende de estar por encima de otros, nunca vas a estar tranquilo. La comparación es una carrera sin meta. El día que compites contra ti mismo, y no contra los demás, empiezas a ganar de verdad.\n\n3. Mirar la vida de otros te distrae de la tuya. Cada minuto que pasas pendiente de lo que otros tienen, dejas de construir lo tuyo. La envidia y la comparación gastan energía que podrías usar en avanzar. Baja la cabeza y trabaja en tu camino. Cuando te enfocas en ti, dejas de medir tu valor con la regla de otro."]]}, {"fmt": "F2", "n": 20, "bucket": "", "title": "3 ARREPENTIMIENTOS QUE LA GENTE TIENE AL FINAL DE SU VIDA", "body": "<ol class='pts'><li><strong>No haber vivido como querían, sino como esperaban los demás.</strong> Mucha gente pasa la vida cumpliendo lo que otros esperaban de ella. Estudia, trabaja y elige para no decepcionar a nadie. Al final se da cuenta de que vivió una vida prestada. No dejes que el miedo al qué dirán decida por ti. La vida que vives es tuya, no de los demás.</li><li><strong>Haber trabajado tanto que se perdieron lo importante.</strong> Por correr detrás del dinero y del éxito, muchos se pierden los momentos con quienes amaban. Cuando quieren volver, ya es tarde. El trabajo siempre estará, pero los años con tu gente no. Gana, sí, pero no a costa de perderte la vida mientras intentas asegurarla.</li><li><strong>No haberse atrevido por miedo al fracaso.</strong> El arrepentimiento más grande no son los errores, sino lo que nunca intentaron. Quedarse callado, no empezar el proyecto, no decir lo que sentían. El miedo los frenó y después solo quedó el &quot;y si lo hubiera hecho&quot;. Prefiere intentarlo y fallar antes que vivir preguntándote qué habría pasado.</li></ol>", "search": "3 arrepentimientos que la gente tiene al final de su vida no haber vivido como querían, sino como esperaban los demás. mucha gente pasa la vida cumpliendo lo que otros esperaban de ella. estudia, trabaja y elige para no decepcionar a nadie. al final se da cuenta de que vivió una vida prestada. no dejes que el miedo al qué dirán decida por ti. la vida que vives es tuya, no de los demás. haber trabajado tanto que se perdieron lo importante. por correr detrás del dinero y del éxito, muchos se pierden los momentos con quienes amaban. cuando quieren volver, ya es tarde. el trabajo siempre estará, pero los años con tu gente no. gana, sí, pero no a costa de perderte la vida mientras intentas asegurarla. no haberse atrevido por miedo al fracaso. el arrepentimiento más grande no son los errores, sino lo que nunca intentaron. quedarse callado, no empezar el proyecto, no decir lo que sentían. el miedo los frenó y después solo quedó el \"y si lo hubiera hecho\". prefiere intentarlo y fallar antes que vivir preguntándote qué habría pasado.", "copies": [["Copy card", "3 ARREPENTIMIENTOS QUE LA GENTE TIENE AL FINAL DE SU VIDA\n\n1. No haber vivido como querían, sino como esperaban los demás. Mucha gente pasa la vida cumpliendo lo que otros esperaban de ella. Estudia, trabaja y elige para no decepcionar a nadie. Al final se da cuenta de que vivió una vida prestada. No dejes que el miedo al qué dirán decida por ti. La vida que vives es tuya, no de los demás.\n\n2. Haber trabajado tanto que se perdieron lo importante. Por correr detrás del dinero y del éxito, muchos se pierden los momentos con quienes amaban. Cuando quieren volver, ya es tarde. El trabajo siempre estará, pero los años con tu gente no. Gana, sí, pero no a costa de perderte la vida mientras intentas asegurarla.\n\n3. No haberse atrevido por miedo al fracaso. El arrepentimiento más grande no son los errores, sino lo que nunca intentaron. Quedarse callado, no empezar el proyecto, no decir lo que sentían. El miedo los frenó y después solo quedó el \"y si lo hubiera hecho\". Prefiere intentarlo y fallar antes que vivir preguntándote qué habría pasado."]]}, {"fmt": "F2", "n": 21, "bucket": "", "title": "3 COSAS QUE LA GENTE DISCIPLINADA HACE DIFERENTE", "body": "<ol class='pts'><li><strong>No negocian con sus excusas.</strong> Cuando deciden algo, lo hacen, aunque estén cansados o sin ganas. No esperan el momento ideal porque saben que casi nunca llega. La diferencia entre lograr y desear está en no escuchar a la voz que busca razones para no empezar. La disciplina es hacer lo que dijiste, incluso cuando ya no quieres.</li><li><strong>Construyen rutinas para no depender del ánimo.</strong> Saben que la motivación va y viene, así que no confían en ella. Crean hábitos que hacen casi en automático, sin pelear cada día consigo mismos. Cuando algo es rutina, no gastas energía decidiendo. La gente disciplinada no es más fuerte, solo dejó de depender de tener ganas.</li><li><strong>Empiezan pequeño y son constantes.</strong> No intentan cambiar toda su vida en un día. Eligen un paso pequeño y lo repiten hasta que se vuelve parte de ellos. Saben que lo lento y constante vence a lo grande y pasajero. Mientras otros se cansan del cambio brusco, ellos avanzan sin parar con cosas simples.</li></ol>", "search": "3 cosas que la gente disciplinada hace diferente no negocian con sus excusas. cuando deciden algo, lo hacen, aunque estén cansados o sin ganas. no esperan el momento ideal porque saben que casi nunca llega. la diferencia entre lograr y desear está en no escuchar a la voz que busca razones para no empezar. la disciplina es hacer lo que dijiste, incluso cuando ya no quieres. construyen rutinas para no depender del ánimo. saben que la motivación va y viene, así que no confían en ella. crean hábitos que hacen casi en automático, sin pelear cada día consigo mismos. cuando algo es rutina, no gastas energía decidiendo. la gente disciplinada no es más fuerte, solo dejó de depender de tener ganas. empiezan pequeño y son constantes. no intentan cambiar toda su vida en un día. eligen un paso pequeño y lo repiten hasta que se vuelve parte de ellos. saben que lo lento y constante vence a lo grande y pasajero. mientras otros se cansan del cambio brusco, ellos avanzan sin parar con cosas simples.", "copies": [["Copy card", "3 COSAS QUE LA GENTE DISCIPLINADA HACE DIFERENTE\n\n1. No negocian con sus excusas. Cuando deciden algo, lo hacen, aunque estén cansados o sin ganas. No esperan el momento ideal porque saben que casi nunca llega. La diferencia entre lograr y desear está en no escuchar a la voz que busca razones para no empezar. La disciplina es hacer lo que dijiste, incluso cuando ya no quieres.\n\n2. Construyen rutinas para no depender del ánimo. Saben que la motivación va y viene, así que no confían en ella. Crean hábitos que hacen casi en automático, sin pelear cada día consigo mismos. Cuando algo es rutina, no gastas energía decidiendo. La gente disciplinada no es más fuerte, solo dejó de depender de tener ganas.\n\n3. Empiezan pequeño y son constantes. No intentan cambiar toda su vida en un día. Eligen un paso pequeño y lo repiten hasta que se vuelve parte de ellos. Saben que lo lento y constante vence a lo grande y pasajero. Mientras otros se cansan del cambio brusco, ellos avanzan sin parar con cosas simples."]]}, {"fmt": "F2", "n": 22, "bucket": "", "title": "3 SEÑALES DE QUE ALGUIEN MERECE TU CONFIANZA", "body": "<ol class='pts'><li><strong>Hace lo que dice, aunque nadie lo esté mirando.</strong> La confianza no se gana con palabras bonitas, sino con hechos repetidos. El que cumple lo que promete, incluso en lo pequeño, te muestra quién es. Cuídate del que habla mucho y cumple poco. Quien actúa igual contigo presente o ausente es alguien en quien puedes apoyarte.</li><li><strong>Guarda lo que le cuentas en privado.</strong> El que no anda repitiendo los secretos de otros, tampoco repetirá los tuyos. Fíjate cómo habla de la gente que no está presente. Así habla de ti cuando no estás. La persona de confianza no usa tu vida como tema de conversación. Lo que le dices, se queda con ella.</li><li><strong>Se alegra de verdad cuando te va bien.</strong> El que te quiere bien celebra tus logros sin envidia ni comentarios secos. No compite contigo ni se incomoda con tu avance. Esa alegría sincera por lo tuyo es difícil de fingir. Cuando encuentres a alguien que se alegra de corazón por ti, valóralo, porque hay pocos así.</li></ol>", "search": "3 señales de que alguien merece tu confianza hace lo que dice, aunque nadie lo esté mirando. la confianza no se gana con palabras bonitas, sino con hechos repetidos. el que cumple lo que promete, incluso en lo pequeño, te muestra quién es. cuídate del que habla mucho y cumple poco. quien actúa igual contigo presente o ausente es alguien en quien puedes apoyarte. guarda lo que le cuentas en privado. el que no anda repitiendo los secretos de otros, tampoco repetirá los tuyos. fíjate quier conversación.</li><li><strong>No puedes arrepentirte de lo que no dijiste.</strong> Muchos problemas nacen de una palabra dicha de más, en el momento equivocado. El que habla rápido suele hablar mal. Cuando guardas silencio, te das tiempo para pensar y evitas decir cosas que después no puedes borrar. Lo que callas hoy nunca se vuelve en tu contra mañana.</li><li><strong>Tu silencio incomoda a quien busca tu reacción.</strong> Hay gente que provoca solo para verte alterado. Cuando respondes con calma o simplemente callas, le quitas el juego. No saben qué hacer con alguien que no entra en su provocación. El silencio, bien usado, dice más que cualquier grito y te deja siempre con el control.</li></ol>", "search": "3 razones por las que el silencio es tu mejor arma el que observa en silencio entiende lo que otros no ven. mientras todos hablan, el que calla escucha y aprende. nota detalles, intenciones y mentiras que se escapan al que solo quiere hablar. el silencio te da información, y la información es poder. no tienes que decir todo lo que piensas. a veces, callar y mirar te enseña más que cualquier conversación. no puedes arrepentirte de lo que no dijiste. muchos problemas nacen de una palabra dicha de más, en el momento equivocado. el que habla rápido suele hablar mal. cuando guardas silencio, te das tiempo para pensar y evitas decir cosas que después no puedes borrar. lo que callas hoy nunca se vuelve en tu contra mañana. tu silencio incomoda a quien busca tu reacción. hay gente que provoca solo para verte alterado. cuando respondes con calma o simplemente callas, le quitas el juego. no saben qué hacer con alguien que no entra en su provocación. el silencio, bien usado, dice más que cualquier grito y te deja siempre con el control.", "copies": [["Copy card", "3 RAZONES POR LAS QUE EL SILENCIO ES TU MEJOR ARMA\n\n1. El que observa en silencio entiende lo que otros no ven. Mientras todos hablan, el que calla escucha y aprende. Nota detalles, intenciones y mentiras que se escapan al que solo quiere hablar. El silencio te da información, y la información es poder. No tienes que decir todo lo que piensas. A veces, callar y mirar te enseña más que cualquier conversación.\n\n2. No puedes arrepentirte de lo que no dijiste. Muchos problemas nacen de una palabra dicha de más, en el momento equivocado. El que habla rápido suele hablar mal. Cuando guardas silencio, te das tiempo para pensar y evitas decir cosas que después no puedes borrar. Lo que callas hoy nunca se vuelve en tu contra mañana.\n\n3. Tu silencio incomoda a quien busca tu reacción. Hay gente que provoca solo para verte alterado. Cuando respondes con calma o simplemente callas, le quitas el juego. No saben qué hacer con alguien que no entra en su provocación. El silencio, bien usado, dice más que cualquier grito y te deja siempre con el control."]]}, {"fmt": "F2", "n": 24, "bucket": "", "title": "3 VERDADES SOBRE CONSTRUIR DINERO DE VERDAD", "body": "<ol class='pts'><li><strong>Lo que se ve no es riqueza, muchas veces es deuda.</strong> El que anda mostrando autos, ropa y viajes no siempre tiene dinero; a veces solo tiene cuotas. La riqueza real casi no se ve, porque está en lo que se ahorra y se invierte, no en lo que se gasta. No confundas aparentar con tener. Lo que de verdad importa rara vez se exhibe.</li><li><strong>El dinero crece despacio para casi todos.</strong> Olvida la idea de hacerte rico de un día para otro. La mayoría construye dinero juntando poco a poco, ahorrando e invirtiendo con paciencia. Lo rápido casi siempre es trampa o suerte que no dura. Lo que crece lento y constante es lo que se queda. La prisa por el dinero suele dejarte sin él.</li><li><strong>Gastar menos de lo que ganas es la base de todo.</strong> No importa cuánto entre si gastas más de lo que tienes. La fórmula es simple aunque cueste: vive con menos de lo que ganas y guarda la diferencia. El que domina esto, con el tiempo tiene opciones. El que no, vive siempre ajustado, gane lo que gane.</li></ol>", "search": "3 verdades sobre construir dinero de verdad lo que se ve no es riqueza, muchas veces es deuda. el que anda mostrando autos, ropa y viajes no siempre tiene dinero; a veces solo tiene cuotas. la riqueza real casi no se ve, porque está en lo que se ahorra y se invierte, no en lo que se gasta. no confundas aparentar con tener. lo que de verdad importa rara vez se exhibe. el dinero crece despacio para casi todos. olvida la idea de hacerte rico de un día para otro. la mayoría construye dinero juntando poco a poco, ahorrando e invirtiendo con paciencia. lo rápido casi siempre es trampa o suerte que no dura. lo que crece lento y constante es lo que se queda. la prisa por el dinero suele dejarte sin él. gastar menos de lo que ganas es la base de todo. no importa cuánto entre si gastas más de lo que tienes. la fórmula es simple aunque cueste: vive con menos de lo que ganas y guarda la diferencia. el que domina esto, con el tiempo tiene opciones. el que no, vive siempre ajustado, gane lo que gane.", "copies": [["Copy card", "3 VERDADES SOBRE CONSTRUIR DINERO DE VERDAD\n\n1. Lo que se ve no es riqueza, muchas veces es deuda. El que anda mostrando autos, ropa y viajes no siempre tiene dinero; a veces solo tiene cuotas. La riqueza real casi no se ve, porque está en lo que se ahorra y se invierte, no en lo que se gasta. No confundas aparentar con tener. Lo que de verdad importa rara vez se exhibe.\n\n2. El dinero crece despacio para casi todos. Olvida la idea de hacerte rico de un día para otro. La mayoría construye dinero juntando poco a poco, ahorrando e invirtiendo con paciencia. Lo rápido casi siempre es trampa o suerte que no dura. Lo que crece lento y constante es lo que se queda. La prisa por el dinero suele dejarte sin él.\n\n3. Gastar menos de lo que ganas es la base de todo. No importa cuánto entre si gastas más de lo que tienes. La fórmula es simple aunque cueste: vive con menos de lo que ganas y guarda la diferencia. El que domina esto, con el tiempo tiene opciones. El que no, vive siempre ajustado, gane lo que gane."]]}, {"fmt": "F2", "n": 25, "bucket": "", "title": "3 VERDADES QUE TE HACEN DUEÑO DE TU VIDA", "body": "<ol class='pts'><li><strong>Mientras culpes a otros, no vas a cambiar nada.</strong> Es fácil echarle la culpa al pasado, a la familia, a la suerte. Pero mientras la responsabilidad esté afuera, tú no tienes poder para cambiar. El día que aceptas que tu vida es tuya, aunque no todo fue tu culpa, empiezas a tener el control. La responsabilidad duele, pero también libera.</li><li><strong>Nadie va a venir a arreglar tu vida.</strong> Puedes esperar años a que alguien te rescate, te dé la oportunidad o te entienda. La verdad es que casi nadie va a hacerlo. La gente está ocupada en lo suyo. El que entiende esto deja de esperar y empieza a moverse. Tu vida cambia el día que dejas de esperar y empiezas a actuar.</li><li><strong>Las excusas son cómodas, pero te dejan en el mismo lugar.</strong> Siempre habrá una razón para no empezar: falta tiempo, dinero, ánimo. Las excusas calman por un rato, pero te mantienen quieto. El que de verdad quiere algo encuentra la forma; el que no, encuentra la excusa. Deja de explicar por qué no puedes y empieza con lo que sí tienes.</li></ol>", "search": "3 verdades que te hacen dueño de tu vida mientras culpes a otros, no vas a cambiar nada. es fácil echarle la culpa al pasado, a la familia, a la suerte. pero mientras la responsabilidad esté afuera, tú no tienes poder para cambiar. el día que aceptas que tu vida es tuya, aunque no todo fue tu culpa, empiezas a tener el control. la responsabilidad duele, pero también libera. nadie va a venir a arreglar tu vida. puedes esperar años a que alguien te rescate, te dé la oportunidad o te entienda. la verdad es que casi nadie va a hacerlo. la gente está ocupada en lo suyo. el que entiende esto deja de esperar y empieza a moverse. tu vida cambia el día que dejas de esperar y empiezas a actuar. las excusas son cómodas, pero te dejan en el mismo lugar. siempre habrá una razón para no empezar: falta tiempo, dinero, ánimo. las excusas calman por un rato, pero te mantienen quieto. el que de verdad quiere algo encuentra la forma; el que no, encuentra la excusa. deja de explicar por qué no puedes y empieza con lo que sí tienes.", "copies": [["Copy card", "3 VERDADES QUE TE HACEN DUEÑO DE TU VIDA\n\n1. Mientras culpes a otros, no vas a cambiar nada. Es fácil echarle la culpa al pasado, a la familia, a la suerte. Pero mientras la responsabilidad esté afuera, tú no tienes poder para cambiar. El día que aceptas que tu vida es tuya, aunque no todo fue tu culpa, empiezas a tener el control. La responsabilidad duele, pero también libera.\n\n2. Nadie va a venir a arreglar tu vida. Puedes esperar años a que alguien te rescate, te dé la oportunidad o te entienda. La verdad es que casi nadie va a hacerlo. La gente está ocupada en lo suyo. El que entiende esto deja de esperar y empieza a moverse. Tu vida cambia el día que dejas de esperar y empiezas a actuar.\n\n3. Las excusas son cómodas, pero te dejan en el mismo lugar. Siempre habrá una razón para no empezar: falta tiempo, dinero, ánimo. Las excusas calman por un rato, pero te mantienen quieto. El que de verdad quiere algo encuentra la forma; el que no, encuentra la excusa. Deja de explicar por qué no puedes y empieza con lo que sí tienes."]]}, {"fmt": "F2", "n": 26, "bucket": "", "title": "POR QUÉ TE CUESTA TANTO SOLTAR A QUIEN YA NO ESTÁ", "body": "<ol class='pts'><li><strong>No siempre extrañas a la persona, extrañas la costumbre.</strong> Te acostumbraste a su mensaje, a su compañía, a la rutina. Cuando se va, lo que más pesa no es la persona, es el hueco que dejó en tu día. Aprende a separar el cariño real de la simple costumbre. Muchas veces sueltas más fácil cuando entiendes que extrañabas el hábito, no a quien lo tenía.</li><li><strong>Tu mente recuerda lo bueno y borra lo malo.</strong> Cuando alguien se va, tu cabeza repite los momentos lindos y esconde las razones por las que terminó. Así idealizas algo que ya no era sano. Antes de querer volver, recuerda completo, no a medias. Lo que recuerdas bonito muchas veces dolía más de lo que aceptas hoy.</li><li><strong>Soltar no es dejar de querer, es dejar de hacerte daño.</strong> Puedes querer a alguien y aun así entender que quedarte te lastima. Soltar no borra lo que sentiste, solo deja de alimentar algo que ya no te suma. A veces el amor más grande que te queda es el que te tienes a ti mismo al decidir irte.</li></ol>", "search": "por qué te cuesta tanto soltar a quien ya no está no siempre extrañas a la persona, extrañas la costumbre. te acostumbraste a su mensaje, a su compañía, a la rutina. cuando se va, lo que más pesa no es la persona, es el hueco que dejó en tu día. aprende a separar el cariño real de la simple costumbre. muchas veces sueltas más fácil cuando entiendes que extrañabas el hábito, no a quien lo tenía. tu mente recuerda lo bueno y borra lo malo. cuando alguien se va, tu cabeza repite los momentos lindos y esconde las razones por las que terminó. así idealizas algo que ya no era sano. antes de querer volver, recuerda completo, no a medias. lo que recuerdas bonito muchas veces dolía más de lo que aceptas hoy. soltar no es dejar de querer, es dejar de hacerte daño. puedes querer a alguien y aun así entender que quedarte te lastima. soltar no borra lo que sentiste, solo deja de alimentar algo que ya no te suma. a veces el amor más grande que te queda es el que te tienes a ti mismo al decidir irte.", "copies": [["Copy card", "POR QUÉ TE CUESTA TANTO SOLTAR A QUIEN YA NO ESTÁ\n\n1. No siempre extrañas a la persona, extrañas la costumbre. Te acostumbraste a su mensaje, a su compañía, a la rutina. Cuando se va, lo que más pesa no es la persona, es el hueco que dejó en tu día. Aprende a separar el cariño real de la simple costumbre. Muchas veces sueltas más fácil cuando entiendes que extrañabas el hábito, no a quien lo tenía.\n\n2. Tu mente recuerda lo bueno y borra lo malo. Cuando alguien se va, tu cabeza repite los momentos lindos y esconde las razones por las que terminó. Así idealizas algo que ya no era sano. Antes de querer volver, recuerda completo, no a medias. Lo que recuerdas bonito muchas veces dolía más de lo que aceptas hoy.\n\n3. Soltar no es dejar de querer, es dejar de hacerte daño. Puedes querer a alguien y aun así entender que quedarte te lastima. Soltar no borra lo que sentiste, solo deja de alimentar algo que ya no te suma. A veces el amor más grande que te queda es el que te tienes a ti mismo al decidir irte."]]}, {"fmt": "F2", "n": 27, "bucket": "", "title": "3 VERDADES SOBRE LA SOLEDAD QUE NADIE TE DICE", "body": "<ol class='pts'><li><strong>Estar solo no es lo mismo que sentirse solo.</strong> Puedes estar rodeado de gente y sentirte vacío, o estar solo y en paz. La soledad no es el problema, lo es la mala compañía. Aprender a estar contigo sin angustia es una de las libertades más grandes. El que se soporta a sí mismo no necesita a cualquiera para llenar el silencio.</li><li><strong>La peor soledad se siente al lado equivocado.</strong> Estar con alguien que no te escucha, no te valora ni te ve, duele más que estar solo. Mucha gente aguanta relaciones vacías por miedo a la soledad, sin notar que ya está sola, solo que acompañada. A veces irte es justo dejar de sentirte solo.</li><li><strong>La soledad bien llevada te enseña quién eres.</strong> Cuando nadie llena tu tiempo, descubres qué te gusta, qué piensas y qué quieres de verdad. Esos momentos a solas, que al principio asustan, después se vuelven necesarios. El que aprende a disfrutar su propia compañía deja de depender de la de otros para estar bien.</li></ol>", "search": "3 verdades sobre la soledad que nadie te dice estar solo no es lo mismo que sentirse solo. puedes estar rodeado de gente y sentirte vacío, o estar solo y en paz. la soledad no es el problema, lo es la mala compañía. aprender a estar contigo sin angustia es una de las libertades más grandes. el que se soporta a sí mismo no necesita a cualquiera para llenar el silencio. la peor soledad se siente al lado equivocado. estar con alguien que no te escucha, no te valora ni te ve, duele más que estar solo. mucha gente aguanta relaciones vacías por miedo a la soledad, sin notar que ya está sola, solo que acompañada. a veces irte es justo dejar de sentirte solo. la soledad bien llevada te enseña quién eres. cuando nadie llena tu tiempo, descubres qué te gusta, qué piensas y qué quieres de verdad. esos momentos a solas, que al principio asustan, después se vuelven necesarios. el que aprende a disfrutar su propia compañía deja de depender de la de otros para estar bien.", "copies": [["Copy card", "3 VERDADES SOBRE LA SOLEDAD QUE NADIE TE DICE\n\n1. Estar solo no es lo mismo que sentirse solo. Puedes estar rodeado de gente y sentirte vacío, o estar solo y en paz. La soledad no es el problema, lo es la mala compañía. Aprender a estar contigo sin angustia es una de las libertades más grandes. El que se soporta a sí mismo no necesita a cualquiera para llenar el silencio.\n\n2. La peor soledad se siente al lado equivocado. Estar con alguien que no te escucha, no te valora ni te ve, duele más que estar solo. Mucha gente aguanta relaciones vacías por miedo a la soledad, sin notar que ya está sola, solo que acompañada. A veces irte es justo dejar de sentirte solo.\n\n3. La soledad bien llevada te enseña quién eres. Cuando nadie llena tu tiempo, descubres qué te gusta, qué piensas y qué quieres de verdad. Esos momentos a solas, que al principio asustan, después se vuelven necesarios. El que aprende a disfrutar su propia compañía deja de depender de la de otros para estar bien."]]}, {"fmt": "F2", "n": 28, "bucket": "", "title": "POR QUÉ LA GENTE HABLA MAL DE TI CUANDO TE VA BIEN", "body": "<ol class='pts'><li><strong>Tu avance les recuerda lo que ellos no han hecho.</strong> Cuando subes, algunos no ven tu esfuerzo, ven su propio estancamiento. En vez de moverse, prefieren bajarte para sentirse al mismo nivel. No es sobre ti, es sobre lo que tu progreso despierta en ellos. El que está en paz con su vida no necesita hablar mal de la tuya.</li><li><strong>Criticarte les cuesta menos que mejorar.</strong> Es más fácil señalar lo que haces que ponerse a hacer. La crítica vacía es el refugio del que no quiere esforzarse. Por eso el que más habla suele ser el que menos avanza. Mientras unos comentan tu camino, tú sigues caminando, y esa es toda la respuesta que necesitas.</li><li><strong>El que habla de ti es el que te observa.</strong> Ocupas su mente más de lo que admite. Te critica, pero te mira; se burla, pero te sigue. Esa atención dice más de su envidia que de tus defectos. No gastes energía en callar bocas. Sigue avanzando; nada molesta más al que te critica que verte bien.</li></ol>", "search": "por qué la gente habla mal de ti cuando te va bien tu avance les recuerda lo que ellos no han hecho. cuando subes, algunos no ven tu esfuerzo, ven su propio estancamiento. en vez de moverse, prefieren bajarte para sentirse al mismo nivel. no es sobre ti, es sobre lo que tu progreso despierta en ellos. el que está en paz con su vida no necesita hablar mal de la tuya. criticarte les cuesta menos que mejorar. es más fácil señalar lo que haces que ponerse a hacer. la crítica vacía es el refugio del que no quiere esforzarse. por eso el que más habla suele ser el que menos avanza. mientras unos comentan tu camino, tú sigues caminando, y esa es toda la respuesta que necesitas. el que habla de ti es el que te observa. ocupas su mente más de lo que admite. te critica, pero te mira; se burla, pero te sigue. esa atención dice más de su envidia que de tus defectos. no gastes energía en callar bocas. sigue avanzando; nada molesta más al que te critica que verte bien.", "copies": [["Copy card", "POR QUÉ LA GENTE HABLA MAL DE TI CUANDO TE VA BIEN\n\n1. Tu avance les recuerda lo que ellos no han hecho. Cuando subes /ol>", "search": "3 cosas que el dinero te enseña sobre la gente cuando tienes, aparecen muchos; cuando no, quedan pocos. el dinero atrae compañía, pero no siempre lealtad. en los buenos momentos te rodean, en los malos descubres quiénes eran de verdad. no confundas a los que vienen por lo que tienes con los que están por quien eres. la crisis siempre muestra quién se queda sin recibir nada a cambio. el dinero no compra lealtad, solo alquila compañía. hay quien se queda mientras hay algo que ganar y se va cuando ya no. esa cercanía tiene precio, no cariño. la gente que de verdad vale se queda cuando no tienes nada que ofrecer. cuídate de quien solo aparece cuando hay un beneficio de por medio. cómo alguien trata tu dinero dice quién es. el que te respeta cuida lo que le prestas, cumple lo que debe y no abusa de tu confianza. el que no, lo toma como suyo y desaparece. antes de juzgar a alguien por sus palabras, mira cómo actúa cuando hay dinero de por medio. ahí se cae la máscara.", "copies": [["Copy card", "3 COSAS QUE EL DINERO TE ENSEÑA SOBRE LA GENTE\n\n1. Cuando tienes, aparecen muchos; cuando no, quedan pocos. El dinero atrae compañía, pero no siempre lealtad. En los buenos momentos te rodean, en los malos descubres quiénes eran de verdad. No confundas a los que vienen por lo que tienes con los que están por quien eres. La crisis siempre muestra quién se queda sin recibir nada a cambio.\n\n2. El dinero no compra lealtad, solo alquila compañía. Hay quien se queda mientras hay algo que ganar y se va cuando ya no. Esa cercanía tiene precio, no cariño. La gente que de verdad vale se queda cuando no tienes nada que ofrecer. Cuídate de quien solo aparece cuando hay un beneficio de por medio.\n\n3. Cómo alguien trata tu dinero dice quién es. El que te respeta cuida lo que le prestas, cumple lo que debe y no abusa de tu confianza. El que no, lo toma como suyo y desaparece. Antes de juzgar a alguien por sus palabras, mira cómo actúa cuando hay dinero de por medio. Ahí se cae la máscara."]]}, {"fmt": "F2", "n": 30, "bucket": "", "title": "3 VERDADES SOBRE EMPEZAR DE NUEVO A CUALQUIER EDAD", "body": "<ol class='pts'><li><strong>No es tarde, es miedo disfrazado de excusa.</strong> Decir &quot;ya es tarde para mí&quot; suele ser una forma de no enfrentar el miedo a intentarlo. La edad casi nunca es el problema real. El tiempo va a pasar igual, lo uses o no. La pregunta no es si es tarde, es si vas a seguir esperando un momento que no llega.</li><li><strong>Empezar tarde es mejor que vivir con el arrepentimiento.</strong> Vas a sentirte raro al comenzar algo nuevo a destiempo, pero ese momento incómodo pasa. Lo que no pasa es el &quot;y si lo hubiera intentado&quot;. Prefiere la vergüenza de empezar antes que el peso de no haberlo hecho. El arrepentimiento dura más que cualquier comienzo torpe.</li><li><strong>Cada día que esperas hace el cambio más difícil.</strong> La comodidad de hoy es el arrepentimiento de mañana. Mientras más postergas, más razones encuentras para no moverte. No esperes a estar listo ni a tener todo claro. Da el primer paso pequeño hoy; mañana esa duda será un poco más grande y tú un poco más cómodo.</li></ol>", "search": "3 verdades sobre empezar de nuevo a cualquier edad no es tarde, es miedo disfrazado de excusa. decir \"ya es tarde para mí\" suele ser una forma de no enfrentar el miedo a intentarlo. la edad casi nunca es el problema real. el tiempo va a pasar igual, lo uses o no. la pregunta no es si es tarde, es si vas a seguir esperando un momento que no llega. empezar tarde es mejor que vivir con el arrepentimiento. vas a sentirte raro al comenzar algo nuevo a destiempo, pero ese momento incómodo pasa. lo que no pasa es el \"y si lo hubiera intentado\". prefiere la vergüenza de empezar antes que el peso de no haberlo hecho. el arrepentimiento dura más que cualquier comienzo torpe. cada día que esperas hace el cambio más difícil. la comodidad de hoy es el arrepentimiento de mañana. mientras más postergas, más razones encuentras para no moverte. no esperes a estar listo ni a tener todo claro. da el primer paso pequeño hoy; mañana esa duda será un poco más grande y tú un poco más cómodo.", "copies": [["Copy card", "3 VERDADES SOBRE EMPEZAR DE NUEVO A CUALQUIER EDAD\n\n1. No es tarde, es miedo disfrazado de excusa. Decir \"ya es tarde para mí\" suele ser una forma de no enfrentar el miedo a intentarlo. La edad casi nunca es el problema real. El tiempo va a pasar igual, lo uses o no. La pregunta no es si es tarde, es si vas a seguir esperando un momento que no llega.\n\n2. Empezar tarde es mejor que vivir con el arrepentimiento. Vas a sentirte raro al comenzar algo nuevo a destiempo, pero ese momento incómodo pasa. Lo que no pasa es el \"y si lo hubiera intentado\". Prefiere la vergüenza de empezar antes que el peso de no haberlo hecho. El arrepentimiento dura más que cualquier comienzo torpe.\n\n3. Cada día que esperas hace el cambio más difícil. La comodidad de hoy es el arrepentimiento de mañana. Mientras más postergas, más razones encuentras para no moverte. No esperes a estar listo ni a tener todo claro. Da el primer paso pequeño hoy; mañana esa duda será un poco más grande y tú un poco más cómodo."]]}, {"fmt": "F2", "n": 31, "bucket": "", "title": "3 VERDADES SOBRE LA GENTE QUE FINGE SER TU AMIGA", "body": "<ol class='pts'><li><strong>El amigo falso aparece en la fiesta, no en el problema.</strong> Está para reírse contigo, pero desaparece cuando lo necesitas. Su amistad dura mientras todo va bien. El día que caes, ves quién se queda y quién encuentra una excusa. La verdadera amistad no se mide en los buenos momentos, se mide en los difíciles.</li><li><strong>Te escucha para usarte, no para ayudarte.</strong> Hay quien guarda lo que le cuentas, no para apoyarte, sino para tener material el día que le convenga. Fíjate si después de hablar te sientes ligero o expuesto. El amigo real cuida lo que sabe de ti. El falso lo guarda por si algún día lo necesita en tu contra.</li><li><strong>Su lealtad dura lo que dura su interés.</strong> Mientras le sirves, está cerca. Cuando dejas de darle algo, se aleja sin explicación. Esa cercanía no era por ti, era por lo que obtenía. Observa quién sigue ahí cuando ya no tienes nada que ofrecer. Esos pocos son los que de verdad importan.</li></ol>", "search": "3 verdades sobre la gente que finge ser tu amiga el amigo falso aparece en la fiesta, no en el problema. está para reírse contigo, pero desaparece cuando lo necesitas. su amistad dura mientras todo va bien. el día que caes, ves quién se queda y quién encuentra una excusa. la verdadera amistad no se mide en los buenos momentos, se mide en los difíciles. te escucha para usarte, no para ayudarte. hay quien guarda lo que le cuentas, no para apoyarte, sino para tener material el día que le convenga. fíjate si después de hablar te sientes ligero o expuesto. el amigo real cuida lo que sabe de ti. el falso lo guarda por si algún día lo necesita en tu contra. su lealtad dura lo que dura su interés. mientras le sirves, está cerca. cuando dejas de darle algo, se aleja sin explicación. esa cercanía no era por ti, era por lo que obtenía. observa quién sigue ahí cuando ya no tienes nada que ofrecer. esos pocos son los que de verdad importan.", "copies": [["Copy card", "3 VERDADES SOBRE LA GENTE QUE FINGE SER TU AMIGA\n\n1. El amigo falso aparece en la fiesta, no en el problema. Está para reírse contigo, pero desaparece cuando lo necesitas. Su amistad dura mientras todo va bien. El día que caes, ves quién se queda y quién encuentra una excusa. La verdadera amistad no se mide en los buenos momentos, se mide en los difíciles.\n\n2. Te escucha para usarte, no para ayudarte. Hay quien guarda lo que le cuentas, no para apoyarte, sino para tener material el día que le convenga. Fíjate si después de hablar te sientes ligero o expuesto. El amigo real cuida lo que sabe de ti. El falso lo guarda por si algún día lo necesita en tu contra.\n\n3. Su lealtad dura lo que dura su interés. Mientras le sirves, está cerca. Cuando dejas de darle algo, se aleja sin explicación. Esa cercanía no era por ti, era por lo que obtenía. Observa quién sigue ahí cuando ya no tienes nada que ofrecer. Esos pocos son los que de verdad importan."]]}, {"fmt": "F2", "n": 32, "bucket": "", "title": "POR QUÉ NO DEBES TOMAR DECISIONES CUANDO ESTÁS DOLIDO", "body": "<ol class='pts'><li><strong>El dolor nubla lo que de verdad quieres.</strong> Cuando estás herido, reaccionas para calmar la rabia, no para resolver. Decides desde la emoción y no desde la razón. Lo que parece urgente en ese momento muchas veces se ve distinto al día siguiente. Date tiempo antes de actuar; el dolor es mal consejero y casi siempre exagera.</li><li><strong>Una decisión con rabia casi siempre se lamenta.</strong> En caliente dices cosas que no piensas y haces cosas que no quieres. La rabia pasa, pero el daño de lo que hiciste se queda. Antes de responder enojado, respira y espera. Pocas cosas se arruinan por pensarlas un día más, pero muchas se arruinan por apurarlas.</li><li><strong>El problema se ve distinto con la mente en calma.</strong> Lo que de noche parece el fin del mundo, de día se ve manejable. Las emociones exageran, la calma ordena. No tomes decisiones importantes en tu peor momento. Espera a estar tranquilo y vas a ver opciones que el dolor te estaba escondiendo.</li></ol>", "search": "por qué no debes tomar decisiones cuando estás dolido el dolor nubla lo que de verdad quieres. cuando estás herido, reaccionas para calmar la rabia, no para resolver. decides desde la emoción y no desde la razón. lo que parece urgente en ese momento muchas veces se ve distinto al día siguiente. date tiempo antes de actuar; el dolor es mal consejero y casi siempre exagera. una decisión con rabia casi siempre se lamenta. en caliente dices cosas que no piensas y haces cosas que no quieres. la rabia pasa, pero el daño de lo que hiciste se queda. antes de responder enojado, respira y espera. pocas cosas se arruinan por pensarlas un día más, pero muchas se arruinan por apurarlas. el problema se ve distinto con la mente en calma. lo que de noche parece el fin del mundo, de día se ve manejable. las emociones exageran, la calma ordena. no tomes decisiones importantes en tu peor momento. espera a estar tranquilo y vas a ver opciones que el dolor te estaba escondiendo.", "copies": [["Copy card", "POR QUÉ NO DEBES TOMAR DECISIONES CUANDO ESTÁS DOLIDO\n\n1. El dolor nubla lo que de verdad quieres. Cuando estás herido, reaccionas para calmar la rabia, no para resolver. Decides desde la emoción y no desde la razón. Lo que parece urgente en ese momento muchas veces se ve distinto al día siguiente. Date tiempo antes de actuar; el dolor es mal consejero y casi siempre exagera.\n\n2. Una decisión con rabia casi siempre se lamenta. En caliente dices cosas que no piensas y haces cosas que no quieres. La rabia pasa, pero el daño de lo que hiciste se queda. Antes de responder enojado, respira y espera. Pocas cosas se arruinan por pensarlas un día más, pero muchas se arruinan por apurarlas.\n\n3. El problema se ve distinto con la mente en calma. Lo que de noche parece el fin del mundo, de día se ve manejable. Las emociones exageran, la calma ordena. No tomes decisiones importantes en tu peor momento. Espera a estar tranquilo y vas a ver opciones que el dolor te estaba escondiendo."]]}, {"fmt": "F2", "n": 33, "bucket": "", "title": "3 COSAS QUE CAMBIAN CUANDO DEJAS DE COMPLACER A TODOS", "body": "<ol class='pts'><li><strong>Recuperas el tiempo que dabas por miedo.</strong> Cuando dejas de decir que sí a todo, te queda tiempo para ti. Ese rato que gastabas en complacer ahora lo usas en lo que de verdad te importa. Complacer por miedo te vacía; elegir con libertad te devuelve la energía. Tu tiempo es tuyo, no de quien sabe pedírtelo.</li><li><strong>Descubres quién te quería y quién solo te usaba.</strong> Cuando empiezas a poner límites, algunos se molestan. Justo esos son los que estaban cómodos con tu &quot;sí&quot; eterno. El que te quiere respeta tu &quot;no&quot;. El que se enoja solo quería tu obediencia. Tus límites no alejan a tu gente, alejan a quien te usaba.</li><li><strong>Tu paz deja de depender de la aprobación de otros.</strong> Mientras vivas para agradar, tu tranquilidad estará en manos ajenas. Cuando dejas de buscar el aplauso, recuperas el control de cómo te sientes. Ya no te derrumba una crítica ni te levanta un elogio. Esa independencia es una de las formas más reales de paz.</li></ol>", "search": "3 cosas que cambian cuando dejas de complacer a todos recuperas el tiempo que dabas por miedo. cuando dejas de decir que sí a todo, te queda tiempo para ti. ese rato que gastabas en complacer ahora lo usas en lo que de verdad te importa. complacer por miedo te vacía; elegir con libertad te devuelve la energía. tu tiempo es tuyo, no de quien sabe pedírtelo. descubres quién te quería y quién solo te usaba. cuando empiezas a poner límites, algunos se molestan. justo esos son los que estaban cómodos con tu \"sí\" eterno. el que te quiere respeta tu \"no\". el que se enoja solo quería tu obediencia. tus límites no alejan a tu gente, alejan a quien te usaba. tu paz deja de depender de la aprobación de otros. mientras vivas para agradar, tu tranquilidad estará en manos ajenas. cuando dejas de buscar el aplauso, recuperas el control de cómo te sientes. ya no te derrumba una crítica ni te levanta un elogio. esa independencia es una de las formas más reales de paz.", "copies": [["Copy card", "3 COSAS QUE CAMBIAN CUANDO DEJAS DE COMPLACER A TODOS\n\n1. Recuperas el tiempo que dabas por miedo. Cuando dejas de decir que sí a todo, te queda tiempo para ti. Ese rato que gastabas en complacer ahora lo usas en lo que de verdad te importa. Complacer por miedo te vacía; elegir con libertad te devuelve la energía. Tu tiempo es tuyo, no de quien sabe pedírtelo.\n\n2. Descubres quién te quería y quién solo te usaba. Cuando empiezas a poner
