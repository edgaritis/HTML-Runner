elegida, no rescatada.\n\nPero también entendí algo importante: esto no era jugar a ser frío, no era hacerse el difícil ni fingir desinterés. Era, en serio, construir una vida en la que mi bienestar no dependiera de nadie.\n\nEmpecé a trabajar en eso. A tener mi vida, a no depender, a no rogar. Y, sin buscarlo, empecé a atraer de verdad. Aprendí que el que no necesita, fascina; el que mendiga, espanta."]]}, {"fmt": "F3", "n": 247, "bucket": "", "title": "ENTENDÍ LA DIFERENCIA ENTRE SER BUENO Y SER USABLE", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Confundía ser bueno con decir sí a todo. Aprendí que eso no era bondad: era ser usable.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo me consideraba una buena persona. Decía sí a todo, estaba siempre disponible, ayudaba a quien me lo pidiera, nunca decía no. Y, sin embargo, sentía que la gente abusaba de mí, que me usaban sin valorarlo.</p><p class='g'>No entendía por qué, si era tan bueno, terminaba sintiéndome tan pisado.</p><p class='g'>Con el tiempo entendí la diferencia entre ser bueno y ser usable.</p><p class='g'>Lo primero que me cayó la ficha: bueno no es decir sí a todo. Lo que yo creía bondad, en realidad, era miedo: miedo a quedar mal, a no agradar, a perder a alguien. Lo que llamaba ser bueno era una vulnerabilidad disfrazada que abría la puerta a que abusaran de mí.</p><p class='g'>También entendí algo incómodo: mucha gente, cuando ve a alguien siempre dispuesto, siempre dando, siempre cediendo, no lo valora; lo aprovecha. Confunden tu generosidad con debilidad, y piden más y más. No es que mi bondad fuera mala; era que me faltaba el otro lado de la moneda: la firmeza.</p><p class='g'>La buena noticia, descubrí, era que no tenía que elegir entre ser amable o ser respetado. Se podían las dos cosas. Bondad con firmeza: dar cuando quería y podía, decir no cuando hacía falta, poner límites con calma.</p><p class='g'>Empecé a hacerlo así. A poner límites sin dejar de ser amable. Y aprendí algo importante: si te están usando, no eres bueno, eres usable. Cambiar eso no me hizo peor persona; me hizo una buena persona con criterio.</p></div>", "search": "entendí la diferencia entre ser bueno y ser usable confundía ser bueno con decir sí a todo. aprendí que eso no era bondad: era ser usable. yo me consideraba una buena persona. decía sí a todo, estaba siempre disponible, ayudaba a quien me lo pidiera, nunca decía no. y, sin embargo, sentía que la gente abusaba de mí, que me usaban sin valorarlo.\n\nno entendía por qué, si era tan bueno, terminaba sintiéndome tan pisado.\n\ncon el tiempo entendí la diferencia entre ser bueno y ser usable.\n\nlo primero que me cayó la ficha: bueno no es decir sí a todo. lo que yo creía bondad, en realidad, era miedo: miedo a quedar mal, a no agradar, a perder a alguien. lo que llamaba ser bueno era una vulnerabilidad disfrazada que abría la puerta a que abusaran de mí.\n\ntambién entendí algo incómodo: mucha gente, cuando ve a alguien siempre dispuesto, siempre dando, siempre cediendo, no lo valora; lo aprovecha. confunden tu generosidad con debilidad, y piden más y más. no es que mi bondad fuera mala; era que me faltaba el otro lado de la moneda: la firmeza.\n\nla buena noticia, descubrí, era que no tenía que elegir entre ser amable o ser respetado. se podían las dos cosas. bondad con firmeza: dar cuando quería y podía, decir no cuando hacía falta, poner límites con calma.\n\nempecé a hacerlo así. a poner límites sin dejar de ser amable. y aprendí algo importante: si te están usando, no eres bueno, eres usable. cambiar eso no me hizo peor persona; me hizo una buena persona con criterio.", "copies": [["Copy teaser", "Confundía ser bueno con decir sí a todo. Aprendí que eso no era bondad: era ser usable."], ["Copy script", "Yo me consideraba una buena persona. Decía sí a todo, estaba siempre disponible, ayudaba a quien me lo pidiera, nunca decía no. Y, sin embargo, sentía que la gente abusaba de mí, que me usaban sin valorarlo.\n\nNo entendía por qué, si era tan bueno, terminaba sintiéndome tan pisado.\n\nCon el tiempo entendí la diferencia entre ser bueno y ser usable.\n\nLo primero que me cayó la ficha: bueno no es decir sí a todo. Lo que yo creía bondad, en realidad, era miedo: miedo a quedar mal, a no agradar, a perder a alguien. Lo que llamaba ser bueno era una vulnerabilidad disfrazada que abría la puerta a que abusaran de mí.\n\nTambién entendí algo incómodo: mucha gente, cuando ve a alguien siempre dispuesto, siempre dando, siempre cediendo, no lo valora; lo aprovecha. Confunden tu generosidad con debilidad, y piden más y más. No es que mi bondad fuera mala; era que me faltaba el otro lado de la moneda: la firmeza.\n\nLa buena noticia, descubrí, era que no tenía que elegir entre ser amable o ser respetado. Se podían las dos cosas. Bondad con firmeza: dar cuando quería y podía, decir no cuando hacía falta, poner límites con calma.\n\nEmpecé a hacerlo así. A poner límites sin dejar de ser amable. Y aprendí algo importante: si te están usando, no eres bueno, eres usable. Cambiar eso no me hizo peor persona; me hizo una buena persona con criterio."]]}, {"fmt": "F3", "n": 248, "bucket": "", "title": "ENTENDÍ POR QUÉ ESTAR SIEMPRE DISPONIBLE ME QUITABA VALOR", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Estaba siempre disponible y me daban por sentado. Aprender a no estar todo el tiempo cambió cómo me veían.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo estaba siempre disponible. Respondía cada mensaje al instante, decía sí a cualquier plan, aparecía cada vez que alguien me llamaba. Pensaba que así demostraba que me importaban los demás.</p><p class='g'>Y, sin entender bien por qué, la gente me daba por sentado. No notaban cuando estaba, casi no me agradecían, me trataban como un servicio.</p><p class='g'>Con el tiempo entendí algo incómodo: estar siempre disponible me quitaba valor.</p><p class='g'>Lo que abunda, se valora menos. Si yo estaba siempre, si respondía al segundo a todo, mi presencia se volvía algo dado por hecho. La gente dejaba de notarme porque sabía que ahí estaría, sin esfuerzo. Estar disponible todo el tiempo, lejos de hacerme querer, me convertía en aire: necesario, pero no notado.</p><p class='g'>También entendí que mi tiempo, mi energía y mi atención eran recursos, y, como cualquier recurso, valían más cuando no eran ilimitados.</p><p class='g'>No se trataba de jugar a estar lejos, ni de hacerme el difícil. Era simplemente no rendirme siempre, no decir sí a todo, tener mi propia vida y mis prioridades.</p><p class='g'>Empecé a no responder cada mensaje al segundo. A decir no a planes que no me sumaban. A tener mis tiempos. Y, lejos de molestar a la gente, descubrí que empezaron a valorar más los momentos en que sí estaba.</p><p class='g'>Aprendí que aparecer cuando importa pesa más que estar todo el día. Y que mi disponibilidad, como mi tiempo, era uno de los activos más valiosos que tenía; me tocaba a mí cuidarlo.</p></div>", "search": "entendí por qué estar siempre disponible me quitaba valor estaba siempre disponible y me daban por sentado. aprender a no estar todo el tiempo cambió cómo me veían. yo estaba siempre disponible. respondía cada mensaje al instante, decía sí a cualquier plan, aparecía cada vez que alguien me llamaba. pensaba que así demostraba que me importaban los demás.\n\ny, sin entender bien por qué, la gente me daba por sentado. no notaban cuando estaba, casi no me agradecían, me trataban como un servicio.\n\ncon el tiempo entendí algo incómodo: estar siempre disponible me quitaba valor.\n\nlo que abunda, se valora menos. si yo estaba siempre, si respondía al segundo a todo, mi presencia se volvía algo dado por hecho. la gente dejaba de notarme porque sabía que ahí estaría, sin esfuerzo. estar disponible todo el tiempo, lejos de hacerme querer, me convertía en aire: necesario, pero no notado.\n\ntambién entendí que mi tiempo, mi energía y mi atención eran recursos, y, como cualquier recurso, valían más cuando no eran ilimitados.\n\nno se trataba de jugar a estar lejos, ni de hacerme el difícil. era simplemente no rendirme siempre, no decir sí a todo, tener mi propia vida y mis prioridades.\n\nempecé a no responder cada mensaje al segundo. a decir no a planes que no me sumaban. a tener mis tiempos. y, lejos de molestar a la gente, descubrí que empezaron a valorar más los momentos en que sí estaba.\n\naprendí que aparecer cuando importa pesa más que estar todo el día. y que mi disponibilidad, como mi tiempo, era uno de los activos más valiosos que tenía; me tocaba a mí cuidarlo.", "copies": [["Copy teaser", "Estaba siempre disponible y me daban por sentado. Aprender a no estar todo el tiempo cambió cómo me veían."], ["Copy script", "Yo estaba siempre disponible. Respondía cada mensaje al instante, decía sí a cualquier plan, aparecía cada vez que alguien me llamaba. Pensaba que así demostraba que me importaban los demás.\n\nY, sin entender bien por qué, la gente me daba por sentado. No notaban cuando estaba, casi no me agradecían, me trataban como un servicio.\n\nCon el tiempo entendí algo incómodo: estar siempre disponible me quitaba valor.\n\nLo que abunda, se valora menos. Si yo estaba siempre, si respondía al segundo a todo, mi presencia se volvía algo dado por hecho. La gente dejaba de notarme porque sabía que ahí estaría, sin esfuerzo. Estar disponible todo el tiempo, lejos de hacerme querer, me convertía en aire: necesario, pero no notado.\n\nTambién entendí que mi tiempo, mi energía y mi atención eran recursos, y, como cualquier recurso, valían más cuando no eran ilimitados.\n\nNo se trataba de jugar a estar lejos, ni de hacerme el difícil. Era simplemente no rendirme siempre, no decir sí a todo, tener mi propia vida y mis prioridades.\n\nEmpecé a no responder cada mensaje al segundo. A decir no a planes que no me sumaban. A tener mis tiempos. Y, lejos de molestar a la gente, descubrí que empezaron a valorar más los momentos en que sí estaba.\n\nAprendí que aparecer cuando importa pesa más que estar todo el día. Y que mi disponibilidad, como mi tiempo, era uno de los activos más valiosos que tenía; me tocaba a mí cuidarlo."]]}, {"fmt": "F3", "n": 249, "bucket": "", "title": "APRENDÍ LA DISCIPLINA DE RESPONDER DESPUÉS, NO DE INMEDIATO", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Contestaba todo al segundo y vivía reaccionando. Aprender a responder cuando yo decidía me devolvió el control.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Yo contestaba todo al segundo. Cada mensaje, cada llamada, cada pedido. La notificación sonaba y yo respondía, casi en automático. Pensaba que así era educado, atento, profesional.</p><p class='g'>Y vivía agotado, reaccionando a las urgencias de los demás, sin tiempo para lo mío. Mi día lo decidía la bandeja de entrada, no yo.</p><p class='g'>Con el tiempo aprendí una disciplina que me devolvió el control de mi vida: responder cuando yo decidía, no en cuanto sonaba la notificación.</p><p class='g'>Lo primero que entendí: responder al instante me entregaba. Le estaba enseñando al mundo que mi tiempo era de cualquiera. La urgencia, casi siempre, era ajena, no mía; alguien necesitaba algo y, al responder al segundo, su urgencia se volvía mi prioridad.</p><p class='g'>Lo segundo: no todo lo que me apuraban era urgente. Mucho de lo que se presentaba como urgente, en realidad, solo era importante para el otro, que quería su respuesta ya. Distinguir lo que de verdad ardía de lo que solo gritaba me cambió.</p><p class='g'>Empecé a darme unos minutos, unas horas, a veces un día antes de contestar. Y descubrí que mucho podía esperar. Que la pausa antes de responder me permitía contestar con claridad, no con prisa, y casi siempre mejor.</p><p class='g'>Además, sin proponérmelo, empecé a enseñar a la gente a respetar mi tiempo. El que respeta el suyo, hace que otros lo respeten. No era ser maleducado; era elegir cuándo entregarme, en lugar de hacerlo en automático.</p><p class='g'>Y recuperé algo precioso: mi día volvió a ser mío.</p></div>", "search": "aprendí la disciplina de responder después, no de inmediato contestaba todo al segundo y vivía reaccionando. aprender a responder cuando yo decidía me devolvió el control. yo contestaba todo al segundo. cada mensaje, cada llamada, cada pedido. la notificación sonaba y yo respondía, casi en automático. pensaba que así era educado, atento, profesional.\n\ny vivía agotado, reaccionando a las urgencias de los demás, sin tiempo para lo mío. mi día lo decidía la bandeja de entrada, no yo.\n\ncon el tiempo aprendí una disciplina que me devolvió el control de mi vida: responder cuando yo decidía, no en cuanto sonaba la notificación.\n\nlo primero que entendí: responder al instante me entregaba. le estaba enseñando al mundo que mi tiempo era de cualquiera. la urgencia, casi siempre, era ajena, no mía; alguien necesitaba algo y, al responder al segundo, su urgencia se volvía mi prioridad.\n\nlo segundo: no todo lo que me apuraban era urgente. mucho de lo que se presentaba como urgente, en realidad, solo era importante para el otro, que quería su respuesta ya. distinguir lo que de verdad ardía de lo que solo gritaba me cambió.\n\nempecé a darme unos minutos, unas horas, a veces un día antes de contestar. y descubrí que mucho podía esperar. que la pausa antes de responder me permitía contestar con claridad, no con prisa, y casi siempre mejor.\n\nademás, sin proponérmelo, empecé a enseñar a la gente a respetar mi tiempo. el que respeta el suyo, hace que otros lo respeten. no era ser maleducado; era elegir cuándo entregarme, en lugar de hacerlo en automático.\n\ny recuperé algo precioso: mi día volvió a ser mío.", "copies": [["Copy teaser", "Contestaba todo al segundo y vivía reaccionando. Aprender a responder cuando yo decidía me devolvió el control."], ["Copy script", "Yo contestaba todo al segundo. Cada mensaje, cada llamada, cada pedido. La notificación sonaba y yo respondía, casi en automático. Pensaba que así era educado, atento, profesional.\n\nY vivía agotado, reaccionando a las urgencias de los demás, sin tiempo para lo mío. Mi día lo decidía la bandeja de entrada, no yo.\n\nCon el tiempo aprendí una disciplina que me devolvió el control de mi vida: responder cuando yo decidía, no en cuanto sonaba la notificación.\n\nLo primero que entendí: responder al instante me entregaba. Le estaba enseñando al mundo que mi tiempo era de cualquiera. La urgencia, casi siempre, era ajena, no mía; alguien necesitaba algo y, al responder al segundo, su urgencia se volvía mi prioridad.\n\nLo segundo: no todo lo que me apuraban era urgente. Mucho de lo que se presentaba como urgente, en realidad, solo era importante para el otro, que quería su respuesta ya. Distinguir lo que de verdad ardía de lo que solo gritaba me cambió.\n\nEmpecé a darme unos minutos, unas horas, a veces un día antes de contestar. Y descubrí que mucho podía esperar. Que la pausa antes de responder me permitía contestar con claridad, no con prisa, y casi siempre mejor.\n\nAdemás, sin proponérmelo, empecé a enseñar a la gente a respetar mi tiempo. El que respeta el suyo, hace que otros lo respeten. No era ser maleducado; era elegir cuándo entregarme, en lugar de hacerlo en automático.\n\nY recuperé algo precioso: mi día volvió a ser mío."]]}, {"fmt": "F3", "n": 250, "bucket": "", "title": "ENTENDÍ, AL FINAL, QUÉ ATRAÍA DE VERDAD A LA GENTE", "body": "<div class='f3'><span class='lbl'>Teaser · goes on the image</span><p class='teaser'>Intenté atraer impresionando y presumiendo. Al final entendí qué atrae de verdad a la gente.</p><span class='lbl'>Full script · goes in the description</span><p class='g'>Durante años intenté atraer a la gente impresionando. Presumiendo mis logros, mostrando lo que tenía, hablando de mis éxitos, tratando de parecer impecable. Y, aunque a veces lograba captar atención, las relaciones no duraban; la gente no se quedaba.</p><p class='g'>Con el tiempo, observando a las personas que sí tenían relaciones profundas y duraderas, entendí qué atrae de verdad a la gente. Y no era nada de lo que yo estaba haciendo.</p><p class='g'>Lo primero que entendí: la gente no se queda contigo por tus logros, tu dinero o lo bien que hablas. Se queda por cómo se siente a tu lado. Si la haces sentir vista, valorada, en paz, tendida en confianza, te buscará. Si la haces sentir menos, juzgada, drenada, se alejará, por mucho que impresiones.</p><p class='g'>Lo segundo: la gente conecta con lo auténtico, no con la imagen perfecta. Atrae quien se muestra tal cual es, con sus virtudes y sus fallas, sin máscara. Lo perfecto da desconfianza; lo real conecta.</p><p class='g'>Lo tercero: atrae quien cumple lo que dice. Las palabras bonitas no construyen nada; los actos sí. Ser coherente entre lo que prometes y lo que haces es un imán silencioso pero poderosísimo.</p><p class='g'>Y lo último, lo que más me sorprendió: atrae quien no te necesita para estar bien. La persona en paz consigo misma, que tiene su vida y su sentido, no ruega ni se aferra, y eso, sin pedirlo, la hace magnética.</p><p class='g'>Ahí cerré el círculo. Aprendí que lo que de verdad atrae no son los logros que muestras, sino tu paz, tu autenticidad y tu coherencia. Que la gente no se queda con quien impresiona, sino con quien la hace sentir bien. Esa fue, al final, la lección que lo cambió todo.</p></div>", "search": "entendí, al final, qué atraía de verdad a la gente intenté atraer impresionando y presumiendo. al final entendí qué atrae de verdad a la gente. durante años intenté atraer a la gente impresionando. presumiendo mis logros, mostrando lo que tenía, hablando de mis éxitos, tratando de parecer impecable. y, aunque a veces lograba captar atención, las relaciones no duraban; la gente no se quedaba.\n\ncon el tiempo, observando a las personas que sí tenían relaciones profundas y duraderas, entendí qué atrae de verdad a la gente. y no era nada de lo que yo estaba haciendo.\n\nlo primero que entendí: la gente no se queda contigo por tus logros, tu dinero o lo bien que hablas. se queda por cómo se siente a tu lado. si la haces sentir vista, valorada, en paz, tendida en confianza, te buscará. si la haces sentir menos, juzgada, drenada, se alejará, por mucho que impresiones.\n\nlo segundo: la gente conecta con lo auténtico, no con la imagen perfecta. atrae quien se muestra tal cual es, con sus virtudes y sus fallas, sin máscara. lo perfecto da desconfianza; lo real conecta.\n\nlo tercero: atrae quien cumple lo que dice. las palabras bonitas no construyen nada; los actos sí. ser coherente entre lo que prometes y lo que haces es un imán silencioso pero poderosísimo.\n\ny lo último, lo que más me sorprendió: atrae quien no te necesita para estar bien. la persona en paz consigo misma, que tiene su vida y su sentido, no ruega ni se aferra, y eso, sin pedirlo, la hace magnética.\n\nahí cerré el círculo. aprendí que lo que de verdad atrae no son los logros que muestras, sino tu paz, tu autenticidad y tu coherencia. que la gente no se queda con quien impresiona, sino con quien la hace sentir bien. esa fue, al final, la lección que lo cambió todo.", "copies": [["Copy teaser", "Intenté atraer impresionando y presumiendo. Al final entendí qué atrae de verdad a la gente."], ["Copy script", "Durante años intenté atraer a la gente impresionando. Presumiendo mis logros, mostrando lo que tenía, hablando de mis éxitos, tratando de parecer impecable. Y, aunque a veces lograba captar atención, las relaciones no duraban; la gente no se quedaba.\n\nCon el tiempo, observando a las personas que sí tenían relaciones profundas y duraderas, entendí qué atrae de verdad a la gente. Y no era nada de lo que yo estaba haciendo.\n\nLo primero que entendí: la gente no se queda contigo por tus lo function counts(){ const c={ALL:DATA.length,F1:0,F2:0,F3:0,F4:0}; DATA.forEach(i=>c[i.fmt]++); return c; }
function renderTabs(){
  const c=counts();
  const order=[["ALL","All"],["F1","Lists"],["F2","3 Points"],["F3","Script"],["F4","Prompts"]];
  tabsEl.innerHTML="";
  order.forEach(([k,lab])=>{
    const b=document.createElement("button");
    b.className="tab"; b.setAttribute("aria-selected", k===activeFmt);
    b.innerHTML=lab+" <span class='cnt'>"+c[k]+"</span>";
    b.onclick=()=>{activeFmt=k; renderTabs(); render();};
    tabsEl.appendChild(b);
  });
}
function matches(it){
  if(activeFmt!=="ALL" && it.fmt!==activeFmt) return false;
  if(hideDone && isDone(it)) return false;
  if(query && !it.search.includes(query)) return false;
  return true;
}
function copyText(txt, btn){
  const done=()=>{ btn.classList.add("ok"); const o=btn.textContent; btn.textContent="Copied!";
    toast.classList.add("show"); clearTimeout(window.__tt);
    window.__tt=setTimeout(()=>{btn.classList.remove("ok");btn.textContent=o;toast.classList.remove("show");},1300); };
  if(navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
  else fallback(txt,done);
}
function fallback(txt,cb){ const ta=document.createElement("textarea"); ta.value=txt;
  ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function card(it){
  const el=document.createElement("article");
  el.className="card"+(isDone(it)?" done":"");
  const bucket=it.bucket?"<span class='bucket'>"+escapeHtml(it.bucket)+"</span>":"";
  let foot=""; it.copies.forEach((c,idx)=>{ foot+="<button class='copy"+(idx>0?" secondary":"")+"' data-i='"+idx+"'>"+c[0]+"</button>"; });
  const titleHtml = it.title ? "<div class='title'>"+escapeHtml(it.title)+"</div>" : "";
  el.innerHTML=
    "<div class='chead'><span class='pill p-"+it.fmt+"'>"+LABELS[it.fmt]+"</span>"+bucket+
    "<span class='idx'>"+it.fmt+" · "+it.n+"</span>"+
    "<button class='markbtn'>"+(isDone(it)?"Posted":"Mark")+"</button></div>"+
    titleHtml + it.body +
    "<div class='cfoot'>"+foot+"</div>";
  el.querySelectorAll(".copy").forEach(b=>{ b.onclick=()=>copyText(it.copies[+b.dataset.i][1], b); });
  el.querySelector(".markbtn").onclick=()=>{ store.set(doneKey(it), isDone(it)?"0":"1"); render(); };
  return el;
}
function render(){ const list=DATA.filter(matches); grid.innerHTML="";
  list.forEach(it=>grid.appendChild(card(it))); emptyEl.hidden=list.length>0; }
document.getElementById("q").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();render();});
document.getElementById("hide").addEventListener("change",e=>{hideDone=e.target.checked;render();});
document.addEventListener("keydown",e=>{ if(e.key==="/" && document.activeElement.id!=="q"){e.preventDefault();document.getElementById("q").focus();}});
renderTabs(); render();
</script>
</body>
</html>
